<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة والتوزيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
:root{
--blue:#0B3D91;
--red:#e53935;
--orange:#ff7a00;
--gray:#777;
--bg:#f5f7fa;
}

body{margin:0;font-family:Cairo;background:var(--bg)}

/* HEADER */
.header{position:sticky;top:0;z-index:1000;background:var(--blue);color:#fff}
.header img{width:100%;height:120px;object-fit:cover}
.title{text-align:center;padding:5px;font-weight:bold}

/* NEWS */
.news{background:var(--orange);color:#fff;text-align:center;padding:6px}

/* TIERS */
.tiers{display:flex;gap:6px;padding:8px;overflow-x:auto;background:#fff}
.tier{padding:6px 12px;border-radius:20px;border:1px solid #ddd}
.tier.active{background:var(--blue);color:#fff}

/* BACK */
.back{padding:8px;text-align:center;background:#fff;color:var(--blue);display:none;font-weight:bold}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}

/* CARD */
.card{background:#fff;border-radius:10px;padding:10px;text-align:center}
.card img{width:100%;height:100px;object-fit:contain}

/* PRICE */
.price{color:var(--red);font-weight:bold}

/* QTY */
.qty{display:flex;justify-content:center;align-items:center;gap:5px;margin:5px}
.qty input{width:50px;text-align:center}
.qty button{padding:5px}

/* BTN */
.btn{background:var(--orange);color:#fff;padding:8px;border-radius:8px;margin-top:5px}

/* FOOTER */
.footer{position:fixed;bottom:0;width:100%;background:#fff;display:flex;justify-content:space-between;padding:10px;border-top:1px solid #ddd}

/* INPUT */
.input{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:1px solid #ccc}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2e7d32;color:#fff;padding:10px;border-radius:20px;display:none}
</style>
</head>

<body>

<div class="header">
<img id="headerImg">
<div class="title">الأهرام للتجارة والتوزيع</div>
<div class="news" id="news">...</div>
<div class="tiers" id="tiers"></div>
<div class="back" id="backBtn" onclick="goBack()">⬅ اضغط للرجوع</div>
</div>

<div id="app"></div>

<div class="footer">
<div onclick="goBack()">⬅ رجوع</div>
<div id="totalBox">0 جنيه</div>
<div onclick="review()">🧾 مراجعة</div>
</div>

<div class="toast" id="toast">✔ تمت الإضافة</div>

<script>

const fix=u=>u+"&t="+Date.now();
const num=v=>parseFloat(v)||0;

let products=[],tiers=[],settings=[];
let cart=JSON.parse(localStorage.getItem("cart")||"{}");
let tier=JSON.parse(localStorage.getItem("tier")||"null");
let customer=JSON.parse(localStorage.getItem("customer")||"{}");

let currentPage="brands",lastCompany=null;

/* LOAD */
function load(url){return new Promise(r=>{
Papa.parse(fix(url),{download:true,header:true,complete:(res)=>r(res.data||[])});
});}

Promise.all([
load("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=2123604928&output=csv"),
load("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=688371996&output=csv"),
load("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1922249138&output=csv")
]).then(([p,t,s])=>{

products=p.filter(x=>(x.status||"").trim()=="active");
tiers=t.filter(x=>String(x.tier_active||"")=="1");
settings=s;

/* HEADER */
let img=settings.find(x=>x.type=="company_image")?.value;
document.getElementById("headerImg").src=img||"https://via.placeholder.com/600x200";

/* NEWS FIX */
let raw=settings.filter(x=>x.type=="news").map(x=>x.value).join("،");
let list=raw.split("،").filter(x=>x.trim());
let i=0;
if(list.length){
setInterval(()=>{
document.getElementById("news").innerText=list[i];
i=(i+1)%list.length;
},3000);
}else{
document.getElementById("news").innerText="";
}

/* TIERS */
let box=document.getElementById("tiers");
tiers.forEach(t=>{
let d=document.createElement("div");
d.className="tier";
d.innerText=t.tier_name;

d.onclick=()=>{
tier=t;
localStorage.setItem("tier",JSON.stringify(t));
cart={};localStorage.setItem("cart","{}");
showBrands();updateTotal();
};

box.appendChild(d);
});

showBrands();
updateTotal();

});

/* BRANDS */
function showBrands(){
currentPage="brands";
document.getElementById("backBtn").style.display="none";

let brands=[...new Set(products.map(p=>p.company))];
let app=document.getElementById("app");
app.innerHTML="<div class='grid'>";

brands.forEach(b=>{
if(tier && b=="صفقة اليوم") return;
let img=products.find(p=>p.company==b)?.brand_image||"";
app.innerHTML+=`<div class="card" onclick="showProducts('${b}')"><img src="${img}"><div>${b}</div></div>`;
});

app.innerHTML+="</div>";
}

/* PRODUCTS */
function showProducts(company){
currentPage="products";
lastCompany=company;
document.getElementById("backBtn").style.display="block";

let app=document.getElementById("app");
app.innerHTML="<div class='grid'>";

products.filter(p=>p.company==company).forEach(p=>{

let units=["carton","dozen","piece"].filter(u=>num(p["price_"+u])>0);

app.innerHTML+=`
<div class="card">
<img src="${p.image}">
<div>${p.name}</div>
<div class="price">${num(p.price_carton)} جنيه</div>

<select id="u_${p.code}">
<option value="">الوحدة</option>
${units.map(u=>`<option value="${u}">${u=="carton"?"كرتونة":u=="dozen"?"دستة":"قطعة"}</option>`).join("")}
</select>

<div class="qty">
<button onclick="change('${p.code}',-1)">-</button>
<input id="q_${p.code}" value="1">
<button onclick="change('${p.code}',1)">+</button>
</div>

<div class="btn" onclick="add('${p.code}')">🛒 أضف للسلة</div>
</div>
`;
});

app.innerHTML+="</div>";
}

/* QTY */
function change(code,val){
let el=document.getElementById("q_"+code);
let v=parseInt(el.value)||1;
v+=val;
if(v<1)v=1;
el.value=v;
}

/* ADD */
function add(code){
code=String(code).trim();
let p=products.find(x=>String(x.code).trim()==code);
if(!p)return alert("خطأ في المنتج");

let unit=document.getElementById("u_"+code).value;
if(!unit)return alert("اختر الوحدة");

let qty=parseInt(document.getElementById("q_"+code).value)||1;
let price=num(p["price_"+unit]);
if(!price)return alert("السعر غير متاح");

cart[code]={code,name:p.name,unit,qty,price};
localStorage.setItem("cart",JSON.stringify(cart));

toast();updateTotal();
}

/* TOAST */
function toast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1000);
}

/* TOTAL */
function updateTotal(){
let total=0;
Object.values(cart).forEach(c=>total+=c.qty*c.price);
document.getElementById("totalBox").innerText=total+" جنيه";
}

/* REVIEW */
function review(){
currentPage="review";
document.getElementById("backBtn").style.display="block";

let app=document.getElementById("app");
let html="",total=0;

Object.values(cart).forEach(c=>{
let s=c.qty*c.price; total+=s;
html+=`
<div class="card">
[${c.code}] ${c.name}<br>
${c.qty} × ${c.unit}<br>
${s} جنيه
<div class="qty">
<button onclick="edit('${c.code}',-1)">-</button>
<span>${c.qty}</span>
<button onclick="edit('${c.code}',1)">+</button>
</div>
<div onclick="removeItem('${c.code}')">❌ حذف</div>
</div>`;
});

html+=`
<div class="card">
<input class="input" id="name" placeholder="الاسم" value="${customer.name||""}">
<input class="input" id="phone" placeholder="الموبايل" value="${customer.phone||""}">
<input class="input" id="address" placeholder="العنوان" value="${customer.address||""}">
<input class="input" id="business" placeholder="اسم النشاط" value="${customer.business||""}">

<div class="btn" onclick="getLocation()">📍 اضغط لإضافة اللوكيشن</div>
<div id="locMsg"></div>

<div class="btn" onclick="send(${total})">إرسال الطلب</div>
</div>
`;

app.innerHTML=html;
}

/* LOCATION */
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
let link=`https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
customer.location=link;
localStorage.setItem("customer",JSON.stringify(customer));
document.getElementById("locMsg").innerText="✔ تم تحديد اللوكيشن";
});
}

/* SEND */
function send(total){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

customer={name,phone,address,...customer};
localStorage.setItem("customer",JSON.stringify(customer));

let msg="طلب:%0A";

Object.values(cart).forEach(c=>{
msg+=`[${c.code}] ${c.name}%0A${c.qty} ${c.unit} = ${c.qty*c.price}%0A`;
});

msg+=`%0Aالإجمالي: ${total}%0A${name}%0A${phone}%0A${address}`;

window.open("https://wa.me/201552670465?text="+msg);
}

/* BACK */
function goBack(){
if(currentPage=="products")showBrands();
else if(currentPage=="review")showProducts(lastCompany);
}

</script>

</body>
</html>
