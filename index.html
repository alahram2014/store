<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>الأهرام للتجارة والتوزيع</title>
<meta name="theme-color" content="#c79b18" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{--gold:#c79b18;--gold2:#f0d46c;--gold3:#8a5a00;--bg:#fcf6e5;--card:#fff;--line:#ead08a;--text:#1b2230;--muted:#687280;--green:#1f8b4c;--red:#c0392b;--blue:#0b3d91;--shadow:0 10px 24px rgba(184,138,0,.12)}
*{box-sizing:border-box} html,body{height:100%}
body{margin:0;font-family:'Cairo',sans-serif;background:linear-gradient(180deg,#fffaf0,#fcf6e5 35%,#f8efd5);color:var(--text)}
a{color:inherit;text-decoration:none} button,input,select{font-family:inherit}
#shell{min-height:100%;display:flex;flex-direction:column}
.header{position:sticky;top:0;z-index:1200;background:linear-gradient(180deg,#d0a42a,#a97105);color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.hero{position:relative;min-height:170px;overflow:hidden;background:linear-gradient(135deg,#3a2700,#a97105)}
.hero img{width:100%;min-height:170px;height:100%;object-fit:cover;opacity:.9}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.4))}
.heroText{position:absolute;top:12px;right:12px;left:12px;z-index:2;display:flex;flex-direction:column;align-items:flex-end;gap:4px;text-shadow:0 2px 8px rgba(0,0,0,.35)}
.heroTitle,.heroSub{background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border-radius:14px;padding:6px 10px}
.heroTitle{font-size:20px;font-weight:900;line-height:1.2}
.heroSub{font-size:13px;font-weight:700;line-height:1.7}
.contacts,.toolbar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 10px 8px}
.contactBtn,.toolbar button,.searchBtn,.quickBtn,.clearBtn,.footerBtn,.mainBtn,.addBtn,.qtyBtn,.tierBtn,.bannerBtn,.miniBtn,.repAction{border:0;border-radius:14px;cursor:pointer;font-family:inherit;font-weight:800}
.contactBtn{min-height:42px;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 8px 16px rgba(0,0,0,.08)}
.toolbar{padding:0 10px 10px}
.toolbar button{min-height:44px;background:linear-gradient(135deg,#fff7cf,#f0d46c);color:#5b4300;box-shadow:0 10px 20px rgba(0,0,0,.12)}
.toolbar button.active{outline:2px solid rgba(255,255,255,.6)}
.newsbar{background:linear-gradient(135deg,#f0d46c,#c79b18);color:#553c00;font-weight:900;padding:8px 12px;min-height:34px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:13px;line-height:1.5}
.searchWrap{padding:10px;background:rgba(255,255,255,.06)}
.searchRow{display:grid;grid-template-columns:1fr 96px 56px;gap:8px}
.searchInput,.unitSelect,.qtyInput,.reviewQtyInput,.input{width:100%;height:44px;border-radius:12px;border:1px solid #dccb89;outline:none;background:#fff;padding:0 12px;font-size:14px}
.searchInput:focus,.unitSelect:focus,.qtyInput:focus,.reviewQtyInput:focus,.input:focus{border-color:#c79b18;box-shadow:0 0 0 3px rgba(199,155,24,.14)}
.searchBtn,.quickBtn,.clearBtn{height:44px;color:#fff}
.searchBtn{background:linear-gradient(135deg,#c79b18,#f0d46c);color:#5b4300}.quickBtn{background:linear-gradient(135deg,#0b3d91,#3a74e6)}.clearBtn{background:#74808e}
#app{flex:1;padding:10px 10px 120px}
.card,.pageCard,.tierCard,.reviewItem,.reviewBox,.formBox,.emptyBox,.banner{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
.pageCard,.reviewBox,.formBox,.banner{padding:12px;margin-bottom:10px}
.pageTitle{font-weight:900;font-size:16px;color:#7b5600;margin-bottom:6px}
.pageText{font-size:13px;line-height:1.8;color:#4e5968}
.sectionTitle{margin:12px 0 8px;font-size:13px;font-weight:800;color:#5f6473}
.grid,.tiersGrid,.quickGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.brandCard,.productCard,.tierCard{padding:10px}
.brandCard{text-align:center;display:flex;flex-direction:column;gap:6px;min-height:130px;justify-content:center}
.brandLogo,.productImage{width:100%;object-fit:contain;border-radius:14px;background:#fff8e8}
.brandLogo{height:72px}.productImage{height:96px}
.brandName,.productName{font-weight:900;font-size:13px;line-height:1.35}
.brandName{color:#604500}.productName{min-height:36px}
.priceLine{font-size:13px;font-weight:900;color:#8a5a00;line-height:1.3}
.modeBadge,.stockBadge{display:inline-flex;align-items:center;justify-content:center;align-self:flex-start;font-size:11px;font-weight:900;padding:4px 8px;border-radius:999px}
.modeBadge{background:#fff5d6;color:#805900}.stockBadge.ok{background:#e7f7ee;color:#1a7a42}.stockBadge.no{background:#ffeceb;color:#be2d24}
.qtyWrap{display:grid;grid-template-columns:34px 1fr 34px;gap:5px;align-items:center}
.qtyBtn{height:36px;width:34px;background:#eff3f8;color:#1d2737}.unitSelect{height:38px;font-size:13px}.qtyInput,.reviewQtyInput{text-align:center}
.addBtn{min-height:42px;background:linear-gradient(135deg,#d38912,#f0d46c);color:#5b4300}
.addBtn.offer{background:linear-gradient(135deg,#c79b18,#fff0a8)}
.tierHead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;font-weight:900;font-size:14px;color:#754e00}
.tierTag{padding:4px 8px;border-radius:999px;font-size:11px;font-weight:900;background:#fff0bf;color:#7e5900}
.tierMeta,.tierDesc{font-size:12px;line-height:1.7;color:#556273}.tierDesc{margin-top:6px}
.tierBtn{width:100%;min-height:40px;margin-top:10px;background:linear-gradient(135deg,#0b3d91,#3a74e6);color:#fff}
.tierCard.locked .tierBtn{background:linear-gradient(135deg,#8a5a00,#c79b18)}
.bannerTop{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px;line-height:1.8;font-weight:900;color:#5f4300}
.bannerBtn{min-height:36px;padding:0 12px;border-radius:999px;background:linear-gradient(135deg,#0b3d91,#3a74e6);color:#fff}
.handTitle{font-size:18px;font-weight:900;font-style:italic;color:#7a5600;line-height:1.4;margin-bottom:6px}
.reviewSummaryRow{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.reviewTitle{font-size:14px;font-weight:900;color:#223044;margin-bottom:4px}
.reviewLine{font-size:13px;line-height:1.7;color:#445063}
.reviewActions{margin-top:8px;display:grid;grid-template-columns:34px 1fr 34px;gap:5px;align-items:center}
.reviewDelete{margin-top:8px;text-align:center;font-weight:900;color:#c0392b;cursor:pointer}
.locationStatus{margin-top:6px;color:#7a7f8b;font-size:13px;min-height:18px}
.sendBanner{width:100%;min-height:52px;background:linear-gradient(135deg,#1f8b4c,#2ea95d);color:#fff;font-size:17px;box-shadow:0 12px 24px rgba(31,139,76,.22)}
.sendBanner:disabled{background:linear-gradient(135deg,#a7b1bb,#c7d0d8);box-shadow:none}
.footer{position:fixed;left:0;right:0;bottom:0;z-index:1300;background:#fff;border-top:1px solid var(--line);box-shadow:0 -8px 24px rgba(0,0,0,.08);padding:8px 10px 10px;display:grid;grid-template-columns:94px 1fr 94px;gap:8px;align-items:center}
.footerBtn{min-height:46px;background:#eff3f8;color:#1f2a3a;font-size:14px}
.footerBtn.cart{background:linear-gradient(135deg,#c79b18,#f0d46c);color:#5b4300}
.footerTotal{text-align:center;font-weight:900;color:#8a5a00;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toast{position:fixed;left:50%;top:16px;transform:translateX(-50%);z-index:3000;min-width:200px;max-width:90vw;padding:11px 14px;border-radius:999px;text-align:center;font-size:14px;font-weight:800;color:#fff;background:#0b3d91;box-shadow:0 12px 28px rgba(0,0,0,.18);display:none}
.toast.ok{background:#1f8b4c}.toast.error{background:#c0392b}.toast.info{background:#0b3d91}
.repBadge{position:fixed;top:12px;left:12px;z-index:2500;display:none;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:linear-gradient(135deg,#fff8de,#f0d46c);color:#6d4a00;border:1px solid #e6cf82;box-shadow:0 12px 24px rgba(184,138,0,.18);font-weight:900;font-size:13px}
.repBadge button{border:0;border-radius:999px;background:#8a5a00;color:#fff;font-weight:900;cursor:pointer;padding:5px 10px}
.modal{position:fixed;inset:0;z-index:4000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.46);backdrop-filter:blur(6px);padding:16px}
.modal.show{display:flex}.modalCard{width:min(420px,100%);background:#fff;border-radius:22px;padding:18px;border:1px solid #e7cf87;box-shadow:0 24px 56px rgba(0,0,0,.22)}
.modalTitle{font-size:20px;font-weight:900;color:#7a5600;margin-bottom:6px}
.modalText{font-size:13px;line-height:1.8;color:#5c6878;margin-bottom:12px}
.modalInput{width:100%;height:46px;border-radius:14px;border:1px solid #d9c47c;margin-bottom:10px;padding:0 14px;font-size:15px;outline:none}
.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modalActions button{min-height:44px;border:0;border-radius:14px;font-family:inherit;font-weight:800;cursor:pointer}
.modalActions .primary{background:linear-gradient(135deg,#c79b18,#f0d46c);color:#5b4300}
.modalActions .secondary{background:#eff3f8;color:#1f2a3a}
.quickTop{background:linear-gradient(135deg,#fff4cc,#fffdf3);border:1px solid #e5c972;border-radius:20px;padding:14px;margin-bottom:10px}
.quickTitle{font-size:19px;font-weight:900;color:#7a5600;margin-bottom:4px}.quickSub{font-size:13px;line-height:1.8;color:#4c5967}
.quickChip{border:1px solid #e3cd87;background:#fff;border-radius:14px;padding:10px 8px;font-size:13px;font-weight:900;color:#7a5600;min-height:48px}
.emptyBox{padding:18px;text-align:center;color:#7a7f8b;font-weight:800}
.hidden{display:none!important}
@media (min-width:700px){.grid,.tiersGrid,.quickGrid{grid-template-columns:repeat(3,minmax(0,1fr))}.toolbar,.contacts{grid-template-columns:repeat(3,minmax(0,220px));justify-content:center}}
</style>
</head>
<body>
<div id="shell">
  <div class="header">
    <div class="hero">
      <img id="heroImage" alt="الأهرام للتجارة والتوزيع" loading="eager">
      <div class="heroText">
        <div class="heroTitle" id="heroTitle">الأهرام للتجارة والتوزيع</div>
        <div class="heroSub" id="heroSub">تشكيل كبير ومتنوّع لأكبر شركات مستحضرات التجميل</div>
      </div>
    </div>
    <div class="contacts">
      <a class="contactBtn" id="phoneLink" href="tel:01040880002">📞</a>
      <a class="contactBtn" id="waLink" href="https://wa.me/201040880002" target="_blank" rel="noopener">🟢</a>
      <a class="contactBtn" id="fbLink" href="https://www.facebook.com/alahram2014" target="_blank" rel="noopener">f</a>
    </div>
    <div class="newsbar" id="newsBar">أهلاً بكم في الأهرام للتجارة والتوزيع</div>
    <div class="toolbar">
      <button type="button" id="tierBtn">اختار شريحتك</button>
      <button type="button" id="dealBtn">صفقة اليوم</button>
      <button type="button" id="repBtn">دخول مندوب</button>
    </div>
    <div class="searchWrap">
      <div class="searchRow">
        <input class="searchInput" id="searchInput" placeholder="ابحث باسم الصنف أو الكود أو الأرقام..." autocomplete="off">
        <button class="quickBtn" type="button" id="quickBtn">التسوق السريع</button>
        <button class="clearBtn" type="button" id="clearBtn">مسح</button>
      </div>
    </div>
  </div>

  <div id="app"><div class="emptyBox">جارٍ التحميل...</div></div>

  <div class="footer">
    <button class="footerBtn" id="leftFooterBtn">السلة</button>
    <div class="footerTotal" id="footerTotal">0 جنيه</div>
    <button class="footerBtn" id="rightFooterBtn">رجوع للخلف</button>
  </div>
</div>

<div class="repBadge" id="repBadge"></div>
<div class="toast" id="toast"></div>

<div class="modal" id="repModal">
  <div class="modalCard">
    <div class="modalTitle">دخول المندوب</div>
    <div class="modalText">أدخل كود المندوب والرقم السري المطابقين لصفحة Reps.</div>
    <input class="modalInput" id="repCode" placeholder="كود المندوب" autocomplete="off">
    <input class="modalInput" id="repPass" placeholder="الرقم السري" type="password" autocomplete="off">
    <div class="modalActions">
      <button class="primary" id="repSubmit" type="button">دخول</button>
      <button class="secondary" id="repCancel" type="button">إلغاء</button>
    </div>
  </div>
</div>

<script>
const SHEETS = {
  products: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1503749054&output=csv",
  tiers: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1417829941&output=csv",
  settings: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=47255050&output=csv",
  reps: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1117843076&output=csv"
};
const POST_URL = "https://script.google.com/macros/s/AKfycbw36ri62dxHKYrw5D1sCg8utxKBoWdrqHj8IHj07BCwkvBeIOrgXs7Hto4IFOCSx3wqcA/exec";
const DEFAULT_IMAGE = "https://i.ibb.co/35bpcFM1/file-000000006684720a8af00bcc1169c95a.png";
const LS = { cart:"alahram_cart_v11", tier:"alahram_tier_v11", rep:"alahram_rep_v11", draft:"alahram_draft_v11", unlocked:"alahram_unlocked_tiers_v11", customer:"alahram_customer_v11", lastOrder:"alahram_last_order_v11", search:"alahram_search_v11" };

const $ = id => document.getElementById(id);
const clean = v => (v ?? "").toString().trim();
const num = v => { const n = parseFloat(clean(v).replace(/[٬،\s]/g,"").replace(/,/g,"")); return Number.isFinite(n)?n:0; };
const html = s => String(s ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"','&quot;');
const norm = s => clean(s).normalize("NFKD").replace(/[\u064B-\u065F\u0670\u0640]/g,"").replace(/[أإآ]/g,"ا").replace(/ى/g,"ي").replace(/ؤ/g,"و").replace(/ئ/g,"ي").replace(/ة/g,"ه").replace(/\s+/g," ").toLowerCase();
const compact = s => norm(s).replace(/\s+/g,"");
const save = (k,v) => localStorage.setItem(k, JSON.stringify(v));
const load = (k,f) => { try { return JSON.parse(localStorage.getItem(k)) ?? f; } catch { return f; } };
const money = n => Math.round(num(n)).toLocaleString("en-US");
const pct = n => { const x = num(n); return Number.isInteger(x) ? String(x) : String(x); };
const firstOf = (row, keys) => { const arr = Array.isArray(keys)?keys:[keys]; for (const wanted of arr) { for (const [k,v] of Object.entries(row||{})) { if (compact(k)===compact(wanted)) return clean(v); } } for (const wanted of arr) { for (const [k,v] of Object.entries(row||{})) { if (compact(k).includes(compact(wanted))) return clean(v); } } return ""; };
const asBool = v => ["1","true","yes","active","on","فعال","متاح"].includes(norm(v));
const slide = s => clean(s).split(/[،\n;|]+/g).map(x=>clean(x)).filter(Boolean);

let data = { products:[], tiers:[], settings:[], reps:[] };
let state = { page:"home", prevPage:null, search:load(LS.search,""), selectedTier:load(LS.tier,null), rep:load(LS.rep,null), cart:load(LS.cart,{}), drafts:load(LS.draft,{}), unlockedTiers:load(LS.unlocked,{}), customer:load(LS.customer,{}), searchSourcePage:"home", sending:false, prevCompany:"" };

function persist(){ save(LS.cart,state.cart); save(LS.tier,state.selectedTier); save(LS.rep,state.rep); save(LS.draft,state.drafts); save(LS.unlocked,state.unlockedTiers); save(LS.customer,state.customer); save(LS.search,state.search); }
function toast(msg, kind="info"){ const t=$("toast"); t.className=`toast ${kind}`; t.textContent=msg; t.style.display="block"; clearTimeout(window.__toastTimer); window.__toastTimer=setTimeout(()=>t.style.display="none",1800); }
function loadCSV(url){ return new Promise(resolve=>Papa.parse(`${url}&t=${Date.now()}`,{download:true,header:true,skipEmptyLines:true,complete:r=>resolve(r.data||[])})); }
function setPage(page, params={}, push=true){ state.page=page; if(push) history.pushState({page,params},""); persist(); renderPage(page,params); }
function goBack(){ if(history.length>1){ history.back(); return; } setPage("home",{},false); }
function setMeta(){ $("heroTitle").textContent=getHeroTitle(); $("heroSub").textContent=getHeroSubtitle(); $("heroImage").src=getHeroImage(); $("phoneLink").href=`tel:${getContactPhone()}`; $("waLink").href=`https://wa.me/${getWhatsapp()}`; $("fbLink").href=getFacebook(); const lines=getNewsLines(); let i=0; $("newsBar").textContent=lines[0]; clearInterval(window.__ticker); window.__ticker=setInterval(()=>{$("newsBar").textContent=lines[(++i)%lines.length]},3000); }
function renderFooter(){ $("leftFooterBtn").textContent = state.page==="review" ? "الشركات" : "السلة"; $("leftFooterBtn").onclick = ()=>state.page==="review" ? setPage("companies") : setPage("review"); $("rightFooterBtn").textContent="رجوع للخلف"; $("rightFooterBtn").onclick=()=>goBack(); $("footerTotal").onclick=()=>state.page==="review" ? setPage("companies") : setPage("review"); $("footerTotal").textContent = `${money(cartTotal())} جنيه`; }
function showRepBadge(){ const b=$("repBadge"); if(state.rep&&state.rep.repName){ b.style.display="flex"; b.innerHTML=`<span>👔 ${html(state.rep.repName)}</span><button id="repLogoutBtn" type="button">خروج</button>`; $("repLogoutBtn").onclick=()=>logoutRep(); } else { b.style.display="none"; b.innerHTML=""; } }
function openRepModal(){ $("repModal").classList.add("show"); $("repCode").value=""; $("repPass").value=""; $("repCode").focus(); }
function closeRepModal(){ $("repModal").classList.remove("show"); }
function logoutRep(){ state.rep=null; persist(); showRepBadge(); toast("تم تسجيل الخروج من وضع المندوب","info"); renderPage(state.page,{}); }

function getSetting(keys, fallback=""){ const wanted=Array.isArray(keys)?keys:[keys]; for(const row of data.settings){ const hay=norm([row.type,row.key,row.name,row.title,row.label].filter(Boolean).join(" ")); if(wanted.some(k=>hay.includes(norm(k)))){ const val=firstOf(row,["value","text","content","message","news","url"]); if(clean(val)) return clean(val); } } return fallback; }
function getHeroImage(){ return getSetting(["company_image","hero_image","header_image","main_image","image"],DEFAULT_IMAGE)||DEFAULT_IMAGE; }
function getHeroSubtitle(){ return getSetting(["hero_subtitle","subtitle","tagline","headline","banner_text"],"تشكيل كبير ومتنوّع لأكبر شركات مستحضرات التجميل"); }
function getHeroTitle(){ return getSetting(["company_title","company_name","title"],"الأهرام للتجارة والتوزيع"); }
function getContactPhone(){ return getSetting(["contact_phone","phone","tel"],"01040880002"); }
function getWhatsapp(){ return getSetting(["contact_whatsapp","whatsapp","wa"],"201040880002"); }
function getFacebook(){ return getSetting(["contact_facebook","facebook","fb"],"https://www.facebook.com/alahram2014"); }
function getNewsLines(){ const rows=data.settings.filter(r=>{ const hay=norm([r.type,r.key,r.name,r.title].filter(Boolean).join(" ")); return hay.includes("news")||hay.includes("ticker")||hay.includes("announcement"); }); const lines=[]; rows.forEach(r=>{ const t=firstOf(r,["value","text","content","message","news"]); if(t) lines.push(...slide(t)); }); if(!lines.length){ const fallback=getSetting(["news","ticker","news_text"],""); if(fallback) lines.push(...slide(fallback)); } return lines.length ? lines : ["أهلاً بكم في الأهرام للتجارة والتوزيع"]; }

function getDisplayName(p){ return clean(firstOf(p,["name","product_name","item_name","title","product","item"])) || "صنف"; }
function getProductCode(p){ return clean(firstOf(p,["codo","code","product_code","productcode","sku","id"])); }
function getCompany(p){ return clean(firstOf(p,["company","company_name","brand","group"])); }
function getImage(p){ return clean(firstOf(p,["image","photo","img","product_image","picture","brand_image"])) || DEFAULT_IMAGE; }
function getStatus(p){ return norm(firstOf(p,["status","active","state"])); }
function isActive(p){ const s=getStatus(p); return !s || ["active","1","true","yes","فعال","متاح"].includes(s); }
function isOffer(p){ return getCompany(p)==="صفقة اليوم" || asBool(firstOf(p,["deal","offer","is_offer","offer_active"])) || clean(firstOf(p,["offer_label","offer_name","offer"])); }
function keyOf(p){ return clean(firstOf(p,["product_id","id","sku","code","codo","product_code"])) || `${getProductCode(p)}|${getDisplayName(p)}|${getCompany(p)}`; }

function getBasePrice(p, unit){
  const u=clean(unit);
  if(u==="offer") return num(firstOf(p,["price_offer","offer_price","سعر العرض","سعر العرض الخاص"])) || num(firstOf(p,["price_carton","carton_price","سعر الكرتونة","سعر الكرتونه"])) || num(firstOf(p,["price_dozen","dozen_price","سعر الدستة","سعر الدسته"])) || num(firstOf(p,["price_piece","piece_price","سعر القطعة","سعر القطعه"])) || 0;
  const map={carton:["price_carton","carton_price","سعر الكرتونة","سعر الكرتونه"],dozen:["price_dozen","dozen_price","سعر الدستة","سعر الدسته"],piece:["price_piece","piece_price","سعر القطعة","سعر القطعه"]};
  for(const k of (map[u]||[])){ const v=num(firstOf(p,[k])); if(v>0) return v; }
  return 0;
}
function getRepPrice(p, unit){
  if(!state.rep) return 0;
  const u=clean(unit), id=compact(state.rep.repId||""), name=compact(state.rep.repName||"");
  const keys=[`${id}_${u}`,`${name}_${u}`,`rep_${u}`,`${u}_rep`,`price_rep_${u}`,`rep_price_${u}`,`price_${u}_rep`];
  for(const k of keys){ const v=num(firstOf(p,[k])); if(v>0) return v; }
  return 0;
}
function getTierPrice(p, unit){
  if(!state.selectedTier) return 0;
  const u=clean(unit), n=compact(state.selectedTier.tier_name||""), v=compact(state.selectedTier.visible_label||"");
  const keys=[`${n}_${u}`,`${n}${u}`,`${u}_${n}`,`${v}_${u}`,`${v}${u}`,`${u}_${v}`,`tier_${u}`,`${u}_tier`,`price_tier_${u}`,`tier_price_${u}`];
  for(const k of keys){ const x=num(firstOf(p,[k])); if(x>0) return x; }
  return 0;
}
function getActivePrice(p, unit){ if(state.selectedTier){ const t=getTierPrice(p,unit); return t>0?t:getBasePrice(p,unit); } if(state.rep){ const r=getRepPrice(p,unit); return r>0?r:getBasePrice(p,unit); } return getBasePrice(p,unit); }
function getAvailableUnits(p){ return ["carton","dozen","piece"].filter(u=>getActivePrice(p,u)>0); }
function primaryUnit(p){ if(getActivePrice(p,"carton")>0) return "carton"; if(getActivePrice(p,"dozen")>0) return "dozen"; if(getActivePrice(p,"piece")>0) return "piece"; return getAvailableUnits(p)[0]||""; }
function getOfferPrice(p){ return getActivePrice(p,"offer"); }

function productsByCompany(company){ return data.products.filter(p=>getCompany(p)===company && isActive(p)); }
function companyList(){ const seen=new Set(), list=[]; data.products.forEach(p=>{ const c=getCompany(p); if(!c || c==="صفقة اليوم" || seen.has(c)) return; seen.add(c); list.push(c); }); return list; }
function dealProducts(){ return data.products.filter(p=>isOffer(p) && isActive(p)); }
function topProductsForQuick(){ const out=[], used=new Set(); for(const c of companyList()){ const p=productsByCompany(c)[0]; if(p && !used.has(keyOf(p))){ used.add(keyOf(p)); out.push(p); } if(out.length>=12) break; } if(out.length<12){ data.products.filter(isActive).forEach(p=>{ if(out.length<12 && getCompany(p)!=="صفقة اليوم" && !used.has(keyOf(p))){ used.add(keyOf(p)); out.push(p); } }); } return out; }

function tierRows(){ return data.tiers.map(t=>({ raw:t, tier_name: clean(firstOf(t,["tier_name","name","title"])) || "شريحة", visible_label: clean(firstOf(t,["visible_label","tier_name","name","title"])) || clean(firstOf(t,["tier_name","name","title"])), tier_password: clean(firstOf(t,["tier_password","password","pass","secret_code","code","pin"])), tier_min: num(firstOf(t,["tier_min","min","min_amount","minimum","limit"])), tier_discount: num(firstOf(t,["tier_discount","discount","discount_percent","percent"])), tier_description: clean(firstOf(t,["tier_description","description","desc","terms","conditions"])), active: firstOf(t,["active","tier_active","status"]) })).filter(t=>!t.active || asBool(t.active)); }

function cartItems(){ return Object.values(state.cart||{}); }
function cartTotal(){ return cartItems().reduce((sum,it)=>{ const p=getProductByKey(it.productKey); const unit=clean(it.unit||"carton"); const price=p ? getActivePrice(p,unit) : num(it.price); return sum + num(it.qty)*price; },0); }
function tierMin(){ return state.selectedTier ? num(firstOf(state.selectedTier.raw||state.selectedTier,["tier_min","min","min_amount","minimum","limit"])) : 0; }
function tierDiscount(){ return state.selectedTier ? num(firstOf(state.selectedTier.raw||state.selectedTier,["tier_discount","discount","discount_percent","percent"])) : 0; }
function tierSatisfied(){ return !state.selectedTier || cartTotal() >= tierMin(); }
function isCartDeal(){ return cartItems().some(i=>i.kind==="deal" || clean(i.company)==="صفقة اليوم" || clean(i.unit)==="offer"); }
function notifyTotals(){ $("footerTotal").textContent = `${money(cartTotal())} جنيه`; }

function getProductByKey(key){ const k=clean(key); return data.products.find(p=>keyOf(p)===k || clean(p.__key)===k || getProductCode(p)===k) || null; }
function setDraft(key, field, value){ state.drafts[key]=state.drafts[key]||{}; state.drafts[key][field]=value; persist(); }

function selectTier(tier){
  if(isCartDeal()) return toast("لا يمكن الجمع بين صفقة اليوم والشرائح في فاتورة واحدة","error");
  const pass = clean(firstOf(tier,["tier_password","password","pass","secret_code","code","pin"]));
  const key = compact(clean(firstOf(tier,["visible_label","tier_name","name","title"])));
  if(pass && !state.unlockedTiers[key]){
    const entered = prompt(`أدخل الرقم السري للشريحة: ${clean(firstOf(tier,["visible_label","tier_name","name","title"]))}`);
    if(entered===null) return;
    if(compact(entered)!==compact(pass)) return toast("الرقم السري غير صحيح","error");
    state.unlockedTiers[key]=true;
  }
  state.selectedTier = { raw:tier, tier_name: clean(firstOf(tier,["tier_name","name","title"])) || "شريحة", visible_label: clean(firstOf(tier,["visible_label","tier_name","name","title"])) || clean(firstOf(tier,["tier_name","name","title"])) };
  persist(); toast(`تم اختيار الشريحة: ${state.selectedTier.visible_label}`,"ok"); renderPage(state.page,{},false);
}
function clearTier(){ state.selectedTier=null; persist(); toast("تم إلغاء الشريحة","info"); renderPage(state.page,{},false); }
function logoutRep(){ state.rep=null; persist(); showRepBadge(); toast("تم تسجيل الخروج من وضع المندوب","info"); renderPage(state.page,{}); }

function addToCart(key){
  const p=getProductByKey(key); if(!p) return toast("خطأ في المنتج","error");
  const offer=isOffer(p);
  const unit = offer ? "offer" : clean(state.drafts[key]?.unit || primaryUnit(p));
  if(!offer && !unit) return toast("اختر الوحدة أولاً","error");
  if(offer && state.selectedTier) return toast("لا يمكن الجمع بين صفقة اليوم والشرائح في فاتورة واحدة","error");
  if(offer && cartItems().some(i=>i.kind==="tier")) return toast("لا يمكن الجمع بين صفقة اليوم والشرائح في فاتورة واحدة","error");
  const qty=Math.max(1, parseInt(state.drafts[key]?.qty || 1,10) || 1);
  const price=offer ? getOfferPrice(p) : getActivePrice(p,unit);
  if(!price) return toast("الوحدة المختارة لا تحتوي على سعر","error");
  const cartKey=`${key}|${unit}`;
  state.cart[cartKey]={ key:cartKey, productKey:key, code:getProductCode(p), name:getDisplayName(p), company:getCompany(p), unit:offer?"offer":unit, qty:(state.cart[cartKey]?.qty||0)+qty, price, kind: offer?"deal":(state.selectedTier?"tier":"normal") };
  persist(); notifyTotals(); toast("تمت الإضافة للسلة","ok"); renderFooter();
}
function removeItem(key){ delete state.cart[key]; persist(); notifyTotals(); renderPage("review",{},false); }
function changeQty(key, delta){ const it=state.cart[key]; if(!it) return; it.qty=Math.max(1,(parseInt(it.qty,10)||1)+delta); persist(); notifyTotals(); renderPage("review",{},false); }
function qtyInput(key, value){ const it=state.cart[key]; if(!it) return; it.qty=Math.max(1, parseInt(clean(value).replace(/[^\d]/g,''),10)||1); persist(); notifyTotals(); renderPage("review",{},false); }
function setUnit(key, value){ setDraft(key,"unit",value); renderPage(state.page,{},false); }
function qtyDraft(key, value){ setDraft(key,"qty", clean(value).replace(/[^\d]/g,"")||1); }
function qtyChange(key, delta){ const curr=parseInt(state.drafts[key]?.qty||1,10)||1; setDraft(key,"qty",Math.max(1,curr+delta)); renderPage(state.page,{},false); }

function searchScore(p, raw){ const q=compact(raw); if(!q) return 0; const name=compact(getDisplayName(p)), code=compact(getProductCode(p)), company=compact(getCompany(p)), offer=compact(firstOf(p,["offer_label","offer_name","offer"])); let s=0; if(name===q||code===q) s+=2000; if(name.startsWith(q)) s+=1200; if(code.startsWith(q)) s+=1100; if(company.startsWith(q)) s+=700; if(name.includes(q)) s+=600; if(code.includes(q)) s+=500; if(company.includes(q)) s+=300; if(offer.includes(q)) s+=200; const tokens=norm(raw).split(" ").filter(Boolean); if(tokens.length>1 && tokens.every(t=>name.includes(compact(t))||code.includes(compact(t))||company.includes(compact(t))||offer.includes(compact(t)))) s+=250; return s; }
function searchProducts(q){ const query=clean(q); if(!query) return []; return data.products.filter(isActive).map(p=>({p,s:searchScore(p,query)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).map(x=>x.p); }
function brandCard(company){ return `<div class="card brandCard" onclick="window.__openCompany(${JSON.stringify(company)})"><img class="brandLogo" src="${html(companyImage(company))}" alt="${html(company)}" onerror="this.src='${DEFAULT_IMAGE}'"><div class="brandName">${html(company)}</div></div>`; }
function companyImage(company){ const sample=productsByCompany(company)[0]; return sample ? (getImage(sample) || DEFAULT_IMAGE) : DEFAULT_IMAGE; }
function productCard(p){ const k=keyOf(p), name=getDisplayName(p), img=getImage(p)||DEFAULT_IMAGE, offer=isOffer(p), units=offer?[]:getAvailableUnits(p), unit=state.drafts[k]?.unit || primaryUnit(p), price=offer ? getOfferPrice(p) : getActivePrice(p,unit), mode = offer ? "عرض" : (state.selectedTier ? (state.selectedTier.visible_label || state.selectedTier.tier_name) : (state.rep ? "سعر مندوب" : "سعر أساسي")); if(!isActive(p)) return `<div class="card productCard"><img class="productImage" src="${html(img)}" alt="${html(name)}" onerror="this.src='${DEFAULT_IMAGE}'"><div class="productName">${html(name)}</div><div class="stockBadge no">نفذت الكمية ستصل قريبًا</div></div>`; return `<div class="card productCard"><img class="productImage" src="${html(img)}" alt="${html(name)}" onerror="this.src='${DEFAULT_IMAGE}'"><div class="productName">${html(name)}</div><div class="priceLine">${offer ? "سعر العرض" : "سعر الكرتونة"}: ${money(price)} جنيه</div><div class="modeBadge">${html(mode)}</div>${offer ? "" : (units.length ? `<select class="unitSelect" data-key="${html(k)}" onchange="window.__setUnit(this.dataset.key,this.value)"><option value="">اختر الوحدة</option>${units.map(u=>`<option value="${u}" ${(state.drafts[k]?.unit||primaryUnit(p))===u?"selected":""}>${u==="carton"?"كرتونة":u==="dozen"?"دستة":"قطعة"}</option>`).join("")}</select>` : `<div class="stockBadge no">لا توجد وحدة مسعّرة</div>`)}<div class="qtyWrap"><button class="qtyBtn" type="button" onclick="window.__qtyChange('${html(k)}',-1)">-</button><input class="qtyInput" data-key="${html(k)}" inputmode="numeric" value="${html(state.drafts[k]?.qty||1)}" oninput="window.__qtyDraft(this.dataset.key,this.value)"><button class="qtyBtn" type="button" onclick="window.__qtyChange('${html(k)}',1)">+</button></div><button class="addBtn ${offer?'offer':''}" type="button" onclick="window.__addToCart('${html(k)}')">أضف للسلة</button></div>`; }

function renderHome(){ const intro=getSetting(["home_intro","intro","welcome","banner_text"],"اختر من الشرائح أو صفقة اليوم أو استخدم البحث الذكي للوصول مباشرة إلى المنتجات."); $("app").innerHTML = `${state.selectedTier ? `<div class="banner"><div class="bannerTop"><div>أنت الآن على شريحة <b>${html(state.selectedTier.visible_label||state.selectedTier.tier_name)}</b>${tierSatisfied() ? " — تم تحقيق الشريحة" : ` — المتبقي <b>${money(Math.max(0,tierMin()-cartTotal()))} جنيه</b>`}</div><button class="bannerBtn" type="button" onclick="window.__goCart()">التوجه للسلة</button></div></div>` : ""}<div class="pageCard"><div class="pageTitle">الرئيسية</div><div class="pageText">${html(intro)}</div></div><div class="sectionTitle">البراندات</div><div class="grid">${companyList().slice(0,12).map(brandCard).join("")}</div>`; state.page="home"; }
function renderTiers(){ const intro=getSetting(["tier_intro","tiers_intro","tiers_text"],"اختر الشريحة المناسبة لك من هنا. بعض الشرائح تحتاج رقمًا سريًا من الشيت."); const terms=getSetting(["tier_terms","tiers_terms","tier_conditions","conditions"],""); const cards=tierRows().map(t=>{ const name=t.visible_label||t.tier_name, min=t.tier_min, disc=t.tier_discount, desc=t.tier_description || terms, pass=clean(t.tier_password), key=compact(name), unlocked=!pass || state.unlockedTiers[key]; return `<div class="card tierCard ${pass && !unlocked ? "locked" : ""}"><div class="tierHead"><span>${html(name)}</span><span class="tierTag">${pass ? (unlocked ? "مفتوح" : "مقفل") : "متاح"}</span></div><div class="tierMeta">الخصم: <b>${pct(disc)}%</b> — الحد الأدنى: <b>${money(min)} جنيه</b></div><div class="tierDesc">${html(desc)}</div><button class="tierBtn" type="button" onclick="window.__chooseTier(${JSON.stringify(t.raw)})">${html(pass && !unlocked ? "دخول بالرقم السري" : "اختيار الشريحة")}</button></div>`; }).join(""); $("app").innerHTML = `<div class="pageCard"><div class="pageTitle">شرائح الجملة VIP</div><div class="pageText">${html(intro)}</div></div>${state.selectedTier ? `<div class="banner"><div class="bannerTop"><div>الشريحة الحالية: <b>${html(state.selectedTier.visible_label||state.selectedTier.tier_name)}</b> — الحد الأدنى <b>${money(tierMin())} جنيه</b></div><button class="bannerBtn" type="button" onclick="window.__clearTier()">إلغاء الشريحة</button></div></div>` : ""}<div class="tiersGrid">${cards}</div>`; state.page="tiers"; }
function renderDeals(){ const cards=dealProducts().map(p=>`<div class="card productCard"><img class="productImage" src="${html(getImage(p)||DEFAULT_IMAGE)}" alt="${html(getDisplayName(p))}" onerror="this.src='${DEFAULT_IMAGE}'"><div class="productName">${html(getDisplayName(p))}</div><div class="handTitle">انتهز الفرصه الصفقات لفترة محدودة</div><div class="priceLine">سعر العرض: ${money(getOfferPrice(p))} جنيه</div><div class="qtyWrap"><button class="qtyBtn" type="button" onclick="window.__qtyChange('${html(keyOf(p))}',-1)">-</button><input class="qtyInput" data-key="${html(keyOf(p))}" inputmode="numeric" value="${html(state.drafts[keyOf(p)]?.qty||1)}" oninput="window.__qtyDraft(this.dataset.key,this.value)"><button class="qtyBtn" type="button" onclick="window.__qtyChange('${html(keyOf(p))}',1)">+</button></div><button class="addBtn offer" type="button" onclick="window.__addToCart('${html(keyOf(p))}')">أضف للسلة</button></div>`).join(""); $("app").innerHTML = `<div class="pageCard"><div class="pageTitle">صفقة اليوم</div><div class="pageText">لا تحتوي على وحدات. فقط أدخل الكمية واضف للسلة.</div></div>${cards || '<div class="emptyBox">لا توجد صفقات اليوم حالياً</div>'}`; state.page="deals"; }
function renderQuick(){ const chips=companyList().slice(0,12).map(c=>`<button class="quickChip" type="button" onclick="window.__openCompany('${html(c)}')">${html(c)}</button>`).join(""); const top=topProductsForQuick().map(productCard).join(""); $("app").innerHTML = `<div class="quickTop"><div class="quickTitle">التسوق السريع</div><div class="quickSub">أكثر المنتجات طلبًا من شركات مختلفة مع وصول سريع إلى الشركات والعروض والشرائح.</div></div>${state.rep?.repName ? `<div class="banner"><div class="bannerTop"><div>وضع المندوب الحالي: <b>${html(state.rep.repName)}</b></div><button class="bannerBtn" type="button" onclick="logoutRep()">خروج</button></div></div>` : ""}<div class="sectionTitle">الشركات</div><div class="quickGrid">${chips}</div><div class="sectionTitle">منتجات مختارة</div><div class="grid">${top}</div>`; state.page="quick"; }
function renderCompanies(){ $("app").innerHTML = `<div class="pageCard"><div class="pageTitle">الشركات والبراندات</div><div class="pageText">اضغط على أي شركة لفتح منتجاتها.</div></div><div class="grid">${companyList().slice(0,999).map(brandCard).join("")}</div>`; state.page="companies"; }
function renderSearch(){ const results=searchProducts(state.search); const chips=companyList().slice(0,12).map(c=>`<button class="quickChip" type="button" onclick="window.__openCompany('${html(c)}')">${html(c)}</button>`).join(""); $("app").innerHTML = `<div class="pageCard"><div class="pageTitle">نتائج البحث</div><div class="pageText">البحث الذكي يطابق الاسم أو الكود أو الشركة ويهمل ترتيب الكلمات.</div></div>${results.map(productCard).join("") || '<div class="emptyBox">لا توجد نتائج مطابقة</div>'}<div class="sectionTitle">الشركات</div><div class="quickGrid">${chips}</div>`; state.page="search"; }
function renderBrand(company){ state.prevCompany=company; $("app").innerHTML = `<div class="pageCard"><div class="pageTitle">${html(company)}</div><div class="pageText">اختر الوحدة ثم الكمية وأضف للسلة. الوحدات التي بلا سعر لا تظهر.</div></div>${productsByCompany(company).map(productCard).join("") || '<div class="emptyBox">لا توجد منتجات داخل هذا القسم</div>'}`; state.page="brand"; }
function renderReview(){ const subtotal=cartTotal(), rem=Math.max(0,tierMin()-subtotal), tierText=state.selectedTier ? (tierSatisfied() ? `أنت الآن على شريحة <b>${html(state.selectedTier.visible_label||state.selectedTier.tier_name)}</b> — تم تحقيق الشريحة` : `أنت الآن على شريحة <b>${html(state.selectedTier.visible_label||state.selectedTier.tier_name)}</b> — المتبقي <b>${money(rem)} جنيه</b>`) : "لم يتم اختيار شريحة."; const repBlock = state.rep ? `<div class="pageText"><b>بيانات المندوب:</b> ${html(state.rep.repName)}${state.rep.phone ? ` — ${html(state.rep.phone)}` : ""}${state.rep.governorate ? ` — ${html(state.rep.governorate)}` : ""}</div>` : ""; const items=cartItems().map(item=>{ const p=getProductByKey(item.productKey), unitPrice=p?getActivePrice(p,item.unit):num(item.price), line=unitPrice*num(item.qty); return `<div class="reviewItem"><div class="reviewTitle">${html(item.code||"")} — ${html(item.name)}</div><div class="reviewLine">وحدة الصنف: <b>${html(item.unit==="offer"?"عرض":item.unit==="carton"?"كرتونة":item.unit==="dozen"?"دستة":"قطعة")}</b></div><div class="reviewLine">الكمية: <b>${html(item.qty)}</b></div><div class="reviewLine">السعر: <b>${money(unitPrice)} جنيه</b> — إجمالي: <b>${money(line)} جنيه</b></div><div class="reviewActions"><button class="qtyBtn" type="button" onclick="window.__reviewQty('${html(item.key)}',-1)">-</button><input class="reviewQtyInput" value="${html(item.qty)}" inputmode="numeric" onchange="window.__reviewQtyInput('${html(item.key)}',this.value)"><button class="qtyBtn" type="button" onclick="window.__reviewQty('${html(item.key)}',1)">+</button></div><div class="reviewDelete" onclick="window.__removeItem('${html(item.key)}')">حذف</div></div>`; }).join(""); $("app").innerHTML = `<div class="reviewBox"><div class="reviewSummaryRow"><div class="pageTitle">إتمام الشراء</div><button class="miniBtn" type="button" onclick="window.__clearCart()">تصفير السلة</button></div><div class="banner"><div class="bannerTop"><div>${tierText}</div></div></div>${repBlock}<div class="pageText">إجمالي المشتريات: <b>${money(subtotal)} جنيه</b></div></div>${items || '<div class="emptyBox">السلة فارغة</div>'}<div class="formBox"><input class="input" id="custName" placeholder="اسم العميل" value="${html(state.customer.name||"")}"><input class="input" id="custPhone" placeholder="رقم الهاتف" value="${html(state.customer.phone||"")}"><input class="input" id="custAddress" placeholder="العنوان" value="${html(state.customer.address||"")}"><button class="miniBtn" type="button" style="width:100%;min-height:44px" onclick="setLocation()">📍 إضافة اللوكيشن</button><div class="locationStatus" id="locationStatus">${state.customer.location ? "✔ تم حفظ اللوكيشن" : ""}</div><div style="height:10px"></div><button class="sendBanner" id="sendBtn" ${state.selectedTier && !tierSatisfied() ? "disabled" : ""} onclick="sendOrder()">إرسال الفاتورة</button></div>`; state.page="review"; }
function renderHomeScreen(){ const intro=getSetting(["home_intro","intro","welcome","banner_text"],"اختر من الشرائح أو صفقة اليوم أو استخدم البحث الذكي للوصول مباشرة إلى المنتجات."); $("app").innerHTML = `${state.selectedTier ? `<div class="banner"><div class="bannerTop"><div>أنت الآن على شريحة <b>${html(state.selectedTier.visible_label||state.selectedTier.tier_name)}</b>${tierSatisfied() ? " — تم تحقيق الشريحة" : ` — المتبقي <b>${money(Math.max(0,tierMin()-cartTotal()))} جنيه</b>`}</div><button class="bannerBtn" type="button" onclick="window.__goCart()">التوجه للسلة</button></div></div>` : ""}<div class="pageCard"><div class="pageTitle">الرئيسية</div><div class="pageText">${html(intro)}</div></div><div class="sectionTitle">البراندات</div><div class="grid">${companyList().slice(0,12).map(brandCard).join("")}</div>`; state.page="home"; }
function renderPage(page=state.page, params={}){ if(page==="home") renderHome(); else if(page==="tiers") renderTiers(); else if(page==="deals") renderDeals(); else if(page==="quick") renderQuick(); else if(page==="companies") renderCompanies(); else if(page==="brand") renderBrand(params.company || state.prevCompany || ""); else if(page==="search") renderSearch(); else if(page==="review") renderReview(); else renderHome(); renderFooter(); showRepBadge(); notifyTotals(); }
function setLocation(){ if(!navigator.geolocation) return toast("الموقع غير مدعوم على هذا الجهاز","error"); navigator.geolocation.getCurrentPosition(pos=>{ state.customer.location=`https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`; persist(); $("locationStatus").textContent="✔ تم حفظ اللوكيشن"; toast("تم تحديد اللوكيشن","ok"); },()=>toast("تعذر تحديد اللوكيشن","error"),{enableHighAccuracy:true,timeout:12000,maximumAge:0}); }
function buildItems(){ return cartItems().map(it=>{ const p=getProductByKey(it.productKey), unit=it.unit||"offer", price=p?getActivePrice(p,unit):num(it.price); return { product_code:it.code||"", product_name:it.name||"", unit, quantity:num(it.qty), price, total:num(it.qty)*price, company:it.company||"" }; }); }
function buildPayload(){ const customer={ name:clean($("custName")?.value), phone:clean($("custPhone")?.value), address:clean($("custAddress")?.value), location:clean(state.customer.location||"") }; state.customer={...state.customer,...customer}; persist(); return { type:"order", order_id:`ORD-${Date.now()}`, order_time:new Date().toISOString(), customer_name:customer.name, phone:customer.phone, address:customer.address, location:customer.location, user_type:state.rep ? "rep" : "customer", rep_id:state.rep?.repId || "", rep_name:state.rep?.repName || "", rep_phone:state.rep?.phone || "", rep_governorate:state.rep?.governorate || "", tier_name:state.selectedTier ? (state.selectedTier.visible_label || state.selectedTier.tier_name) : "", tier_discount:state.selectedTier ? tierDiscount() : 0, order_type:isCartDeal() ? "deal" : (state.selectedTier ? "tier" : "normal"), subtotal:cartTotal(), total:cartTotal(), items_count:cartItems().length, items:buildItems() }; }
function buildWaMessage(payload){ const unitName=u=>u==="carton"?"كرتونة":u==="dozen"?"دستة":u==="piece"?"قطعة":"عرض"; const out=[]; out.push("طلب شراء فاتورة من"); out.push(""); if(payload.rep_name){ out.push("بيانات المندوب"); out.push(`الاسم : ${payload.rep_name}`); if(payload.rep_phone) out.push(`رقم التليفون : ${payload.rep_phone}`); if(payload.rep_governorate) out.push(`المحافظة : ${payload.rep_governorate}`); out.push(""); } out.push("بيانات العميل"); out.push(`الاسم : ${payload.customer_name}`); out.push(`العنوان : ${payload.address}`); out.push(`رقم التليفون : ${payload.phone}`); out.push(`اللوكيشن : ${payload.location || ""}`); out.push(""); if(payload.tier_name){ out.push(`الشريحة : ${payload.tier_name}`); out.push(""); } out.push("بيان الفاتورة"); out.push(""); payload.items.forEach(it=>{ out.push(`كود الصنف : ${it.product_code||""}`); out.push(`اسم الصنف : ${it.product_name||""}`); out.push(`وحدة الصنف : ${unitName(it.unit)}`); out.push(`الكميه : ${it.quantity}`); out.push(`السعر : ${money(it.price)} جنيه`); out.push(`اجمالى : ${money(it.total)} جنيه`); out.push(""); }); out.push(`إجمالي الفاتورة : ${money(payload.total)} جنيه`); return out.join("\n"); }
async function sendOrder(){ if(state.sending) return; if(!clean($("custName")?.value) || !clean($("custPhone")?.value) || !clean($("custAddress")?.value) || !clean(state.customer.location||"")) return toast("أكمل اسم العميل ورقم الهاتف والعنوان واللوكيشن","error"); if(state.selectedTier && !tierSatisfied()) return toast("لم تحقق شروط الشريحة بعد","error"); if(!cartItems().length) return toast("السلة فارغة","error"); state.sending=true; const btn=$("sendBtn"); if(btn) btn.disabled=true; const payload=buildPayload(); save(LS.lastOrder,payload); window.open(`https://wa.me/201040880002?text=${encodeURIComponent(buildWaMessage(payload))}`,"_blank"); let ok=false; try { if(navigator.sendBeacon){ ok = navigator.sendBeacon(POST_URL, new Blob([JSON.stringify(payload)], {type:"text/plain;charset=UTF-8"})); } else { await fetch(POST_URL,{method:"POST",mode:"no-cors",body:JSON.stringify(payload),headers:{"Content-Type":"text/plain;charset=UTF-8"}}); ok=true; } } catch(e) { ok=false; } if(!ok){ state.sending=false; if(btn) btn.disabled=false; return toast("تعذر إرسال الطلب إلى صفحة الأوردرات","error"); } state.cart={}; state.drafts={}; state.selectedTier=null; state.rep=null; persist(); showRepBadge(); state.sending=false; toast("تم إرسال الفاتورة وتصفير السلة","ok"); setPage("home",{},false); }

function openRepModal(){ $("repModal").classList.add("show"); $("repCode").value=""; $("repPass").value=""; $("repCode").focus(); }
function closeRepModal(){ $("repModal").classList.remove("show"); }
async function loginRep(){ const code=clean($("repCode").value), pass=clean($("repPass").value); if(!code||!pass) return toast("أدخل كود المندوب والرقم السري","error"); const reps=await loadCSV(SHEETS.reps); const found = reps.map(r=>({ raw:r, repId:firstOf(r,["repId","rep_id","id","code","codo","rep_code","كود المندوب"]), repName:firstOf(r,["repName","rep_name","name","اسم","اسم المندوب"]), password:firstOf(r,["repPassword","rep_password","password","pass","pin","الرقم السري"]), phone:firstOf(r,["phone","mobile","tel","whatsapp","رقم التليفون"]), governorate:firstOf(r,["governorate","gov","city","province","محافظة"]), status:firstOf(r,["status","active","state"]) })).find(r=>{ if(r.status && !asBool(r.status)) return false; return compact(r.repId || r.repName)===compact(code) && compact(r.password)===compact(pass); }); if(!found) return toast("بيانات المندوب غير صحيحة","error"); state.rep={ repId:found.repId, repName:found.repName, phone:found.phone, governorate:found.governorate }; persist(); showRepBadge(); closeRepModal(); toast(`تم دخول المندوب: ${found.repName || found.repId}`,"ok"); renderPage(state.page,{},false); }

function renderPageSwitcher(page, params={}){ if(page==="home") renderHome(); else if(page==="tiers") renderTiers(); else if(page==="deals") renderDeals(); else if(page==="quick") renderQuick(); else if(page==="companies") renderCompanies(); else if(page==="brand") renderBrand(params.company || state.prevCompany || ""); else if(page==="search") renderSearch(); else if(page==="review") renderReview(); else renderHome(); renderFooter(); showRepBadge(); notifyTotals(); }
function bootUI(){ setMeta(); renderFooter(); showRepBadge(); }
function bootSearch(){ $("searchInput").value=state.search||""; $("searchInput").oninput=e=>{ state.search=clean(e.target.value); persist(); if(state.search){ if(state.page!=="search") state.searchSourcePage=state.page; setPage("search",{},false); } else { setPage(state.searchSourcePage||"home",{},false); } }; $("searchInput").onkeydown=e=>{ if(e.key==="Enter"){ e.preventDefault(); setPage("search",{},false); } }; $("clearBtn").onclick=()=>{ $("searchInput").value=""; state.search=""; persist(); if(state.page==="search") setPage(state.searchSourcePage||"home",{},false); else renderPage(state.page,{}); }; }
function bootTopButtons(){ $("repSubmit").onclick=loginRep; $("repCancel").onclick=closeRepModal; $("repModal").onclick=e=>{ if(e.target.id==="repModal") closeRepModal(); }; $("tierBtn").onclick=()=>setPage("tiers"); $("dealBtn").onclick=()=>setPage("deals"); $("quickBtn").onclick=()=>setPage("quick"); $("repBtn").onclick=()=>state.rep ? (confirm("تسجيل خروج المندوب؟") && logoutRep()) : openRepModal(); }
function __openCompany(company){ state.prevCompany=company; setPage("brand",{company}); }
function __chooseTier(tier){ selectTier(tier); }
function __clearTier(){ clearTier(); }
function __logoutRep(){ logoutRep(); }
function __goCart(){ setPage("review"); }
function __removeItem(key){ removeItem(key); }
function __reviewQty(key,delta){ changeQty(key,delta); }
function __reviewQtyInput(key,val){ qtyInput(key,val); }
function __setLocation(){ setLocation(); }
function __sendOrder(){ sendOrder(); }
function __clearCart(){ state.cart={}; state.drafts={}; persist(); notifyTotals(); renderPage("review",{},false); toast("تم تصفير السلة","info"); }
function __qtyChange(key,delta){ qtyChange(key,delta); }
function __qtyDraft(key,val){ qtyDraft(key,val); }
function __setUnit(key,val){ setUnit(key,val); }
function __addToCart(key){ addToCart(key); }

async function init(){
  try{
    const [products, tiers, settings] = await Promise.all([loadCSV(SHEETS.products), loadCSV(SHEETS.tiers), loadCSV(SHEETS.settings)]);
    data.products = products.map(r => ({...r,__key:keyOf(r)})).filter(r=>clean(getCompany(r)));
    data.tiers = tiers.filter(r => clean(firstOf(r,["tier_name","name","title","visible_label"])));
    data.settings = settings;
    setMeta();
    bootUI();
    bootSearch();
    bootTopButtons();
    if(!history.state) history.replaceState({page:"home"},"");
    window.addEventListener("popstate", e => { const page=e.state?.page || "home"; state.page=page; renderPageSwitcher(page, e.state?.params || {}); });
    renderPageSwitcher(state.page || "home");
  }catch(err){
    $("app").innerHTML = `<div class="emptyBox">تعذر تحميل البيانات. راجع روابط الشيت أو الاتصال.</div>`;
  }
}
window.__openCompany = __openCompany;
window.__chooseTier = __chooseTier;
window.__clearTier = __clearTier;
window.__logoutRep = __logoutRep;
window.__goCart = __goCart;
window.__removeItem = __removeItem;
window.__reviewQty = __reviewQty;
window.__reviewQtyInput = __reviewQtyInput;
window.__setLocation = __setLocation;
window.__sendOrder = __sendOrder;
window.__clearCart = __clearCart;
window.__qtyChange = __qtyChange;
window.__qtyDraft = __qtyDraft;
window.__setUnit = __setUnit;
window.__addToCart = __addToCart;
window.addEventListener("load", init);
</script>
</body>
</html>
