<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>الأهرام للتجارة والتوزيع</title>
<meta name="theme-color" content="#0B3D91" />
<link rel="manifest" href="./manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{
  --blue:#0B3D91;
  --red:#E53935;
  --orange:#FF7A00;
  --gold:#b88a00;
  --gold2:#f5d67a;
  --gray:#7A8596;
  --bg:#F5F7FA;
  --card:#ffffff;
  --line:#e7e9ee;
  --text:#172233;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
}
a{color:inherit;text-decoration:none}
.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:var(--blue);
  color:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}
.headerMeta{display:none}
.hero{
  position:relative;
  height:176px;
  overflow:hidden;
  background:linear-gradient(135deg,#0B3D91,#0a2b66);
}
.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.58), rgba(0,0,0,.06));
}
.heroOverlay{
  position:absolute;
  top:12px;
  right:12px;
  left:auto;
  z-index:2;
  display:flex;
  justify-content:flex-end;
  align-items:flex-start;
}
.heroTitle{
  font-weight:700;
  font-size:17px;
  color:#fff;
  background:rgba(255,255,255,.16);
  backdrop-filter:blur(10px);
  padding:10px 14px;
  border-radius:16px;
  text-shadow:0 1px 3px rgba(0,0,0,.36);
  box-shadow:0 6px 18px rgba(0,0,0,.14);
}
.news{
  background:var(--orange);
  color:#fff;
  padding:7px 10px;
  text-align:center;
  font-weight:700;
  font-size:13px;
  min-height:30px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.tiersWrap{
  background:#fff;
  border-bottom:1px solid var(--line);
  padding:8px 10px 8px;
}
.tiers{
  display:flex;
  gap:8px;
  overflow-x:auto;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
.tiers::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;
  border:1px solid #d7dce5;
  background:linear-gradient(180deg,#fbfcfe,#f3f6fb);
  color:#233044;
  padding:9px 14px;
  border-radius:999px;
  white-space:nowrap;
  font-size:14px;
  cursor:pointer;
  user-select:none;
  box-shadow:0 2px 8px rgba(16,24,40,.04);
}
.chip.active{
  background:linear-gradient(180deg,#1852b6,#0B3D91);
  color:#fff;
  border-color:#0B3D91;
  box-shadow:0 6px 14px rgba(11,61,145,.18);
}
.chip.cancel{
  background:linear-gradient(180deg,#ffeceb,#ffd9d7);
  color:var(--red);
  border-color:#ffb9b5;
  font-weight:700;
}
.contactBlock{
  margin:10px 0 0;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.contactRow{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:8px 10px 10px;
  background:#fff;
  border-bottom:1px solid var(--line);
}
.contactBtn{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:40px;
  border-radius:12px;
  font-weight:700;
  font-size:13px;
  color:#fff;
}
.contactBtn.phone{background:#173a84}
.contactBtn.wa{background:#1f8b4c}
.tierBanner{
  display:none;
  margin-top:8px;
  padding:8px 10px;
  border-radius:12px;
  background:#eef4ff;
  color:#10306a;
  font-size:12px;
  line-height:1.5;
}
.tierBannerRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
.tierBannerAction{
  border:none;
  border-radius:10px;
  background:linear-gradient(180deg,#ff5e57,#e53935);
  color:#fff;
  padding:7px 10px;
  font-family:inherit;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
  font-size:12px;
}
.offerNotice{
  background:linear-gradient(180deg,#fff9df,#fff2b6);
  color:#7a5a00;
  border:1px solid #e0c46c;
  border-radius:14px;
  padding:10px 12px;
  text-align:center;
  font-weight:700;
  line-height:1.6;
  margin-bottom:10px;
  font-size:13px;
}
.back{
  display:none;
  position:fixed;
  top:12px;
  right:12px;
  z-index:1500;
  background:linear-gradient(180deg,#ffffff,#eef4ff);
  color:var(--blue);
  padding:9px 12px;
  border:1px solid #c9d8f4;
  border-radius:999px;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(16,24,40,.12);
  user-select:none;
}
#app{padding:10px;padding-bottom:120px}
.searchBar{margin:0 0 10px 0}
.searchRow{display:grid;grid-template-columns:1fr 84px 56px;gap:8px}
.searchInput,.unitSelect,.qtyInput,.reviewQtyInput,.input{
  width:100%;
  height:42px;
  border-radius:10px;
  border:1px solid #d7dce5;
  padding:0 12px;
  font-family:inherit;
  font-size:14px;
  outline:none;
  background:#fff;
}
.searchBtn,.clearBtn,.mainBtn,.addBtn,.qtyBtn,.footerBtn{
  border:none;
  border-radius:10px;
  font-family:inherit;
  font-weight:700;
  cursor:pointer;
}
.searchBtn,.clearBtn{color:#fff;height:42px}
.searchBtn{background:var(--blue)}
.clearBtn{background:#6b7280}
.searchHint{margin:0 0 10px 0;color:var(--blue);font-weight:700;text-align:center}
.sectionTitle{margin:12px 0 8px;font-weight:700;color:#39485f;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:8px;
  text-align:center;
  box-shadow:0 2px 10px rgba(16,24,40,.04);
  overflow:hidden;
}
.brandCard{
  min-height:118px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:6px;
}
.brandCard .brandImg{
  width:100%;
  height:66px;
  object-fit:contain;
}
.brandCard .brandName{
  font-weight:700;
  font-size:13px;
  line-height:1.3;
}
.productCard{
  min-height:260px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.productCard.inactive{opacity:.95}
.productCard.offerCard{
  background:linear-gradient(180deg,#fffbe9,#fff8da);
  border-color:#e0c46c;
  box-shadow:0 8px 20px rgba(184,138,0,.12);
}
.productImg{
  width:100%;
  height:88px;
  object-fit:contain;
  border-radius:10px;
  background:#f7f9fc;
}
.productName{
  font-weight:700;
  font-size:13px;
  line-height:1.32;
  min-height:34px;
}
.offerLabel{
  font-weight:700;
  font-size:12px;
  line-height:1.3;
  color:#8b6500;
  min-height:18px;
}
.stockBadge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:5px 9px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  margin:0 auto;
}
.stockBadge.active{background:#e8f5ee;color:#16824b}
.stockBadge.inactive{background:#fff0f0;color:#bf2c2c}
.cartonPrice{
  font-weight:700;
  font-size:12px;
  line-height:1.25;
  min-height:18px;
  color:var(--red);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.price{
  color:var(--red);
  font-weight:700;
  font-size:14px;
  min-height:22px;
}
.price.offer{color:#8b6500}
.price.wait{color:var(--gray);font-weight:700}
.unitSelect{
  height:36px;
  padding:0 10px;
  font-size:13px;
  color:#1f2a3a;
}
.qtyWrap{
  display:grid;
  grid-template-columns:34px 1fr 34px;
  gap:5px;
  align-items:center;
}
.qtyBtn{
  width:34px;
  height:34px;
  border:none;
  border-radius:10px;
  background:#e9edf3;
  color:#1f2a3a;
  font-size:18px;
  font-weight:700;
}
.qtyBtn:disabled,.unitSelect:disabled,.qtyInput:disabled,.addBtn:disabled{opacity:.55;cursor:not-allowed}
.qtyInput{text-align:center}
.addBtn{
  margin-top:auto;
  background:linear-gradient(135deg,var(--orange),#ff9a3a);
  color:#fff;
  padding:10px 12px;
  min-height:40px;
}
.addBtn.offer{
  background:linear-gradient(135deg,#c59a14,#f4d76b);
  color:#5a4300;
}
.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  z-index:1000;
  background:#fff;
  border-top:1px solid var(--line);
  display:grid;
  grid-template-columns:92px 1fr 108px;
  align-items:center;
  gap:8px;
  padding:10px;
  box-shadow:0 -2px 10px rgba(0,0,0,.04);
}
.footerBtn{
  text-align:center;
  font-weight:700;
  color:#1f2a3a;
  cursor:pointer;
  user-select:none;
  min-height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  background:#eff3f8;
  font-size:15px;
}
.footerBtn.primary{
  background:linear-gradient(135deg,#1f8b4c,#2da35d);
  color:#fff;
}
.footerTotal{
  text-align:center;
  font-weight:700;
  color:var(--blue);
  font-size:15px;
}
.toast{
  position:fixed;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  z-index:2000;
  min-width:180px;
  max-width:90vw;
  background:#1f8b4c;
  color:#fff;
  padding:10px 14px;
  border-radius:999px;
  text-align:center;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
  display:none;
  font-size:14px;
}
.toast.error{background:#c0392b}
.toast.info{background:#0B3D91}
.reviewWrap{display:flex;flex-direction:column;gap:10px}
.reviewSummary,.reviewItem,.formCard{background:#fff;border:1px solid var(--line);border-radius:14px}
.reviewSummary{padding:12px;line-height:1.8}
.reviewItem{padding:10px;line-height:1.7}
.reviewItemTop{font-weight:700}
.reviewControls{
  display:grid;
  grid-template-columns:34px 1fr 34px;
  gap:5px;
  align-items:center;
  margin-top:8px;
}
.reviewQtyInput{text-align:center}
.reviewAction{
  margin-top:8px;
  text-align:center;
  color:var(--red);
  font-weight:700;
  cursor:pointer;
  user-select:none;
}
.formCard{padding:12px}
.input{margin-bottom:8px}
.input:focus,.unitSelect:focus,.qtyInput:focus,.reviewQtyInput:focus,.searchInput:focus{
  border-color:#8fb0e6;
  box-shadow:0 0 0 3px rgba(11,61,145,.08);
}
.mainBtn{
  width:100%;
  border:none;
  border-radius:12px;
  min-height:46px;
  font-family:inherit;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}
.mainBtn.primary{
  background:linear-gradient(135deg,var(--orange),#ff9a3a);
  color:#fff;
}
.mainBtn.secondary{
  background:#eff3f8;
  color:#1f2a3a;
}
.locationStatus{
  margin-top:6px;
  font-size:13px;
  color:var(--gray);
  min-height:20px;
}
.emptyState{
  background:#fff;
  border:1px dashed #d7dce5;
  border-radius:14px;
  padding:20px;
  text-align:center;
  color:var(--gray);
}
.designSignature{
  margin:10px 0 0;
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  text-align:center;
  padding:8px 10px;
  color:#4b5563;
  font-size:12px;
  font-weight:700;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.hidden{display:none!important}
body.compact .headerMeta,body.compact .hero{display:none}
body.compact .news{font-size:13px;min-height:30px;padding:6px 8px}
body.compact .tiersWrap{padding:6px 8px}
body.compact .back{top:10px;right:10px;padding:8px 11px;font-size:13px}
body.compact #app{padding-top:8px}
body.compact .chip{padding:7px 11px;font-size:13px}
body.offerMode .tiersWrap{display:none}
body.homeMode .contactRow{
  margin-top:8px;
  border-bottom:none;
  background:transparent;
  padding-bottom:0;
}
body.purchaseMode .contactRow{
  margin-top:10px;
  border-bottom:none;
  background:transparent;
  padding-bottom:0;
}
</style>
</head>
<body>
<div class="header">
  <div class="headerMeta"></div>
  <div class="hero">
    <img id="headerImg" alt="company header">
    <div class="heroOverlay"><div class="heroTitle">الأهرام للتجارة والتوزيع</div></div>
  </div>
  <div class="news" id="news"></div>
  <div class="tiersWrap" id="tiersWrap">
    <div class="tiers" id="tiersBar"></div>
    <div class="tierBanner" id="tierBanner"></div>
  </div>
  <div class="back" id="backBtn" onclick="goBack()">↩ رجوع</div>
</div>

<div id="app"></div>

<div class="footer">
  <div class="footerBtn" onclick="goBack()">رجوع</div>
  <div class="footerTotal" id="totalBox">0 جنيه</div>
  <div class="footerBtn primary" onclick="openReview()">إتمام الشراء</div>
</div>

<div class="toast" id="toastBox"></div>

<script>
const URLS = {
  products: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=2123604928&output=csv",
  tiers: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=688371996&output=csv",
  settings: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1922249138&output=csv"
};

const PLACEHOLDERS = {
  header: "https://via.placeholder.com/1200x500/f5f7fa/0B3D91?text=Alahram+Store",
  brand: (name) => `https://via.placeholder.com/400x250/f5f7fa/0B3D91?text=${encodeURIComponent(name || "Brand")}`,
  product: (name) => `https://via.placeholder.com/400x250/f7f9fc/0B3D91?text=${encodeURIComponent(name || "Product")}`
};

const UNIT_NAMES = { carton:"كرتونة", dozen:"دستة", piece:"قطعة", offer:"عرض" };

const LS = { cart:"alahram_cart_v8", tier:"alahram_tier_v8", customer:"alahram_customer_v8", drafts:"alahram_drafts_v8" };

const el = {
  headerImg: document.getElementById("headerImg"),
  news: document.getElementById("news"),
  tiersBar: document.getElementById("tiersBar"),
  tierBanner: document.getElementById("tierBanner"),
  backBtn: document.getElementById("backBtn"),
  app: document.getElementById("app"),
  totalBox: document.getElementById("totalBox"),
  toastBox: document.getElementById("toastBox")
};

const clean = (v) => (v ?? "").toString().trim();
const toNum = (v) => { const n = parseFloat(v); return Number.isFinite(n) ? n : 0; };
const saveJSON = (k,v) => localStorage.setItem(k, JSON.stringify(v));
const loadJSON = (k,f) => { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : f; } catch { return f; } };

const stripDiacritics = (str) => clean(str).normalize("NFKD").replace(/[\u064B-\u065F\u0670\u0640]/g, "");
const normalizeLoose = (str) => stripDiacritics(str).toLowerCase().replace(/[أإآ]/g,"ا").replace(/ى/g,"ي").replace(/ؤ/g,"و").replace(/ئ/g,"ي").replace(/ة/g,"ه").replace(/[^\w\u0600-\u06FF ]+/g," ").replace(/\s+/g," ").trim();
const normalizeCompact = (str) => normalizeLoose(str).replace(/\s+/g,"");
const escapeAttr = (v) => String(v).replaceAll("&","&amp;").replaceAll('"',"&quot;").replaceAll("<","&lt;").replaceAll(">","&gt;");

let products = [];
let tiersData = [];
let settings = [];
let cart = loadJSON(LS.cart, {});
let selectedTier = loadJSON(LS.tier, null);
let customer = loadJSON(LS.customer, {});
let drafts = loadJSON(LS.drafts, {});
let currentPage = "home";
let lastCompany = null;
let reviewReturn = { type:"home", value:null };
let searchQuery = "";
let searchTimer = null;

function persistAll() {
  saveJSON(LS.cart, cart);
  saveJSON(LS.tier, selectedTier);
  saveJSON(LS.customer, customer);
  saveJSON(LS.drafts, drafts);
}

function notify(message, kind="ok") {
  el.toastBox.textContent = message;
  el.toastBox.className = `toast ${kind}`;
  el.toastBox.style.display = "block";
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => el.toastBox.style.display = "none", 1400);
}

function loadCSV(url) {
  return new Promise((resolve) => {
    Papa.parse(`${url}&t=${Date.now()}`, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: (res) => resolve(res.data || [])
    });
  });
}

function setCompactMode(isCompact) { document.body.classList.toggle("compact", !!isCompact); }
function setOfferMode(isOffer) { document.body.classList.toggle("offerMode", !!isOffer); }
function setMode(mode) {
  document.body.classList.toggle("homeMode", mode === "home");
  document.body.classList.toggle("purchaseMode", mode !== "home");
}

function getProductCode(p) { return clean(p.codo || p.code || p.CODO || p.CODE); }
function getCompany(p) { return clean(p.company); }
function isOfferProduct(p) { return getCompany(p) === "صفقة اليوم"; }
function isActiveProduct(p) { const s = clean(p.status).toLowerCase(); return s === "active" || s === "فعال"; }
function getOfferLabel(p) { return clean(p.offer_label || p.offer_name || p.offer || ""); }
function getDisplayName(p) { return clean(p.name || p.product_name || p.item_name || p.item || p.title) || getOfferLabel(p) || "صنف"; }

function getProductKey(p) {
  const code = getProductCode(p);
  return clean(p.id || p.product_id || p.sku || `${code}_${getDisplayName(p)}_${getCompany(p)}`) || `${getDisplayName(p)}_${getCompany(p)}`;
}

function getOriginalPrice(p, unit) {
  const map = {
    carton: ["price_carton", "carton_price", "سعر الكرتونة"],
    dozen: ["price_dozen", "dozen_price", "سعر الدستة"],
    piece: ["price_piece", "piece_price", "سعر القطعة"],
    offer: ["price_offer", "offer_price", "priceعرض", "سعر العرض"]
  };
  const keys = map[unit] || [];
  for (const k of keys) {
    if (p[k] !== undefined && p[k] !== null && clean(p[k]) !== "") return toNum(p[k]);
  }
  return 0;
}

function getDiscountedPrice(base) {
  const d = selectedTier ? toNum(selectedTier.tier_discount) : 0;
  if (!selectedTier || d <= 0) return base;
  return Math.max(0, base - (base * d / 100));
}

function isAddableToCart(p) {
  const raw = p.allow_cart ?? p.add_to_cart ?? p.can_add_to_cart ?? p.orderable ?? p.can_order ?? p.buyable ?? p.purchasable ?? p.cartable ?? p.allow_order;
  if (raw === undefined || raw === null || clean(raw) === "") return true;
  const s = normalizeLoose(raw).replace(/\s+/g, "");
  const falseList = ["0","false","no","n","لا","غيرمتاح","ممنوع","disabled","off","inactive","غيرمسموح"];
  const trueList = ["1","true","yes","y","نعم","متاح","مسموح","allow","allowed","available","active","فعال","ok","on"];
  if (falseList.includes(s)) return false;
  if (trueList.includes(s)) return true;
  if (raw === 0 || raw === "0") return false;
  if (raw === 1 || raw === "1") return true;
  return true;
}

function getSubtotal() {
  return Object.values(cart).reduce((sum, item) => sum + (toNum(item.qty) * toNum(item.price)), 0);
}
function getTierMin() { return selectedTier ? toNum(selectedTier.tier_min) : 0; }
function getTierDiscount() { return selectedTier ? toNum(selectedTier.tier_discount) : 0; }
function isTierSatisfied() { return !selectedTier || getSubtotal() >= getTierMin(); }
function getDiscountAmount() { return (!selectedTier || !isTierSatisfied()) ? 0 : getSubtotal() * (getTierDiscount() / 100); }
function getPayableTotal() { return Math.max(0, getSubtotal() - getDiscountAmount()); }
function updateFooterTotal() { el.totalBox.textContent = `${Math.round(getPayableTotal()).toLocaleString("en-US")} جنيه`; }

function hasOfferItems() { return Object.values(cart).some(item => clean(item.company) === "صفقة اليوم" || clean(item.unit) === "offer"); }
function clearCart() { cart = {}; drafts = {}; persistAll(); updateFooterTotal(); }

function renderContactBlock() {
  return `
    <div class="contactRow">

function productSearchScore(p, raw) {
  const qLoose = normalizeLoose(raw);
  const q = normalizeCompact(raw);
  if (!q) return 0;
  const code = getProductCode(p), name = getDisplayName(p), company = getCompany(p);
  const nameC = normalizeCompact(name), codeC = normalizeCompact(code), companyC = normalizeCompact(company);
  const all = [nameC, codeC, companyC, normalizeCompact(String(getOriginalPrice(p, "carton"))), normalizeCompact(String(getOriginalPrice(p, "dozen"))), normalizeCompact(String(getOriginalPrice(p, "piece"))), normalizeCompact(String(getOriginalPrice(p, "offer"))), normalizeCompact(getOfferLabel(p))].join(" ");
  let score = 0;
  if (nameC === q || codeC === q) score += 1500;
  if (nameC.startsWith(q)) score += 1200;
  if (codeC.startsWith(q)) score += 1100;
  if (companyC.startsWith(q)) score += 800;
  if (nameC.includes(q)) score += 700;
  if (codeC.includes(q)) score += 550;
  if (companyC.includes(q)) score += 300;
  if (all.includes(q)) score += 150;
  const tokens = qLoose.split(" ").filter(Boolean);
  if (tokens.length > 1) {
    let allFound = true, points = 0;
    for (const tok of tokens) {
      const t = normalizeCompact(tok);
      const hitName = nameC.includes(t), hitCode = codeC.includes(t), hitCompany = companyC.includes(t);
      if (!hitName && !hitCode && !hitCompany) { allFound = false; break; }
      if (nameC.startsWith(t)) points += 50;
      else if (nameC.includes(t)) points += 25;
      else if (companyC.includes(t)) points += 10;
    }
    if (allFound) score += 250 + points;
  }
  return score;
}
function sortSearchResults(list, raw) {
  return list.map(p => ({ p, score: productSearchScore(p, raw) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score || clean(a.p.name).localeCompare(clean(b.p.name), "ar"))
    .map(x => x.p);
}

function restoreDraftForProduct(uiKey) {
  const draft = drafts[uiKey];
  if (!draft) return;
  const unitEl = document.getElementById(`unit_${uiKey}`);
  if (unitEl && clean(draft.unit)) unitEl.value = draft.unit;
  const qtyEl = document.getElementById(`qty_${uiKey}`);
  if (qtyEl) qtyEl.value = clean(draft.qty) ? String(draft.qty) : "";
}

function findProductByKey(uiKey) {
  const key = clean(uiKey);
  return products.find((p) => getProductKey(p) === key || clean(p.__uiKey) === key || clean(p.codo) === key || clean(p.code) === key);
}

function selectUnit(uiKey, unit, silent=false) {
  const product = findProductByKey(uiKey);
  if (!product) return;
  if (isOfferProduct(product)) return;
  if (!isAddableToCart(product)) return;

  const u = clean(unit);
  drafts[uiKey] = drafts[uiKey] || {};
  drafts[uiKey].unit = u;
  persistAll();

  const base = getOriginalPrice(product, u || "carton");
  const priceEl = document.getElementById(`price_${uiKey}`);
  if (priceEl) {
    priceEl.innerHTML = `${(selectedTier ? getDiscountedPrice(base) : base).toLocaleString("en-US")} جنيه`;
    priceEl.classList.remove("wait");
  }
  if (!silent) notify(`تم اختيار ${UNIT_NAMES[u] || "الوحدة"}`, "info");
}

function draftQty(uiKey, value) {
  const cleaned = clean(value).replace(/[^\d]/g, "");
  drafts[uiKey] = drafts[uiKey] || {};
  drafts[uiKey].qty = cleaned === "" ? "" : parseInt(cleaned, 10);
  persistAll();
}

function changeQty(uiKey, delta) {
  const input = document.getElementById(`qty_${uiKey}`);
  if (!input) return;
  let current = parseInt(clean(input.value), 10);
  if (!Number.isFinite(current) || current <= 0) current = 1;
  current += delta;
  if (current < 1) current = 1;
  input.value = String(current);
  draftQty(uiKey, input.value);
}

function addToCart(uiKey) {
  const product = findProductByKey(uiKey);
  if (!product) {
    notify("خطأ في المنتج", "error");
    return;
  }
  if (!isAddableToCart(product)) {
    notify("هذا الصنف غير متاح للإضافة للسلة", "error");
    return;
  }

  const offerMode = isOfferProduct(product);
  const unit = offerMode ? "offer" : clean(drafts[uiKey]?.unit || document.getElementById(`unit_${uiKey}`)?.value);
  if (!offerMode && !unit) {
    notify("اختر الوحدة أولاً", "error");
    return;
  }

  let qty = clean(drafts[uiKey]?.qty || document.getElementById(`qty_${uiKey}`)?.value);
  qty = qty === "" ? 1 : parseInt(qty, 10);
  if (!Number.isFinite(qty) || qty <= 0) qty = 1;

  const basePrice = getOriginalPrice(product, unit);
  if (!basePrice) {
    notify("سعر هذه الوحدة غير متاح", "error");
    return;
  }

  cart[clean(uiKey)] = {
    uiKey: clean(uiKey),
    code: getProductCode(product),
    name: getDisplayName(product),
    company: clean(product.company),
    unit,
    qty,
    price: basePrice,
    basePrice
  };
  persistAll();
  updateFooterTotal();
  notify("تمت الإضافة للسلة", "ok");
}

function reviewQtyInput(uiKey, value) {
  const cleaned = clean(value).replace(/[^\d]/g, "");
  const qty = cleaned === "" ? "" : parseInt(cleaned, 10);
  if (!Number.isFinite(qty) || qty < 1) {
    drafts[uiKey] = drafts[uiKey] || {};
    drafts[uiKey].qty = "";
    persistAll();
    return;
  }
  if (cart[uiKey]) {
    cart[uiKey].qty = qty;
    persistAll();
    renderReview();
    updateFooterTotal();
  } else {
    drafts[uiKey] = drafts[uiKey] || {};
    drafts[uiKey].qty = qty;
    persistAll();
  }
}

function reviewQty(uiKey, delta) {
  if (!cart[uiKey]) return;
  let qty = toNum(cart[uiKey].qty);
  if (!Number.isFinite(qty) || qty < 1) qty = 1;
  qty += delta;
  if (qty < 1) qty = 1;
  cart[uiKey].qty = qty;
  persistAll();
  renderReview();
  updateFooterTotal();
}

function removeFromCart(uiKey) {
  delete cart[uiKey];
  persistAll();
  renderReview();
  updateFooterTotal();
  notify("تم حذف الصنف", "info");
}

function setLocation() {
  if (!navigator.geolocation) {
    notify("الموقع غير مدعوم على هذا الجهاز", "error");
    return;
  }
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const link = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
      customer.location = link;
      persistAll();
      const loc = document.getElementById("locationStatus");
      if (loc) loc.textContent = "✔ تم تحديد اللوكيشن";
      notify("تم تحديد اللوكيشن", "ok");
    },
    () => notify("تعذر تحديد اللوكيشن", "error"),
    { enableHighAccuracy:true, timeout:12000, maximumAge:0 }
  );
}

function sendOrder() {
  const name = clean(document.getElementById("custName")?.value);
  const phone = clean(document.getElementById("custPhone")?.value);
  const business = clean(document.getElementById("custBusiness")?.value);
  const address = clean(document.getElementById("custAddress")?.value);
  const location = clean(customer.location || "");

  if (!name || !phone || !business || !address || !location) {
    notify("من فضلك أكمل بيانات العميل واللوكيشن", "error");
    return;
  }

  const subtotal = getSubtotal();
  const discount = getDiscountAmount();
  const payable = getPayableTotal();

  if (selectedTier && !isTierSatisfied()) {
    notify("لم تصل للحد الأدنى للشريحة", "error");
    return;
  }

  customer = { name, phone, business, address, location };
  persistAll();

  const lines = [];
  lines.push(`طلب شراء من / ${name}`);
  lines.push("");

  Object.values(cart).forEach((item) => {
    const itemTotal = toNum(item.qty) * toNum(item.price);
    const isOfferItem = clean(item.unit) === "offer";
    lines.push(`الصنف: ${item.code ? `${item.code} - ` : ""}${item.name}`);
    lines.push(`الوحدة: ${isOfferItem ? "عرض" : (UNIT_NAMES[item.unit] || item.unit)}`);
    lines.push(`الكمية: ${item.qty}`);
    lines.push(`سعر الوحدة: ${toNum(item.price).toLocaleString("en-US")} جنيه`);
    lines.push(`الإجمالي: ${itemTotal.toLocaleString("en-US")} جنيه`);
    lines.push("");
  });

  lines.push(`إجمالي قبل الخصم: ${subtotal.toLocaleString("en-US")} جنيه`);
  if (selectedTier) {
    lines.push(`الشريحة: ${selectedTier.tier_name}`);
    lines.push(`الخصم: ${getTierDiscount()}%${isTierSatisfied() ? ` (${discount.toLocaleString("en-US")} جنيه)` : ""}`);
  }
  lines.push(`الإجمالي النهائي: ${payable.toLocaleString("en-US")} جنيه`);
  lines.push("");
  lines.push(`الاسم: ${name}`);
  lines.push(`الهاتف: ${phone}`);
  lines.push(`النشاط: ${business}`);
  lines.push(`العنوان: ${address}`);
  lines.push(`اللوكيشن: ${location}`);

  window.open(`https://wa.me/201552670465?text=${encodeURIComponent(lines.join("\n"))}`, "_blank");
}

function backToShopping() {
  if (reviewReturn?.type === "products" && reviewReturn?.value) {
    renderProducts(reviewReturn.value);
  } else {
    renderHome();
  }
}

function goBack() {
  if (currentPage === "products") {
    renderHome();
    return;
  }
  if (currentPage === "review") {
    backToShopping();
    return;
  }
}

Promise.all([loadCSV(URLS.products), loadCSV(URLS.tiers), loadCSV(URLS.settings)]).then(([productsRes, tiersRes, settingsRes]) => {
  products = productsRes.filter(x => clean(x.company)).map((p) => ({ ...p, __uiKey: getProductKey(p) }));
  tiersData = tiersRes.filter(x => clean(x.tier_active) === "1");
  settings = settingsRes;

  const headerImage = settings.find(x => clean(x.type) === "company_image")?.value;
  el.headerImg.src = clean(headerImage) ? headerImage : PLACEHOLDERS.header;
  el.headerImg.onerror = () => { el.headerImg.src = PLACEHOLDERS.header; };

  const newsList = settings
    .filter(x => clean(x.type) === "news" && clean(x.value))
    .flatMap(x => clean(x.value).split("،"))
    .map(x => clean(x))
    .filter(Boolean);

  if (newsList.length) {
    let i = 0;
    el.news.textContent = newsList[0];
    setInterval(() => {
      el.news.textContent = newsList[i];
      i = (i + 1) % newsList.length;
    }, 3000);
  }

  renderTiers();
  renderHome();
  updateFooterTotal();

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
  }
});
</script>
