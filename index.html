<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة والتوزيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
:root{
  --blue:#0B3D91;
  --red:#E53935;
  --orange:#FF7A00;
  --gray:#7A8596;
  --bg:#F5F7FA;
  --card:#ffffff;
  --line:#e7e9ee;
  --text:#172233;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
}

a{color:inherit;text-decoration:none}

.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:var(--blue);
  color:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.headerMeta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px 12px 6px;
  background:#0a2f75;
}
.companyTitle{
  font-weight:700;
  font-size:16px;
  line-height:1.2;
}
.headerPhone{
  font-weight:700;
  font-size:13px;
  white-space:nowrap;
  background:rgba(255,255,255,.12);
  padding:6px 10px;
  border-radius:999px;
}

.hero{
  position:relative;
  height:130px;
  overflow:hidden;
  background:linear-gradient(135deg,#0B3D91,#0a2b66);
}
.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,.08));
}
.title{
  position:absolute;
  right:12px;
  bottom:10px;
  z-index:2;
  font-weight:700;
  font-size:18px;
}

.news{
  background:var(--orange);
  color:#fff;
  padding:8px 10px;
  text-align:center;
  font-weight:700;
  font-size:14px;
  min-height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.tiersWrap{
  background:#fff;
  border-bottom:1px solid var(--line);
  padding:8px 10px 8px;
}
.tiers{
  display:flex;
  gap:8px;
  overflow-x:auto;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
.tiers::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;
  border:1px solid #d7dce5;
  background:#f8fafc;
  color:#233044;
  padding:7px 12px;
  border-radius:999px;
  white-space:nowrap;
  font-size:13px;
  cursor:pointer;
  user-select:none;
}
.chip.active{
  background:var(--blue);
  color:#fff;
  border-color:var(--blue);
}
.chip.cancel{
  background:#fff4f4;
  color:var(--red);
  border-color:#ffd2d2;
  font-weight:700;
}

.contactRow{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:8px 10px 10px;
  background:#fff;
  border-bottom:1px solid var(--line);
}
.contactBtn{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:40px;
  border-radius:12px;
  font-weight:700;
  font-size:13px;
  color:#fff;
}
.contactBtn.phone{background:#173a84}
.contactBtn.wa{background:#1f8b4c}

.tierBanner{
  display:none;
  margin-top:8px;
  padding:8px 10px;
  border-radius:10px;
  background:#eef4ff;
  color:#10306a;
  font-size:13px;
  line-height:1.6;
}

.back{
  display:none;
  background:#fff;
  color:var(--blue);
  text-align:center;
  padding:10px 12px;
  border-bottom:1px solid var(--line);
  font-weight:700;
  cursor:pointer;
}

#app{
  padding:10px;
  padding-bottom:140px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  text-align:center;
  box-shadow:0 2px 10px rgba(16,24,40,.04);
  overflow:hidden;
}

.brandCard{
  min-height:132px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:8px;
}
.brandCard .brandImg{
  width:100%;
  height:72px;
  object-fit:contain;
}
.brandCard .brandName{
  font-weight:700;
  font-size:14px;
  line-height:1.3;
}

.productCard{
  min-height:312px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.productImg{
  width:100%;
  height:106px;
  object-fit:contain;
  border-radius:10px;
  background:#f7f9fc;
}
.productName{
  font-weight:700;
  font-size:14px;
  line-height:1.35;
  min-height:38px;
}
.price{
  color:var(--red);
  font-weight:700;
  font-size:15px;
  min-height:24px;
}
.price.wait{
  color:var(--gray);
  font-weight:700;
}
.unitSelect{
  width:100%;
  height:38px;
  border-radius:10px;
  border:1px solid #d7dce5;
  background:#fff;
  padding:0 10px;
  font-family:inherit;
  font-size:14px;
  color:#1f2a3a;
  outline:none;
}

.qtyWrap{
  display:grid;
  grid-template-columns:36px 1fr 36px;
  gap:6px;
  align-items:center;
}
.qtyBtn{
  width:36px;
  height:36px;
  border:none;
  border-radius:10px;
  background:#e9edf3;
  color:#1f2a3a;
  font-size:20px;
  font-weight:700;
  cursor:pointer;
}
.qtyBtn:disabled{
  opacity:.45;
  cursor:not-allowed;
}
.qtyInput{
  width:100%;
  height:36px;
  border-radius:10px;
  border:1px solid #d7dce5;
  text-align:center;
  font-family:inherit;
  font-size:15px;
  outline:none;
  background:#eef1f6;
  color:#1f2a3a;
}
.qtyInput.enabled{
  background:#fff;
  border-color:#9fb5db;
}
.addBtn{
  margin-top:auto;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,var(--orange),#ff9a3a);
  color:#fff;
  padding:10px 12px;
  font-family:inherit;
  font-weight:700;
  cursor:pointer;
  min-height:42px;
}

.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  z-index:1000;
  background:#fff;
  border-top:1px solid var(--line);
  display:grid;
  grid-template-columns:92px 1fr 92px;
  align-items:center;
  gap:8px;
  padding:10px;
  box-shadow:0 -2px 10px rgba(0,0,0,.04);
}
.footerBtn{
  text-align:center;
  font-weight:700;
  color:#1f2a3a;
  cursor:pointer;
  user-select:none;
}
.footerTotal{
  text-align:center;
  font-weight:700;
  color:var(--blue);
  font-size:15px;
}

.designSign{
  position:fixed;
  left:10px;
  right:10px;
  bottom:62px;
  z-index:999;
  background:#ffffff;
  color:#4b5563;
  border:1px solid var(--line);
  border-radius:12px;
  text-align:center;
  padding:8px 10px;
  font-size:12px;
  font-weight:700;
  box-shadow:0 -2px 10px rgba(0,0,0,.04);
}

.toast{
  position:fixed;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  z-index:2000;
  min-width:180px;
  max-width:90vw;
  background:#1f8b4c;
  color:#fff;
  padding:10px 14px;
  border-radius:999px;
  text-align:center;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
  display:none;
  font-size:14px;
}
.toast.error{background:#c0392b}
.toast.info{background:#0B3D91}

.reviewWrap{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.reviewSummary{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  line-height:1.8;
}
.reviewItem{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  line-height:1.7;
}
.reviewItemTop{
  font-weight:700;
}
.reviewControls{
  display:grid;
  grid-template-columns:36px 1fr 36px;
  gap:6px;
  align-items:center;
  margin-top:8px;
}
.reviewQtyInput{
  width:100%;
  height:36px;
  border-radius:10px;
  border:1px solid #d7dce5;
  text-align:center;
  font-family:inherit;
  font-size:15px;
  outline:none;
  background:#fff;
}
.reviewAction{
  margin-top:8px;
  text-align:center;
  color:var(--red);
  font-weight:700;
  cursor:pointer;
  user-select:none;
}
.formCard{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}
.input{
  width:100%;
  height:42px;
  border-radius:10px;
  border:1px solid #d7dce5;
  padding:0 12px;
  font-family:inherit;
  font-size:14px;
  outline:none;
  background:#fff;
  margin-bottom:8px;
}
.input:focus,.unitSelect:focus,.qtyInput:focus,.reviewQtyInput:focus{
  border-color:#8fb0e6;
  box-shadow:0
