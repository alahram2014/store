<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>الأهرام للتجارة والتوزيع</title>
<meta name="theme-color" content="#c79b18" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{
  --gold:#c79b18; --gold2:#f0d46c; --gold3:#8a5a00; --bg:#fbf4de; --card:#ffffff;
  --soft:#fffdf6; --line:#ead08a; --text:#1d2633; --muted:#667085; --accent:#0b3d91;
  --danger:#c0392b; --success:#1f8b4c;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:'Cairo',sans-serif;
  background:linear-gradient(180deg,#fff7df,#fbf4de 30%,#f8f0da);
  color:var(--text); -webkit-tap-highlight-color:transparent;
}
a{text-decoration:none;color:inherit}
button,input,select{font-family:inherit}
img{max-width:100%;display:block}
#app{padding:12px 12px 116px;max-width:980px;margin:0 auto}
.header{position:static;z-index:1000;background:linear-gradient(180deg,#c79b18,#8a5a00);color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.08);overflow:hidden}
.hero{position:relative;height:116px;background:linear-gradient(135deg,#8a5a00,#c79b18)}
.hero img{width:100%;height:100%;object-fit:cover;filter:saturate(1.05) contrast(1.02)}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.60),rgba(0,0,0,.06))}
.heroText{position:absolute;inset:0;z-index:2;padding:8px 12px 12px;display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;gap:6px;text-align:right}
.companyName{margin-top:1px;background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.18);backdrop-filter:blur(8px);color:#fff;padding:10px 14px;border-radius:16px;font-weight:900;font-size:19px;line-height:1.15;box-shadow:0 8px 18px rgba(0,0,0,0.12);text-align:right}
.tagline{background:rgba(255,248,227,0.16);border:1px solid rgba(255,248,227,0.18);backdrop-filter:blur(8px);color:#fffbe8;padding:6px 10px;border-radius:14px;font-size:11px;font-weight:700;line-height:1.45;max-width:92%}
.socialRow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 12px 6px;background:rgba(255,255,255,0.06)}
.socialBtn{min-height:38px;border:none;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,0.10)}
.socialBtn.phone{background:#fff;color:#0b3d91}.socialBtn.wa{background:#1f8b4c;color:#fff}.socialBtn.fb{background:#fff;color:#0b3d91}
.newsTicker{background:linear-gradient(135deg,#fff0c1,#f0d46c);color:#5a4300;padding:6px 12px;font-size:12px;font-weight:800;min-height:32px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.5;border-top:1px solid rgba(255,255,255,0.12)}
.topActions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;padding:8px 12px 10px}
.topBtn{min-height:44px;border:none;border-radius:16px;font-size:12px;font-weight:800;cursor:pointer;box-shadow:0 8px 18px rgba(0,0,0,0.11);min-width:0;width:100%;padding:8px 10px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;justify-content:center;text-align:center;gap:6px}
.topBtn.tier{background:linear-gradient(135deg,#fff7cf,#f0d46c);color:#5a4300}
.topBtn.tier.active{background:linear-gradient(135deg,#8a5a00,#5a4300);color:#fff}
.topBtn.offer{background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff}
.topBtn.repBtn{background:linear-gradient(135deg,#8a5a00,#c79b18);color:#fff}
.searchBox{margin:0 0 8px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:8px;box-shadow:0 6px 16px rgba(0,0,0,0.04)}
.searchRow{display:grid;grid-template-columns:1fr 84px 52px;gap:8px}
.searchInput,.formInput{width:100%;height:44px;border-radius:12px;border:1px solid #d8dde7;padding:0 12px;font-size:14px;outline:none}
.searchBtn{background:var(--accent); color:#fff; border:none; border-radius:12px; font-weight:800}
.sectionCard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:10px;margin-bottom:8px}
.brandGrid,.productGrid,.tierGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.brandCard,.productCard,.tierCard{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;padding:10px;text-align:center}
.brandImg,.productImg{width:100%;height:140px;object-fit:contain;background:#f8fafc;border-radius:14px;margin-bottom:8px}
.productName{font-weight:800;font-size:13px;line-height:1.45;min-height:38px}
.priceNow{color:#c0392b;font-weight:900;display:block;margin:6px 0}
.qtyRow{display:grid;grid-template-columns:40px 1fr 40px;gap:6px;align-items:center;margin:8px 0}
.qtyBtn{height:36px;border:none;border-radius:10px;background:#e9edf3;font-weight:900}
.addBtn,.primaryBtn{min-height:40px;width:100%;background:linear-gradient(135deg,#c79b18,#f0d46c);color:#5a4300;border:none;border-radius:12px;font-weight:800;cursor:pointer}
.footerDock{position:fixed;bottom:0;left:0;right:0;z-index:2200;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.94);backdrop-filter:blur(12px);border-top:1px solid var(--line)}
.footerTotal{display:flex;align-items:center;justify-content:center;background:#fff;border-radius:14px;font-weight:900;color:#5a4300;min-height:46px;border:1px solid var(--line)}
.footerBtn{min-height:46px;border:none;border-radius:14px;font-weight:800;color:#fff}
.footerBtn.checkout{background:linear-gradient(135deg,#1f8b4c,#2da35d)}
.footerBtn.quick{background:linear-gradient(135deg,#8a5a00,#c79b18)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:999px;display:none;z-index:9999;font-weight:800}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:4000;padding:20px}
.modalCard{background:#fff;padding:20px;border-radius:20px;width:100%;max-width:400px}
.modal.show{display:flex}
@media (min-width:700px){.brandGrid,.productGrid,.tierGrid{grid-template-columns:repeat(3,minmax(0,1fr))}}
</style>
</head>
<body>
<div class="header">
  <div class="hero">
    <img id="heroImage" src="" />
    <div class="heroText">
      <div class="companyName">الأهرام للتجارة والتوزيع</div>
      <div class="tagline" id="heroTagline">جارٍ التحميل...</div>
    </div>
  </div>
  <div class="socialRow">
    <a class="socialBtn phone" href="tel:01040880002">📞</a>
    <a class="socialBtn wa" href="https://wa.me/201040880002" target="_blank">واتساب</a>
    <a class="socialBtn fb" href="https://facebook.com/alahram2014" target="_blank">Facebook</a>
  </div>
  <div class="newsTicker" id="newsTicker">أهلاً بكم في شركة الأهرام</div>
  <div class="topActions" id="topActions"></div>
</div>

<div id="app"></div>

<div class="footerDock">
  <button class="footerBtn quick" onclick="renderHome()">الرئيسية</button>
  <div class="footerTotal" id="footerTotal">0 جنيه</div>
  <button class="footerBtn checkout" onclick="renderCart()">السلة</button>
</div>

<div class="modal" id="repModal">
  <div class="modalCard">
    <h3>دخول المندوب</h3>
    <input class="formInput" id="repCode" placeholder="كود المندوب"><br><br>
    <input class="formInput" id="repPassword" type="password" placeholder="الرقم السري"><br><br>
    <button class="primaryBtn" onclick="submitRepLogin()">دخول</button>
    <button class="primaryBtn" style="background:#ddd;margin-top:10px" onclick="closeModals()">إلغاء</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DATA = {
  productsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1503749054&single=true&output=csv",
  settingsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=47255050&single=true&output=csv",
  repsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1633587789&single=true&output=csv",
  tiersUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=917474192&single=true&output=csv",
  authUrl: "https://script.google.com/macros/s/AKfycbwaB-bv-GdQ78TdFmX_p3RKjze2bMjlHAuNip1yaPashWGhqXEO6-i8_2jmh48K1GuYzw/exec"
};

let state = {
  products: [], settings: [], reps: [], tiers: [],
  cart: {}, rep: null, tier: null, loading: true
};

function toast(m) { const t=document.getElementById("toast"); t.textContent=m; t.style.display="block"; setTimeout(()=>t.style.display="none",2000); }

async function loadData() {
  try {
    const [p, s, r, t] = await Promise.all([
      fetchCSV(DATA.productsUrl), fetchCSV(DATA.settingsUrl),
      fetchCSV(DATA.repsUrl), fetchCSV(DATA.tiersUrl)
    ]);
    state.products = p; state.settings = s; state.reps = r; state.tiers = t;
    state.loading = false;
    renderHome();
    updateUI();
  } catch(e) { toast("خطأ في تحميل البيانات"); }
}

function fetchCSV(url) {
  return new Promise(resolve => {
    Papa.parse(url, { download: true, header: true, complete: res => resolve(res.data) });
  });
}

function updateUI() {
  const hero = state.settings.find(s => s.key === "heroimage")?.value;
  if(hero) document.getElementById("heroImage").src = hero;
  document.getElementById("heroTagline").textContent = state.settings.find(s => s.key === "tagline")?.value || "شركة الأهرام للتوزيع";
  
  const actions = document.getElementById("topActions");
  actions.innerHTML = `
    <button class="topBtn tier" onclick="toast('قريباً')">🏷️ الشرائح</button>
    <button class="topBtn offer" onclick="toast('عروض اليوم')">🔥 العروض</button>
    <button class="topBtn repBtn" onclick="openRepLogin()">${state.rep ? state.rep.repName : 'دخول مندوب'}</button>
  `;
}

function renderHome() {
  const brands = [...new Set(state.products.map(p => p.company))].filter(Boolean);
  let html = `
    <div class="searchBox"><div class="searchRow">
      <input class="searchInput" id="search" placeholder="ابحث عن منتج...">
      <button class="searchBtn" onclick="runSearch()">بحث</button>
    </div></div>
    <div class="sectionCard"><h3>الشركات والبراندات</h3><div class="brandGrid">`;
  brands.forEach(b => {
    const img = state.products.find(p => p.company === b)?.brand_image || "";
    html += `<div class="brandCard" onclick="renderBrand('${b}')">
      ${img ? `<img class="brandImg" src="${img}">` : ''}
      <div class="brandName"><b>${b}</b></div>
    </div>`;
  });
  html += `</div></div>`;
  document.getElementById("app").innerHTML = html;
}

function renderBrand(b) {
  const list = state.products.filter(p => p.company === b);
  let html = `<button class="primaryBtn" style="margin-bottom:10px" onclick="renderHome()">⬅ رجوع</button>
              <div class="productGrid">`;
  list.forEach(p => {
    html += `<div class="productCard">
      <img class="productImg" src="${p.image || ''}">
      <div class="productName">${p.name}</div>
      <span class="priceNow">${p.price_piece} جنيه</span>
      <button class="addBtn" onclick="addToCart('${p.codo}')">أضف للسلة</button>
    </div>`;
  });
  html += `</div>`;
  document.getElementById("app").innerHTML = html;
}

function addToCart(code) {
  const p = state.products.find(x => x.codo === code);
  state.cart[code] = (state.cart[code] || 0) + 1;
  updateCartTotal();
  toast("تمت الإضافة");
}

function updateCartTotal() {
  let total = 0;
  for(let code in state.cart) {
    const p = state.products.find(x => x.codo === code);
    total += (state.cart[code] * parseFloat(p.price_piece || 0));
  }
  document.getElementById("footerTotal").textContent = total + " جنيه";
}

function renderCart() {
  let html = `<h3>سلة المشتريات</h3>`;
  for(let code in state.cart) {
    const p = state.products.find(x => x.codo === code);
    html += `<div class="sectionCard"><b>${p.name}</b> - الكمية: ${state.cart[code]}</div>`;
  }
  html += `<button class="primaryBtn" onclick="sendWhatsApp()">إرسال الطلب (واتساب)</button>`;
  document.getElementById("app").innerHTML = html;
}

function sendWhatsApp() {
  let text = "طلب شراء جديد:\n";
  for(let code in state.cart) {
    const p = state.products.find(x => x.codo === code);
    text += `- ${p.name} (${state.cart[code]} قطع)\n`;
  }
  window.open(`https://wa.me/201040880002?text=${encodeURIComponent(text)}`);
}

function openRepLogin() { document.getElementById("repModal").classList.add("show"); }
function closeModals() { document.querySelectorAll(".modal").forEach(m => m.classList.remove("show")); }

async function submitRepLogin() {
  const code = document.getElementById("repCode").value;
  const pass = document.getElementById("repPassword").value;
  const btn = document.querySelector("#repModal .primaryBtn");
  btn.textContent = "جارٍ التحقق..."; btn.disabled = true;
  try {
    const res = await fetch(DATA.authUrl, {
      method: "POST",
      body: JSON.stringify({ action: "check_rep", code, password: pass })
    });
    const result = await res.json();
    if(result.success) {
      state.rep = result.repData;
      toast("أهلاً بك يا " + result.repData.repName);
      closeModals(); updateUI();
    } else { toast(result.message); }
  } catch(e) { toast("خطأ في السيرفر"); }
  finally { btn.textContent = "دخول"; btn.disabled = false; }
}

window.onload = loadData;
</script>
</body>
</html>
