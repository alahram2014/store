<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>الأهرام للتجارة والتوزيع</title>
<meta name="theme-color" content="#0B3D91" />
<link rel="manifest" href="./manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{--blue:#0B3D91;--blue2:#1852b6;--red:#E53935;--orange:#FF7A00;--gold:#c79b18;--gold2:#f0d46c;--gray:#7A8596;--bg:#F5F7FA;--card:#fff;--line:#e7e9ee;--text:#172233}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
a{color:inherit;text-decoration:none}
button,input,select{font-family:inherit}
.header{position:sticky;top:0;z-index:1000;background:linear-gradient(180deg,#0B3D91,#09357c);color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.hero{position:relative;height:176px;overflow:hidden;background:linear-gradient(135deg,#0B3D91,#0a2b66)}
.hero img{width:100%;height:100%;object-fit:cover;display:block}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.58),rgba(0,0,0,.06))}
.heroOverlay{position:absolute;top:12px;right:12px;z-index:2;display:flex;justify-content:flex-end;align-items:flex-start}
.heroTitle{font-weight:700;font-size:17px;color:#fff;background:rgba(255,255,255,.16);backdrop-filter:blur(10px);padding:10px 14px;border-radius:16px;text-shadow:0 1px 3px rgba(0,0,0,.36);box-shadow:0 6px 18px rgba(0,0,0,.14)}
.news{background:var(--orange);color:#fff;padding:7px 10px;text-align:center;font-weight:700;font-size:13px;min-height:30px;display:flex;align-items:center;justify-content:center;line-height:1.35}
.topActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 10px 10px;background:rgba(255,255,255,.04)}
.actionBtn{border:none;border-radius:14px;min-height:44px;font-size:14px;font-weight:700;cursor:pointer;color:#fff;box-shadow:0 8px 18px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;gap:6px}
.actionBtn.tier{background:linear-gradient(135deg,#1fb7a9,#0f8f83);color:#fff;border:1px solid rgba(255,255,255,.28);box-shadow:0 10px 22px rgba(15,143,131,.22)}
.actionBtn.offer{background:linear-gradient(135deg,#c79b18,#f0d46c);color:#5a4300}
.actionBtn.active{outline:2px solid rgba(255,255,255,.55);outline-offset:1px}
.back{display:none;position:fixed;top:12px;right:12px;z-index:1500;background:linear-gradient(135deg,#ffffff,#dbeafe);color:#0a2f75;padding:10px 14px;border:1px solid #8fb0e6;border-radius:999px;font-weight:800;cursor:pointer;box-shadow:0 10px 24px rgba(11,61,145,.22);user-select:none;letter-spacing:.1px}
#app{padding:10px;padding-bottom:120px}
.searchBar{margin:0 0 10px 0}.searchRow{display:grid;grid-template-columns:1fr 84px 56px;gap:8px}
.searchInput,.unitSelect,.qtyInput,.reviewQtyInput,.input{width:100%;height:42px;border-radius:10px;border:1px solid #d7dce5;padding:0 12px;font-size:14px;outline:none;background:#fff}
.searchBtn,.clearBtn,.mainBtn,.addBtn,.qtyBtn,.footerBtn,.smallBtn,.tierCardBtn,.quickContact,.miniDanger{border:none;border-radius:10px;font-weight:700;cursor:pointer}
.searchBtn,.clearBtn{color:#fff;height:42px}.searchBtn{background:var(--blue)}.clearBtn{background:#6b7280}
.searchHint{margin:0 0 10px 0;color:var(--blue);font-weight:700;text-align:center}
.sectionTitle{margin:12px 0 8px;font-weight:700;color:#39485f;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px;text-align:center;box-shadow:0 2px 10px rgba(16,24,40,.04);overflow:hidden}
.pageCard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:0 2px 10px rgba(16,24,40,.04);margin-bottom:10px}
.pageCard.blue{background:linear-gradient(180deg,#f4f8ff,#ffffff);border-color:#dce7ff}
.pageCard.gold{background:linear-gradient(180deg,#fff8df,#fffef7);border-color:#ead08a}
.pageCardTitle{font-weight:700;font-size:15px;margin-bottom:6px;color:#173a84}
.pageCardSub{font-size:13px;line-height:1.7;color:#435166}
.pageList{margin:8px 0 0;padding:0 18px 0 0}.pageList li{margin:4px 0;line-height:1.6}
.contactDock{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 0 10px}
.quickContact{min-height:44px;border-radius:14px;background:#fff;border:1px solid var(--line);box-shadow:0 4px 10px rgba(16,24,40,.06);display:flex;align-items:center;justify-content:center;font-size:18px}
.quickContact.phone{color:#173a84}.quickContact.wa{color:#1f8b4c}.quickContact.fb{color:#0B3D91;font-weight:700}
.quickContact svg{width:20px;height:20px;display:block;flex:0 0 auto}
.quickContact .waSvg{width:22px;height:22px}
.tierPageActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 12px}
.vipLaunchBtn{min-height:40px;border:none;border-radius:12px;background:linear-gradient(135deg,#ffd85c,#c79b18);color:#5a4300;font-family:inherit;font-weight:800;cursor:pointer;box-shadow:0 8px 18px rgba(184,138,0,.18)}
.vipPage{background:linear-gradient(180deg,#2f2416 0%, #f5ecd5 12%, #fbf4e2 44%, #f4ead0 100%)}
.vipPage .header{background:linear-gradient(180deg,#6d4c2f,#4e381f)}
.vipPage .pageCard,.vipPage .card{border-color:#e1c777;box-shadow:0 8px 20px rgba(184,138,0,.10)}
.vipPage .brandCard{background:linear-gradient(180deg,#fffef8,#fff7de);border-color:#e7cf87}
.vipPage .brandCard .brandName{color:#5a4300}
.vipPage .pageCard.blue{background:linear-gradient(180deg,#fffaf0,#ffffff);border-color:#e7cf87}
.vipPage .footer{background:#fff8ea}

.brandCard{min-height:118px;display:flex;flex-direction:column;justify-content:center;gap:6px}
.brandCard .brandImg{width:100%;height:66px;object-fit:contain}
.brandCard .brandName{font-weight:700;font-size:13px;line-height:1.3}
.productCard{min-height:260px;display:flex;flex-direction:column;gap:6px}
.productCard.offerCard{background:linear-gradient(180deg,#fffdf0,#fff4c8);border-color:#e0c46c;box-shadow:0 8px 20px rgba(184,138,0,.12)}
.productImg{width:100%;height:88px;object-fit:contain;border-radius:10px;background:#f7f9fc}
.productName{font-weight:700;font-size:13px;line-height:1.32;min-height:34px}
.offerLabel{font-weight:700;font-size:12px;line-height:1.3;color:#8b6500;min-height:18px}
.stockBadge{display:inline-flex;align-items:center;justify-content:center;padding:5px 9px;border-radius:999px;font-size:11px;font-weight:700;margin:0 auto}
.stockBadge.active{background:#e8f5ee;color:#16824b}.stockBadge.inactive{background:#fff0f0;color:#bf2c2c}
.cartonPrice{font-weight:700;font-size:12px;line-height:1.25;min-height:18px;color:var(--red);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.price{color:var(--red);font-weight:700;font-size:14px;min-height:22px}.price.offer{color:#8b6500}
.unitSelect{height:36px;padding:0 10px;font-size:13px;color:#1f2a3a}
.qtyWrap{display:grid;grid-template-columns:34px 1fr 34px;gap:5px;align-items:center}
.qtyBtn{width:34px;height:34px;border:none;border-radius:10px;background:#e9edf3;color:#1f2a3a;font-size:18px;font-weight:700}
.qtyBtn:disabled,.unitSelect:disabled,.qtyInput:disabled,.addBtn:disabled{opacity:.55;cursor:not-allowed}.qtyInput{text-align:center}
.addBtn{margin-top:auto;background:linear-gradient(135deg,var(--orange),#ff9a3a);color:#fff;padding:10px 12px;min-height:40px}
.addBtn.offer{background:linear-gradient(135deg,#c79b18,#f0d46c);color:#5a4300}
.tiersGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.tierCard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;box-shadow:0 2px 10px rgba(16,24,40,.04);text-align:right}
.tierCard.active{border-color:#0B3D91;box-shadow:0 10px 22px rgba(11,61,145,.14)}
.tierCard.locked{background:linear-gradient(180deg,#fbfcff,#f3f7ff)}
.tierCardName{display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:700;font-size:14px;margin-bottom:6px;color:#173a84}
.tierBadge{font-size:11px;font-weight:700;border-radius:999px;padding:4px 8px;background:#eef4ff;color:#10306a}
.tierCardMeta{font-size:12px;line-height:1.7;color:#435166}
.tierCardBtn{width:100%;min-height:38px;margin-top:10px;background:linear-gradient(135deg,#0B3D91,#1852b6);color:#fff}
.tierCardBtn.locked{background:linear-gradient(135deg,#7a5a00,#c59a14);color:#fff}
.footer{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:92px 1fr 108px;align-items:center;gap:8px;padding:10px;box-shadow:0 -2px 10px rgba(0,0,0,.04)}
.footerBtn{text-align:center;font-weight:700;color:#1f2a3a;cursor:pointer;user-select:none;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:#eff3f8;font-size:15px}
.footerBtn.primary{background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff}
.footerTotal{text-align:center;font-weight:700;color:var(--blue);font-size:15px}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:2000;min-width:180px;max-width:90vw;background:#1f8b4c;color:#fff;padding:10px 14px;border-radius:999px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.18);display:none;font-size:14px}.toast.error{background:#c0392b}.toast.info{background:#0B3D91}
.reviewWrap{display:flex;flex-direction:column;gap:10px}.reviewSummary,.reviewItem,.formCard,.emptyState{background:#fff;border:1px solid var(--line);border-radius:14px}.reviewSummary{padding:12px;line-height:1.8}
.reviewSummaryTop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}.reviewItem{padding:10px;line-height:1.7}.reviewItemTop{font-weight:700}
.reviewControls{display:grid;grid-template-columns:34px 1fr 34px;gap:5px;align-items:center;margin-top:8px}.reviewQtyInput{text-align:center}.reviewAction{margin-top:8px;text-align:center;color:var(--red);font-weight:700;cursor:pointer;user-select:none}
.formCard{padding:12px}.input{margin-bottom:8px}.input:focus,.unitSelect:focus,.qtyInput:focus,.reviewQtyInput:focus,.searchInput:focus{border-color:#8fb0e6;box-shadow:0 0 0 3px rgba(11,61,145,.08)}
.mainBtn{width:100%;border:none;border-radius:12px;min-height:46px;font-size:16px;font-weight:700;cursor:pointer}.mainBtn.primary{background:linear-gradient(135deg,var(--orange),#ff9a3a);color:#fff}.mainBtn.secondary{background:#eff3f8;color:#1f2a3a}
.smallBtn{min-height:38px;padding:0 12px;background:#f0f4fb;color:#173a84;border:1px solid #d9e6ff}.miniDanger{min-height:36px;padding:0 12px;background:linear-gradient(135deg,#ff6d66,#e53935);color:#fff;border:none;font-size:13px}
.locationStatus{margin-top:6px;font-size:13px;color:var(--gray);min-height:20px}.emptyState{padding:20px;text-align:center;color:var(--gray)}
.designSignature{margin:10px 0 0;background:#fff;border:1px solid var(--line);border-radius:12px;text-align:center;padding:8px 10px;color:#4b5563;font-size:12px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.hidden{display:none!important}
body.compact .hero{display:none}body.compact .news{font-size:12px;min-height:28px;padding:6px 8px}body.compact .topActions{padding:6px 8px 8px}body.compact .back{top:10px;right:10px;padding:8px 11px;font-size:13px}body.compact #app{padding-top:8px}body.compact .actionBtn{min-height:40px;font-size:13px}
body.offerPage{background:linear-gradient(180deg,#f7ecd0,#f7f1dc 35%,#f4f0e3)}body.offerPage .header{background:linear-gradient(180deg,#8b6500,#5a4300)}body.offerPage .actionBtn.offer{outline:2px solid rgba(255,255,255,.4)}body.offerPage .productCard.offerCard{background:linear-gradient(180deg,#fffef7,#fff4c8)}body.offerPage .card,body.offerPage .pageCard{border-color:#ead08a}
body.tierPage{background:linear-gradient(180deg,#eef4ff,#f9fbff 45%,#f4f8ff)}body.tierPage .header{background:linear-gradient(180deg,#0B3D91,#0a2b66)}body.tierPage .pageCard.blue{background:linear-gradient(180deg,#f2f6ff,#ffffff)}
@media (min-width:700px){.grid,.tiersGrid{grid-template-columns:repeat(3,minmax(0,1fr))}.topActions{grid-template-columns:repeat(2,minmax(0,240px));justify-content:center}.topActions{justify-items:center}}
</style>
</head>
<body>
<div class="header">
  <div class="hero">
    <img id="headerImg" alt="company header" fetchpriority="high" loading="eager">
    <div class="heroOverlay"><div class="heroTitle">الأهرام للتجارة والتوزيع</div></div>
  </div>
  <div class="news" id="news"></div>
  <div class="topActions">
    <button class="actionBtn tier" id="tierActionBtn" onclick="openTiersPage()">💰 شرائح الجملة VIP</button>
    <button class="actionBtn offer" id="offerActionBtn" onclick="openOffersPage()">🔥 صفقة اليوم</button>
  </div>
  <div class="back" id="backBtn" onclick="goBack()">↩ رجوع</div>
</div>
<div id="app"><div class="emptyState">جارٍ التحميل...</div></div>
<div class="footer">
  <div class="footerBtn" id="footerBack" onclick="goBack()">رجوع</div>
  <div class="footerTotal" id="totalBox">0 جنيه</div>
  <div class="footerBtn primary" id="footerPrimary" onclick="openReview()">إتمام الشراء</div>
</div>
<div class="toast" id="toastBox"></div>
<script>
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbwaWPLXheiziFzHZAgW8yBPoFvJqOfsLR8dDnYwZJWGdw46HSnbWqxJHbq6WpN519cz/exec";
const URLS = {
  products: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1503749054&output=csv",
  tiers: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1417829941&output=csv",
  settings: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=47255050&output=csv"
};
const PLACEHOLDERS = { header:"https://via.placeholder.com/1200x500/f5f7fa/0B3D91?text=Alahram+Store", brand:n=>`https://via.placeholder.com/400x250/f5f7fa/0B3D91?text=${encodeURIComponent(n||"Brand")}`, product:n=>`https://via.placeholder.com/400x250/f7f9fc/0B3D91?text=${encodeURIComponent(n||"Product")}` };
const UNIT_NAMES = { carton:"كرتونة", dozen:"دستة", piece:"قطعة", offer:"عرض" };
const LS = { cart:"alahram_cart_v10", tier:"alahram_tier_v10", customer:"alahram_customer_v10", drafts:"alahram_drafts_v10", unlocks:"alahram_tier_unlocks_v10", analytics:"alahram_events_v10", latestOrder:"alahram_latest_order_v10" };
const el = { headerImg:document.getElementById("headerImg"), news:document.getElementById("news"), backBtn:document.getElementById("backBtn"), app:document.getElementById("app"), totalBox:document.getElementById("totalBox"), toastBox:document.getElementById("toastBox"), footerPrimary:document.getElementById("footerPrimary"), footerBack:document.getElementById("footerBack"), tierActionBtn:document.getElementById("tierActionBtn"), offerActionBtn:document.getElementById("offerActionBtn") };
const clean = v => (v ?? "").toString().trim();
const toNum = v => {
  const raw = clean(v).replace(/[٬،\s]/g, "");
  if (!raw) return 0;
  const normalized = raw.includes(",") && !raw.includes(".")
    ? raw.replace(",", ".")
    : raw.replace(/,/g, "");
  const n = parseFloat(normalized);
  return Number.isFinite(n) ? n : 0;
};
const saveJSON = (k,v) => localStorage.setItem(k, JSON.stringify(v));
const loadJSON = (k,f) => { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : f; } catch { return f; } };
const stripDiacritics = s => clean(s).normalize("NFKD").replace(/[\u064B-\u065F\u0670\u0640]/g, "");
const normalizeLoose = s => stripDiacritics(s).toLowerCase().replace(/[أإآ]/g,"ا").replace(/ى/g,"ي").replace(/ؤ/g,"و").replace(/ئ/g,"ي").replace(/ة/g,"ه").replace(/[^\w\u0600-\u06FF ]+/g," ").replace(/\s+/g," ").trim();
const normalizeCompact = s => normalizeLoose(s).replace(/\s+/g, "");
const escapeHtml = v => String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"','&quot;');
const escapeAttr = escapeHtml;
const formatMoney = n => Math.round(toNum(n)).toLocaleString("en-US");
const formatPercent = n => {
  const value = toNum(n);
  return Number.isInteger(value) ? String(value) : String(value);
};

let products = [], tiersData = [], settings = [];
let cart = loadJSON(LS.cart, {}), selectedTier = loadJSON(LS.tier, null), customer = loadJSON(LS.customer, {}), drafts = loadJSON(LS.drafts, {}), unlockedTiers = loadJSON(LS.unlocks, {}), analytics = loadJSON(LS.analytics, []);
let currentPage = "home", lastCompany = null, reviewReturn = { type:"home", value:null }, searchQuery = "", searchTimer = null, brandPageStyle = "standard", brandReturnTarget = "home";

function persistAll(){ saveJSON(LS.cart, cart); saveJSON(LS.tier, selectedTier); saveJSON(LS.customer, customer); saveJSON(LS.drafts, drafts); saveJSON(LS.unlocks, unlockedTiers); saveJSON(LS.analytics, analytics.slice(-500)); }
function logEvent(type, data = {}){ analytics.push({ type, time:Date.now(), page:currentPage, ...data }); if(analytics.length > 500) analytics = analytics.slice(-500); saveJSON(LS.analytics, analytics); }
function notify(message, kind = "ok"){ el.toastBox.textContent = message; el.toastBox.className = `toast ${kind}`; el.toastBox.style.display = "block"; clearTimeout(window.__toastTimer); window.__toastTimer = setTimeout(()=>el.toastBox.style.display = "none", 1400); }
function loadCSV(url){ return new Promise(resolve => Papa.parse(`${url}&t=${Date.now()}`, { download:true, header:true, skipEmptyLines:true, complete:res => resolve(res.data || []) })); }
function applyBrandStyle(){ document.body.classList.toggle("vipPage", brandPageStyle === "vip"); }
function setMode(page){ currentPage = page; document.body.className = document.body.className.replace(/\bhomeMode\b|\btierPage\b|\bofferPage\b|\bvipPage\b|\bpurchaseMode\b|\bcompact\b/g, "").trim(); if(page !== "home") document.body.classList.add("compact"); if(page === "tiers") document.body.classList.add("tierPage"); if(page === "offers") document.body.classList.add("offerPage"); applyBrandStyle(); }
function scrollTop(){ window.scrollTo({ top:0, behavior:"auto" }); }
function syncFooter(){ el.footerPrimary.textContent = currentPage === "review" ? "إرسال الطلب" : "إتمام الشراء"; el.footerPrimary.onclick = currentPage === "review" ? sendOrder : openReview; }
function updateFooterTotal(){ el.totalBox.textContent = `${formatMoney(getPayableTotal())} جنيه`; }
function renderPageCard(title, subtitle, tone="blue", extra=""){ return `<div class="pageCard ${tone}"><div class="pageCardTitle">${escapeHtml(title)}</div><div class="pageCardSub">${escapeHtml(subtitle || "")}</div>${extra}</div>`; }
function renderTextBlock(text){ const lines = clean(text).split(/\n|،|;/g).map(s=>clean(s)).filter(Boolean); return lines.length ? `<ul class="pageList">${lines.map(x=>`<li>${escapeHtml(x)}</li>`).join("")}</ul>` : ""; }
function getSettingText(keys=[]){ const out = settings.filter(row => { const hay = normalizeLoose([row.type,row.key,row.name,row.title].filter(Boolean).join(" ")); return keys.some(k => hay.includes(normalizeLoose(k))); }).map(row => clean(row.value)).filter(Boolean); return out.join("\n"); }
function splitSettingsTypes(keys=[]){ return getSettingText(keys); }
function getProductCode(p){ return clean(p.codo || p.code || p.CODO || p.CODE || p.product_code || p.productCode || p.sku || ""); }
function getCompany(p){ return clean(p.company || p.company_name || p.brand || ""); }
function isOfferProduct(p){ return getCompany(p) === "صفقة اليوم"; }
function isActiveProduct(p){ const s = clean(p.status).toLowerCase(); return s === "active" || s === "فعال" || s === "1" || s === "yes" || s === "true"; }
function getOfferLabel(p){ return clean(p.offer_label || p.offer_name || p.offer || ""); }
function getDisplayName(p){ return clean(p.name || p.product_name || p.item_name || p.item || p.title) || getOfferLabel(p) || "صنف"; }
function getProductKey(p){ return clean(p.id || p.product_id || p.sku || `${getProductCode(p)}_${getDisplayName(p)}_${getCompany(p)}`) || `${getDisplayName(p)}_${getCompany(p)}`; }

  function promptTierUnlock(t) {
    const secret = window.prompt(`أدخل الرقم السري للشريحة: ${clean(t?.visible_label || t?.tier_name || "")}`);
    if (secret === null) return;
    if (clean(secret) === tierPassword(t)) {
      const key = clean(t?.tier_name || t?.tier_id || t?.id || "");
      unlockedTiers[key] = true;
      persistAll();
      notify("تم فتح الشريحة", "ok");
      chooseTier(t);
    } else {
      notify("الرقم السري غير صحيح", "error");
    }
  }

  function selectUnit(uiKey, unit, silent = false) {
    const product = findProductByKey(uiKey);
    if (!product || isOfferProduct(product) || !isAddableToCart(product)) return;
    const u = clean(unit);
    drafts[uiKey] = drafts[uiKey] || {};
    drafts[uiKey].unit = u;
    persistAll();
    refreshProductPrice(uiKey);
    if (!silent) notify(`تم اختيار ${UNIT_NAMES[u] || "الوحدة"}`, "info");
  }

  function draftQty(uiKey, value) {
    const cleaned = clean(value).replace(/[^\d]/g, "");
    drafts[uiKey] = drafts[uiKey] || {};
    drafts[uiKey].qty = cleaned === "" ? "" : parseInt(cleaned, 10);
    persistAll();
  }

  function changeQty(uiKey, delta) {
    const input = document.getElementById(`qty_${uiKey}`);
    if (!input) return;
    let current = parseInt(clean(input.value), 10);
    if (!Number.isFinite(current) || current <= 0) current = 1;
    current += delta;
    if (current < 1) current = 1;
    input.value = String(current);
    draftQty(uiKey, input.value);
  }

  function addToCart(uiKey) {
    const product = findProductByKey(uiKey);
    if (!product) {
      notify("خطأ في المنتج", "error");
      return;
    }
    if (!isAddableToCart(product)) {
      notify("نفذت الكمية ستصل قريبًا", "error");
      return;
    }
    const offerMode = isOfferProduct(product);
    const unit = offerMode ? "offer" : clean(drafts[uiKey]?.unit || document.getElementById(`unit_${uiKey}`)?.value);
    if (!offerMode && !unit) {
      notify("اختر الوحدة أولاً", "error");
      return;
    }
    let qty = clean(drafts[uiKey]?.qty || document.getElementById(`qty_${uiKey}`)?.value);
    qty = qty === "" ? 1 : parseInt(qty, 10);
    if (!Number.isFinite(qty) || qty <= 0) qty = 1;
    const unitPrice = getTierUnitPrice(product, unit);
    if (!unitPrice) {
      notify("السعر غير متاح لهذا الصنف", "error");
      return;
    }
    cart[clean(uiKey)] = {
      uiKey: clean(uiKey),
      code: getProductCode(product),
      name: getDisplayName(product),
      company: clean(product.company),
      unit,
      qty,
      price: unitPrice,
      basePrice: getBaseUnitPrice(product, unit)
    };
    persistAll();
    updateFooterTotal();
    notify("تمت الإضافة للسلة", "ok");
    logEvent("add_to_cart", { code: getProductCode(product), name: getDisplayName(product), company: clean(product.company), unit, qty });
  }

  function buildOrderItemsPayload() {
    return Object.values(cart).map(item => {
      const product = findProductByKey(item.uiKey || item.code || item.name);
      const unit = clean(item.unit || "carton");
      const unitPrice = product ? getTierUnitPrice(product, unit) : toNum(item.price || item.basePrice || 0);
      return {
        order_id: "",
        product_code: item.code || "",
        product_name: item.name || "",
        company: item.company || "",
        unit,
        quantity: toNum(item.qty),
        price_after_discount: unitPrice,
        item_total: toNum(item.qty) * unitPrice
      };
    });
  }

  function buildOrderPayload() {
    const name = clean(document.getElementById("custName")?.value);
    const phone = clean(document.getElementById("custPhone")?.value);
    const business = clean(document.getElementById("custBusiness")?.value);
    const address = clean(document.getElementById("custAddress")?.value);
    const location = clean(customer.location || "");
    const total = getCartTotal();
    const orderId = `ORD-${Date.now()}`;
    return {
      order_id: orderId,
      time: new Date().toISOString(),
      name,
      phone,
      business,
      address,
      location,
      tier: currentTierKey() || "بدون",
      tier_label: selectedTier ? currentTierLabel() : "بدون",
      tier_min: selectedTier ? getTierMin() : 0,
      subtotal: total,
      total,
      status: "تم التواصل مع العميل",
      notes: "",
      items_count: Object.keys(cart).length,
      items: buildOrderItemsPayload(),
      items_json: JSON.stringify(buildOrderItemsPayload())
    };
  }

  function buildWhatsAppMessage(payload) {
    const unitMap = { carton: "كرتونة", dozen: "دستة", piece: "قطعة", offer: "عرض" };
    const lines = [];
    lines.push(`طلب شراء من : ${payload.name}`);
    lines.push(`رقم التليفون : ${payload.phone}`);
    lines.push(`العنوان : ${payload.address}`);
    lines.push(`اسم النشاط : ${payload.business}`);
    lines.push(`اللوكيشن : ${payload.location}`);
    lines.push("");
    if (payload.tier_label && payload.tier_label !== "بدون") {
      lines.push(`الشريحة : ${payload.tier_label}`);
      lines.push("");
    }
    lines.push("بيان الفاتورة");
    lines.push("");
    buildOrderItemsPayload().forEach(item => {
      lines.push(`كود الصنف : ${item.product_code || "-"}`);
      lines.push(`اسم الصنف : ${item.product_name}`);
      lines.push(`الوحدة : ${unitMap[item.unit] || item.unit}`);
      lines.push(`الكميه : ${item.quantity}`);
      lines.push(`السعر : ${formatMoney(item.price_after_discount)} جنيه`);
      lines.push(`اجمالي الصنف بالجنيه : ${formatMoney(item.item_total)} جنيه`);
      lines.push("");
    });
    lines.push(`إجمالي الفاتورة : ${formatMoney(payload.total)} جنيه`);
    return lines.join("\n");
  }

  function sendOrder() {
    const name = clean(document.getElementById("custName")?.value);
    const phone = clean(document.getElementById("custPhone")?.value);
    const business = clean(document.getElementById("custBusiness")?.value);
    const address = clean(document.getElementById("custAddress")?.value);
    const location = clean(customer.location || "");
    if (!name || !phone || !business || !address || !location) {
      notify("من فضلك أكمل بيانات العميل واللوكيشن", "error");
      return;
    }
    if (selectedTier && !isTierSatisfied()) {
      notify("لم يتم تحقيق الشريحة بعد", "error");
      return;
    }
    customer = { name, phone, business, address, location };
    persistAll();
    const payload = buildOrderPayload();
    saveJSON(LS.latestOrder, payload);
    logEvent("order_prepare", { order_id: payload.order_id, total: payload.total, items_count: payload.items_count });
    postOrderToSheet(payload);
    window.open(`https://wa.me/201040880002?text=${encodeURIComponent(buildWhatsAppMessage(payload))}`, "_blank");
    notify("تم تجهيز الطلب وإرساله", "ok");
    logEvent("order_sent", { order_id: payload.order_id, total: payload.total, items_count: payload.items_count });
  }

      ${selectedTier ? (satisfied
        ? `<div class="reviewTierState ok">أنت الآن على شريحة <b>${escapeHtml(tierLabel)}</b> — تم تحقيق الشريحة يمكنك الآن إرسال الفاتورة.</div>`
        : `<div class="reviewTierState warn">أنت الآن على شريحة <b>${escapeHtml(tierLabel)}</b> — متبقي <b>${formatMoney(getTierMin() - total)} جنيه</b> لتحقيق الفاتورة.</div>`) : `<div class="reviewTierState">لم يتم اختيار شريحة بعد.</div>`}
      <div class="formCard">
        <input class="input" id="custName" placeholder="اسم العميل" value="${escapeAttr(customer.name || "")}">
        <input class="input" id="custPhone" placeholder="رقم الهاتف" value="${escapeAttr(customer.phone || "")}">
        <input class="input" id="custBusiness" placeholder="اسم النشاط" value="${escapeAttr(customer.business || "")}">
        <input class="input" id="custAddress" placeholder="العنوان" value="${escapeAttr(customer.address || "")}">
        <button class="mainBtn secondary" onclick="setLocation()">📍 اضغط لإضافة اللوكيشن</button>
        <div class="locationStatus" id="locationStatus">${customer.location ? "✔ تم حفظ اللوكيشن" : ""}</div>
        <div style="height:10px"></div>
        <button class="mainBtn primary" id="sendNowBtn" onclick="sendOrder()" ${selectedTier && !satisfied ? "disabled" : ""}>إرسال الطلب الآن</button>
        <div style="height:8px"></div>
        <button class="mainBtn secondary" onclick="goBack()">⬅ الرجوع للتسوق</button>
      </div>
    `;
    items.forEach(item => {
      const product = findProductByKey(item.uiKey || item.code || item.name);
      const unit = clean(item.unit || "carton");
      const unitPrice = product ? getTierUnitPrice(product, unit) : toNum(item.price || item.basePrice || 0);
      const lineTotal = toNum(item.qty) * unitPrice;
      const isOfferItem = unit === "offer";
      html += `
        <div class="reviewItem">
          <div class="reviewItemTop">${escapeHtml(item.name)}${item.code ? ` (${escapeHtml(item.code)})` : ""}</div>
          <div>الوحدة: ${escapeHtml(isOfferItem ? "عرض" : (UNIT_NAMES[unit] || unit))}</div>
          <div>الكمية: ${item.qty}</div>
          <div>السعر: ${formatMoney(unitPrice)} جنيه</div>
          <div><b>إجمالي الصنف بالجنيه:</b> ${formatMoney(lineTotal)} جنيه</div>
          <div class="reviewControls">
            <button class="qtyBtn" onclick="reviewQty('${item.uiKey}', -1)">-</button>
            <input class="reviewQtyInput" value="${item.qty}" inputmode="numeric" oninput="reviewQtyInput('${item.uiKey}', this.value)">
            <button class="qtyBtn" onclick="reviewQty('${item.uiKey}', 1)">+</button>
          </div>
          <div class="reviewAction" onclick="removeFromCart('${item.uiKey}')">حذف</div>
        </div>
      `;
    });
    html += `</div>`;
    el.app.innerHTML = renderGlobalSearchAndBrandShell(html);
    updateFooterTotal();
    syncFooter();
    renderTierBanner();
    updateTierActionButton();
  }

  function backToShopping() {
    if (reviewReturn?.type === "products" && reviewReturn?.value) {
      history.back();
    } else {
      history.back();
    }
  }

  function goBack() {
    if (currentPage === "home") {
      if (confirm("هل تريد الخروج من المتجر؟")) {
        window.history.back();
      }
      return;
    }
    window.history.back();
  }

  function setLocation() {
    if (!navigator.geolocation) {
      notify("الموقع غير مدعوم على هذا الجهاز", "error");
      return;
    }
    navigator.geolocation.getCurrentPosition(pos => {
      customer.location = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
      persistAll();
      const loc = document.getElementById("locationStatus");
      if (loc) loc.textContent = "✔ تم تحديد اللوكيشن";
      notify("تم تحديد اللوكيشن", "ok");
      logEvent("set_location");
    }, () => notify("تعذر تحديد اللوكيشن", "error"), { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 });
  }

  function renderCurrentState(replace = false) {
    if (currentPage === "home") return renderHome(replace);
    if (currentPage === "products") return renderBrandProducts(lastCompany, brandReturnTarget, replace);
    if (currentPage === "tiers") return renderTiersPage(replace);
    if (currentPage === "vipBrands") return renderTierProductsPage(replace);
    if (currentPage === "offers") return renderOffersPage(replace);
    if (currentPage === "review") return renderReview(replace);
    return renderHome(replace);
  }

  const oldPrompt = window.promptTierUnlock;
  window.promptTierUnlock = promptTierUnlock;
  window.executeGlobalSearch = executeGlobalSearch;
  window.clearSearch = clearSearch;
  window.debouncedSearch = debouncedSearch;
  window.renderHome = renderHome;
  window.renderBrandProducts = renderBrandProducts;
  window.renderTiersPage = renderTiersPage;
  window.renderTierProductsPage = renderTierProductsPage;
  window.renderOffersPage = renderOffersPage;
  window.chooseTier = chooseTier;
  window.clearTier = clearTier;
  window.tierCardClick = tierCardClick;
  window.openTiersPage = openTiersPage;
  window.openOffersPage = openOffersPage;
  window.openTierProductsPage = openTierProductsPage;
  window.renderReview = renderReview;
  window.openReview = openReview;
  window.backToShopping = backToShopping;
  window.goBack = goBack;
  window.selectUnit = selectUnit;
  window.draftQty = draftQty;
  window.changeQty = changeQty;
  window.addToCart = addToCart;
  window.sendOrder = sendOrder;
  window.setLocation = setLocation;
  window.renderSearchAndBrands = renderSearchAndBrands;
  window.refreshProductPrice = refreshProductPrice;
  window.getSubtotal = getSubtotal;
  window.getPayableTotal = getPayableTotal;
  window.getDiscountAmount = getDiscountAmount;
  window.getTierMin = getTierMin;
  window.getTierDiscount = getTierDiscount;
  window.getDiscountedPrice = getDiscountedPrice;
  window.isTierSatisfied = isTierSatisfied;
  window.renderTierBanner = renderTierBanner;
  window.syncFooter = syncFooter;
  window.updateFooterTotal = updateFooterTotal;
  window.updateTierActionButton = updateTierActionButton;
  window.getAvailableUnits = getAvailableUnits;
  window.getPrimaryUnit = getPrimaryUnit;
  window.getBaseUnitPrice = getBaseUnitPrice;
  window.getTierUnitPrice = getTierUnitPrice;
  window.getProductKey = getProductKey;
  window.getProductCode = getProductCode;
  window.getDisplayName = getDisplayName;
  window.getOfferLabel = getOfferLabel;
  window.isOfferProduct = isOfferProduct;
  window.isTierUnlocked = tierIsUnlocked;
  window.isProtectedTier = tierIsProtected;

  injectAlaStyles();
  updateTierActionButton();

  if (!window.__alahramBootPatched) {
    window.__alahramBootPatched = true;
    const originalPromiseAll = Promise.all;
    window.addEventListener("load", () => {
      if (!history.state) {
        history.replaceState({ appPage: "home" }, "", location.href);
      }
    });
  }
})();


Promise.all([loadCSV(URLS.products), loadCSV(URLS.tiers), loadCSV(URLS.settings)]).then(([productsRes, tiersRes, settingsRes]) => { products = productsRes.filter(x => clean(x.company)).map((p,i)=>({...p,__uiKey:getProductKey(p)})); tiersData = tiersRes.filter(x => clean(x.tier_active) === "1" || clean(x.active) === "1" || clean(x.status).toLowerCase() === "active"); settings = settingsRes; initHeader(); renderTierBanner(); renderHome(); updateFooterTotal(); syncFooter(); logEvent("visit"); if("serviceWorker" in navigator){ window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(()=>{})); } }).catch(() => { el.app.innerHTML = `<div class="emptyState">تعذر تحميل البيانات. راجع روابط الشيت أو الاتصال.</div>`; });
