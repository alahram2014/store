<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>الأهرام للتجارة والتوزيع</title>
<meta name="theme-color" content="#c79b18" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{
  --gold:#c79b18; --gold2:#f0d46c; --gold3:#8a5a00; --bg:#fbf4de; --card:#ffffff;
  --soft:#fffdf6; --line:#ead08a; --text:#1d2633; --muted:#667085; --accent:#0b3d91;
  --danger:#c0392b; --success:#1f8b4c;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:'Cairo',sans-serif;
  background:linear-gradient(180deg,#fff7df,#fbf4de 30%,#f8f0da);
  color:var(--text); -webkit-tap-highlight-color:transparent;
}
a{text-decoration:none;color:inherit}
button,input,select{font-family:inherit}
img{max-width:100%;display:block}
#app{padding:12px 12px 116px;max-width:980px;margin:0 auto}
.header{position:static;z-index:1000;background:linear-gradient(180deg,#c79b18,#8a5a00);color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.08);overflow:hidden}
.hero{position:relative;height:116px;background:linear-gradient(135deg,#8a5a00,#c79b18)}
.hero img{width:100%;height:100%;object-fit:cover;filter:saturate(1.05) contrast(1.02)}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.60),rgba(0,0,0,.06))}
.heroText{position:absolute;inset:0;z-index:2;padding:12px 14px;display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;gap:6px;text-align:right}
.companyBrand{display:flex;align-items:center;justify-content:flex-start;flex-direction:row-reverse;gap:10px;width:100%}
.companyLogo{width:56px;height:56px;border-radius:14px;object-fit:cover;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.24);box-shadow:0 8px 18px rgba(0,0,0,.12);display:none}
.companyTextWrap{display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:0}
.companyName{margin-top:1px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(8px);color:#fff;padding:8px 12px;border-radius:16px;font-weight:800;font-size:15px;line-height:1.2;box-shadow:0 8px 18px rgba(0,0,0,.12)}
.socialRow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 12px 6px;background:rgba(255,255,255,.06)}
.socialBtn{min-height:38px;border:none;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.10)}
.socialBtn.phone{background:#fff;color:#0b3d91}.socialBtn.wa{background:#1f8b4c;color:#fff}.socialBtn.fb{background:#fff;color:#0b3d91}
.newsTicker{background:linear-gradient(135deg,#fff0c1,#f0d46c);color:#5a4300;padding:6px 12px;font-size:12px;font-weight:800;min-height:32px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.5;border-top:1px solid rgba(255,255,255,.12)}
.topActions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;padding:8px 12px 10px}
.topBtn{min-height:44px;border:none;border-radius:16px;font-size:12px;font-weight:800;cursor:pointer;box-shadow:0 8px 18px rgba(0,0,0,.11);width:100%;padding:8px 5px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;justify-content:center;text-align:center;gap:4px;flex-direction:row}
.topBtn.tier{background:linear-gradient(135deg,#fff7cf,#f0d46c);color:#5a4300}
.topBtn.tier.active{background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff}
.topBtn.offer{background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff}
.topBtn.repBtn{background:linear-gradient(135deg,#8a5a00,#c79b18);color:#fff}
.searchBox{margin:0 0 8px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:8px;box-shadow:0 6px 16px rgba(0,0,0,.04)}
.searchRow{display:grid;grid-template-columns:1fr 84px;gap:8px}
.searchInput,.unitSelect,.formInput{width:100%;height:44px;border-radius:12px;border:1px solid #d8dde7;padding:0 12px;font-size:14px;outline:none;background:#fff}
.searchInput:focus,.unitSelect:focus,.formInput:focus{border-color:#d4b14b;box-shadow:0 0 0 3px rgba(199,155,24,.12)}
.searchBtn{min-height:44px;color:#fff;font-weight:800;border:none;border-radius:12px;background:var(--accent)}
.sectionCard{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 6px 16px rgba(0,0,0,.04);padding:10px;margin-bottom:8px}
.brandGrid,.productGrid,.tierGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.brandCard,.productCard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:8px;text-align:center}
.productImg,.brandImg{width:100%;height:140px;object-fit:contain;background:#f8fafc;border-radius:14px}
.priceLine{font-weight:800;color:#c0392b;font-size:14px}.old{text-decoration:line-through;color:#8b8f98;margin-inline-end:6px}.priceNow{color:#c0392b;font-weight:900}
.qtyRow{display:grid;grid-template-columns:40px 1fr 40px;gap:6px;align-items:center;margin-top:6px;margin-bottom:6px}
.qtyBtn{height:40px;font-size:18px;font-weight:900;background:#e9edf3;border:none;border-radius:12px}
.qtyInput{text-align:center;border:1px solid #d8dde7;border-radius:8px;height:100%;width:100%;font-weight:bold;background:transparent;outline:none;}
.addBtn,.primaryBtn{min-height:44px;font-weight:800;border:none;border-radius:12px;cursor:pointer;width:100%}
.addBtn{background:linear-gradient(135deg,#c79b18,#f0d46c);color:#5a4300}
.footerDock{position:fixed;bottom:0;left:0;right:0;z-index:2200;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(255,255,255,.94);border-top:1px solid var(--line)}
.footerTotal{display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--line);border-radius:14px;font-weight:900;color:#5a4300;min-height:46px}
.footerBtn{min-height:46px;border:none;border-radius:14px;font-weight:800;color:#fff;cursor:pointer}
.footerBtn.quick{background:linear-gradient(135deg,#8a5a00,#c79b18)}
.footerBtn.checkout{background:linear-gradient(135deg,#1f8b4c,#2da35d)}
.modal{position:fixed;inset:0;z-index:4000;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.45);backdrop-filter:blur(4px)}.modal.show{display:flex}
.modalCard{width:min(430px,100%);background:#fff;border-radius:22px;padding:16px;border:1px solid #ead08a}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:5000;padding:10px 14px;border-radius:999px;background:#1f8b4c;color:#fff;display:none;font-weight:800}
.toast.error{background:#c0392b}
.stockBadge{display:inline-flex;align-items:center;justify-content:center;margin:0 auto;padding:5px 10px;border-radius:999px;font-weight:800;font-size:12px}
@media (min-width:700px){.brandGrid,.productGrid,.tierGrid{grid-template-columns:repeat(3,minmax(0,1fr))}}
</style>
</head>
<body>
<div class="header">
  <div class="hero">
    <img id="heroImage" alt="الأهرام للتجارة والتوزيع" />
    <div class="heroText">
      <div class="companyName">الأهرام للتجارة والتوزيع</div>
    </div>
  </div>
  <div class="socialRow">
    <a class="socialBtn phone" href="tel:01040880002">📞</a>
    <a class="socialBtn wa" href="https://wa.me/201040880002" target="_blank">واتساب</a>
    <a class="socialBtn fb" href="https://www.facebook.com/alahram2014" target="_blank">Facebook</a>
  </div>
  <div class="newsTicker" id="newsTicker">جارٍ تحميل الأخبار...</div>
  <div class="topActions" id="topActions"></div>
</div>

<div class="footerDock">
  <button class="footerBtn quick" onclick="goHome()">الرئيسية</button>
  <div class="footerTotal" id="footerTotal">0 جنيه</div>
  <button class="footerBtn checkout" onclick="goCart()">إتمام الشراء</button>
</div>

<div id="app"><div class="sectionCard" id="loadMsg">جارٍ تحميل البيانات...</div></div>
<div class="toast" id="toast"></div>

<div class="modal" id="repModal">
  <div class="modalCard">
    <h3>دخول المندوب</h3>
    <input class="formInput" id="repCode" placeholder="كود المندوب">
    <input class="formInput" id="repPassword" type="password" placeholder="الرقم السري" style="margin-top:10px">
    <button class="primaryBtn" id="repLoginBtn" onclick="submitRepLogin()" style="margin-top:15px">دخول</button>
    <button class="primaryBtn" style="background:#eee;color:#333;margin-top:10px" onclick="closeModals()">إلغاء</button>
  </div>
</div>

<div class="modal" id="tierModal">
  <div class="modalCard">
    <h3 id="tierModalText">تفعيل الشريحة</h3>
    <input class="formInput" id="tierPassword" type="password" placeholder="الرقم السري">
    <button class="primaryBtn" id="tierLoginBtn" onclick="submitTierPassword()" style="margin-top:15px">تفعيل</button>
    <button class="primaryBtn" style="background:#eee;color:#333;margin-top:10px" onclick="closeModals()">إلغاء</button>
  </div>
</div>

<script>
const DATA = {
  productsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1503749054&single=true&output=csv",
  settingsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=47255050&single=true&output=csv",
  repsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1633587789&single=true&output=csv",
  tiersUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=917474192&single=true&output=csv",
  authUrl: "https://script.google.com/macros/s/AKfycbwaB-bv-GdQ78TdFmX_p3RKjze2bMjlHAuNip1yaPashWGhqXEO6-i8_2jmh48K1GuYzw/exec"
};

const LS = { cart: "alah_c", tier: "alah_t", rep: "alah_r", customer: "alah_cust", unlocks: "alah_u", drafts: "alah_d" };
let state = { products:[], tiers:[], settings:[], reps:[], cart:loadJSON(LS.cart,{}), selectedTier:loadJSON(LS.tier,null), rep:loadJSON(LS.rep,null), customer:loadJSON(LS.customer,{name:"",phone:""}), tierUnlocks:loadJSON(LS.unlocks,{}), page:"home", search:"", loading:true, currentBrand:"", brandImages:{}, drafts:loadJSON(LS.drafts,{}) };
const els = { app:document.getElementById("app"), toast:document.getElementById("toast"), heroImage:document.getElementById("heroImage"), topActions:document.getElementById("topActions"), footerTotal:document.getElementById("footerTotal"), repModal:document.getElementById("repModal"), tierModal:document.getElementById("tierModal") };

function loadJSON(k,f){try{const r=localStorage.getItem(k);return r?JSON.parse(r):f}catch{return f}}
function saveJSON(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function clean(v){return (v??"").toString().trim()}
function html(v){return String(v??"").replaceAll("&","&").replaceAll("<","<").replaceAll(">","<").replaceAll('"',""")}
function num(v){const r=clean(v).replace(/[٬،\s,]/g,"");const p=parseFloat(r);return Number.isFinite(p)?p:0}
function compact(s){return clean(s).normalize("NFKD").replace(/[\u064B-\u065F\u0670\u0640]/g,"").toLowerCase().replace(/[أإآ]/g,"ا").replace(/ى/g,"ي").replace(/ة/g,"ه").replace(/\s+/g,"").trim()}
function toast(m,t="ok"){els.toast.textContent=m;els.toast.className=`toast ${t==="error"?"error":""}`;els.toast.style.display="block";setTimeout(()=>els.toast.style.display="none",2500)}

function fetchCSV(u){
  return new Promise((resolve, reject)=>{
    Papa.parse(u + "&t=" + Date.now(), {
      download:true, header:true, skipEmptyLines:true,
      complete:r => resolve(r.data),
      error: e => reject(e)
    });
  });
}

function tierKey(r){return clean(r?.tier_id||r?.tier_name||"")}
function tierLabel(r){return clean(r?.visible_label||r?.tier_name||"")}
function tierMin(r){return num(r?.tier_min||0)}
function productKey(r){return clean(r?.codo||r?.id||"")}
function companyName(r){return clean(r?.company||"")}
function isActive(r){const s=clean(r?.status).toLowerCase();return !s||["1","true","active","فعال"].includes(s)}
function isOffer(r){return companyName(r)==="صفقة اليوم"||num(r?.price_offer)>0}

// تم استرجاع دالة قراءة الأسعار السليمة لتقرأ كل العواميد
function basePrice(row, unit){
  const map={ 
    carton:["price_carton","carton_price","سعر الكرتونة","سعر الكرتونه","سعر كرتونة","سعر كرتونه"], 
    dozen:["price_dozen","dozen_price","سعر الدستة","سعر الدسته","سعر دستة","سعر دسته"], 
    piece:["price_piece","piece_price","سعر القطعة","سعر القطعه","سعر قطعة","سعر قطعه"], 
    offer:["price_offer","offer_price"] 
  };
  for(const k of map[unit] || []){ if(num(row[k])>0) return num(row[k]); } return 0;
}

function effectivePrice(r, u){
  if(state.selectedTier){
    const tk = compact(`${tierKey(state.selectedTier)}_${u}`);
    for(let [k,v] of Object.entries(r)){if(compact(k)===tk && num(v)>0)return num(v)}
  }
  if(state.rep){
    const rk = compact(`rep_price_${u}`); if(num(r[rk])>0)return num(r[rk]);
  }
  return basePrice(r, u);
}

function availableUnits(r){return ["carton","dozen","piece"].filter(u=>effectivePrice(r,u)>0)}
function cartTotal(){return Object.values(state.cart).reduce((s,i)=>s+(i.qty*i.price),0)}
function unitLabel(u){return {carton:"كرتونة",dozen:"دستة",piece:"قطعة",offer:"عرض"}[u]||u}

function buildBrandImageCache(){
  state.brandImages={};
  state.products.forEach(p=>{
    const c=compact(p.company); if(c && p.brand_image && !state.brandImages[c]) state.brandImages[c]=p.brand_image;
  });
}

function renderHome(){
  state.page="home";
  const brands = [...new Set(state.products.filter(isActive).map(p=>p.company))].filter(c=>c&&c!=="صفقة اليوم");
  let h = `<div class="searchBox"><div class="searchRow"><input class="searchInput" id="sInp" value="${state.search}" placeholder="ابحث..." oninput="state.search=this.value; liveSearch()"><button class="searchBtn">بحث</button></div></div>`;
  
  if(compact(state.search)){
      const q = compact(state.search);
      const res = state.products.filter(p=>isActive(p) && (compact(p.name).includes(q) || compact(p.company).includes(q)));
      h += `<div class="productGrid">${res.slice(0,30).map(productCard).join("")}</div>`;
  } else {
      h += `<div class="brandGrid">` + brands.map(b=>`<div class="brandCard" onclick="openBrand('${b}')">${state.brandImages[compact(b)]?`<img class="brandImg" src="${state.brandImages[compact(b)]}">`:''}<b>${b}</b></div>`).join("") + `</div>`;
  }
  
  els.app.innerHTML = h; renderTopActions();
}

function liveSearch() {
    clearTimeout(window.__st);
    window.__st = setTimeout(renderHome, 200);
}

function openBrand(b){
  state.currentBrand=b; state.page="brand";
  const list = state.products.filter(p=>isActive(p) && p.company===b);
  let h = `<button class="primaryBtn" onclick="renderHome()" style="margin-bottom:10px;width:100%">⬅ رجوع</button><div class="productGrid">`;
  list.forEach(p=> h += productCard(p));
  els.app.innerHTML = h + `</div>`;
}

// تصميم الكارت الجديد ومعالجة نفاد الكمية
function productCard(p){
  const key = productKey(p);
  const offer = isOffer(p);
  const units = availableUnits(p);
  const unit = offer ? "offer" : (state.drafts[key]?.unit || units[0]);

  // لو الصنف ملوش أي تسعيرة (نفدت الكمية)
  if (!unit) {
      return `<div class="productCard">
        ${p.image?`<img class="productImg" src="${p.image}">`:''}
        <div style="font-weight:800;font-size:13px;min-height:38px">${html(p.name)}</div>
        <div class="stockBadge" style="background:#c0392b;color:#fff;margin-top:10px;width:100%">نفذت الكمية سيصل قريباً</div>
      </div>`;
  }

  const price = effectivePrice(p, unit);
  const base = basePrice(p, unit);

  return `<div class="productCard">
    ${p.image?`<img class="productImg" src="${p.image}">`:''}
    <div style="font-weight:800;font-size:13px;min-height:38px">${html(p.name)}</div>
    <div class="priceLine">${state.selectedTier && price < base ? `<span class="old">${Math.round(base)} ج</span>` : ''} <span class="priceNow">${Math.round(price)} ج</span> ${offer?'':`(${unitLabel(unit)})`}</div>
    ${offer ? '<div class="stockBadge" style="background:#fff7cf;color:#5a4300;margin:6px 0;width:100%">صفقة اليوم</div>' : `
    <div class="qtyRow">
      <button class="qtyBtn" onclick="changeDraftQty('${key}',-1)">-</button>
      <input class="qtyInput" type="number" inputmode="numeric" value="${state.drafts[key]?.qty||1}" oninput="setDraftQty('${key}',this.value)">
      <button class="qtyBtn" onclick="changeDraftQty('${key}',1)">+</button>
    </div>`}
    <button class="addBtn" onclick="addToCart('${key}','${unit}')">${offer?'أضف العرض للسلة':'أضف للسلة'}</button>
  </div>`;
}

// اللوجيك القوي للتأكد من القواعد عند الإضافة
function addToCart(k,u){
  const p=state.products.find(x=>productKey(x)===k);
  const qty = isOffer(p) ? 1 : parseInt(state.drafts[k]?.qty || 1);
  const price = effectivePrice(p, u);
  const itemTotal = price * qty;

  // 1. قاعدة صفقة اليوم (صفقة واحدة فقط)
  if (isOffer(p)) {
      const hasOtherDeal = Object.values(state.cart).some(i => i.key !== k && isOffer(state.products.find(x=>productKey(x)===i.key)));
      if (hasOtherDeal) return toast("مسموح بصفقة واحدة فقط في الفاتورة", "error");
  }

  // 2. قاعدة 25% للشركة الواحدة في حالة تفعيل الشريحة
  if (state.selectedTier && !isOffer(p)) {
      const tMin = tierMin(state.selectedTier);
      const maxPerCompany = tMin * 0.25;
      const company = companyName(p);

      let currentCompanyTotal = 0;
      for (const item of Object.values(state.cart)) {
          if (item.key !== k) {
              const cp = state.products.find(x => productKey(x) === item.key);
              if (cp && companyName(cp) === company) {
                  currentCompanyTotal += (item.price * item.qty);
              }
          }
      }

      if (currentCompanyTotal + itemTotal > maxPerCompany) {
          return toast(`لا يمكن تجاوز ${Math.round(maxPerCompany)} ج (25%) لشركة ${company}`, "error");
      }
  }

  state.cart[k] = {key: k, name: p.name, qty: qty, price: price, unit: u};
  saveJSON(LS.cart, state.cart); 
  updateCartBadge(); 
  toast("تمت الإضافة للسلة");
}

function changeDraftQty(k,d){
    state.drafts[k]=state.drafts[k]||{qty:1};
    state.drafts[k].qty=Math.max(1,(state.drafts[k].qty||1)+d);
    saveJSON(LS.drafts, state.drafts);
    if(state.page==="brand") renderBrand(); else renderHome();
}
function setDraftQty(k,v){
    state.drafts[k]={qty:Math.max(1,parseInt(v)||1)};
    saveJSON(LS.drafts, state.drafts);
}

function updateCartBadge(){els.footerTotal.textContent=`${Math.round(cartTotal())} ج`}

// إصلاح دخول המندوب بدالة clean
async function submitRepLogin() {
  const code = clean(document.getElementById("repCode").value);
  const pass = clean(document.getElementById("repPassword").value);
  const btn = document.getElementById("repLoginBtn"); 
  if(!code || !pass) return toast("أدخل الكود والرقم السري", "error");
  btn.textContent = "تحقق...";
  btn.disabled = true;
  try {
    const res = await fetch(DATA.authUrl, { method:"POST", body:JSON.stringify({action:"check_rep", code, password:pass}) });
    const r = await res.json();
    if (r.success) { 
        state.rep = r.repData; 
        saveJSON(LS.rep, state.rep); 
        closeModals(); 
        renderTopActions();
        if(state.page==="brand") renderBrand(); else renderHome();
        toast("أهلاً "+state.rep.repName); 
    }
    else toast(r.message || "بيانات خطأ", "error");
  } catch { toast("خطأ اتصال", "error"); }
  finally { btn.textContent = "دخول"; btn.disabled = false; }
}

async function submitTierPassword() {
  const row = state.pendingTier; 
  const entered = clean(document.getElementById("tierPassword").value);
  const btn = document.getElementById("tierLoginBtn");
  if (!entered) return toast("أدخل الرقم السري", "error");
  btn.textContent = "تحقق..."; btn.disabled = true;
  try {
    const res = await fetch(DATA.authUrl, { method:"POST", body:JSON.stringify({action:"check_tier", tierId:tierKey(row), password:entered}) });
    const r = await res.json();
    if (r.success) { 
        state.tierUnlocks[compact(tierKey(row))] = true; 
        saveJSON(LS.unlocks, state.tierUnlocks); 
        closeModals(); 
        activateTier(row); 
    }
    else toast(r.message || "رقم سري خطأ", "error");
  } catch { toast("خطأ اتصال بالسيرفر", "error"); }
  finally { btn.textContent = "تفعيل"; btn.disabled = false; }
}

function renderTopActions(){
  // حل مشكلة النص الطويل
  const tierText = state.selectedTier ? 'شريحتي' : 'الشرائح';
  document.getElementById("topActions").innerHTML = `
    <button class="topBtn tier ${state.selectedTier?'active':''}" onclick="goTiers()">🏷️ ${tierText}</button>
    <button class="topBtn offer" onclick="goOffers()">🔥 عروض</button>
    <button class="topBtn repBtn" onclick="els.repModal.classList.add('show')">${state.rep?state.rep.repName:'دخول مندوب'}</button>
  `;
}

function closeModals(){ document.querySelectorAll(".modal").forEach(m=>m.classList.remove("show")); }

function goTiers(){
  state.page = "tiers";
  let h=`<button class="primaryBtn" onclick="goHome()" style="margin-bottom:10px;width:100%">⬅ رجوع</button><div class="tierGrid">`;
  state.tiers.forEach(t=>{
    h+=`<div class="brandCard"><h4>${tierLabel(t)}</h4><p style="font-size:12px;color:#666">حد أدنى: ${t.tier_min} ج</p><button class="addBtn" onclick="selectTier('${tierKey(t)}')">تفعيل</button></div>`;
  });
  els.app.innerHTML=h+`</div>`;
}

function selectTier(k){
  const t=state.tiers.find(x=>tierKey(x)===k);
  if(t.tier_password && !state.tierUnlocks[compact(tierKey(t))]){
      state.pendingTier=t;
      els.tierModal.classList.add("show");
  } else {
      activateTier(t);
  }
}

function activateTier(t){
    state.selectedTier=t; 
    saveJSON(LS.tier, state.selectedTier); 
    goHome(); 
    toast("تم تفعيل "+tierLabel(t));
}

function goOffers(){
    state.currentBrand="صفقة اليوم"; 
    renderBrand();
}

function goCart(){
  state.page="cart";
  let h=`<div class="sectionCard"><h3>سلة المشتريات</h3>`+Object.values(state.cart).map(i=>`<div style="padding:10px;border-bottom:1px solid #eee"><b>${i.name}</b><br>${i.qty} × ${i.price} ج = ${i.qty*i.price} ج <button onclick="delete state.cart['${i.key}'];saveJSON(LS.cart, state.cart);goCart();updateCartBadge()" style="color:red;border:none;background:none;float:left;font-weight:bold;cursor:pointer">حذف</button></div>`).join("");
  h+=`<div style="margin-top:15px;font-weight:900">إجمالي الفاتورة: ${Math.round(cartTotal())} جنيه</div></div>`;
  h+=`<div class="sectionCard"><h3>بيانات العميل</h3>
      <input class="formInput" placeholder="الاسم" oninput="state.customer.name=this.value" value="${state.customer.name}">
      <input class="formInput" placeholder="الهاتف" oninput="state.customer.phone=this.value" value="${state.customer.phone}" style="margin-top:10px">
      <button class="primaryBtn" onclick="sendOrder()" style="margin-top:15px;width:100%;background:green;color:#fff">إرسال الطلب واتساب</button></div>`;
  els.app.innerHTML=h;
}

function sendOrder(){
  if(!state.customer.name || !state.customer.phone) return toast("أكمل البيانات","error");

  // قاعدة الـ 5 شركات عند الشراء (Checkout)
  if (state.selectedTier) {
      const companies = new Set(Object.values(state.cart).map(i => {
          const p = state.products.find(x => productKey(x) === i.key);
          return p && !isOffer(p) ? companyName(p) : null;
      }).filter(Boolean));

      if (companies.size < 5) return toast("يجب التنويع والشراء من 5 شركات مختلفة على الأقل", "error");

      const tMin = tierMin(state.selectedTier);
      if (cartTotal() < tMin) return toast(`الحد الأدنى للشريحة هو ${Math.round(tMin)} ج`, "error");
  }

  let t=`طلب من ${state.customer.name}\n`;
  Object.values(state.cart).forEach(i=>t+=`- ${i.name} (${i.qty})\n`);
  t+=`الإجمالي: ${Math.round(cartTotal())} ج`;
  window.open(`https://wa.me/201040880002?text=${encodeURIComponent(t)}`);
}

function goHome(){ renderHome(); }
function goCompanies(){ renderHome(); }
function quickShop(){ state.search=" "; renderHome(); }

async function start(){
  try {
    const [p,s,r,t] = await Promise.all([fetchCSV(DATA.productsUrl), fetchCSV(DATA.settingsUrl), fetchCSV(DATA.repsUrl), fetchCSV(DATA.tiersUrl)]);
    state.products=p; state.settings=s; state.reps=r; state.tiers=t;
    buildBrandImageCache();
    state.loading=false; renderHome(); updateCartBadge();
  } catch(e) { 
    document.getElementById("loadMsg").innerHTML = "خطأ في تحميل الداتا. يرجى التحديث.";
  }
}
window.onload = start;
</script>
</body>
</html>
