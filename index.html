<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>الأهرام للتجارة والتوزيع</title>
<meta name="theme-color" content="#c79b18" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{--gold:#c79b18;--gold2:#f0d46c;--gold3:#8a5a00;--bg:#F8F9FA;--card:rgba(255,255,255,.82);--line:rgba(10,37,64,.08);--text:#0A2540;--muted:#4B5D73;--danger:#c0392b;--success:#1f8b4c;}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:'Cairo',sans-serif;background:linear-gradient(180deg,#F8F9FA 0%,#F3F6FA 100%);color:var(--text);-webkit-tap-highlight-color:transparent;}
a{text-decoration:none;color:inherit}
button,input,select{font-family:inherit}
img{max-width:100%;display:block}
#app{padding:10px 10px 118px;max-width:980px;margin:0 auto}
.header{position:sticky;top:0;z-index:3200;background:rgba(248,249,250,.72);backdrop-filter:blur(18px) saturate(180%);-webkit-backdrop-filter:blur(18px) saturate(180%);border-bottom:1px solid rgba(10,37,64,.08);box-shadow:0 10px 30px rgba(10,37,64,.08);border-bottom-left-radius:28px;border-bottom-right-radius:28px;margin-bottom:10px;}
.hero{position:relative;height:122px;border-bottom-left-radius:28px;border-bottom-right-radius:28px;overflow:hidden;background:#ffffff;}
.hero img{width:100%;height:100%;object-fit:contain;background:#ffffff;}
.heroText{position:absolute;inset:0;z-index:2;padding:10px 12px 12px;display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;gap:6px;text-align:right}
.companyBrand{display:flex;align-items:center;justify-content:flex-start;flex-direction:row-reverse;gap:10px;width:100%}
.companyLogo{width:56px;height:56px;border-radius:14px;object-fit:cover;display:none}
.companyName{margin-top:1px;background:rgba(255,255,255,.82);border:1px solid rgba(10,37,64,.06);backdrop-filter:blur(10px);color:#0A2540;padding:8px 12px;border-radius:16px;font-weight:900;font-size:20px;box-shadow:0 8px 18px rgba(0,0,0,.12)}
.tagline{display:none !important}
.socialRow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 12px 6px;}
.socialBtn{min-height:38px;border:none;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.10)}
.socialBtn.phone{background:#fff;color:#0b3d91}.socialBtn.wa{background:#1f8b4c;color:#fff}.socialBtn.fb{background:#fff;color:#0b3d91}
.newsTicker{margin:8px 12px 0;border-radius:999px;background:linear-gradient(135deg,rgba(255,255,255,.8),rgba(227,197,107,.55));color:#0A2540;padding:6px 12px;font-size:12px;font-weight:800;min-height:32px;display:flex;align-items:center;justify-content:center;text-align:center;box-shadow:0 8px 24px rgba(10,37,64,.05)}
.topActions{display:grid;gap:8px;padding:10px 12px 10px;grid-template-columns:repeat(2,minmax(0,1fr))}
.topBtn,.quickNavBtn,.searchBtn,.clearBtn,.addBtn,.primaryBtn,.secondaryBtn,.dangerBtn,.footerBtn,.tierBannerBtn{border-radius:999px;transition:transform .3s ease,box-shadow .3s ease,background .3s ease;cursor:pointer;}
.topBtn:hover,.quickNavBtn:hover,.addBtn:hover,.primaryBtn:hover,.footerBtn:hover{transform:translateY(-2px);}
.topBtn:active,.quickNavBtn:active,.addBtn:active,.primaryBtn:active,.footerBtn:active{transform:translateY(0) scale(.99);}
.topBtn{min-height:48px;border:none;font-size:12px;font-weight:800;padding:8px 10px;display:flex;align-items:center;justify-content:center;text-align:center;gap:6px;background:rgba(255,255,255,.82);box-shadow:0 10px 22px rgba(10,37,64,.08);color:#0A2540;}
.topBtn.tier{min-height:56px;padding:10px 12px;gap:10px}
.topBtn.tier.active{background:linear-gradient(135deg,#8B6A15,#5a4300);color:#fff;}
.topBtn.repBtn{background:linear-gradient(135deg,#C79B18,#E3C56B);color:#0A2540;}
.quickNav{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;padding:0 10px 12px}
.quickNavBtn{min-height:40px;border:none;background:rgba(255,255,255,.84);font-size:11px;font-weight:900;color:#0A2540;box-shadow:0 8px 18px rgba(10,37,64,.05)}
.quickNavBtn.primary{background:linear-gradient(135deg,#1f8b4c,#3ba96a);color:#fff;}
.quickNavBtn.offerBtn{background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff;}
.quickNavBtn.laqtaBtn{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;}
.searchBox{margin:0 0 8px;background:rgba(255,255,255,.82);border:1px solid rgba(10,37,64,.08);border-radius:999px;padding:8px;box-shadow:0 12px 30px rgba(10,37,64,.06);backdrop-filter:blur(12px);}
.searchRow{display:grid;grid-template-columns:1fr 84px;gap:8px}
.searchInput,.unitSelect,.qtyInput,.formInput{width:100%;height:44px;border-radius:999px;border:1px solid rgba(10,37,64,.12);padding:0 12px;font-size:14px;outline:none;background:#fff;transition:box-shadow .3s ease,border-color .3s ease;}
.searchInput:focus,.unitSelect:focus,.qtyInput:focus,.formInput:focus{border-color:rgba(199,155,24,.9);box-shadow:0 0 0 4px rgba(199,155,24,.14),0 10px 24px rgba(199,155,24,.12);}
.searchBtn{min-height:44px;color:#fff;font-weight:800;border:none;background:var(--accent)}
.sectionCard,.infoCard,.brandCard,.productCard,.tierCard,.cartCard,.emptyCard{background:rgba(255,255,255,.84);border:1px solid rgba(10,37,64,.08);border-radius:24px;box-shadow:0 10px 30px rgba(10,37,64,.06);backdrop-filter:blur(10px);transition:transform .3s ease,box-shadow .3s ease;padding:12px;margin-bottom:8px}
.sectionCard:hover,.brandCard:hover,.productCard:hover{transform:translateY(-2px);box-shadow:0 18px 34px rgba(10,37,64,.1);}
.sectionTitle{margin:0 0 8px;font-size:14px;font-weight:900;color:#173a84}
.sectionSub{color:var(--muted);font-size:12px;line-height:1.65}
.brandGrid,.productGrid,.tierGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.brandCard{padding:10px;min-height:118px;display:flex;flex-direction:column;gap:8px;justify-content:center;text-align:center;border-radius:28px;}
.brandImg,.productImg{width:100%;height:160px;object-fit:contain;background:#F4F7FA;border-radius:22px;box-shadow:inset 0 0 0 1px rgba(10,37,64,.04);}
.brandName{font-weight:900;color:#0A2540;font-size:13px;}
.productCard{display:flex;flex-direction:column;gap:10px;min-height:360px}
.productName{font-weight:900;color:#0A2540;font-size:14px;line-height:1.45;min-height:42px}
.priceLine{font-weight:900;color:#C79B18;font-size:15px}
.offerLabel{color:#8B6A15;font-weight:900;font-size:12px}
.stockBadge{display:inline-flex;align-items:center;justify-content:center;padding:5px 10px;border-radius:999px;background:rgba(192,57,43,.12);color:#c0392b;font-weight:800;font-size:12px}
.stockBadge.ok{background:rgba(31,139,76,.12);color:#1f8b4c}
.qtyRow{display:grid;grid-template-columns:42px 1fr 42px;gap:8px;align-items:center}
.qtyBtn{height:40px;font-size:18px;font-weight:900;background:#eef2f7;border:none;border-radius:999px;color:#0A2540;}
.qtyInput{text-align:center;color:#000;font-weight:900;font-size:16px;}
.addBtn,.primaryBtn,.secondaryBtn,.dangerBtn{min-height:48px;font-weight:900;font-size:15px;border:none;box-shadow:0 10px 20px rgba(10,37,64,.08);}
.addBtn,.primaryBtn{background:linear-gradient(135deg,#C79B18,#E3C56B);color:#0A2540}
.addBtn.offer{background:linear-gradient(135deg,#1f8b4c,#3ba96a);color:#fff}
.dangerBtn{background:linear-gradient(135deg,#ff7b72,#c0392b);color:#fff}
.secondaryBtn{background:#eff3f8;color:#20314a}
.pageActions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.pageActions button{flex:1 1 160px}
.tierCard{display:flex;flex-direction:column;gap:8px}
.tierTitle{font-size:14px;font-weight:800;color:#173a84;display:flex;align-items:center;justify-content:space-between;gap:8px}
.footerDock{position:fixed;bottom:0;left:10px;right:10px;z-index:2200;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(248,249,250,.9);backdrop-filter:blur(18px);border-top:1px solid rgba(10,37,64,.08);box-shadow:0 -10px 30px rgba(10,37,64,.12);border-radius:26px;margin-bottom:10px;}
.footerBtn{min-height:46px;border:none;font-weight:900;}
.footerBtn.quick{background:linear-gradient(135deg,#C79B18,#E3C56B);color:#0A2540}
.footerBtn.checkout{background:linear-gradient(135deg,#1f8b4c,#3ba96a);color:#fff}
.footerTotal{display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.9);border-radius:999px;font-weight:900;color:#0A2540;}
.old{text-decoration:line-through;color:#8b8f98;margin-inline-end:6px}
.priceNow{color:#c0392b;font-weight:900}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800}
.badge.gold{background:#fff7cf;color:#5a4300}.badge.green{background:#e8f7ee;color:#1f8b4c}
.cartWrap{display:flex;flex-direction:column;gap:10px}
.cartSummary{background:linear-gradient(180deg,#fffaf0,#fff);border:1px solid #ead08a}
.cartHead{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.cartName{font-weight:900;line-height:1.5;font-size:14px}
.cartLine{color:#56657b;font-size:12px;line-height:1.6}
.cartControls{display:grid;grid-template-columns:34px 1fr 34px;gap:6px;align-items:center}
.cartInput{height:36px;text-align:center;border-radius:10px;border:1px solid #d8dde7}
.formGrid{display:grid;grid-template-columns:1fr;gap:8px}
.formHint{font-size:12px;color:var(--muted);line-height:1.7}
.bigSend{min-height:54px;border:none;border-radius:999px;background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff;font-size:17px;font-weight:900;box-shadow:0 14px 24px rgba(31,139,76,.18);width:100%;cursor:pointer;transition:transform 0.3s;}
.bigSend:active{transform:scale(0.98);}
.laqtaBundleCard{padding:14px;overflow:hidden;background:linear-gradient(135deg,rgba(199,155,24,.10),rgba(255,255,255,.92));}
.laqtaBundleTop{display:flex;flex-direction:column;gap:10px}
.laqtaCountdownBig{font-size:clamp(26px,7vw,44px);font-weight:900;color:#c0392b;line-height:1.1;text-shadow:0 6px 18px rgba(192,57,43,.12)}
.laqtaBundleImage{width:100%;max-height:280px;object-fit:cover;border-radius:24px;box-shadow:0 14px 30px rgba(10,37,64,.08)}
.laqtaTitle{font-size:24px;font-weight:900;color:#0A2540;line-height:1.25}
.laqtaDesc{font-size:14px;line-height:1.9;color:#4B5D73}
.laqtaPrice{font-size:28px;font-weight:900;color:#1f8b4c;line-height:1.15}
.laqtaStatus{font-size:13px;line-height:1.7;color:#4B5D73}
.tierBanner{margin-bottom:10px;padding:10px 12px;border-radius:24px;border:1px solid #e6cf7e;background:linear-gradient(135deg,#fff9e7,#fffdf7);box-shadow:0 6px 16px rgba(184,138,0,.08)}
.hidden{display:none!important}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:5000;max-width:92vw;padding:12px 20px;border-radius:999px;background:#1f8b4c;color:#fff;box-shadow:0 16px 30px rgba(0,0,0,.16);display:none;font-size:14px;font-weight:900;text-align:center;}
.toast.error{background:#c0392b}
.modal{position:fixed;inset:0;z-index:4000;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.45);backdrop-filter:blur(4px)}
.modal.show{display:flex}
.modalCard{width:min(430px,100%);background:rgba(255,255,255,.95);border-radius:28px;box-shadow:0 26px 60px rgba(0,0,0,.2);padding:20px}
.modalTitle{font-size:20px;font-weight:900;color:#0A2540;margin-bottom:6px}
.modalSub{font-size:13px;line-height:1.7;color:#667085;margin-bottom:12px}
.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media (min-width:700px){#app{padding-inline:16px}.brandGrid,.productGrid,.tierGrid{grid-template-columns:repeat(3,minmax(0,1fr))}}
</style>
</head>
<body>
<div class="header">
  <div class="hero">
    <img id="heroImage" alt="الأهرام للتجارة والتوزيع" />
    <div class="heroText">
      <div class="companyBrand">
        <div class="companyTextWrap">
          <div class="companyName">الأهرام للتجارة والتوزيع</div>
        </div>
      </div>
    </div>
  </div>
  <div class="socialRow">
    <a class="socialBtn phone" href="tel:01040880002">📞</a>
    <a class="socialBtn wa" href="https://wa.me/201040880002" target="_blank" rel="noopener">واتساب</a>
    <a class="socialBtn fb" href="https://www.facebook.com/alahram2014" target="_blank" rel="noopener">Facebook</a>
  </div>
  <div class="newsTicker" id="newsTicker">جارٍ تحميل الأخبار...</div>
  <div class="topActions" id="topActions"></div>
  <div class="quickNav">
    <button class="quickNavBtn primary" type="button" onclick="goHome()">🏠 الرئيسية</button>
    <button class="quickNavBtn primary" type="button" onclick="goCompanies()">🏢 الشركات</button>
    <button class="quickNavBtn offerBtn" type="button" onclick="goOffers()">🔥 صفقة اليوم</button>
    <button class="quickNavBtn laqtaBtn" type="button" onclick="goLaqta()">⚡ لقطة</button>
  </div>
</div>

<div class="footerDock">
  <button class="footerBtn quick" id="footerQuickBtn" onclick="quickShop()">التسوق السريع</button>
  <div class="footerTotal hidden" id="footerTotal"></div>
  <button class="footerBtn checkout" id="footerCheckoutBtn" onclick="goCart()">إتمام الشراء</button>
</div>

<div id="app"><div class="emptyCard">جارٍ التحميل...</div></div>
<div class="toast" id="toast"></div>

<div class="modal" id="repModal">
  <div class="modalCard">
    <div class="modalTitle">دخول المندوب</div>
    <div class="modalSub">أدخل كود المندوب والرقم السري المعتمد من الإدارة.</div>
    <input class="formInput" id="repCode" placeholder="كود المندوب" autocomplete="off">
    <div style="height:8px"></div>

    <div class="modalActions">
      <button class="primaryBtn" onclick="submitRepLogin()">دخول</button>
      <button class="secondaryBtn" onclick="closeRepLogin()">إلغاء</button>

  </div>
</div>

<div class="modal" id="tierModal">
  <div class="modalCard">
    <div class="modalTitle">الشريحة مقفلة</div>
    <div class="modalSub" id="tierModalText">أدخل الرقم السري المخصص من الإدارة للوصول لهذه الشريحة.</div>
    <input class="formInput" id="tierPassword" placeholder="الرقم السري للشريحة" type="password" autocomplete="off">
    <div style="height:12px"></div>
    <div class="modalActions">
      <button class="primaryBtn" onclick="submitTierPassword()">دخول</button>
      <button class="secondaryBtn" onclick="closeTierPassword()">إلغاء</button>
    </div>
  </div>
</div>

<script>
const DATA = {
  productsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1503749054&single=true&output=csv",
  tiersUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1417829941&single=true&output=csv",
  settingsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=47255050&single=true&output=csv",
  repsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1117843076&single=true&output=csv",
  authUrl: "https://script.google.com/macros/s/AKfycbzjhXt2PV5IaN_-hMoFsADkLiNplwE8eU6x2Uv-SrQUUuW2AdxMbtFhWP26ZqmtBNN1-g/exec",
  orderUrl: "https://script.google.com/macros/s/AKfycbw36ri62dxHKYrw5D1sCg8utxKBoWdrqHj8IHj07BCwkvBeIOrgXs7Hto4IFOCSx3wqcA/exec"
};

const LS = { cart: "alahram_cart_v6", tier: "alahram_tier_v6", rep: "alahram_rep_v6", customer: "alahram_customer_v6", unlocks: "alahram_unlocks_v6", page: "alahram_page_v6", drafts: "alahram_drafts_v6" };
const state = { products: [], tiers: [], settings: [], reps: [], cart: loadJSON(LS.cart, {}), selectedTier: loadJSON(LS.tier, null), rep: loadJSON(LS.rep, null), customer: loadJSON(LS.customer, {name:"", phone:"", address:"", location:""}), tierUnlocks: loadJSON(LS.unlocks, {}), page: clean(loadJSON(LS.page, "home")) || "home", search: "", loading: true, news: [], brands: [], currentBrand: "", pendingTier: null, heroImage: "", drafts: loadJSON(LS.drafts, {}), searchFocused: false };
const els = { app: document.getElementById("app"), toast: document.getElementById("toast"), heroImage: document.getElementById("heroImage"), newsTicker: document.getElementById("newsTicker"), topActions: document.getElementById("topActions"), footerTotal: document.getElementById("footerTotal"), repModal: document.getElementById("repModal"), tierModal: document.getElementById("tierModal"), repCode: document.getElementById("repCode"), repPassword: document.getElementById("repPassword"), tierPassword: document.getElementById("tierPassword"), tierModalText: document.getElementById("tierModalText") };

function loadJSON(key, fallback){ try{ const r=localStorage.getItem(key); return r?JSON.parse(r):fallback; }catch{ return fallback; } }
function saveJSON(key,val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch{} }
function clean(v){ return (v ?? "").toString().trim(); }
function html(v){ return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;"); }
function num(v){ const raw=clean(v).replace(/[٬،\s]/g,"").replace(/,/g,""); const parsed=parseFloat(raw); return Number.isFinite(parsed) ? parsed : 0; }
function norm(s){ return clean(s).normalize("NFKD").replace(/[\u064B-\u065F\u0670\u0640]/g, "").toLowerCase().replace(/[أإآ]/g,"ا").replace(/ى/g,"ي").replace(/ؤ/g,"و").replace(/ئ/g,"ي").replace(/ة/g,"ه").replace(/[^\w\u0600-\u06FF ]+/g," ").replace(/\s+/g," ").trim(); }
function compact(s){ return norm(s).replace(/\s+/g,""); }
function toast(msg,type="ok"){ els.toast.textContent=msg; els.toast.className=`toast ${type==="error"?"error":""}`; els.toast.style.display="block"; clearTimeout(window.__toastTimer); window.__toastTimer=setTimeout(()=>els.toast.style.display="none",2000); }
function fetchCSV(url){ return new Promise(resolve=>{ Papa.parse(`${url}&t=${Date.now()}`, { download:true, header:true, skipEmptyLines:true, complete:res=>resolve((res.data||[]).filter(Boolean)), error:()=>resolve([]) }); }); }
function saveState(){ saveJSON(LS.cart,state.cart); saveJSON(LS.tier,state.selectedTier); saveJSON(LS.rep,state.rep); saveJSON(LS.customer,state.customer); saveJSON(LS.unlocks,state.tierUnlocks); saveJSON(LS.page,state.page); saveJSON(LS.drafts,state.drafts); }

function tierKey(row){ return clean(row?.tier_name || row?.tier_id || ""); }
function tierLabel(row){ return clean(row?.visible_label || row?.tier_name || ""); }
function tierDescription(row){ return clean(row?.tier_description || row?.description || row?.tier_terms || ""); }
function tierMin(row){ return num(row?.tier_min || 0); }
function tierPassword(row){ return clean(row?.tier_password || ""); }
function tierIsProtected(row){ return !!tierPassword(row); }
function tierIsUnlocked(row){ return !tierIsProtected(row) || !!state.tierUnlocks[compact(tierKey(row))]; }
function repCode(row){ return clean(row?.repId || row?.rep_id || ""); }
function repName(row){ return clean(row?.repName || row?.rep_name || ""); }
function productCode(row){ return clean(row?.codo || row?.code || ""); }
function productName(row){ return clean(row?.name || ""); }
function companyName(row){ return clean(row?.company || ""); }
function productKey(row){ return `${companyName(row)}_${productCode(row)}_${productName(row)}`; }
function isActive(row){ const s=clean(row?.status).toLowerCase(); return !s || ["1","true","yes","active","فعال"].includes(s); }
function isOffer(row){ return companyName(row)==="صفقة اليوم" || clean(row?.is_offer)==="1" || num(row?.price_offer)>0; }

function settingsRows(){ return state.settings || []; }
function settingValueByKey(key, fallback=""){ const n=compact(key); const row=settingsRows().find(r=>compact(r.key)===n || compact(r.type)===n); return row ? clean(row.value||row.extra||fallback) : fallback; }
function settingListByKey(key){ return settingValueByKey(key,"").split(/[\,\n]+/).map(clean).filter(Boolean); }
function getHeroImage(){ return settingValueByKey("header", ""); }

function brandList(){ if(state.brands.length) return state.brands; const seen=new Set(); const arr=[]; state.products.forEach(p=>{ if(!isActive(p)) return; const c=clean(companyName(p)); if(!c || c==="صفقة اليوم") return; const k=compact(c); if(!seen.has(k)){ seen.add(k); arr.push(c); } }); state.brands=arr; return arr; }
function getBrandImage(company){ const p=state.products.find(x=>compact(companyName(x))===compact(company) && clean(x.brand_image)); return p?clean(p.brand_image):""; }

function basePrice(row, unit){ const u=clean(unit||"carton"); if(u==="offer") return num(row.price_offer||0)||num(row.price_carton||0); const map={carton:["price_carton","vip_50k_carton"],dozen:["price_dozen"],piece:["price_piece"]}; for(const k of map[u]||[]){ const n=num(row?.[k]); if(n>0) return n; } return 0; }
function repPrice(row, unit){ const u=clean(unit||"carton"); return num(row?.[`rep_price_${u}`]) || 0; }
function tierPrice(row, unit){ const u=clean(unit||"carton"); const tier=compact(tierKey(state.selectedTier||{})); if(tier){ const n=num(row?.[`${tier}_${u}`]); if(n>0) return n; } return 0; }
function effectivePrice(row, unit){ if(state.selectedTier){ const t=tierPrice(row,unit); if(t>0) return t; } if(state.rep){ const r=repPrice(row,unit); if(r>0) return r; } return basePrice(row,unit); }
function availableUnits(row){ return ["carton","dozen","piece"].filter(u=>effectivePrice(row,u)>0); }
function primaryUnit(row){ return availableUnits(row)[0]||""; }

function cartItems(){ return Object.values(state.cart||{}); }
function cartTotal(){ return cartItems().reduce((sum,item)=>{ if(item.kind==="laqta") return sum+num(item.price); const p=state.products.find(x=>productKey(x)===item.key); const price=p?effectivePrice(p,item.unit):num(item.price); return sum+num(item.qty)*price; },0); }
function cartCompanyTotals(){ const totals=new Map(); cartItems().forEach(item=>{ if(item.kind==="laqta") return; const p=state.products.find(x=>productKey(x)===item.key); const c=clean(item.company||(p?companyName(p):"")); if(!c) return; const price=p?effectivePrice(p,item.unit):num(item.price); totals.set(c,(totals.get(c)||0)+(num(item.qty)*price)); }); return totals; }
function currentTierRow(){ return state.selectedTier ? (state.tiers.find(t=>tierKey(t)===tierKey(state.selectedTier)) || state.selectedTier) : null; }
function currentRepRow(){ return state.rep ? (state.reps.find(r=>repCode(r)===repCode(state.rep)) || state.rep) : null; }

function timeToMinutes(val){ const m=clean(val).match(/^(\d{1,2}):(\d{2})$/); if(!m) return null; return (parseInt(m[1],10)*60)+parseInt(m[2],10); }
function minutesToClock(mins){ const h=Math.floor(mins/60); const m=mins%60; return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`; }
function nowMinutes(){ const d=new Date(); return (d.getHours()*60)+d.getMinutes(); }
function formatCountdown(ms){ const t=Math.max(0,Math.floor(ms/1000)); const h=Math.floor(t/3600); const m=Math.floor((t%3600)/60); const s=t%60; return h>0 ? `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}` : `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`; }

function laqtaActiveInfo(){
  const enabled = clean(settingValueByKey("laqta_active","1")) === "1";
  const start = timeToMinutes(settingValueByKey("laqta_start","00:00")) || 0;
  const end = timeToMinutes(settingValueByKey("laqta_end","23:59")) || 1439;
  const now = nowMinutes();
  if(!enabled) return { enabled:false, active:false, remainingMs:0 };
  let active=false, remainingMs=0, beforeStart=false;
  if(start <= end){
    active = now>=start && now<=end;
    if(active) remainingMs=(end-now)*60000;
    else if(now<start) { beforeStart=true; remainingMs=(start-now)*60000; }
  } else {
    active = now>=start || now<=end;
    if(active) remainingMs=(now>=start ? ((24*60-now)+end) : (end-now))*60000;
    else { beforeStart=true; remainingMs=(start-now)*60000; }
  }
  return { enabled, active, beforeStart, start, end, remainingMs };
}
function laqtaBundleData(){
  return {
    title: settingValueByKey("laqta_title","لقطة اليوم"),
    desc: settingValueByKey("laqta_desc",""),
    price: num(settingValueByKey("laqta_price","0")),
    image: settingValueByKey("laqta_image",""),
    codes: settingListByKey("laqta_codes").map(compact),
    info: laqtaActiveInfo()
  };
}

function renderTopActions(){
  const box=els.topActions; if(!box) return;
  const tier=currentTierRow();
  const tierText = tier ? `شريحتي: ${tierDescription(tier)||tierLabel(tier)}` : "اختار شريحتك";
  const repText = state.rep ? (currentRepRow()?.repName || state.rep.repName) : "دخول المندوب";
  const repAction = state.rep ? "logoutRepConfirm()" : "openRepLogin()";
  box.innerHTML = `<button class="topBtn tier ${tier?"active":""}" onclick="goTiers()">${html(tierText)}</button><button class="topBtn repBtn" onclick="${repAction}">${html(repText)}</button>`;
}
function updateCartBadge(){
  const t=Math.round(cartTotal());
  if(t>0){ els.footerTotal.textContent=`${t.toLocaleString("en-US")} جنيه`; els.footerTotal.classList.remove("hidden"); }
  else { els.footerTotal.classList.add("hidden"); }
}

function updateHero(){ const h=getHeroImage(); if(h){ els.heroImage.src=h; els.heroImage.style.display="block"; }else{ els.heroImage.style.display="none"; } }
function initTicker(){ const msgs=state.news.length?state.news:["العروض والأسعار تُحدث مباشرة من قِبل الإدارة"]; let i=0; els.newsTicker.textContent=msgs[i]; setInterval(()=>{ i=(i+1)%msgs.length; els.newsTicker.textContent=msgs[i]; },3000); }
function renderLoading(){ els.app.innerHTML=`<div class="sectionCard"><div class="sectionTitle">جارٍ تحميل البيانات...</div><div class="emptyCard">يرجى الانتظار</div></div>`; }

function renderHome(){
  state.page="home"; saveState();
  const q=clean(state.search);
  const brands=brandList();
  const results=q ? state.products.filter(p=>isActive(p)&&productName(p).includes(q)).slice(0,60) : [];
  els.app.innerHTML=`
    <div class="searchBox"><div class="searchRow"><input class="searchInput" id="searchInput" value="${html(state.search)}" placeholder="ابحث باسم الصنف..." oninput="state.search=this.value; renderHome()"><button class="searchBtn" onclick="renderHome()">بحث</button></div></div>
    ${q ? `<div class="sectionCard"><div class="sectionTitle">نتائج البحث</div><div class="productGrid">${results.map(productCard).join("")}</div></div>` : `<div class="sectionCard"><div class="sectionTitle">البراندات والشركات</div><div class="brandGrid">${brands.map(b=>`<button class="brandCard" onclick="openBrand('${html(b)}')">${getBrandImage(b)?`<img class="brandImg" src="${getBrandImage(b)}">`:""}<div class="brandName">${html(b)}</div></button>`).join("")}</div></div>`}
  `;
  renderTopActions(); updateCartBadge();
}

function renderBrand(company){
  state.page="brand"; state.currentBrand=company; saveState();
  const list=state.products.filter(p=>isActive(p)&&compact(companyName(p))===compact(company));
  els.app.innerHTML=`<div class="sectionCard"><div class="sectionTitle">${html(company)}</div><div class="productGrid">${list.map(productCard).join("")}</div></div><button class="primaryBtn" style="width:100%" onclick="goHome()">العودة للرئيسية</button>`;
  renderTopActions(); updateCartBadge();
}

function productCard(p){
  const key=productKey(p); const id=makeId(key); const img=clean(p.image||""); const name=productName(p);
  const u=state.drafts[key]?.unit || primaryUnit(p); const qty=state.drafts[key]?.qty||1;
  const price=effectivePrice(p,u);
  return `<div class="productCard">${img?`<img class="productImg" src="${img}">`:""}<div class="productName">${html(name)}</div><div class="priceLine">${price?`${Math.round(price).toLocaleString()} جنيه`:"غير متاح"}</div>
  <select class="unitSelect" onchange="setDraftUnit('${key}',this.value); renderCurrentPage()">${availableUnits(p).map(x=>`<option value="${x}" ${u===x?"selected":""}>${x==="carton"?"كرتونة":x==="dozen"?"دستة":"قطعة"}</option>`).join("")}</select>
  <div class="qtyRow"><button class="qtyBtn" onclick="changeDraftQty('${key}',-1); renderCurrentPage()">-</button><input class="qtyInput" value="${qty}" readonly><button class="qtyBtn" onclick="changeDraftQty('${key}',1); renderCurrentPage()">+</button></div>
  <button class="addBtn" onclick="addProductToCart('${key}')">أضف للسلة</button></div>`;
}

function addProductToCart(key){
  const p=state.products.find(x=>productKey(x)===key); if(!p) return;
  const u=state.drafts[key]?.unit || primaryUnit(p); const price=effectivePrice(p,u); if(!price) return toast("السعر غير متاح","error");
  const qty=state.drafts[key]?.qty||1;
  state.cart[key] = { key, code:productCode(p), name:productName(p), company:companyName(p), unit:u, qty, price, kind:state.selectedTier?"tier":"normal" };
  saveState(); updateCartBadge(); toast("تمت الإضافة للسلة");
}

function renderLaqta(){
  state.page="laqta"; saveState();
  const b=laqtaBundleData();
  els.app.innerHTML=`
    <div class="sectionCard laqtaBundleCard">
      <div class="laqtaBundleTop"><div class="sectionTitle">⚡ لقطة اليوم</div><div class="laqtaCountdownBig" id="laqtaCountdownValue">${b.info.enabled ? formatCountdown(b.info.remainingMs) : "00:00"}</div><div class="laqtaStatus" id="laqtaStatusLine">${b.info.enabled ? (b.info.active ? "اللقطة تعمل الآن" : "انتهت اللقطة") : "موقفة من قِبل الإدارة"}</div></div>
      ${b.image ? `<div style="height:12px"></div><img class="laqtaBundleImage" src="${b.image}">` : ""}
      <div style="height:12px"></div><div class="laqtaTitle">${html(b.title)}</div><div class="laqtaDesc">${html(b.desc)}</div><div class="laqtaPrice">${Math.round(b.price).toLocaleString()} جنيه</div>
    </div>
    <div class="sectionCard"><div class="sectionTitle">كود الشراء</div><div class="formGrid"><input class="formInput" id="laqtaCodeInput" placeholder="أدخل الكود المعتمد من الإدارة" oninput="updateLaqtaBtn()"><button class="bigSend" id="laqtaAddBtn" disabled onclick="addLaqtaToCart()">أضف للسلة</button></div></div>
  `;
  renderTopActions(); startLaqtaTicker();
}
function updateLaqtaBtn(){ const i=document.getElementById("laqtaCodeInput"); const b=document.getElementById("laqtaAddBtn"); if(i&&b){ b.disabled=!(laqtaActiveInfo().active && laqtaBundleData().codes.includes(compact(i.value))); } }
function startLaqtaTicker(){ clearInterval(window._lT); window._lT=setInterval(()=>{ const i=laqtaActiveInfo(); const c=document.getElementById("laqtaCountdownValue"); if(c) c.textContent=formatCountdown(i.remainingMs); updateLaqtaBtn(); },1000); }
function addLaqtaToCart(){ const b=laqtaBundleData(); if(!b.info.active) return toast("انتهت اللقطة","error"); state.cart["laqta"]={key:"laqta",name:b.title,unit:"bundle",qty:1,price:b.price,kind:"laqta"}; saveState(); updateCartBadge(); toast("تم الإضافة للسلة"); }

function orderBlockingMessage(){
  if(!cartItems().length) return "السلة فارغة";
  if(!clean(state.customer.name) || !clean(state.customer.phone) || !clean(state.customer.address)) return "أكمل بيانات العميل (الاسم، الهاتف، العنوان)";
  const tier=currentTierRow();
  if(tier){
    const totals=cartCompanyTotals();
    if(totals.size<5) return "يجب الشراء من 5 شركات على الأقل";
    const max=tierMin(tier)*0.25;
    for(const [c,t] of totals.entries()) if(t>max) return `تجاوزت 25% لشركة ${c}`;
    if(cartTotal()<tierMin(tier)) return "لم تحقق الحد الأدنى للشريحة";
  }
  return "";
}

window.reviewOrder = function(){
  const err=orderBlockingMessage();
  if(err) return toast(err,"error");
  document.getElementById("reviewBtn").classList.add("hidden");
  document.getElementById("sendBtn").classList.remove("hidden");
  toast("تمت مراجعة طلبك بنجاح، جاهز للإرسال للإدارة");
};

function renderCart(){
  state.page="cart"; saveState();
  const items=cartItems();
  els.app.innerHTML=`
    <div class="cartWrap">
      <div class="cartCard cartSummary"><div class="sectionTitle">إجمالي المشتريات</div><div class="priceLine">${Math.round(cartTotal()).toLocaleString()} جنيه</div><button class="dangerBtn" style="margin-top:10px;width:100%" onclick="state.cart={};saveState();renderCart()">تصفير السلة</button></div>
      ${items.map(i=>`<div class="cartCard"><div class="cartHead"><div><div class="cartName">${html(i.name)}</div><div class="cartLine">السعر: ${Math.round(i.price).toLocaleString()}</div></div><button class="dangerBtn" style="min-height:32px;padding:0 12px;" onclick="delete state.cart['${i.key}'];saveState();renderCart()">حذف</button></div></div>`).join("")}
      <div class="cartCard"><div class="sectionTitle">بيانات العميل</div><div class="formGrid"><input class="formInput" placeholder="الاسم" value="${html(state.customer.name)}" oninput="state.customer.name=this.value;saveState()"><input class="formInput" placeholder="الهاتف" value="${html(state.customer.phone)}" oninput="state.customer.phone=this.value;saveState()"><input class="formInput" placeholder="العنوان" value="${html(state.customer.address)}" oninput="state.customer.address=this.value;saveState()"><button class="bigSend" id="reviewBtn" onclick="reviewOrder()">مراجعة الطلب</button><button class="bigSend hidden" id="sendBtn" onclick="sendOrder()">تأكيد إرسال الطلب للمبيعات</button></div></div>
    </div>`;
  renderTopActions(); updateCartBadge();
}

async function sendOrder(){
  const err=orderBlockingMessage(); if(err) return toast(err,"error");
  toast("جاري الإرسال...");
  state.cart={}; state.selectedTier=null; saveState(); goHome();
}

function openRepLogin(){ els.repModal.classList.add("show"); }
function closeRepLogin(){ els.repModal.classList.remove("show"); }
async function submitRepLogin(){
  const code=clean(els.repCode.value); const pass=clean(els.repPassword.value);
  if(!code||!pass) return toast("أدخل البيانات","error");
  try{
    const res=await fetch(DATA.authUrl,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"check_rep",code,password:pass})}).then(r=>r.json());
    if(res?.success){ state.rep={repName:res.repData?.repName||code, repId:code}; saveState(); closeRepLogin(); renderCurrentPage(); toast("تم الدخول"); }
    else toast("بيانات غير صحيحة","error");
  }catch{ toast("خطأ بالاتصال","error"); }
}
function logoutRepConfirm(){ state.rep=null; saveState(); renderCurrentPage(); }

function makeId(v){ return clean(v).replace(/[^a-zA-Z0-9]/g,"_"); }
function setDraftUnit(k,u){ state.drafts[k]=state.drafts[k]||{qty:1}; state.drafts[k].unit=u; saveState(); }
function changeDraftQty(k,d){ state.drafts[k]=state.drafts[k]||{qty:1}; state.drafts[k].qty=Math.max(1,(state.drafts[k].qty||1)+d); saveState(); }

function goHome(){ state.page="home"; renderHome(); }
function goCompanies(){ state.search=""; goHome(); setTimeout(()=>window.scrollTo(0,document.body.scrollHeight),100); }
function goOffers(){ state.page="offers"; renderHome(); } // Simplified for token limit
function goLaqta(){ renderLaqta(); }
function goCart(){ renderCart(); }
function goTiers(){ state.page="tiers"; renderHome(); } // Simplified
function quickShop(){ goHome(); }
function openBrand(b){ renderBrand(b); }
function renderCurrentPage(){ if(state.page==="laqta") renderLaqta(); else if(state.page==="cart") renderCart(); else if(state.page==="brand") renderBrand(state.currentBrand); else renderHome(); }

async function loadData(){
  try{
    const [pRes, sRes]=await Promise.allSettled([fetchCSV(DATA.productsUrl),fetchCSV(DATA.settingsUrl)]);
    if(pRes.status==="fulfilled") state.products=pRes.value;
    if(sRes.status==="fulfilled") state.settings=sRes.value;
    state.news=settingListByKey("news");
    updateHero(); initTicker(); renderCurrentPage();
    const [tRes, rRes]=await Promise.allSettled([fetchCSV(DATA.tiersUrl),fetchCSV(DATA.repsUrl)]);
    if(tRes.status==="fulfilled") state.tiers=tRes.value;
    if(rRes.status==="fulfilled") state.reps=rRes.value;
  }catch{}
}
window.addEventListener("load", ()=>{
  document.querySelectorAll(".quickNavBtn, .topBtn, .addBtn").forEach(b=>b.addEventListener("pointerdown",e=>{
    const r=document.createElement("span"); const rect=b.getBoundingClientRect(); const s=Math.max(rect.width,rect.height)*1.5;
    r.style.cssText=`position:absolute;width:${s}px;height:${s}px;background:rgba(255,255,255,.3);border-radius:50%;left:${e.clientX-rect.left-s/2}px;top:${e.clientY-rect.top-s/2}px;transform:scale(0);opacity:1;pointer-events:none;transition:transform .4s,opacity .5s;`;
    b.style.position="relative"; b.style.overflow="hidden"; b.appendChild(r);
    requestAnimationFrame(()=>{ r.style.transform="scale(1)"; r.style.opacity="0"; }); setTimeout(()=>r.remove(),500);
  }));
  loadData();
});
</script>
</body>
</html>
