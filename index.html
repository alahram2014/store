<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:Cairo;margin:0;background:#f5f7fa}

/* HEADER */
.header{background:#0B3D91;color:#fff;padding:12px;text-align:center}

/* BACK BTN */
.back{
background:#E53935;color:#fff;
padding:10px;text-align:center;margin:10px;
border-radius:10px;font-weight:bold;
}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}

.card{background:#fff;padding:10px;border-radius:10px}

/* INPUT */
input,select{
width:100%;padding:8px;margin-top:5px;border-radius:8px;border:1px solid #ccc
}

/* REVIEW */
.review{background:#fff;margin:10px;padding:10px;border-radius:10px}

/* FOOTER */
.footer{
position:fixed;bottom:0;width:100%;
background:#fff;padding:10px;
display:flex;justify-content:space-between;
}

/* ALERT */
.toast{
position:fixed;top:20px;left:50%;
transform:translateX(-50%);
background:green;color:#fff;padding:10px 20px;
border-radius:20px;display:none;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<div class="header">الأهرام للتجارة والتوزيع</div>

<div class="back" onclick="showBrands()">⬅ اضغط للرجوع للخلف</div>

<div id="app"></div>

<div class="footer">
<div onclick="showBrands()">⬅ رجوع</div>
<div onclick="review()">🧾 مراجعة</div>
</div>

<div class="toast" id="toast">✔ تم الإضافة للسلة</div>

<script>

let products=[],tiers=[];
let cart={},tier=null;

/* LOAD CSV */
function loadCSV(url){
return new Promise(r=>{
Papa.parse(url,{download:true,header:true,complete:(res)=>r(res.data)});
});
}

/* DATA */
Promise.all([
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vTIBDH5bvuDjt6_VNA69Z5iSDfpnjtEQcyaRLSjxKhcoh6AEqYWBDu9rIrfwsYgZRDYcXtNcT4PeGcw/pub?gid=1311908073&output=csv"),
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vTIBDH5bvuDjt6_VNA69Z5iSDfpnjtEQcyaRLSjxKhcoh6AEqYWBDu9rIrfwsYgZRDYcXtNcT4PeGcw/pub?gid=1316070187&output=csv")
]).then(([p,t])=>{
products=p.filter(x=>x.status==="active");
tiers=t;
showBrands();
});

/* BRANDS */
function showBrands(){
let app=document.getElementById("app");
app.innerHTML="";
let brands=[...new Set(products.map(p=>p.company))];

brands.forEach(b=>{
app.innerHTML+=`<div class="card" onclick="showProducts('${b}')">${b}</div>`;
});
}

/* PRODUCTS */
function showProducts(company){
let app=document.getElementById("app");
app.innerHTML="";

products.filter(p=>p.company==company).forEach(p=>{
app.innerHTML+=`
<div class="card">
<h4>${p.name}</h4>

<select onchange="setUnit('${p.code}',this.value)">
<option disabled selected>اختر الوحدة</option>
<option value="carton">كرتونة</option>
<option value="dozen">دستة</option>
<option value="piece">قطعة</option>
</select>

<input type="number" placeholder="الكمية"
oninput="setQty('${p.code}',this.value)">
</div>`;
});
}

/* CART */
function setUnit(code,unit){
if(!cart[code]) cart[code]={};
cart[code].unit=unit;
}

function setQty(code,qty){
if(!cart[code]?.unit) return alert("اختر الوحدة أولا");

let p=products.find(x=>x.code==code);
let price=p["price_"+cart[code].unit];

cart[code]={...cart[code],qty:+qty,price,name:p.name};

toast();
}

/* TOAST */
function toast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

/* REVIEW */
function review(){
let app=document.getElementById("app");
let total=0;
let html="<h3>مراجعة الطلب</h3>";

for(let i in cart){
let c=cart[i];
let sum=c.qty*c.price;
total+=sum;

html+=`
<div class="review">
[${i}] ${c.name}<br>
${c.qty} × ${c.unit}<br>
${sum} جنيه
<input type="number" value="${c.qty}" onchange="setQty('${i}',this.value)">
</div>`;
}

html+=`<h3>الإجمالي: ${total}</h3>

<input id="name" placeholder="الاسم">
<input id="phone" placeholder="الموبايل">
<input id="biz" placeholder="اسم النشاط">
<input id="loc" placeholder="اللوكيشن">

<button onclick="send(${total})">إرسال</button>
`;

app.innerHTML=html;
}

/* SEND */
function send(total){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

if(!name||!phone) return alert("ادخل البيانات");

let msg="طلب:%0A";

for(let i in cart){
let c=cart[i];
msg+=`[${i}] ${c.name} - ${c.qty} ${c.unit} = ${c.qty*c.price}%0A`;
}

msg+=`%0Aالإجمالي: ${total}`;

window.open("https://wa.me/201552670465?text="+msg);
}

</script>

</body>
</html>
