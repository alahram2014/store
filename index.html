<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام - نظام البيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:Cairo;margin:0;background:#f5f7fa}

/* HEADER */
.header{background:#0B3D91;color:#fff;padding:12px;text-align:center;font-size:18px}

/* TIER POPUP */
.tier-popup{
position:fixed;inset:0;
background:#0008;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}
.tier-box{
background:#fff;
padding:20px;
border-radius:12px;
text-align:center;
width:90%;
}
.tier-box button{
margin:5px;
padding:10px;
border:none;
background:#0B3D91;
color:#fff;
border-radius:10px;
width:100%;
}

/* BANNER */
.banner{
background:#FFD600;
padding:10px;
text-align:center;
font-weight:bold;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}
.card{
background:#fff;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
font-weight:bold;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
</style>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<div class="header">الأهرام للتجارة والتوزيع</div>

<div id="banner" class="banner"></div>

<div id="app"></div>

<!-- Tier Popup -->
<div id="tierPopup" class="tier-popup">
<div class="tier-box">
<h3>اختار الشريحة</h3>
<div id="tierBtns"></div>
</div>
</div>

<script>

let products=[],tiers=[],settings=[];
let tier=null;

/* CSV LOAD */
function loadCSV(url){
return new Promise((resolve)=>{
Papa.parse(url,{
download:true,
header:true,
skipEmptyLines:true,
complete:(res)=>resolve(res.data)
});
});
}

/* LOAD DATA */
Promise.all([
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vTIBDH5bvuDjt6_VNA69Z5iSDfpnjtEQcyaRLSjxKhcoh6AEqYWBDu9rIrfwsYgZRDYcXtNcT4PeGcw/pub?gid=1311908073&output=csv"),
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vTIBDH5bvuDjt6_VNA69Z5iSDfpnjtEQcyaRLSjxKhcoh6AEqYWBDu9rIrfwsYgZRDYcXtNcT4PeGcw/pub?gid=1316070187&output=csv"),
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vTIBDH5bvuDjt6_VNA69Z5iSDfpnjtEQcyaRLSjxKhcoh6AEqYWBDu9rIrfwsYgZRDYcXtNcT4PeGcw/pub?gid=1273210397&output=csv")
])
.then(([p,t,s])=>{

products = p.filter(x=>x.status==="active");
tiers = t.filter(x=>x.tier_active==="1");
settings = s;

/* LOAD TIERS */
loadTiers();

});

/* TIER UI */
function loadTiers(){
let box=document.getElementById("tierBtns");

tiers.forEach(t=>{
let b=document.createElement("button");
b.innerText=`${t.tier_name} (${t.tier_discount}%)`;
b.onclick=()=>{
tier=t;
localStorage.setItem("tier",JSON.stringify(t));
document.getElementById("tierPopup").style.display="none";
showBanner();
showBrands();
};
box.appendChild(b);
});
}

/* BANNER */
function showBanner(){
document.getElementById("banner").innerText=
`أنت الآن في شريحة: ${tier.tier_name} (خصم ${tier.tier_discount}%)`;
}

/* BRANDS */
function showBrands(){
let app=document.getElementById("app");
app.innerHTML="";

let brands=[...new Set(products.map(p=>p.company))];

if(!brands.length){
app.innerHTML="<h3 style='text-align:center'>لا يوجد منتجات</h3>";
return;
}

let grid=document.createElement("div");
grid.className="grid";

brands.forEach(b=>{
let c=document.createElement("div");
c.className="card";
c.innerHTML=`${b}`;
c.onclick=()=>alert("المرحلة القادمة: عرض المنتجات");
grid.appendChild(c);
});

app.appendChild(grid);
}

</script>

</body>
</html>
