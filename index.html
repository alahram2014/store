<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة والتوزيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
:root{
  --blue:#0B3D91;
  --red:#E53935;
  --orange:#FF7A00;
  --gray:#7A8596;
  --bg:#F5F7FA;
  --card:#ffffff;
  --line:#e7e9ee;
  --text:#172233;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
}

a{color:inherit;text-decoration:none}

.topContact{
  background:#0a1f4d;
  color:#fff;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:8px 10px;
  position:sticky;
  top:0;
  z-index:1100;
}
.contactBtn{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:36px;
  border-radius:10px;
  font-weight:700;
  font-size:13px;
  border:1px solid rgba(255,255,255,.12);
}
.contactBtn.phone{background:#173a84}
.contactBtn.wa{background:#1f8b4c}

.header{
  position:sticky;
  top:52px;
  z-index:1000;
  background:var(--blue);
  color:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.hero{
  position:relative;
  height:130px;
  overflow:hidden;
  background:linear-gradient(135deg,#0B3D91,#0a2b66);
}
.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,.08));
}
.title{
  position:absolute;
  right:12px;
  bottom:10px;
  z-index:2;
  font-weight:700;
  font-size:18px;
}

.news{
  background:var(--orange);
  color:#fff;
  padding:8px 10px;
  text-align:center;
  font-weight:700;
  font-size:14px;
  min-height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.tiersWrap{
  background:#fff;
  border-bottom:1px solid var(--line);
  padding:8px 10px 6px;
}
.tiers{
  display:flex;
  gap:8px;
  overflow-x:auto;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
.tiers::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;
  border:1px solid #d7dce5;
  background:#f8fafc;
  color:#233044;
  padding:7px 12px;
  border-radius:999px;
  white-space:nowrap;
  font-size:13px;
  cursor:pointer;
  user-select:none;
}
.chip.active{
  background:var(--blue);
  color:#fff;
  border-color:var(--blue);
}
.chip.cancel{
  background:#fff4f4;
  color:var(--red);
  border-color:#ffd2d2;
  font-weight:700;
}
.tierBanner{
  display:none;
  margin-top:8px;
  padding:8px 10px;
  border-radius:10px;
  background:#eef4ff;
  color:#10306a;
  font-size:13px;
  line-height:1.6;
}

.back{
  display:none;
  background:#fff;
  color:var(--blue);
  text-align:center;
  padding:10px 12px;
  border-bottom:1px solid var(--line);
  font-weight:700;
  cursor:pointer;
}

#app{
  padding:10px;
  padding-bottom:96px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  text-align:center;
  box-shadow:0 2px 10px rgba(16,24,40,.04);
  overflow:hidden;
}

.brandCard{
  min-height:132px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:8px;
}
.brandCard .brandImg{
  width:100%;
  height:72px;
  object-fit:contain;
}
.brandCard .brandName{
  font-weight:700;
  font-size:14px;
  line-height:1.3;
}

.productCard{
  min-height:312px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.productImg{
  width:100%;
  height:106px;
  object-fit:contain;
  border-radius:10px;
  background:#f7f9fc;
}
.productName{
  font-weight:700;
  font-size:14px;
  line-height:1.35;
  min-height:38px;
}
.price{
  color:var(--red);
  font-weight:700;
  font-size:15px;
  min-height:24px;
}
.price.wait{
  color:var(--gray);
  font-weight:700;
}
.unitSelect{
  width:100%;
  height:38px;
  border-radius:10px;
  border:1px solid #d7dce5;
  background:#fff;
  padding:0 10px;
  font-family:inherit;
  font-size:14px;
  color:#1f2a3a;
  outline:none;
}

.qtyWrap{
  display:grid;
  grid-template-columns:36px 1fr 36px;
  gap:6px;
  align-items:center;
}
.qtyBtn{
  width:36px;
  height:36px;
  border:none;
  border-radius:10px;
  background:#e9edf3;
  color:#1f2a3a;
  font-size:20px;
  font-weight:700;
  cursor:pointer;
}
.qtyBtn:disabled{
  opacity:.45;
  cursor:not-allowed;
}
.qtyInput{
  width:100%;
  height:36px;
  border-radius:10px;
  border:1px solid #d7dce5;
  text-align:center;
  font-family:inherit;
  font-size:15px;
  outline:none;
  background:#eef1f6;
  color:#1f2a3a;
}
.qtyInput.enabled{
  background:#fff;
  border-color:#9fb5db;
}
.addBtn{
  margin-top:auto;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,var(--orange),#ff9a3a);
  color:#fff;
  padding:10px 12px;
  font-family:inherit;
  font-weight:700;
  cursor:pointer;
  min-height:42px;
}

.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  z-index:1000;
  background:#fff;
  border-top:1px solid var(--line);
  display:grid;
  grid-template-columns:92px 1fr 92px;
  align-items:center;
  gap:8px;
  padding:10px;
  box-shadow:0 -2px 10px rgba(0,0,0,.04);
}
.footerBtn{
  text-align:center;
  font-weight:700;
  color:#1f2a3a;
  cursor:pointer;
  user-select:none;
}
.footerTotal{
  text-align:center;
  font-weight:700;
  color:var(--blue);
  font-size:15px;
}

.toast{
  position:fixed;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  z-index:2000;
  min-width:180px;
  max-width:90vw;
  background:#1f8b4c;
  color:#fff;
  padding:10px 14px;
  border-radius:999px;
  text-align:center;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
  display:none;
  font-size:14px;
}
.toast.error{background:#c0392b}
.toast.info{background:#0B3D91}

.reviewWrap{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.reviewSummary{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
  line-height:1.8;
}
.reviewItem{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  line-height:1.7;
}
.reviewItemTop{
  font-weight:700;
}
.reviewControls{
  display:grid;
  grid-template-columns:36px 1fr 36px;
  gap:6px;
  align-items:center;
  margin-top:8px;
}
.reviewQtyInput{
  width:100%;
  height:36px;
  border-radius:10px;
  border:1px solid #d7dce5;
  text-align:center;
  font-family:inherit;
  font-size:15px;
  outline:none;
  background:#fff;
}
.reviewAction{
  margin-top:8px;
  text-align:center;
  color:var(--red);
  font-weight:700;
  cursor:pointer;
  user-select:none;
}
.formCard{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px;
}
.input{
  width:100%;
  height:42px;
  border-radius:10px;
  border:1px solid #d7dce5;
  padding:0 12px;
  font-family:inherit;
  font-size:14px;
  outline:none;
  background:#fff;
  margin-bottom:8px;
}
.input:focus,.unitSelect:focus,.qtyInput:focus,.reviewQtyInput:focus{
  border-color:#8fb0e6;
  box-shadow:0 0 0 3px rgba(11,61,145,.08);
}
.mainBtn{
  width:100%;
  border:none;
  border-radius:12px;
  min-height:46px;
  font-family:inherit;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}
.mainBtn.primary{
  background:linear-gradient(135deg,var(--orange),#ff9a3a);
  color:#fff;
}
.mainBtn.secondary{
  background:#eff3f8;
  color:#1f2a3a;
}
.mainBtn:disabled{
  opacity:.5;
  cursor:not-allowed;
}
.locationStatus{
  margin-top:6px;
  font-size:13px;
  color:var(--gray);
  min-height:20px;
}
.emptyState{
  background:#fff;
  border:1px dashed #d7dce5;
  border-radius:14px;
  padding:20px;
  text-align:center;
  color:var(--gray);
}

.searchBar{
  margin:0 0 10px 0;
}
.searchInput{
  width:100%;
  height:42px;
  border-radius:10px;
  border:1px solid #d7dce5;
  padding:0 12px;
  font-family:inherit;
  font-size:14px;
  outline:none;
  background:#fff;
}
.searchHint{
  margin:0 0 10px 0;
  color:var(--blue);
  font-weight:700;
  text-align:center;
}
.hidden{display:none !important}
</style>
</head>

<body>

<div class="topContact">
  <a class="contactBtn phone" href="tel:01552670465">اتصال 01552670465</a>
  <a class="contactBtn wa" href="https://wa.me/201552670465" target="_blank" rel="noopener">واتساب</a>
</div>

<div class="header">
  <div class="hero">
    <img id="headerImg" alt="company header">
    <div class="title">الأهرام للتجارة والتوزيع</div>
  </div>
  <div class="news" id="news"></div>
  <div class="tiersWrap">
    <div class="tiers" id="tiersBar"></div>
    <div class="tierBanner" id="tierBanner"></div>
  </div>
  <div class="back" id="backBtn" onclick="goBack()">⬅ اضغط للرجوع</div>
</div>

<div id="app"></div>

<div class="footer">
  <div class="footerBtn" onclick="goBack()">⬅ رجوع</div>
  <div class="footerTotal" id="totalBox">0 جنيه</div>
  <div class="footerBtn" onclick="review()">🧾 مراجعة</div>
</div>

<div class="toast" id="toastBox"></div>

<script>
const URLS = {
  products: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=2123604928&output=csv",
  tiers: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=688371996&output=csv",
  settings: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1922249138&output=csv"
};

const PLACEHOLDERS = {
  header: "https://via.placeholder.com/1200x400/f5f7fa/0B3D91?text=Alahram+Store",
  brand: (name) => `https://via.placeholder.com/400x250/f5f7fa/0B3D91?text=${encodeURIComponent(name || "Brand")}`,
  product: (name) => `https://via.placeholder.com/400x250/f7f9fc/0B3D91?text=${encodeURIComponent(name || "Product")}`
};

const UNIT_NAMES = {
  carton: "كرتونة",
  dozen: "دستة",
  piece: "قطعة"
};

const LS = {
  cart: "alahram_cart_v6",
  tier: "alahram_tier_v6",
  customer: "alahram_customer_v6",
  drafts: "alahram_drafts_v6"
};

const el = {
  headerImg: document.getElementById("headerImg"),
  news: document.getElementById("news"),
  tiersBar: document.getElementById("tiersBar"),
  tierBanner: document.getElementById("tierBanner"),
  backBtn: document.getElementById("backBtn"),
  app: document.getElementById("app"),
  totalBox: document.getElementById("totalBox"),
  toastBox: document.getElementById("toastBox")
};

const clean = (v) => (v ?? "").toString().trim();
const toNum = (v) => {
  const n = parseFloat(v);
  return Number.isFinite(n) ? n : 0;
};
const saveJSON = (key, value) => localStorage.setItem(key, JSON.stringify(value));
const loadJSON = (key, fallback) => {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
};
function normalizeText(str) {
  return clean(str)
    .toLowerCase()
    .normalize("NFKD")
    .replace(/[\u064B-\u065F\u0670\u0640]/g, "")
    .replace(/[أإآ]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ؤ/g, "و")
    .replace(/ئ/g, "ي")
    .replace(/ة/g, "ه")
    .replace(/[٠١٢٣٤٥٦٧٨٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d).toString())
    .replace(/[۰۱۲۳۴۵۶۷۸۹]/g, d => "۰۱۲۳۴۵۶۷۸۹".indexOf(d).toString())
    .replace(/[^\w\u0600-\u06FF]+/g, "");
}

let products = [];
let tiersData = [];
let settings = [];

let cart = loadJSON(LS.cart, {});
let selectedTier = loadJSON(LS.tier, null);
let customer = loadJSON(LS.customer, {});
let drafts = loadJSON(LS.drafts, {});

let currentPage = "brands";
let lastCompany = null;
let reviewReturn = { type: "brands", value: null };
let searchQuery = "";

function persistAll() {
  saveJSON(LS.cart, cart);
  saveJSON(LS.tier, selectedTier);
  saveJSON(LS.customer, customer);
  saveJSON(LS.drafts, drafts);
}

function notify(message, kind = "ok") {
  el.toastBox.textContent = message;
  el.toastBox.className = `toast ${kind}`;
  el.toastBox.style.display = "block";
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => {
    el.toastBox.style.display = "none";
  }, 1400);
}

function loadCSV(url) {
  return new Promise((resolve) => {
    Papa.parse(`${url}&t=${Date.now()}`, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: (res) => resolve(res.data || [])
    });
  });
}

function getSubtotal() {
  return Object.values(cart).reduce((sum, item) => sum + (toNum(item.qty) * toNum(item.price)), 0);
}
function getTierMin() { return selectedTier ? toNum(selectedTier.tier_min) : 0; }
function getTierDiscount() { return selectedTier ? toNum(selectedTier.tier_discount) : 0; }
function isTierSatisfied() { return !selectedTier || getSubtotal() >= getTierMin(); }
function getDiscountAmount() {
  if (!selectedTier || !isTierSatisfied()) return 0;
  return getSubtotal() * (getTierDiscount() / 100);
}
function getPayableTotal() { return Math.max(0, getSubtotal() - getDiscountAmount()); }
function updateFooterTotal() { el.totalBox.textContent = `${Math.round(getPayableTotal()).toLocaleString("en-US")} جنيه`; }

function renderTiers() {
  el.tiersBar.innerHTML = "";
  tiersData.forEach((t) => {
    const key = t.tier_id ? clean(t.tier_id) : clean(t.tier_name);
    const activeKey = selectedTier ? (selectedTier.tier_id ? clean(selectedTier.tier_id) : clean(selectedTier.tier_name)) : "";
    const chip = document.createElement("div");
    chip.className = `chip${activeKey === key ? " active" : ""}`;
    chip.textContent = t.tier_name;
    chip.onclick = () => selectTier(t);
    el.tiersBar.appendChild(chip);
  });

  if (selectedTier) {
    const cancel = document.createElement("div");
    cancel.className = "chip cancel";
    cancel.textContent = "إلغاء الشريحة";
    cancel.onclick = clearTier;
    el.tiersBar.appendChild(cancel);

    el.tierBanner.style.display = "block";
    el.tierBanner.textContent = `أنت الآن على شريحة: ${selectedTier.tier_name} — الخصم ${getTierDiscount()}% — الحد الأدنى ${getTierMin() ? getTierMin().toLocaleString("en-US") : 0} جنيه`;
  } else {
    el.tierBanner.style.display = "none";
    el.tierBanner.textContent = "";
  }
}

function removeOfferItemsIfNeeded() {
  let removed = false;
  Object.keys(cart).forEach((code) => {
    const item = cart[code];
    if (clean(item.company) === "صفقة اليوم") {
      delete cart[code];
      removed = true;
    }
  });
  if (removed) {
    persistAll();
    updateFooterTotal();
  }
  return removed;
}

function selectTier(tierObj) {
  selectedTier = tierObj;
  if (removeOfferItemsIfNeeded()) notify("تم حذف صفقة اليوم بسبب اختيار الشريحة", "info");
  persistAll();
  renderTiers();
  rerenderCurrentPage();
  updateFooterTotal();
}

function clearTier() {
  selectedTier = null;
  persistAll();
  renderTiers();
  rerenderCurrentPage();
  updateFooterTotal();
  notify("تم إلغاء الشريحة", "info");
}

function rerenderCurrentPage() {
  if (currentPage === "brands") renderBrands();
  else if (currentPage === "products") renderProducts(lastCompany);
  else if (currentPage === "review") renderReview();
}

function matchesSearch(product, term) {
  const q = normalizeText(term);
  if (!q) return false;
  const fields = [
    product.name,
    product.code,
    product.company,
    product.price_carton,
    product.price_dozen,
    product.price_piece
  ].map(normalizeText).join(" ");
  return fields.includes(q);
}

function handleSearch(value) {
  searchQuery = clean(value);
  renderBrands();
}

function brandMarkup(visibleBrands) {
  return `<div class="grid">
    ${visibleBrands.map((b) => {
      const sample = products.find(p => clean(p.company) === b);
      const img = clean(sample?.brand_image) || PLACEHOLDERS.brand(b);
      return `
        <div class="card brandCard" data-company="${escapeAttr(b)}">
          <img class="brandImg" src="${img}" alt="${escapeAttr(b)}" onerror="this.src='${PLACEHOLDERS.brand(b)}'">
          <div class="brandName">${b}</div>
        </div>
      `;
    }).join("")}
  </div>`;
}

function bindBrandCards() {
  document.querySelectorAll(".brandCard").forEach((card) => {
    card.onclick = () => {
      const company = clean(card.getAttribute("data-company"));
      if (!company) return;
      searchQuery = "";
      renderProducts(company);
    };
  });
}

function renderBrands() {
  currentPage = "brands";
  lastCompany = null;
  el.backBtn.style.display = "none";

  const brands = [...new Set(products.map(p => clean(p.company)).filter(Boolean))];
  const visibleBrands = selectedTier ? brands.filter(b => b !== "صفقة اليوم") : brands;

  let html = `
    <div class="searchBar">
      <input
        class="searchInput"
        id="searchInput"
        placeholder="ابحث باسم الصنف أو الكود أو أي رقم..."
        value="${escapeAttr(searchQuery)}"
        oninput="handleSearch(this.value)"
      >
    </div>
  `;

  const q = clean(searchQuery);
  if (q) {
    const results = products
      .filter(p => !selectedTier || clean(p.company) !== "صفقة اليوم")
      .filter(p => matchesSearch(p, q));

    if (results.length) {
      html += `<div class="searchHint">نتائج البحث: ${results.length}</div>`;
      html += `<div class="grid">${results.map(renderProductCard).join("")}</div>`;
    } else {
      html += `<div class="emptyState">لا توجد نتائج مطابقة</div>`;
    }
  } else {
    if (!visibleBrands.length) {
      html += `<div class="emptyState">لا توجد شركات لعرضها</div>`;
    } else {
      html += brandMarkup(visibleBrands);
    }
  }

  el.app.innerHTML = html;
  bindBrandCards();
  updateFooterTotal();
}

function safeKey(product, index) {
  const base = clean(product.code) || clean(product.name) || clean(product.company) || "item";
  return `${base}_${index}`.replace(/\s+/g, "_").replace(/[^\w\u0600-\u06FF]+/g, "_");
}

function renderProductCard(p, index = 0) {
  const code = clean(p.code);
  const uiKey = p.__uiKey || safeKey(p, index);
  const productImg = clean(p.image) || PLACEHOLDERS.product(p.name);
  const options = ["carton", "dozen", "piece"]
    .filter(u => toNum(p[`price_${u}`]) > 0)
    .map(u => `<option value="${u}">${UNIT_NAMES[u]}</option>`)
    .join("");

  const draft = drafts[uiKey] || {};
  const selectedUnit = clean(draft.unit);

  return `
    <div class="card productCard" id="card_${uiKey}">
      <img class="productImg" src="${productImg}" alt="${escapeAttr(p.name)}" onerror="this.src='${PLACEHOLDERS.product(p.name)}'">
      <div class="productName">${p.name}</div>
      <div class="price wait" id="price_${uiKey}">${selectedUnit ? `${toNum(p[`price_${selectedUnit}`])} جنيه` : "اختر الوحدة"}</div>

      <select class="unitSelect" id="unit_${uiKey}" onchange="selectUnit(${JSON.stringify(uiKey)}, this.value)">
        <option value="">اختر الوحدة</option>
        ${options}
      </select>

      <div class="qtyWrap">
        <button class="qtyBtn" id="minus_${uiKey}" disabled onclick="changeQty(${JSON.stringify(uiKey)}, -1)">-</button>
        <input class="qtyInput" id="qty_${uiKey}" disabled placeholder="" inputmode="numeric" oninput="draftQty(${JSON.stringify(uiKey)}, this.value)">
        <button class="qtyBtn" id="plus_${uiKey}" disabled onclick="changeQty(${JSON.stringify(uiKey)}, 1)">+</button>
      </div>

      <button class="addBtn" onclick="addToCart(${JSON.stringify(uiKey)})">أضف للسلة</button>
    </div>
  `;
}

function renderProducts(company) {
  const companyName = clean(company);
  if (selectedTier && companyName === "صفقة اليوم") {
    notify("صفقة اليوم غير متاحة مع الشريحة", "error");
    renderBrands();
    return;
  }

  currentPage = "products";
  lastCompany = companyName;
  el.backBtn.style.display = "block";

  const list = products
    .filter(p => clean(p.company) === companyName)
    .map((p, i) => ({ ...p, __uiKey: safeKey(p, i) }));

  if (!list.length) {
    el.app.innerHTML = `<div class="emptyState">لا توجد منتجات داخل هذا القسم</div>`;
    return;
  }

  el.app.innerHTML = `<div class="grid">${list.map((p, i) => renderProductCard(p, i)).join("")}</div>`;
  list.forEach(p => restoreDraftForProduct(p.__uiKey));
  updateFooterTotal();
}

function restoreDraftForProduct(uiKey) {
  const draft = drafts[uiKey];
  if (!draft || !clean(draft.unit)) return;

  const unitEl = document.getElementById(`unit_${uiKey}`);
  if (unitEl) {
    unitEl.value = draft.unit;
    selectUnit(uiKey, draft.unit, true);
  }

  const qtyEl = document.getElementById(`qty_${uiKey}`);
  if (qtyEl) qtyEl.value = clean(draft.qty) ? String(draft.qty) : "";
}

function selectUnit(uiKey, unit, silent = false) {
  const product = products.find((x, i) => safeKey(x, i) === clean(uiKey) || clean(x.__uiKey) === clean(uiKey));
  if (!product) return;

  const u = clean(unit);
  drafts[uiKey] = drafts[uiKey] || {};
  drafts[uiKey].unit = u;
  persistAll();

  const price = toNum(product[`price_${u}`]);
  const priceEl = document.getElementById(`price_${uiKey}`);
  if (priceEl) {
    priceEl.textContent = `${price} جنيه`;
    priceEl.classList.remove("wait");
  }

  const qtyEl = document.getElementById(`qty_${uiKey}`);
  const minusEl = document.getElementById(`minus_${uiKey}`);
  const plusEl = document.getElementById(`plus_${uiKey}`);

  if (qtyEl) {
    qtyEl.disabled = false;
    qtyEl.classList.add("enabled");
    qtyEl.style.background = "#fff";
  }
  if (minusEl) minusEl.disabled = false;
  if (plusEl) plusEl.disabled = false;

  if (!silent) notify(`تم اختيار ${UNIT_NAMES[u] || "الوحدة"}`, "info");
}

function draftQty(uiKey, value) {
  const cleaned = clean(value).replace(/[^\d]/g, "");
  drafts[uiKey] = drafts[uiKey] || {};
  drafts[uiKey].qty = cleaned === "" ? "" : parseInt(cleaned, 10);
  persistAll();
}

function changeQty(uiKey, delta) {
  const input = document.getElementById(`qty_${uiKey}`);
  if (!input) return;
  let current = parseInt(clean(input.value), 10);
  if (!Number.isFinite(current) || current <= 0) current = 1;
  current += delta;
  if (current < 1) current = 1;
  input.value = String(current);
  draftQty(uiKey, input.value);
}

function addToCart(uiKey) {
  const product = products.find((x, i) => safeKey(x, i) === clean(uiKey) || clean(x.__uiKey) === clean(uiKey));
  if (!product) {
    notify("خطأ في المنتج", "error");
    return;
  }

  const unit = clean(drafts[uiKey]?.unit || document.getElementById(`unit_${uiKey}`)?.value);
  if (!unit) {
    notify("اختر الوحدة أولاً", "error");
    return;
  }

  let qty = clean(drafts[uiKey]?.qty);
  qty = qty === "" ? 1 : parseInt(qty, 10);
  if (!Number.isFinite(qty) || qty <= 0) qty = 1;

  const price = toNum(product[`price_${unit}`]);
  if (!price) {
    notify("سعر هذه الوحدة غير متاح", "error");
    return;
  }

  cart[clean(uiKey)] = {
    uiKey: clean(uiKey),
    code: clean(product.code),
    name: product.name,
    company: clean(product.company),
    unit,
    qty,
    price
  };

  persistAll();
  updateFooterTotal();
  notify("تمت الإضافة للسلة", "ok");
}

function updateFooterTotal() {
  el.totalBox.textContent = `${Math.round(getPayableTotal()).toLocaleString("en-US")} جنيه`;
}

function openReview() {
  reviewReturn = { type: currentPage, value: lastCompany };
  renderReview();
}

function renderReview() {
  currentPage = "review";
  el.backBtn.style.display = "block";

  const items = Object.values(cart);
  const subtotal = getSubtotal();
  const discount = getDiscountAmount();
  const payable = getPayableTotal();
  const satisfied = isTierSatisfied();

  if (!items.length) {
    el.app.innerHTML = `
      <div class="emptyState">السلة فارغة</div>
      <div style="height:10px"></div>
      <div class="card">
        <button class="mainBtn secondary" onclick="goBack()">⬅ الرجوع للتسوق</button>
      </div>
    `;
    updateFooterTotal();
    return;
  }

  let html = `<div class="reviewWrap">`;

  if (selectedTier) {
    html += `
      <div class="reviewSummary">
        <div><b>الشريحة:</b> ${selectedTier.tier_name}</div>
        <div><b>الخصم:</b> ${getTierDiscount()}%</div>
        <div><b>الحد الأدنى:</b> ${getTierMin().toLocaleString("en-US")} جنيه</div>
        ${satisfied
          ? `<div><b>إجمالي قبل الخصم:</b> ${subtotal.toLocaleString("en-US")} جنيه</div>
             <div><b>الخصم:</b> ${discount.toLocaleString("en-US")} جنيه</div>
             <div><b>إجمالي بعد الخصم:</b> ${payable.toLocaleString("en-US")} جنيه</div>`
          : `<div style="color:var(--red)"><b>المتبقي للوصول للشريحة:</b> ${(getTierMin() - subtotal).toLocaleString("en-US")} جنيه</div>
             <div><b>إجمالي حالي:</b> ${subtotal.toLocaleString("en-US")} جنيه</div>`
        }
      </div>
    `;
  } else {
    html += `
      <div class="reviewSummary">
        <div><b>إجمالي السلة:</b> ${subtotal.toLocaleString("en-US")} جنيه</div>
      </div>
    `;
  }

  items.forEach((item) => {
    const lineTotal = toNum(item.qty) * toNum(item.price);
    html += `
      <div class="reviewItem">
        <div class="reviewItemTop">كود الصنف: ${item.code || item.uiKey || ""}</div>
        <div>الاسم: ${item.name}</div>
        <div>${UNIT_NAMES[item.unit] || item.unit} × ${item.qty}</div>
        <div><b>السعر:</b> ${toNum(item.price).toLocaleString("en-US")} جنيه</div>
        <div><b>الإجمالي:</b> ${lineTotal.toLocaleString("en-US")} جنيه</div>

        <div class="reviewControls">
          <button class="qtyBtn" onclick="reviewQty('${item.uiKey}', -1)">-</button>
          <input class="reviewQtyInput" value="${item.qty}" inputmode="numeric" oninput="reviewQtyInput('${item.uiKey}', this.value)">
          <button class="qtyBtn" onclick="reviewQty('${item.uiKey}', 1)">+</button>
        </div>

        <div class="reviewAction" onclick="removeFromCart('${item.uiKey}')">حذف</div>
      </div>
    `;
  });

  html += `
    <div class="formCard">
      <input class="input" id="custName" placeholder="الاسم" value="${escapeAttr(customer.name || "")}">
      <input class="input" id="custPhone" placeholder="رقم الهاتف" value="${escapeAttr(customer.phone || "")}">
      <input class="input" id="custBusiness" placeholder="اسم النشاط" value="${escapeAttr(customer.business || "")}">
      <input class="input" id="custAddress" placeholder="العنوان" value="${escapeAttr(customer.address || "")}">

      <button class="mainBtn secondary" onclick="setLocation()">📍 اضغط لإضافة اللوكيشن</button>
      <div class="locationStatus" id="locationStatus">${customer.location ? "✔ تم حفظ اللوكيشن" : ""}</div>

      <div style="height:10px"></div>

      <button class="mainBtn primary" id="sendBtn" onclick="sendOrder(${payable.toFixed(2)})" ${selectedTier && !satisfied ? "disabled" : ""}>إرسال الطلب الآن</button>
      <div style="height:8px"></div>
      <button class="mainBtn secondary" onclick="backToShopping()">⬅ الرجوع للتسوق</button>
    </div>
  `;

  html += `</div>`;
  el.app.innerHTML = html;
  updateFooterTotal();
}

function reviewQtyInput(uiKey, value) {
  const cleaned = clean(value).replace(/[^\d]/g, "");
  const qty = cleaned === "" ? "" : parseInt(cleaned, 10);

  if (!Number.isFinite(qty) || qty < 1) {
    drafts[uiKey] = drafts[uiKey] || {};
    drafts[uiKey].qty = "";
    persistAll();
    return;
  }

  if (cart[uiKey]) {
    cart[uiKey].qty = qty;
    persistAll();
    renderReview();
    updateFooterTotal();
  } else {
    drafts[uiKey] = drafts[uiKey] || {};
    drafts[uiKey].qty = qty;
    persistAll();
  }
}

function reviewQty(uiKey, delta) {
  if (!cart[uiKey]) return;

  let qty = toNum(cart[uiKey].qty);
  if (!Number.isFinite(qty) || qty < 1) qty = 1;
  qty += delta;
  if (qty < 1) qty = 1;

  cart[uiKey].qty = qty;
  persistAll();
  renderReview();
  updateFooterTotal();
}

function removeFromCart(uiKey) {
  delete cart[uiKey];
  persistAll();
  renderReview();
  updateFooterTotal();
  notify("تم حذف الصنف", "info");
}

function setLocation() {
  if (!navigator.geolocation) {
    notify("الموقع غير مدعوم على هذا الجهاز", "error");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const link = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
      customer.location = link;
      persistAll();
      const loc = document.getElementById("locationStatus");
      if (loc) loc.textContent = "✔ تم تحديد اللوكيشن";
      notify("تم تحديد اللوكيشن", "ok");
    },
    () => notify("تعذر تحديد اللوكيشن", "error"),
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
  );
}

function sendOrder(total) {
  const name = clean(document.getElementById("custName")?.value);
  const phone = clean(document.getElementById("custPhone")?.value);
  const business = clean(document.getElementById("custBusiness")?.value);
  const address = clean(document.getElementById("custAddress")?.value);
  const location = clean(customer.location || "");

  if (!name || !phone || !business || !address || !location) {
    notify("من فضلك أكمل بيانات العميل واللوكيشن", "error");
    return;
  }

  const subtotal = getSubtotal();
  const discount = getDiscountAmount();
  const payable = getPayableTotal();

  if (selectedTier && !isTierSatisfied()) {
    notify("لم تصل للحد الأدنى للشريحة", "error");
    return;
  }

  customer = { name, phone, business, address, location };
  persistAll();

  let msg = `طلب شراء من / ${name}%0A%0A`;

  Object.values(cart).forEach((item) => {
    const itemTotal = toNum(item.qty) * toNum(item.price);
    msg += `كود الصنف: ${item.code || item.uiKey || ""}%0A`;
    msg += `الاسم: ${item.name}%0A`;
    msg += `الوحدة: ${UNIT_NAMES[item.unit] || item.unit}%0A`;
    msg += `الكمية: ${item.qty}%0A`;
    msg += `سعر الوحدة: ${toNum(item.price).toLocaleString("en-US")} جنيه%0A`;
    msg += `الإجمالي: ${itemTotal.toLocaleString("en-US")} جنيه%0A%0A`;
  });

  msg += `إجمالي قبل الخصم: ${subtotal.toLocaleString("en-US")} جنيه%0A`;
  if (selectedTier) {
    msg += `الشريحة: ${selectedTier.tier_name}%0A`;
    msg += `الخصم: ${getTierDiscount()}%${isTierSatisfied() ? ` (${discount.toLocaleString("en-US")} جنيه)` : ""}%0A`;
  }
  msg += `الإجمالي النهائي: ${payable.toLocaleString("en-US")} جنيه%0A%0A`;
  msg += `الاسم: ${name}%0A`;
  msg += `الهاتف: ${phone}%0A`;
  msg += `النشاط: ${business}%0A`;
  msg += `العنوان: ${address}%0A`;
  msg += `اللوكيشن: ${location}`;

  window.open(`https://wa.me/201552670465?text=${encodeURIComponent(msg)}`, "_blank");
}

function backToShopping() {
  if (reviewReturn?.type === "products" && reviewReturn?.value) {
    renderProducts(reviewReturn.value);
  } else {
    renderBrands();
  }
}

function goBack() {
  if (currentPage === "products") {
    renderBrands();
    return;
  }
  if (currentPage === "review") {
    backToShopping();
    return;
  }
}

function review() {
  openReview();
}

Promise.all([
  loadCSV(URLS.products),
  loadCSV(URLS.tiers),
  loadCSV(URLS.settings)
]).then(([productsRes, tiersRes, settingsRes]) => {
  products = productsRes
    .filter(x => clean(x.company) && clean(x.status) === "active")
    .map((p, i) => ({ ...p, __uiKey: safeKey(p, i) }));

  tiersData = tiersRes.filter(x => clean(x.tier_active) === "1");
  settings = settingsRes;

  const headerImage = settings.find(x => clean(x.type) === "company_image")?.value;
  el.headerImg.src = clean(headerImage) ? headerImage : PLACEHOLDERS.header;
  el.headerImg.onerror = () => {
    el.headerImg.src = PLACEHOLDERS.header;
  };

  const newsList = settings
    .filter(x => clean(x.type) === "news" && clean(x.value))
    .flatMap(x => clean(x.value).split("،"))
    .map(x => clean(x))
    .filter(Boolean);

  if (newsList.length) {
    let i = 0;
    el.news.textContent = newsList[0];
    setInterval(() => {
      el.news.textContent = newsList[i];
      i = (i + 1) % newsList.length;
    }, 3000);
  } else {
    el.news.textContent = "";
  }

  renderTiers();
  renderBrands();
  updateFooterTotal();
});
</script>

</body>
</html>
