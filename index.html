<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alahram Store</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:Cairo;margin:0;background:#F5F7FA}
.header{height:180px;background:#ccc;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px}
.news{background:#E53935;color:#fff;padding:10px;text-align:center}
.tiers{display:flex;flex-wrap:wrap;gap:6px;padding:10px}
.tiers button{flex:1;padding:10px;border:none;border-radius:20px;background:#0B3D91;color:#fff}
.cancel{background:#000!important}
.card{background:#fff;padding:10px;border-radius:12px;margin:10px;text-align:center}
.footer{position:fixed;bottom:0;width:100%;background:#fff;padding:10px;display:flex;justify-content:space-between}
</style>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<div class="header">الأهرام للتجارة والتوزيع</div>
<div class="news" id="news">تحميل...</div>
<div class="tiers" id="tiers"></div>
<div id="app"></div>

<div class="footer">
<div onclick="location.reload()">🔄 تحديث</div>
<div onclick="review()">🧾 مراجعة</div>
</div>

<script>

/* 🔥 حل الكاش النهائي */
function fix(url){
  return url + "&t=" + Date.now();
}

function loadCSV(url){
  return new Promise(res=>{
    Papa.parse(fix(url),{
      download:true,
      header:true,
      skipEmptyLines:true,
      complete:r=>res(r.data)
    });
  });
}

let products=[],tiers=[],settings=[];
let cart={};
let tier=null;

Promise.all([
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=2123604928&output=csv"),
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=688371996&output=csv"),
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1922249138&output=csv")
]).then(([p,t,s])=>{

products=p;
tiers=t;
settings=s;

/* NEWS */
let news=settings.filter(x=>x.type==="news").map(x=>x.value);
document.getElementById("news").innerText=news[0]||"";

/* TIERS */
let box=document.getElementById("tiers");
tiers.forEach(t=>{
let b=document.createElement("button");
b.innerText=t.tier_name;
b.onclick=()=>tier=t;
box.appendChild(b);
});

/* BRANDS */
showBrands();

});

/* BRANDS */
function showBrands(){
let app=document.getElementById("app");
app.innerHTML="";

let brands=[...new Set(products.map(p=>p.company))];

brands.forEach(b=>{
app.innerHTML+=`<div class="card">${b}</div>`;
});
}

/* REVIEW */
function review(){
alert("عدد المنتجات: " + Object.keys(cart).length);
}

</script>

</body>
</html>
