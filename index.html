<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alahram Store</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{margin:0;font-family:Cairo;background:#f5f7fa}

/* HEADER */
.header{position:sticky;top:0;background:#0B3D91;color:#fff}
.header img{width:100%;height:120px;object-fit:cover}
.title{text-align:center;padding:6px;font-weight:bold}
.news{background:#ff7a00;padding:6px;text-align:center}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

/* CARD */
.card{
background:#fff;
border-radius:12px;
padding:10px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}
.card img{
width:100%;
height:100px;
object-fit:contain;
}

/* PRICE */
.price{color:#e53935;font-weight:bold;margin:5px}

/* SELECT */
select{width:100%;padding:6px;border-radius:6px}

/* QTY */
.qty{
display:flex;
justify-content:center;
gap:6px;
margin-top:5px
}
.qty input{
width:60px;
text-align:center;
border-radius:6px;
border:1px solid #ccc;
background:#eee;
}
.qty button{
padding:6px;
border:none;
background:#ddd;
border-radius:6px;
}

/* BTN */
.btn{
background:#ff7a00;
color:#fff;
padding:8px;
border-radius:8px;
margin-top:6px;
}

/* FOOTER */
.footer{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-between;
padding:10px;
border-top:1px solid #ddd
}
</style>
</head>

<body>

<div class="header">
<img id="headerImg">
<div class="title">الأهرام للتجارة والتوزيع</div>
<div class="news" id="news"></div>
</div>

<div id="app"></div>

<div class="footer">
<div onclick="showBrands()">⬅ رجوع</div>
<div id="totalBox">0 جنيه</div>
<div onclick="review()">🧾 مراجعة</div>
</div>

<script>

const unitNames={
carton:"كرتونة",
dozen:"دستة",
piece:"قطعة"
};

let products=[],settings=[];
let cart={},state={};

const fix=u=>u+"&t="+Date.now();
const num=v=>parseFloat(v)||0;

function load(url){
return new Promise(r=>{
Papa.parse(fix(url),{download:true,header:true,complete:res=>r(res.data||[])});
});
}

Promise.all([
load("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=2123604928&output=csv"),
load("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1922249138&output=csv")
]).then(([p,s])=>{

products=p.filter(x=>x.company && x.status=="active");
settings=s;

headerImg.src=settings.find(x=>x.type=="company_image")?.value||"";

let newsArr=settings.filter(x=>x.type=="news").map(x=>x.value);
let i=0;
setInterval(()=>{
news.innerText=newsArr[i]||"";
i=(i+1)%newsArr.length;
},3000);

showBrands();

});

/* BRANDS */
function showBrands(){
let brands=[...new Set(products.map(p=>p.company.trim()))];

app.innerHTML="<div class='grid'>";
brands.forEach(b=>{
app.innerHTML+=`
<div class="card" onclick="showProducts('${b}')">
<b>${b}</b>
</div>`;
});
app.innerHTML+="</div>";
}

/* PRODUCTS */
function showProducts(company){
app.innerHTML="<div class='grid'>";

products.filter(p=>p.company==company).forEach(p=>{

let units=["carton","dozen","piece"].filter(u=>num(p["price_"+u])>0);

app.innerHTML+=`
<div class="card">

<img src="${p.image}">
<div>${p.name}</div>

<div class="price" id="price_${p.code}">--</div>

<select onchange="selectUnit('${p.code}',this.value)">
<option value="">اختر الوحدة</option>
${units.map(u=>`<option value="${u}">${unitNames[u]}</option>`).join("")}
</select>

<div class="qty">
<button disabled id="m_${p.code}" onclick="change('${p.code}',-1)">-</button>
<input disabled id="q_${p.code}" placeholder="">
<button disabled id="p_${p.code}" onclick="change('${p.code}',1)">+</button>
</div>

<div class="btn" onclick="add('${p.code}')">أضف للسلة</div>

</div>
`;
});

app.innerHTML+="</div>";
}

/* SELECT UNIT */
function selectUnit(code,unit){
let p=products.find(x=>x.code==code);
state[code]={unit};

let price=num(p["price_"+unit]);

let priceEl=document.getElementById("price_"+code);
priceEl.innerText=price+" جنيه";
priceEl.style.color="#0B3D91";

let q=document.getElementById("q_"+code);
let m=document.getElementById("m_"+code);
let pbtn=document.getElementById("p_"+code);

q.disabled=false;
q.style.background="#fff";
q.value="";

m.disabled=false;
pbtn.disabled=false;
}

/* QTY */
function change(code,val){
let el=document.getElementById("q_"+code);
let v=parseInt(el.value)||0;
v+=val;
if(v<1)v=1;
el.value=v;
}

/* ADD */
function add(code){
let st=state[code];
if(!st)return alert("اختر الوحدة");

let p=products.find(x=>x.code==code);
let qty=parseInt(document.getElementById("q_"+code).value)||1;

cart[code]={qty,price:num(p["price_"+st.unit])};

updateTotal();
}

/* TOTAL */
function updateTotal(){
let t=0;
Object.values(cart).forEach(c=>t+=c.qty*c.price);
totalBox.innerText=t+" جنيه";
}

/* REVIEW */
function review(){
let html="<div class='grid'>";
Object.entries(cart).forEach(([k,c])=>{
html+=`<div class="card">كود: ${k}<br>${c.qty} × ${c.price}</div>`;
});
html+="</div>";
app.innerHTML=html;
}

</script>

</body>
</html>
