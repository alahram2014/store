<script>
(function(){
  if (window.__alahramUserPatchLoaded) return;
  window.__alahramUserPatchLoaded = true;

  const REP_MODE_KEY = "alahram_rep_mode_v1";
  const REP_PASS_CACHE = "alahram_rep_password_cache_v1";
  const DEFAULT_REP_PASSWORD = "2014"; // fallback only; best replaced from Settings > rep_password
  let repMode = localStorage.getItem(REP_MODE_KEY) === "1";
  let quickSearchQuery = "";

  function clean(v){ return (v ?? "").toString().trim(); }
  function toNum(v){ const n = parseFloat(String(v ?? "").replace(/[٬،\s,]/g, "").replace(/[^0-9.\-]/g, "")); return Number.isFinite(n) ? n : 0; }
  function getSettingValue(key){
    try{
      const rows = Array.isArray(settings) ? settings : [];
      const row = rows.find(r => clean(r?.key).toLowerCase() === clean(key).toLowerCase());
      return clean(row?.value);
    }catch(_){ return ""; }
  }
  function getRepPassword(){
    return getSettingValue("rep_password") || localStorage.getItem(REP_PASS_CACHE) || DEFAULT_REP_PASSWORD;
  }
  function saveRepMode(){
    localStorage.setItem(REP_MODE_KEY, repMode ? "1" : "0");
    document.body.classList.toggle("repMode", repMode);
  }
  function notify(msg, kind){
    if (typeof window.notify === "function") window.notify(msg, kind || "info");
    else alert(msg);
  }
  function compactText(s){ return clean(s).toLowerCase().replace(/[أإآ]/g,"ا").replace(/ى/g,"ي").replace(/ؤ/g,"و").replace(/ئ/g,"ي").replace(/ة/g,"ه").replace(/\s+/g,""); }
  function distinctBrands(limit){
    const seen = new Set();
    const brands = [];
    (products || []).forEach(p => {
      const company = clean(p.company);
      if(!company || company === "صفقة اليوم" || seen.has(company)) return;
      seen.add(company);
      brands.push(company);
    });
    return brands.slice(0, limit || 12);
  }
  function activeProducts(){
    return (products || []).filter(p => clean(p.status).toLowerCase() === "active" || clean(p.status) === "متاح" || !clean(p.status));
  }
  function prioritySort(a,b){
    return toNum(a.priority || a.priority_sort || 999999) - toNum(b.priority || b.priority_sort || 999999);
  }
  function isOffer(p){
    return clean(p.company) === "صفقة اليوم" || toNum(p.is_offer) === 1 || toNum(p.price_offer) > 0 || clean(p.offer_label) !== "";
  }
  function getDisplayName(p){
    return clean(p.name || p.product_name || p.item_name || p.title || p.offer_label || "صنف");
  }
  function getKey(p){
    return clean(p.id || p.product_id || p.sku || `${p.codo || p.code || getDisplayName(p)}_${clean(p.company)}`);
  }
  function renderSmartSearch(q){
    const list = (products || []).map(p => ({p,score: (window.buildSearchScore ? window.buildSearchScore(p, q) : 0)})).filter(x => x.score > 0).sort((a,b)=>b.score-a.score).map(x=>x.p);
    return list.slice(0, 40);
  }
  function quickSearchHTML(list){
    if(!list.length) return `<div class="emptyState">لا توجد نتائج مطابقة</div>`;
    return `<div class="grid">${window.renderProductsGrid ? window.renderProductsGrid(list) : ""}</div>`;
  }

  function injectHomeCTA(){
    const app = document.getElementById("app");
    if(!app) return;
    const topActions = app.querySelector(".topActions");
    if (topActions && !app.querySelector(".quickActionRow")) {
      topActions.insertAdjacentHTML("afterend", `
        <div class="quickActionRow">
          <button class="mainBtn primary" type="button" onclick="openQuickBuyPage()">🛒 اشترى الآن</button>
          <button class="mainBtn secondary" type="button" onclick="toggleRepMode()">👔 ${repMode ? "إلغاء وضع المندوب" : "دخول المندوب"}</button>
        </div>
      `);
    }

    if (app.querySelector(".searchBar") && !app.querySelector(".buyNowEntry")) {
      const searchBar = app.querySelector(".searchBar");
      searchBar.insertAdjacentHTML("beforebegin", `
        <div class="pageCard gold buyNowEntry">
          <div class="pageCardTitle">🛒 اشترى الآن</div>
          <div class="pageCardSub">صفحة الطلب السريع للوصول للمنتج وإتمام الشراء في أقل من 30 ثانية.</div>
          <div class="quickActionRow">
            <button class="mainBtn primary" type="button" onclick="openQuickBuyPage()">ابدأ الطلب السريع</button>
            <button class="mainBtn secondary" type="button" onclick="toggleRepMode()">${repMode ? "وضع المندوب مفعل" : "فتح وضع المندوب"}</button>
          </div>
        </div>
      `);
    }

    if (repMode) {
      const dock = app.querySelector(".contactDock");
      if (dock && !app.querySelector(".repMiniBadge")) {
        dock.insertAdjacentHTML("afterend", `<div class="quickBadge gold repMiniBadge">👔 وضع المندوب مفعل</div>`);
      }
    }
  }

  function renderQuickBuyPage(){
    if (typeof window.setMode === "function") window.setMode("home");
    document.body.classList.add("compact", "quick-mode");
    currentPage = "quick";
    lastCompany = null;
    brandReturnTarget = "home";
    const backBtn = document.getElementById("backBtn"); if (backBtn) backBtn.style.display = "block";
    document.title = "اشترى الآن - الأهرام للتجارة والتوزيع";
    if (typeof window.scrollTop === "function") window.scrollTop();
    if (typeof window.logEvent === "function") window.logEvent("page_quick_buy");

    const topOffers = activeProducts().filter(isOffer).sort(prioritySort).slice(0, 4).map((p,i)=>({...p,__uiKey: (window.getProductKey ? window.getProductKey(p) : getKey(p)) || `${i}`})); 
    const topProducts = activeProducts().filter(p => !isOffer(p)).sort(prioritySort).slice(0, 8).map((p,i)=>({...p,__uiKey: (window.getProductKey ? window.getProductKey(p) : getKey(p)) || `${i}`}));
    const brands = distinctBrands(10);
    const mainText = repMode
      ? "وضع المندوب مفعل: الفاتورة ستطلب اسم المندوب وبيانات التاجر قبل الإرسال."
      : "اختصر الطريق: ابحث، أضف، وأرسل الطلب من شاشة واحدة.";

    const offersHTML = topOffers.length
      ? `<div class="quickGridTitle">🔥 صفقات اليوم</div>${window.renderProductsGrid(topOffers)}`
      : `<div class="emptyState">لا توجد صفقات اليوم حالياً</div>`;

    const productsHTML = topProducts.length
      ? `<div class="quickGridTitle">⭐ الأكثر طلبًا</div>${window.renderProductsGrid(topProducts)}`
      : `<div class="emptyState">لا توجد منتجات كافية للعرض</div>`;

    const brandsHTML = brands.length
      ? `<div class="quickGridTitle">🏷️ البراندات السريعة</div><div class="quickBrandRow">${brands.map(b => `<button class="quickBrandChip" type="button" onclick="renderBrandProducts('${String(b).replace(/'/g,"\\'")}','home')">${b}</button>`).join("")}</div>`
      : "";

    const tierHint = selectedTier

  const originalSendOrder = window.sendOrder;

    const phone = clean(document.getElementById("custPhone")?.value);

    if (selectedTier && typeof window.isTierSatisfied === "function" && !window.isTierSatisfied()) { notify("لم يتم تحقيق الحد الأدنى للشريحة", "error"); return; }

    if (customer) {
      customer = { ...customer, name, phone, business, address, location, repName };
      if (typeof window.persistAll === "function") window.persistAll();
    }

    const payload = typeof window.buildOrderPayload === "function" ? window.buildOrderPayload() : {};
    payload.rep_name = repName;
    payload.mode = repMode ? "rep" : "customer";
    payload.source_mode = repMode ? "مندوب" : "عميل";
    payload.merchant_name = name;

    if (typeof window.saveJSON === "function" && LS?.latestOrder) {
      try { window.saveJSON(LS.latestOrder, payload); } catch(_){}
    }

    if (typeof window.postOrderToSheet === "function") {
      try { await window.postOrderToSheet(payload); } catch(_) {}
    }

    const wa = `https://wa.me/201040880002?text=${encodeURIComponent(typeof window.buildWhatsAppMessage === "function" ? window.buildWhatsAppMessage(payload) : "")}`;
    window.open(wa, "_blank");

    if (typeof window.notify === "function") window.notify("تم تجهيز الطلب وإرساله", "ok");
    if (typeof window.logEvent === "function") window.logEvent("order_sent_patch", { order_id: payload.order_id || "", total: payload.total || 0, items_count: payload.items_count || 0, mode: payload.mode || "customer" });
  };

  const originalGoBack = window.goBack;
  if (typeof originalGoBack === "function") {
    window.goBack = function(){
      if (currentPage === "quick") { window.renderHome(); return; }
      return originalGoBack.apply(this, arguments);

  const originalBackToShopping = window.backToShopping;

  window.openQuickBuyPage = renderQuickBuyPage;
  window.toggleRepMode = toggleRepMode;
  window.clearQuickSearch = clearQuickSearch;
  window.debouncedQuickSearch = debouncedQuickSearch;
  window.runQuickSearch = runQuickSearch;

  saveRepMode();
  document.body.classList.toggle("repMode", repMode);

  if (typeof window.renderHome === "function") {
    window.renderHome();
  }
})();
</script>


<script>

};
const C = v => (v ?? "").toString().trim();
const N = v => {
  const raw = C(v).replace(/[٬،\s]/g, "");
  if(!raw) return 0;
  const norm = raw.includes(",") && !raw.includes(".") ? raw.replace(",", ".") : raw.replace(/,/g, "");
  const n = parseFloat(norm);
  return Number.isFinite(n) ? n : 0;
};
const escapeText = v => String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
const lsGet = (k, f=null) => { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : f; } catch { return f; } };
const lsSet = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };
const lsDel = (k) => { try { localStorage.removeItem(k); } catch {} };

let repState = lsGet(PRO_KEYS.repState, null);
if(repState && !repState.repId) repState = null;

function repActive(){ return !!repState; }
function repLabel(){ return repState ? `${C(repState.repName || "")} - #${C(repState.repId || "")}` : ""; }

function logoutRep(silent=false){

  if(!silent) notify?.("تم الخروج من وضع المندوب", "info");

}

function getCompanyStrict(p){ return C(p?.company || p?.company_name || p?.brand || ""); }
function isActiveProductSafe(p) {
  const s = C(p?.status).toLowerCase();
  return !s || s === "1" || s === "active" || s === "فعال" || s === "yes" || s === "true";
}
function isOfferStrict(p) {
  return getCompanyStrict(p) === "صفقة اليوم";
}
function getPriceFieldProduct(p, unit) {
  const u = C(unit);
  if(u === "carton") return N(p?.price_carton ?? p?.carton_price ?? 0);
  if(u === "dozen") return N(p?.price_dozen ?? p?.dozen_price ?? 0);
  if(u === "piece") return N(p?.price_piece ?? p?.piece_price ?? 0);
  if(u === "offer") return N(p?.price_offer ?? p?.offer_price ?? 0);
  return 0;
}
function getRepPriceField(p, unit) {
  const u = C(unit);
  if(u === "carton") return N(p?.rep_price_carton ?? p?.price_rep_carton ?? p?.repCartonPrice ?? 0);
  if(u === "dozen") return N(p?.rep_price_dozen ?? p?.price_rep_dozen ?? p?.repDozenPrice ?? 0);
  if(u === "piece") return N(p?.rep_price_piece ?? p?.price_rep_piece ?? p?.repPiecePrice ?? 0);
  return 0;
}
function getTierFieldPrice(p, unit) {
  const t = C(selectedTier?.tier_name || selectedTier?.tier_id || selectedTier?.id || "");
  const u = C(unit);
  const compact = t.toLowerCase().replace(/\s+/g, "").replace(/[-]+/g, "_");
  const fieldMap = {
    carton: [`${compact}_carton`, "vip_carton"],
    dozen: [`${compact}_dozen`, "vip_dozen"],
    piece: [`${compact}_piece`, "vip_piece"]
  };
  for(const key of (fieldMap[u] || [])){
    const v = N(p?.[key]);
    if(v > 0) return v;
  }
  return 0;
}
function priceFor(product, unit) {
  if(!product) return 0;
  if(selectedTier) {
    const tierPrice = getTierFieldPrice(product, unit);
    if(tierPrice > 0) return tierPrice;
  }
  if(repActive()) {
    const repPrice = getRepPriceField(product, unit);
    if(repPrice > 0) return repPrice;
  }
  const base = getPriceFieldProduct(product, unit);
  if(base > 0) return base;
  if(unit !== "offer") return getPriceFieldProduct(product, "carton") || getPriceFieldProduct(product, "dozen") || getPriceFieldProduct(product, "piece");
  return 0;
}

const origGetBaseUnitPrice = window.getBaseUnitPrice;

function productByKey(key) {
  const k = C(key);
  return (products || []).find(p => {
    const code = C(p?.codo || p?.code || p?.product_code || p?.sku || "");
    const name = C(p?.name || p?.product_name || p?.item_name || p?.title || "");
    const company = getCompanyStrict(p);
    const id = C(p?.id || p?.product_id || p?.sku || "");
    return [id, code, name + "_" + company].some(x => C(x) === k);
  }) || null;
}

function refreshCartPricing() {
  if(typeof cart === "undefined") return;
  Object.values(cart).forEach(item => {
    const p = productByKey(item.uiKey || item.code || item.name);
    if(!p) return;
    const unit = C(item.unit || "carton");
    item.basePrice = getPriceFieldProduct(p, unit);
    item.price = priceFor(p, unit) || item.basePrice || item.price || 0;
    if(item.unit === "offer" && !selectedTier) {
      const offer = priceFor(p, "offer") || getPriceFieldProduct(p, "offer");
      if(offer > 0) item.price = offer;
    }
  });

  updateFooterTotal?.();

window.getBaseUnitPrice = function(p, unit) {

};
window.getTierUnitPrice = function(p, unit, tier) {

    return priceFor(p, unit);

    if(rp > 0) return rp;

window.getSubtotal = function() {
  return Object.values(cart || {}).reduce((sum, item) => sum + N(item.qty) * N(item.price || 0), 0);

    lines.push(`كود الصنف : ${item.product_code || "-"}`);

    lines.push(`الوحدة : ${unitMap[item.unit] || item.unit}`);

  });

};

function topCompaniesProducts(limit=10) {
  const seen = new Set();
  const out = [];
  const list = (products || []).filter(isActiveProductSafe).sort((a,b) => N(a.priority) - N(b.priority) || C(a.name).localeCompare(C(b.name), "ar"));
  for(const p of list) {
    if(isOfferStrict(p)) continue;
    const company = getCompanyStrict(p);
    if(!company || seen.has(company)) continue;
    seen.add(company);
    out.push(p);
    if(out.length >= limit) break;
  }
  return out.map((p,i) => ({...p, __uiKey: window.getProductKey ? window.getProductKey(p) : C(p.codo || p.code || p.name || i)}));
}

function topOffersProducts(limit=6) {

}

  if(selectedTier && isOfferStrict(p)) { notify?.("لا يمكن إضافة عروض صفقة اليوم داخل فاتورة شريحة", "error"); return; }

    notify?.("لا يمكن دمج العروض مع الشريحة", "error"); return;
  }
  const offerMode = isOfferStrict(p);
  const unit = offerMode ? "offer" : C(drafts?.[uiKey]?.unit || document.getElementById(`unit_${uiKey}`)?.value || "");
  if(!offerMode && !unit) { notify?.("اختر الوحدة أولاً", "error"); return; }
  let qty = C(drafts?.[uiKey]?.qty || document.getElementById(`qty_${uiKey}`)?.value || "");
  qty = qty === "" ? 1 : parseInt(qty, 10);

  const unitPrice = priceFor(p, unit);
  if(!unitPrice) { notify?.("السعر غير متاح لهذا الصنف", "error"); return; }
  cart[C(uiKey)] = {
    uiKey: C(uiKey),
    code: C(p.codo || p.code || p.product_code || p.sku || ""),
    name: C(p.name || p.product_name || p.item_name || p.title || ""),
    company: getCompanyStrict(p),
    unit,
    qty,
    price: unitPrice,
    basePrice: getPriceFieldProduct(p, unit)
  };
  persistAll?.();
  refreshCartPricing();
  updateFooterTotal?.();
  notify?.("تمت الإضافة للسلة", "ok");
};

function wrapRender(fnName) {
  const original = window[fnName];
  if(typeof original !== "function") return;
  window[fnName] = function(...args) {
    const result = original.apply(this, args);
    currentPage = fnName === "renderHome" ? "home" :
      fnName === "renderBrandProducts" ? "products" :
      fnName === "renderTiersPage" ? "tiers" :
      fnName === "renderTierProductsPage" ? "vipBrands" :
      fnName === "renderOffersPage" ? "offers" :
      fnName === "renderReview" ? "review" : currentPage;
    setTimeout(afterRender, 0);
    return result;
  };
}

["renderHome","renderBrandProducts","renderTiersPage","renderTierProductsPage","renderOffersPage","renderReview"].forEach(wrapRender);

  return true;
}

});

window.addEventListener("beforeunload", () => {

});

})();

  function resolvePrice(p, unit) {

      const unit = C(item.unit || "carton");

      const price = p ? resolvePrice(p, unit) : N(item.price || 0);

      city: rep?.repCity || "",

    return {

      subtotal,
      total,

      sheets: {
        Orders: [{
          orderId: order.orderId,
          orderTime: order.orderTime,
          mode: order.mode,
          repId: order.repId,
          customerId: order.customerId,
          phone: order.phone,
          address: order.address,
          area: order.area,
          city: order.city,
          locationLink: order.locationLink,
          tierId: order.tierId,

          discountAmount: order.discountAmount,
          total: order.total,
          itemsCount: order.itemsCount,
          status: order.status,
          notes: order.notes,
          createdAt: order.createdAt
        }],
        OrderItems: items.map((it) => ({
          itemId: it.itemId,
          orderId: order.orderId,
          productId: it.productId,
          quantity: it.quantity,
          unitPrice: it.unitPrice,

        })),
        Customers: [{

          phone: order.customerPhone,
          area: order.area,
          city: order.city,
          address: order.customerAddress,
          repId: order.repId,
          customerType: rep ? "rep" : "client",
          creditLimit: "",
          balance: "",
          status: "active",
          createdAt: order.createdAt,

        }]

    };
  };
  window.buildWhatsAppMessage = function (payload) {
    const rep = currentRep();
    const items = window.buildOrderItemsPayload ? window.buildOrderItemsPayload() : [];
    const unitMap = { carton: "كرتونة", dozen: "دستة", piece: "قطعة", offer: "عرض" };
    const lines = [];

    if (selectedTierRef()) lines.push(`الشريحة : ${C(selectedTierRef().visible_label || selectedTierRef().tier_name || "")}`);
    lines.push("");

    items.forEach((item) => {

      lines.push("");
    });
    lines.push(`إجمالي الفاتورة : ${N(payload.total || 0).toLocaleString("en-US")} جنيه`);
    return lines.join("\n");
  };
  window.postOrderToSheet = async function (payload) {
    const body = JSON.stringify(payload);
    try {
      const response = await fetch(window.SHEETS_URL || "https://script.google.com/macros/s/AKfycbyo8bxUpKK4UKGQgZZHmDfR9kDvEmsuLYSTIRltjWsUEX23jOrk1xGnnCf9YW_NLL4eHw/exec", {
        method: "POST",
        headers: { "Content-Type": "application/json;charset=UTF-8" },
        body
      });
      if (response.ok) return { ok: true, transport: "fetch", response };
    } catch (error) {}
    try {
      if (navigator.sendBeacon) {
        const ok = navigator.sendBeacon(window.SHEETS_URL || "https://script.google.com/macros/s/AKfycbyo8bxUpKK4UKGQgZZHmDfR9kDvEmsuLYSTIRltjWsUEX23jOrk1xGnnCf9YW_NLL4eHw/exec", new Blob([body], { type: "application/json;charset=UTF-8" }));
        if (ok) return { ok: true, transport: "beacon" };
      }
    } catch (error) {}
    return { ok: false };
  };
  window.sendOrder = async function () {
    const customerName = C(document.getElementById("custName")?.value);
    const customerPhone = C(document.getElementById("custPhone")?.value);
    const customerBusiness = C(document.getElementById("custBusiness")?.value);
    const customerAddress = C(document.getElementById("custAddress")?.value);

    if (!customerName || !customerPhone || !customerBusiness || !customerAddress || !location) {

      window.open(waUrl, "_blank", "noopener,noreferrer");
      const result = await window.postOrderToSheet(payload);

      if (!result || !result.ok) {
        notify("تم تجهيز واتساب لكن لم أتمكن من تأكيد الحفظ في الشيت", "error");
        return;

      notify("تم إرسال الطلب بنجاح", "ok");

  window.addToCart = function (uiKey) {
    const product = productByKey(uiKey);
    if (!product) {
      notify("خطأ في المنتج", "error");
      return;
    }
    if (window.isAddableToCart && !window.isAddableToCart(product)) {
      notify("نفذت الكمية ستصل قريبًا", "error");
      return;
    }
    const offerMode = window.isOfferProduct ? window.isOfferProduct(product) : getCompanyStrict(product) === "صفقة اليوم";
    const unit = offerMode ? "offer" : C(draftsRef()?.[uiKey]?.unit || document.getElementById(`unit_${uiKey}`)?.value || "");

      return;
    }
    const cartStore = cartRef();
    cartStore[C(uiKey)] = {
      uiKey: C(uiKey),
      code: C(window.getProductCode ? window.getProductCode(product) : (product.codo || product.code || "")),
      name: C(window.getDisplayName ? window.getDisplayName(product) : (product.name || "")),
      company: C(product.company || ""),
      unit,
      qty,
      price: unitPrice,
      basePrice: priceField(product, unit),
      repPrice: repPriceField(product, unit),
      tierPrice: tierPriceField(product, unit)
    };
    if (typeof window.persistAll === "function") window.persistAll();
    if (typeof window.updateFooterTotal === "function") window.updateFooterTotal();
    notify("تمت الإضافة للسلة", "ok");

  window.syncFooter = function () {

    ensureSlimBar();
    ensureRepBanner();
    if (currentPageRef() === "review") window.syncFooter?.();
    const topActions = document.querySelector(".topActions");

        if (t === "فتح وضع المندوب" || t === "إلغاء وضع المندوب") btn.remove();
      });
    }
  }

  function wrapRender(name, onDone) {
    const original = window[name];
    if (typeof original !== "function") return;
    window[`__orig_${name}`] = original;
    window[name] = function (...args) {
      const result = original.apply(this, args);
      setTimeout(() => {
        try { onDone?.(); } catch {}
      }, 0);
      return result;
    };
  }

  wrapRender("renderHome", cleanupHome);
  wrapRender("renderBrandProducts", cleanupAnyPage);
  wrapRender("renderTiersPage", cleanupAnyPage);
  wrapRender("renderTierProductsPage", cleanupAnyPage);
  wrapRender("renderOffersPage", cleanupAnyPage);

  wrapRender("renderQuickBuyPage", cleanupAnyPage);

  const originalOpenReview = window.openReview;

    const result = originalGoBack ? originalGoBack.apply(this, arguments) : (window.renderHome ? window.renderHome() : null);

    if (repActive()) return openRepModal();

    window.REP_DATA = rows.filter((r) => C(r?.repId || r?.rep_name || r?.repName || r?.name));

  function refreshCatalogBindings() {
    ensureStyles();
    ensureSlimBar();
    ensureRepBanner();
    setUiTextButtons();
    if (currentPageRef() === "review") syncFooter();
  }

  function tryApply() {
    refreshCatalogBindings();
    if (repActive()) document.body.classList.add("repMode");
  }

  if (document.readyState === "complete" || document.readyState === "interactive") {
    tryApply();
  } else {
    window.addEventListener("DOMContentLoaded", tryApply, { once: true });
  }
  window.addEventListener("load", () => {
    ensureStyles();
    ensureSlimBar();
    ensureRepBanner();
    setUiTextButtons();
    syncFooter();
  });

  const boot = setInterval(async () => {
    try {
      if (!isLoaded()) return;
      clearInterval(boot);
      if (!window.URLS) window.URLS = {};
      window.URLS.reps = REP_SHEET_URL;
      await loadRepSheet();
      refreshCatalogBindings();
      if (repActive()) document.body.classList.add("repMode");
      if (typeof window.renderHome === "function" && currentPageRef() === "home") window.renderHome();
      else if (typeof window.renderReview === "function" && currentPageRef() === "review") window.renderReview();
      else if (typeof window.syncFooter === "function") window.syncFooter();
    } catch (e) {}
  }, 250);
})();

  function isRepTrigger(el) {
    if (!el) return false;
    const txt = textOf(el);
    const on = (el.getAttribute && el.getAttribute("onclick")) ? el.getAttribute("onclick") : "";
    return /toggleRepMode/.test(on) || /وضع المندوب|دخول المندوب|إلغاء وضع المندوب/.test(txt);
  }

  function cleanHomeRepUI(root) {
    if (!root) return;

    // Remove the top quick-action strip only when it is outside the buy-now card.
    root.querySelectorAll(".quickActionRow").forEach(row => {
      if (!row.closest(".buyNowEntry")) {
        row.remove();
      }
    });

    // Keep the quick-buy card, but remove any rep button from it.
    root.querySelectorAll(".buyNowEntry").forEach(card => {
      card.querySelectorAll("button").forEach(btn => {
        if (isRepTrigger(btn)) btn.remove();
      });
      const row = card.querySelector(".quickActionRow");
      if (row) {
        const remain = [...row.querySelectorAll("button")];
        if (remain.length === 1) {
          row.style.gridTemplateColumns = "1fr";
          remain[0].style.width = "100%";
        }
        if (remain.length === 0) row.remove();
      }
    });
  }

  function addRepButtonToTiers(root) {
    if (!root) return;
    const actions = root.querySelector(".tierPageActions");
    if (!actions) return;
    if (actions.querySelector("[data-tier-rep-btn='1']")) return;

    const btn = document.createElement("button");
    btn.type = "button";
    btn.setAttribute("data-tier-rep-btn", "1");
    btn.className = "vipLaunchBtn";
    btn.style.marginTop = "0";
    btn.style.background = "linear-gradient(135deg,#7a5a00,#c79b18)";
    btn.style.color = "#fff";
    btn.textContent = "👔 حساب المندوب";
    btn.onclick = () => window.toggleRepMode && window.toggleRepMode();
    actions.appendChild(btn);
  }

  function syncRepPlacement() {
    const app = document.getElementById("app");
    if (!app) return;

    const currentPage = (window.currentPage || window.view || "").toString();
    cleanHomeRepUI(app);

    if (currentPage === "tiers" || document.body.classList.contains("tierMode")) {
      addRepButtonToTiers(app);
    }
  }

  function wrap(name) {
    const original = window[name];
    if (typeof original !== "function") return;
    window[name] = function (...args) {
      const result = original.apply(this, args);
      setTimeout(syncRepPlacement, 0);
      return result;
    };
  }

  wrap("renderHome");
  wrap("renderQuickBuyPage");
  wrap("renderTiersPage");
  wrap("renderOffersPage");
  wrap("renderReview");

  document.addEventListener("DOMContentLoaded", () => setTimeout(syncRepPlacement, 0));
  window.addEventListener("load", () => setTimeout(syncRepPlacement, 0));
})();
</script>

</body>
</html>
