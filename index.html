<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الأهرام للتجارة والتوزيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:Cairo;margin:0;background:#f5f7fa}

/* HEADER */
.header{
height:180px;
background:#0B3D91;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:bold;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

/* CARD */
.card{
background:#fff;
padding:10px;
border-radius:12px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:100px;
object-fit:contain;
}

/* PRICE */
.price{
color:#e53935;
font-weight:bold;
margin:5px 0;
}

/* INPUT */
select,input{
width:100%;
padding:6px;
margin-top:5px;
border-radius:6px;
}

/* BACK */
.back{
background:#e53935;
color:#fff;
padding:8px;
margin:10px;
border-radius:10px;
text-align:center;
}

/* FOOTER */
.footer{
position:fixed;
bottom:0;
width:100%;
background:#fff;
padding:10px;
display:flex;
justify-content:space-between;
border-top:1px solid #ddd;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

<div class="header">
الأهرام للتجارة والتوزيع
</div>

<div id="app"></div>

<div class="footer">
<div onclick="showBrands()">🏠 الرئيسية</div>
<div onclick="review()">🧾 السلة</div>
</div>

<script>

/* Anti Cache */
function fix(url){
return url + "&t=" + Date.now();
}

function loadCSV(url){
return new Promise(r=>{
Papa.parse(fix(url),{
download:true,
header:true,
complete:(res)=>r(res.data)
});
});
}

let products=[];
let cart={};

loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=2123604928&output=csv")

.then(p=>{

products = p.filter(x => (x.status||"").trim() === "active");

showBrands();

});

/* BRANDS */
function showBrands(){
let app=document.getElementById("app");
app.innerHTML="<div class='grid'>";

let brands=[...new Set(products.map(p=>p.company))];

brands.forEach(b=>{
let logo=products.find(p=>p.company==b)?.brand_image||"";

app.innerHTML+=`
<div class="card" onclick="showProducts('${b}')">
<img src="${logo}">
<h4>${b}</h4>
</div>`;
});

app.innerHTML+="</div>";
}

/* PRODUCTS */
function showProducts(company){
let app=document.getElementById("app");

app.innerHTML=`<div class="back" onclick="showBrands()">⬅ رجوع</div><div class='grid'>`;

products.filter(p=>p.company==company).forEach(p=>{

app.innerHTML+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<div class="price">${p.price_carton} جنيه</div>

<select onchange="setUnit('${p.code}',this)">
<option disabled selected>اختر الوحدة</option>
<option value="carton">كرتونة</option>
<option value="dozen">دستة</option>
<option value="piece">قطعة</option>
</select>

<input type="number" placeholder="الكمية"
onchange="addCart('${p.code}',this.value)">
</div>
`;

});

app.innerHTML+="</div>";
}

/* CART */
function setUnit(code,el){
if(!cart[code]) cart[code]={};
cart[code].unit=el.value;
}

function addCart(code,qty){
let p=products.find(x=>x.code==code);
let unit=cart[code]?.unit;

if(!unit) return alert("اختر الوحدة");

let price=p["price_"+unit]||0;

cart[code]={
name:p.name,
qty,
unit,
price
};
}

/* REVIEW */
function review(){
let total=0;
let txt="";

for(let i in cart){
let c=cart[i];
let sum=c.qty*c.price;
total+=sum;
txt+=c.name+" = "+sum+"\n";
}

alert(txt + "\nالإجمالي: " + total);
}

</script>

</body>
</html>
