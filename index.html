<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الأهرام للتجارة والتوزيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:Cairo;margin:0;background:#111;color:#fff}

/* HEADER */
.header{
position:relative;height:180px
}
.header img{
width:100%;height:100%;object-fit:cover
}
.overlay{
position:absolute;inset:0;background:#000a
}
.title{
position:absolute;bottom:10px;right:10px;font-weight:bold
}

/* NEWS */
.news{
background:#FFD600;color:#000;padding:8px;text-align:center;font-weight:bold
}

/* TIERS */
.tiers{
display:flex;gap:6px;padding:10px;overflow-x:auto
}
.tier{
background:#222;padding:6px 12px;border-radius:20px;border:1px solid #555
}
.tier.active{
background:#FFD600;color:#000
}

/* GRID */
.grid{
display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px
}

/* CARD */
.card{
background:#1c1c1c;padding:10px;border-radius:12px;text-align:center
}
.card img{width:100%;height:100px;object-fit:contain}

/* PRICE */
.price{color:#FFD600;font-weight:bold}

/* UNIT */
.units button{
margin:2px;padding:5px;border:none;border-radius:6px;background:#333;color:#fff
}
.units .active{background:#FFD600;color:#000}

/* QTY */
.qty{
display:flex;justify-content:center;align-items:center;gap:10px;margin-top:5px
}
.qty button{padding:5px 10px}

/* FOOTER */
.footer{
position:fixed;bottom:0;width:100%;background:#000;padding:10px;
display:flex;justify-content:space-between
}

/* BTN */
.btn{
background:#FFD600;color:#000;padding:10px;border-radius:8px;margin:10px;text-align:center
}

/* TOAST */
.toast{
position:fixed;top:20px;left:50%;transform:translateX(-50%);
background:#2e7d32;color:#fff;padding:10px;border-radius:20px;display:none
}
</style>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

<div class="header">
<img id="headerImg">
<div class="overlay"></div>
<div class="title">الأهرام للتجارة والتوزيع</div>
</div>

<div class="news" id="news"></div>
<div class="tiers" id="tiers"></div>

<div id="app"></div>

<div class="footer">
<div onclick="goBack()">⬅ رجوع</div>
<div id="totalBox">0 جنيه</div>
<div onclick="review()">🧾 مراجعة</div>
</div>

<div class="toast" id="toast">✔ تمت الإضافة</div>

<script>

function fix(u){return u+"&t="+Date.now()}

function loadCSV(url){
return new Promise(r=>{
Papa.parse(fix(url),{download:true,header:true,complete:(res)=>r(res.data)});
});
}

let products=[],tiers=[],settings=[];
let cart=JSON.parse(localStorage.getItem("cart")||"{}");
let tier=JSON.parse(localStorage.getItem("tier")||"null");
let lastPage="brands";

Promise.all([
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=2123604928&output=csv"),
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=688371996&output=csv"),
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1922249138&output=csv")
]).then(([p,t,s])=>{

products=p.filter(x=>(x.status||"").trim()=="active");
tiers=t.filter(x=>x.tier_active=="1");
settings=s;

/* HEADER IMAGE */
document.getElementById("headerImg").src=settings.find(x=>x.type=="company_image")?.value||"";

/* NEWS */
let raw=settings.filter(x=>x.type=="news").map(x=>x.value).join("،");
let list=raw.split("،").filter(x=>x.trim());
let i=0;
setInterval(()=>{
document.getElementById("news").innerText=list[i];
i=(i+1)%list.length;
},3000);

/* TIERS */
let box=document.getElementById("tiers");
tiers.forEach(t=>{
let d=document.createElement("div");
d.className="tier";
d.innerText=t.tier_name;

d.onclick=()=>{
tier=t;
localStorage.setItem("tier",JSON.stringify(t));
cart={};
localStorage.setItem("cart","{}");
};

box.appendChild(d);
});

showBrands();
updateTotal();

});

/* BRANDS */
function showBrands(){
lastPage="brands";
let app=document.getElementById("app");
app.innerHTML="<div class='grid'>";

let brands=[...new Set(products.map(p=>p.company))];

brands.forEach(b=>{
if(tier && b=="صفقة اليوم") return;
let img=products.find(p=>p.company==b)?.brand_image||"";

app.innerHTML+=`<div class="card" onclick="showProducts('${b}')"><img src="${img}"><h4>${b}</h4></div>`;
});

app.innerHTML+="</div>";
}

/* PRODUCTS */
function showProducts(company){
lastPage=company;

if(company=="صفقة اليوم" && tier){
tier=null;
localStorage.removeItem("tier");
cart={};
localStorage.setItem("cart","{}");
alert("تم إلغاء الشريحة");
}

let app=document.getElementById("app");
app.innerHTML="<div class='grid'>";

products.filter(p=>p.company==company).forEach(p=>{

app.innerHTML+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<div class="price">${p.price_carton} جنيه</div>

<div class="units">
${["carton","dozen","piece"].map(u=>{
if(p["price_"+u]>0){
return `<button onclick="setUnit('${p.code}','${u}',this)">${u=="carton"?"كرتونة":u=="dozen"?"دستة":"قطعة"}</button>`;
}
return "";
}).join("")}
</div>

<div class="qty">
<button onclick="changeQty('${p.code}',-1)">-</button>
<span id="q_${p.code}">1</span>
<button onclick="changeQty('${p.code}',1)">+</button>
</div>

<div class="btn" onclick="addCart('${p.code}')">🛒 أضف للسلة</div>
</div>
`;
});

app.innerHTML+="</div>";
}

/* CART */
function setUnit(code,unit,el){
document.querySelectorAll(`#q_${code}`).forEach(()=>{});
if(!cart[code]) cart[code]={qty:1};
cart[code].unit=unit;
}

function changeQty(code,val){
let el=document.getElementById("q_"+code);
let q=+el.innerText+val;
if(q<1) q=1;
el.innerText=q;
if(cart[code]) cart[code].qty=q;
}

function addCart(code){
let p=products.find(x=>x.code==code);
if(!cart[code]?.unit) return alert("اختر الوحدة");

let q=document.getElementById("q_"+code).innerText;
let price=p["price_"+cart[code].unit];

cart[code]={code,name:p.name,qty:+q,unit:cart[code].unit,price};

localStorage.setItem("cart",JSON.stringify(cart));
toast();
updateTotal();
}

/* TOTAL */
function updateTotal(){
let total=0;
for(let i in cart){
total+=cart[i].qty*cart[i].price;
}
document.getElementById("totalBox").innerText=total+" جنيه";
}

/* REVIEW */
function review(){
let app=document.getElementById("app");
let total=0;

let html="";

for(let i in cart){
let c=cart[i];
let sum=c.qty*c.price;
total+=sum;

html+=`
<div class="card">
[${c.code}] ${c.name}<br>
${c.unit} × ${c.qty}<br>
${sum} جنيه
<div class="qty">
<button onclick="changeCart('${i}',-1)">-</button>
<span>${c.qty}</span>
<button onclick="changeCart('${i}',1)">+</button>
</div>
<div onclick="removeItem('${i}')">❌ حذف</div>
</div>`;
}

html+=`<div class="btn" onclick="checkout(${total})">إتمام الطلب</div>`;

app.innerHTML=html;
}

/* EDIT CART */
function changeCart(code,val){
cart[code].qty+=val;
if(cart[code].qty<1) cart[code].qty=1;
localStorage.setItem("cart",JSON.stringify(cart));
review();
updateTotal();
}

function removeItem(code){
delete cart[code];
localStorage.setItem("cart",JSON.stringify(cart));
review();
updateTotal();
}

/* CHECKOUT */
function checkout(total){
let name=prompt("الاسم");
let phone=prompt("رقم الهاتف");
let address=prompt("العنوان");

let msg="طلب:%0A";

for(let i in cart){
let c=cart[i];
msg+=`[${c.code}] ${c.name}%0A${c.unit} × ${c.qty} = ${c.qty*c.price}%0A`;
}

msg+=`%0Aالإجمالي: ${total}%0A${name}%0A${phone}%0A${address}`;

window.open("https://wa.me/201552670465?text="+msg);
}

/* TOAST */
function toast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

/* BACK */
function goBack(){
if(lastPage=="brands") return;
showProducts(lastPage);
}

</script>

</body>
</html>
