<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alahram Store</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{margin:0;font-family:Cairo;background:#f5f7fa}
.header{position:sticky;top:0;background:#0B3D91;color:#fff}
.header img{width:100%;height:120px;object-fit:cover}
.title{text-align:center;padding:5px}
.news{background:#ff7a00;padding:6px;text-align:center}

.tiersBox{display:flex;gap:6px;padding:8px;background:#fff;overflow:auto}
.tier{padding:6px 10px;border:1px solid #ddd;border-radius:20px}
.tier.active{background:#0B3D91;color:#fff}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#fff;border-radius:10px;padding:10px;text-align:center}
.card img{width:100%;height:100px;object-fit:contain}

.price{color:red;font-weight:bold}
.qty{display:flex;justify-content:center;gap:5px;margin:5px}
.qty input{width:50px;text-align:center;background:#eee}

.btn{background:#ff7a00;color:#fff;padding:6px;border-radius:6px}

.footer{position:fixed;bottom:0;width:100%;background:#fff;display:flex;justify-content:space-between;padding:10px}

.toastBox{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:green;color:#fff;padding:10px;display:none}
</style>
</head>

<body>

<div class="header">
<img id="headerImg">
<div class="title">الأهرام للتجارة والتوزيع</div>
<div class="news" id="news"></div>
<div class="tiersBox" id="tiersBox"></div>
</div>

<div id="app"></div>

<div class="footer">
<div onclick="showBrands()">⬅ رجوع</div>
<div id="totalBox">0 جنيه</div>
<div onclick="review()">🧾 مراجعة</div>
</div>

<div class="toastBox" id="toastBox">✔ تمت الإضافة</div>

<script>

let products=[], tiersData=[], settings=[];
let cart={}, state={};

const fix=u=>u+"&t="+Date.now();
const num=v=>parseFloat(v)||0;

function load(url){
return new Promise(r=>{
Papa.parse(fix(url),{download:true,header:true,complete:res=>r(res.data||[])});
});
}

Promise.all([
load("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=2123604928&output=csv"),
load("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=688371996&output=csv"),
load("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1922249138&output=csv")
]).then(([p,t,s])=>{

products=p.filter(x=>x.company && x.status=="active");
tiersData=t.filter(x=>x.tier_active=="1");
settings=s;

headerImg.src=settings.find(x=>x.type=="company_image")?.value || "";

let newsArr=settings.filter(x=>x.type=="news").map(x=>x.value);
let i=0;
setInterval(()=>{
news.innerText=newsArr[i]||"";
i=(i+1)%newsArr.length;
},3000);

/* TIERS */
let tiersBox=document.getElementById("tiersBox");
tiersData.forEach(t=>{
let d=document.createElement("div");
d.className="tier";
d.innerText=t.tier_name;
d.onclick=()=>{
state.tier=t;
};
tiersBox.appendChild(d);
});

showBrands();

});

/* BRANDS */
function showBrands(){
app.innerHTML="<div class='grid'>";
let brands=[...new Set(products.map(p=>p.company))];

brands.forEach(b=>{
app.innerHTML+=`<div class="card" onclick="showProducts('${b}')">${b}</div>`;
});

app.innerHTML+="</div>";
}

/* PRODUCTS */
function showProducts(c){
app.innerHTML="<div class='grid'>";

products.filter(p=>p.company==c).forEach(p=>{

let units=["carton","dozen","piece"].filter(u=>num(p["price_"+u])>0);

app.innerHTML+=`
<div class="card">
<img src="${p.image}">
<div>${p.name}</div>

<div class="price" id="price_${p.code}">--</div>

<select onchange="selectUnit('${p.code}',this.value)">
<option value="">اختر الوحدة</option>
${units.map(u=>`<option value="${u}">${u}</option>`).join("")}
</select>

<div class="qty">
<button disabled id="m_${p.code}" onclick="change('${p.code}',-1)">-</button>
<input disabled id="q_${p.code}">
<button disabled id="p_${p.code}" onclick="change('${p.code}',1)">+</button>
</div>

<div class="btn" onclick="add('${p.code}')">أضف</div>
</div>
`;
});

app.innerHTML+="</div>";
}

/* SELECT */
function selectUnit(code,unit){
let p=products.find(x=>x.code==code);

state[code]={unit};

document.getElementById("price_"+code).innerText=num(p["price_"+unit])+" جنيه";

document.getElementById("q_"+code).disabled=false;
document.getElementById("m_"+code).disabled=false;
document.getElementById("p_"+code).disabled=false;
}

/* QTY */
function change(code,v){
let el=document.getElementById("q_"+code);
let val=parseInt(el.value)||0;
val+=v;
if(val<1)val=1;
el.value=val;
}

/* ADD */
function add(code){
let st=state[code];
if(!st)return alert("اختر الوحدة");

let p=products.find(x=>x.code==code);
let qty=parseInt(document.getElementById("q_"+code).value)||1;

cart[code]={qty,price:num(p["price_"+st.unit])};

showToast();
updateTotal();
}

/* TOTAL */
function updateTotal(){
let t=0;
Object.values(cart).forEach(c=>t+=c.qty*c.price);
totalBox.innerText=t+" جنيه";
}

/* TOAST */
function showToast(){
let t=document.getElementById("toastBox");
t.style.display="block";
setTimeout(()=>t.style.display="none",1000);
}

/* REVIEW */
function review(){
app.innerHTML=JSON.stringify(cart);
}

</script>

</body>
</html>
