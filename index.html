<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>الأهرام للتجارة والتوزيع</title>
<meta name="theme-color" content="#c79b18" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{
  --gold:#c79b18;
  --gold2:#f0d46c;
  --gold3:#8a5a00;
  --bg:#fbf4de;
  --card:#ffffff;
  --soft:#fffdf6;
  --line:#ead08a;
  --text:#1d2633;
  --muted:#667085;
  --accent:#0b3d91;
  --danger:#c0392b;
  --success:#1f8b4c;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:linear-gradient(180deg,#fff7df,#fbf4de 30%,#f8f0da);
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
}
a{text-decoration:none;color:inherit}
button,input,select{font-family:inherit}
img{max-width:100%;display:block}
#app{padding:12px 12px 116px;max-width:980px;margin:0 auto}
.header{position:static;z-index:1000;background:linear-gradient(180deg,#c79b18,#8a5a00);color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.08);overflow:hidden}
.hero{position:relative;height:116px;background:linear-gradient(135deg,#8a5a00,#c79b18)}
.hero img{width:100%;height:100%;object-fit:cover;filter:saturate(1.05) contrast(1.02)}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.60),rgba(0,0,0,.06))}
.heroText{position:absolute;inset:0;z-index:2;padding:8px 12px 12px;display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;gap:6px;text-align:right}
.companyBrand{display:flex;align-items:center;justify-content:flex-start;flex-direction:row-reverse;gap:10px;width:100%}
.companyLogo{width:56px;height:56px;border-radius:14px;object-fit:cover;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.24);box-shadow:0 8px 18px rgba(0,0,0,.12);display:none}
.companyTextWrap{display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:0}
.companyName{margin-top:1px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(8px);color:#fff;padding:10px 14px;border-radius:16px;font-weight:900;font-size:19px;line-height:1.15;box-shadow:0 8px 18px rgba(0,0,0,.12);text-align:right}
.tagline{background:rgba(255,248,227,.16);border:1px solid rgba(255,248,227,.18);backdrop-filter:blur(8px);color:#fffbe8;padding:6px 10px;border-radius:14px;font-size:11px;font-weight:700;line-height:1.45;max-width:92%}
.socialRow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 12px 6px;background:rgba(255,255,255,.06)}
.socialBtn{min-height:38px;border:none;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.10)}
.socialBtn.phone{background:#fff;color:#0b3d91}.socialBtn.wa{background:#1f8b4c;color:#fff}.socialBtn.fb{background:#fff;color:#0b3d91}
.newsTicker{background:linear-gradient(135deg,#fff0c1,#f0d46c);color:#5a4300;padding:6px 12px;font-size:12px;font-weight:800;min-height:32px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.5;border-top:1px solid rgba(255,255,255,.12)}
.topActions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;padding:8px 12px 10px}
.topBtn{min-height:44px;border:none;border-radius:16px;font-size:12px;font-weight:800;cursor:pointer;box-shadow:0 8px 18px rgba(0,0,0,.11);min-width:0;width:100%;padding:8px 10px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;justify-content:center;text-align:center;gap:6px;flex-direction:row}
.topBtn.tier{background:linear-gradient(135deg,#fff7cf,#f0d46c);color:#5a4300;min-height:52px;padding:10px 12px;gap:8px}
.topBtn.tier.active{background:linear-gradient(135deg,#8a5a00,#5a4300);color:#fff;box-shadow:0 10px 20px rgba(138,90,0,.18);border:1px solid rgba(255,255,255,.25)}
.topBtn.offer{background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff}
.topBtn.tier .tierText{display:flex;flex-direction:column;align-items:flex-end;gap:1px;min-width:0}
.topBtn.tier .topSub{font-size:9px;line-height:1.02;opacity:.9}
.topBtn.repBtn{background:linear-gradient(135deg,#8a5a00,#c79b18);color:#fff}
.topBtn.repChip{background:linear-gradient(135deg,#fff7cf,#f0d46c);color:#5a4300}
.quickNav{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding:0 12px 10px}
.quickNavBtn{min-height:34px;border:1px solid var(--line);background:rgba(255,255,255,.92);border-radius:999px;font-size:11px;font-weight:800;color:#5a4300;box-shadow:0 6px 12px rgba(0,0,0,.05)}
.quickNavBtn.primary{background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff;border:none}
.searchBox{margin:0 0 8px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:8px;box-shadow:0 6px 16px rgba(0,0,0,.04)}
.searchRow{display:grid;grid-template-columns:1fr 84px 52px;gap:8px}
.searchInput,.unitSelect,.qtyInput,.formInput{width:100%;height:44px;border-radius:12px;border:1px solid #d8dde7;padding:0 12px;font-size:14px;outline:none;background:#fff}
.searchInput:focus,.unitSelect:focus,.qtyInput:focus,.formInput:focus{border-color:#d4b14b;box-shadow:0 0 0 3px rgba(199,155,24,.12)}
.searchBtn,.clearBtn{min-height:44px;color:#fff;font-weight:800;border:none;border-radius:12px}
.searchBtn{background:var(--accent)}.clearBtn{background:#6b7280}
.sectionCard,.infoCard,.brandCard,.productCard,.tierCard,.cartCard,.emptyCard{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 6px 16px rgba(0,0,0,.04)}
.sectionCard,.infoCard,.cartCard,.emptyCard{padding:10px;margin-bottom:8px}
.sectionTitle{margin:0 0 8px;font-size:14px;font-weight:800;color:#173a84}
.sectionSub{color:var(--muted);font-size:12px;line-height:1.65}
.brandGrid,.productGrid,.tierGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.brandCard,.productCard,.tierCard{overflow:hidden}
.noImage{display:block}
.brandCard.noImage,.productCard.noImage{padding-top:12px}
.brandCard{padding:8px;min-height:116px;display:flex;flex-direction:column;gap:8px;justify-content:center;text-align:center}
.brandImg,.productImg{width:100%;height:160px;object-fit:contain;background:#f8fafc;border-radius:14px}
.brandName{font-weight:800;color:#5a4300;font-size:13px;line-height:1.35}
.productCard{padding:10px;display:flex;flex-direction:column;gap:9px;min-height:358px}
.productName{font-weight:800;font-size:13px;line-height:1.45;min-height:38px}
.productMeta,.offerLabel,.stockBadge,.tierMeta,.cartMeta{font-size:12px;line-height:1.6}
.priceLine{font-weight:800;color:#c0392b;font-size:14px}
.offerLabel{color:#7a5a00;font-weight:800}
.stockBadge{display:inline-flex;align-items:center;justify-content:center;margin:0 auto;padding:5px 10px;border-radius:999px;background:#fff0f0;color:#b63c2a;font-weight:800}
.stockBadge.ok{background:#e8f7ee;color:#1f8b4c}
.unitSelect{height:38px;font-size:13px}
.qtyRow{display:grid;grid-template-columns:40px 1fr 40px;gap:6px;align-items:center}
.qtyBtn{height:40px;font-size:18px;font-weight:900;background:#e9edf3;border:none;border-radius:12px}
.qtyInput{text-align:center}
.addBtn,.primaryBtn,.secondaryBtn,.dangerBtn,.repAction{min-height:44px;font-weight:800;font-size:15px;border:none;border-radius:12px}
.addBtn{background:linear-gradient(135deg,#c79b18,#f0d46c);color:#5a4300}
.addBtn.offer{background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff}
.primaryBtn{background:linear-gradient(135deg,#c79b18,#f0d46c);color:#5a4300}
.secondaryBtn{background:#eff3f8;color:#20314a}
.dangerBtn{background:linear-gradient(135deg,#ff7b72,#c0392b);color:#fff}
.pageActions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.pageActions .secondaryBtn,.pageActions .primaryBtn,.pageActions .dangerBtn{flex:1 1 160px}
.tierGrid .tierCard{padding:10px;display:flex;flex-direction:column;gap:8px}
.tierTitle{font-size:14px;font-weight:800;color:#173a84;display:flex;align-items:center;justify-content:space-between;gap:8px}
.tierName{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tierMeta{color:#56657b}
.tierActionRow{display:grid;grid-template-columns:1fr;gap:8px}
.tierActionRow .secondaryBtn,.tierActionRow .primaryBtn{min-height:40px}
.footerDock{position:fixed;bottom:0;left:0;right:0;z-index:2200;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);box-shadow:0 -8px 20px rgba(0,0,0,.08)}
.footerBtn{min-height:46px;border:none;border-radius:14px;font-weight:800;cursor:pointer;font-family:inherit}
.footerBtn.quick{background:linear-gradient(135deg,#8a5a00,#c79b18);color:#fff}
.footerBtn.checkout{background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff}
.footerTotal{display:flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#fff;border-radius:14px;font-weight:900;color:#5a4300;box-shadow:0 6px 12px rgba(0,0,0,.04);min-height:46px;padding:0 10px}
.old{text-decoration:line-through;color:#8b8f98;margin-inline-end:6px}
.priceNow{color:#c0392b;font-weight:900}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800}
.badge.gold{background:#fff7cf;color:#5a4300}.badge.green{background:#e8f7ee;color:#1f8b4c}.badge.red{background:#fff0f0;color:#b63c2a}.badge.blue{background:#eaf2ff;color:#173a84}
.cartWrap{display:flex;flex-direction:column;gap:10px}
.cartSummary{background:linear-gradient(180deg,#fffaf0,#fff);border:1px solid #ead08a}
.cartItem{padding:10px;display:flex;flex-direction:column;gap:8px}
.cartHead{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.cartName{font-weight:800;line-height:1.5;font-size:14px}
.cartLine{color:#56657b;font-size:12px;line-height:1.6}
.cartControls{display:grid;grid-template-columns:34px 1fr 34px;gap:6px;align-items:center}
.cartInput{height:36px;text-align:center;border-radius:10px;border:1px solid #d8dde7}
.cartActions{display:flex;gap:8px;flex-wrap:wrap}
.formGrid{display:grid;grid-template-columns:1fr;gap:8px}
.formHint{font-size:12px;color:var(--muted);line-height:1.7}
.bigSend{min-height:54px;border:none;border-radius:18px;background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff;font-size:17px;font-weight:900;box-shadow:0 14px 24px rgba(31,139,76,.18)}
.bigSend:disabled{opacity:.48;cursor:not-allowed;filter:saturate(.65)}
.locationRow{display:flex;flex-direction:column;gap:8px}
.locationStatus{font-size:13px;color:var(--muted)}
.newsEmpty,.emptyCard{text-align:center;color:var(--muted)}
.sectionSpacer{height:8px}
.tierBanner{margin-bottom:10px;padding:10px 12px;border-radius:16px;border:1px solid #e6cf7e;background:linear-gradient(135deg,#fff9e7,#fffdf7);box-shadow:0 6px 16px rgba(184,138,0,.08)}
.tierBannerTop{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}
.tierBannerTitle{font-size:12px;font-weight:800;color:#5a4300}
.tierBannerBtn{min-height:36px;border:none;border-radius:999px;background:linear-gradient(135deg,#8a5a00,#c79b18);color:#fff;padding:0 12px;font-weight:800}
.hidden{display:none!important}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:5000;max-width:92vw;padding:10px 14px;border-radius:999px;background:#1f8b4c;color:#fff;box-shadow:0 16px 30px rgba(0,0,0,.16);display:none;font-size:14px;font-weight:800}
.toast.error{background:#c0392b}.toast.info{background:#173a84}
.modal{position:fixed;inset:0;z-index:4000;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.45);backdrop-filter:blur(4px)}
.modal.show{display:flex}
.modalCard{width:min(430px,100%);background:#fff;border-radius:22px;border:1px solid #ead08a;box-shadow:0 26px 60px rgba(0,0,0,.2);padding:16px}
.modalTitle{font-size:20px;font-weight:900;color:#5a4300;margin-bottom:6px}
.modalSub{font-size:13px;line-height:1.7;color:#667085;margin-bottom:12px}
.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modalActions button{min-height:44px}
@media (min-width:700px){#app{padding-inline:16px}.brandGrid,.productGrid,.tierGrid{grid-template-columns:repeat(3,minmax(0,1fr))}}
</style>
</head>
<body>
<div class="header">
  <div class="hero">
    <img id="heroImage" alt="الأهرام للتجارة والتوزيع" />
    <div class="heroText">
      <div class="companyBrand">
        <img id="companyLogo" class="companyLogo" alt="الأهرام للتجارة والتوزيع" />
        <div class="companyTextWrap">
          <div class="companyName">الأهرام للتجارة والتوزيع</div>
          <div class="tagline" id="heroTagline">تشكيل كبير ومتنوع لأكبر شركات مستحضرات التجميل</div>
        </div>
      </div>
    </div>
  </div>
  <div class="socialRow">
    <a class="socialBtn phone" href="tel:01040880002">📞</a>
    <a class="socialBtn wa" href="https://wa.me/201040880002" target="_blank" rel="noopener">واتساب</a>
    <a class="socialBtn fb" href="https://www.facebook.com/alahram2014" target="_blank" rel="noopener">Facebook</a>
  </div>
  <div class="newsTicker" id="newsTicker">جارٍ تحميل الأخبار...</div>
  <div class="topActions" id="topActions"></div>
  <div class="quickNav">
    <button class="quickNavBtn primary" type="button" onclick="goCompanies()">🏢 الشركات</button>
    <button class="quickNavBtn" type="button" onclick="goHome()">🏠 الرئيسية</button>
  </div>
</div>

<div class="footerDock">
  <button class="footerBtn quick" id="footerQuickBtn" onclick="quickShop()">التسوق السريع</button>
  <div class="footerTotal" id="footerTotal">0 جنيه</div>
  <button class="footerBtn checkout" id="footerCheckoutBtn" onclick="openCart()">إتمام الشراء</button>
</div>

<div id="app"><div class="emptyCard">جارٍ التحميل...</div></div>
<div class="toast" id="toast"></div>

<div class="modal" id="repModal">
  <div class="modalCard">
    <div class="modalTitle">دخول المندوب</div>
    <div class="modalSub">أدخل كود المندوب والرقم السري المطابقين لصفحة Reps في الشيت.</div>
    <input class="formInput" id="repCode" placeholder="كود المندوب" autocomplete="off">
    <div class="sectionSpacer"></div>
    <input class="formInput" id="repPassword" placeholder="الرقم السري" type="password" autocomplete="off">
    <div class="sectionSpacer"></div>
    <div class="modalActions">
      <button class="primaryBtn" onclick="submitRepLogin()">دخول</button>
      <button class="secondaryBtn" onclick="closeRepLogin()">إلغاء</button>
    </div>
  </div>
</div>

<div class="modal" id="tierModal">
  <div class="modalCard">
    <div class="modalTitle">الشريحة مقفلة</div>
    <div class="modalSub" id="tierModalText">أدخل الرقم السري للوصول إلى هذه الشريحة.</div>
    <input class="formInput" id="tierPassword" placeholder="الرقم السري للشريحة" type="password" autocomplete="off">
    <div class="sectionSpacer"></div>
    <div class="modalActions">
      <button class="primaryBtn" onclick="submitTierPassword()">دخول</button>
      <button class="secondaryBtn" onclick="closeTierPassword()">إلغاء</button>
    </div>
  </div>
</div>

<script>
const DATA = {
  productsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1503749054&single=true&output=csv",
  settingsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=47255050&single=true&output=csv",
  repsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1633587789&single=true&output=csv",
  tiersUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=917474192&single=true&output=csv",
  // الرابط الجديد الآمن الذي وفرته يا جوكر
  authUrl: "https://script.google.com/macros/s/AKfycbwaB-bv-GdQ78TdFmX_p3RKjze2bMjlHAuNip1yaPashWGhqXEO6-i8_2jmh48K1GuYzw/exec",
  orderUrl: "https://script.google.com/macros/s/AKfycbw36ri62dxHKYrw5D1sCg8utxKBoWdrqHj8IHj07BCwkvBeIOrgXs7Hto4IFOCSx3wqcA/exec"
};

const LS = {
  cart: "alahram_cart_stable_v1", tier: "alahram_tier_stable_v1", rep: "alahram_rep_stable_v1", customer: "alahram_customer_stable_v1", unlocks: "alahram_unlocks_stable_v1", page: "alahram_page_stable_v1", drafts: "alahram_drafts_stable_v1"
};
const APP_CACHE_KEY = "alahram_app_cache_stable_v1";
const BASE_THEME = { gold: "#c79b18", gold2: "#f0d46c", gold3: "#8a5a00", bg: "#fbf4de", card: "#ffffff", soft: "#fffdf6", line: "#ead08a", text: "#1d2633", muted: "#667085", accent: "#0b3d91", danger: "#c0392b", success: "#1f8b4c" };
const state = { products: [], tiers: [], settings: [], reps: [], cart: loadJSON(LS.cart, {}), selectedTier: loadJSON(LS.tier, null), rep: loadJSON(LS.rep, null), customer: loadJSON(LS.customer, { name:"", phone:"", address:"", location:"" }), tierUnlocks: loadJSON(LS.unlocks, {}), page: clean(loadJSON(LS.page, "home")) || "home", search: "", loading: true, news: [], brands: [], currentBrand: "", pendingTier: null, heroImage: "", heroTagline: "تشكيل كبير ومتنوع لأكبر شركات مستحضرات التجميل", busySend: false, drafts: loadJSON(LS.drafts, {}) };

const els = { app: document.getElementById("app"), toast: document.getElementById("toast"), heroImage: document.getElementById("heroImage"), heroTagline: document.getElementById("heroTagline"), newsTicker: document.getElementById("newsTicker"), topActions: document.getElementById("topActions"), footerTotal: document.getElementById("footerTotal"), repModal: document.getElementById("repModal"), tierModal: document.getElementById("tierModal"), repCode: document.getElementById("repCode"), repPassword: document.getElementById("repPassword"), tierPassword: document.getElementById("tierPassword"), tierModalText: document.getElementById("tierModalText") };

function loadJSON(key, fallback){ try{ const raw=localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; } catch { return fallback; } }
function saveJSON(key,val){ try{ localStorage.setItem(key, JSON.stringify(val)); } catch {} }
function clean(v){ return (v ?? "").toString().trim(); }
function html(v){ return String(v ?? "").replaceAll("&","&").replaceAll("<","<").replaceAll(">",">").replaceAll('"',"""); }
function num(v){ const raw=clean(v).replace(/[٬،\s]/g,"").replace(/,/g,""); const parsed=parseFloat(raw); return Number.isFinite(parsed) ? parsed : 0; }
function compact(s){ return clean(s).normalize("NFKD").replace(/[\u064B-\u065F\u0670\u0640]/g, "").toLowerCase().replace(/[أإآ]/g,"ا").replace(/ى/g,"ي").replace(/ة/g,"ه").replace(/\s+/g,"").trim(); }
function toast(msg,type="ok"){ els.toast.textContent=msg; els.toast.className=`toast ${type === "error" ? "error" : ""}`; els.toast.style.display="block"; clearTimeout(window.__t); window.__t=setTimeout(()=>els.toast.style.display="none",2000); }
function fetchCSV(url){ return new Promise(resolve=>{ Papa.parse(`${url}&t=${Date.now()}`, { download:true, header:true, skipEmptyLines:true, complete:res=>resolve((res.data||[]).filter(Boolean)), error:()=>resolve([]) }); }); }
function saveState(){ saveJSON(LS.cart,state.cart); saveJSON(LS.tier,state.selectedTier); saveJSON(LS.rep,state.rep); saveJSON(LS.customer,state.customer); saveJSON(LS.unlocks,state.tierUnlocks); saveJSON(LS.page,state.page); saveJSON(LS.drafts,state.drafts); }

async function submitRepLogin() {
  const code = clean(els.repCode.value);
  const pass = clean(els.repPassword.value);
  if (!code || !pass) return toast("أدخل كود المندوب والرقم السري", "error");
  const btn = document.querySelector("#repModal .primaryBtn");
  btn.textContent = "جارٍ التحقق..."; btn.disabled = true;
  try {
    const res = await fetch(DATA.authUrl, { method: "POST", body: JSON.stringify({ action: "check_rep", code, password: pass }) });
    const result = await res.json();
    if (result.success) {
      state.rep = result.repData; saveState(); closeRepLogin(); renderTopActions(); render();
      toast(`أهلاً يا ${state.rep.repName}`, "ok");
    } else toast(result.message, "error");
  } catch { toast("خطأ في الاتصال بالسيرفر", "error"); }
  finally { btn.textContent = "دخول"; btn.disabled = false; }
}

async function submitTierPassword() {
  const row = state.pendingTier;
  const entered = clean(els.tierPassword.value);
  if (!entered) return toast("أدخل الرقم السري", "error");
  const btn = document.querySelector("#tierModal .primaryBtn");
  btn.textContent = "جارٍ التحقق..."; btn.disabled = true;
  try {
    const res = await fetch(DATA.authUrl, { method: "POST", body: JSON.stringify({ action: "check_tier", tierId: tierKey(row), password: entered }) });
    const result = await res.json();
    if (result.success) {
      state.tierUnlocks[compact(tierKey(row))] = true; saveState(); closeTierPassword(); activateTier(row);
    } else toast(result.message, "error");
  } catch { toast("خطأ في الاتصال بالسيرفر", "error"); }
  finally { btn.textContent = "دخول"; btn.disabled = false; }
}

// ... باقي الدوال الأساسية لعمل الصفحة (goHome, render, etc.) ...
function renderTopActions(){
  const box = els.topActions; if(!box) return;
  const tier = state.selectedTier;
  const repText = state.rep ? clean(state.rep.repName) : "دخول المندوب";
  box.innerHTML = `<button class="topBtn tier ${tier ? "active" : ""}" onclick="goTiers()">🏷️ ${tier ? tier.tier_name : "اختار شريحتك"}</button><button class="topBtn offer" onclick="goOffers()">صفقة اليوم</button><button class="topBtn repBtn" onclick="${state.rep ? 'logoutRep()' : 'openRepLogin()'}">${repText}</button>`;
}

function startApp(){
  renderLoading(); loadData();
}

async function loadData(){
  state.products = await fetchCSV(DATA.productsUrl);
  state.settings = await fetchCSV(DATA.settingsUrl);
  state.tiers = await fetchCSV(DATA.tiersUrl);
  state.reps = await fetchCSV(DATA.repsUrl);
  state.loading = false;
  renderCurrentPage();
}

function renderLoading(){ els.app.innerHTML = '<div class="emptyCard">جارٍ التحميل...</div>'; }
function renderCurrentPage(){ renderHome(); renderTopActions(); updateHero(); }
function updateHero(){ /* منطق تحديث الصور من الشيت */ }
function goHome(){ state.page="home"; renderHome(); }
function renderHome(){ /* منطق عرض البراندات */ els.app.innerHTML = '<div class="sectionCard">تم التحديث بنظام الأمان الجديد. جرب الدخول الآن.</div>'; }
function openRepLogin(){ els.repModal.classList.add("show"); }
function closeRepLogin(){ els.repModal.classList.remove("show"); }
function goTiers(){ /* منطق الشرائح */ }
function goOffers(){ /* منطق الصفقات */ }

window.onload = startApp;
</script>
</body>
</html>
