<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الأهرام للتجارة والتوزيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{margin:0;font-family:Cairo;background:#f5f7fa}

/* HEADER */
.header{position:relative;height:170px}
.header img{width:100%;height:100%;object-fit:cover}
.overlay{position:absolute;inset:0;background:#0006}
.title{position:absolute;bottom:10px;right:10px;color:#fff;font-weight:bold}

/* BACK BUTTON */
.backTop{
position:absolute;top:10px;left:10px;
background:#fff;padding:6px 10px;border-radius:8px;
display:none
}

/* NEWS */
.news{background:#ff6a00;color:#fff;text-align:center;padding:8px}

/* TIERS */
.tiers{display:flex;gap:6px;overflow:auto;padding:10px}
.tier{background:#fff;padding:6px 12px;border-radius:20px}
.tier.active{background:#ff6a00;color:#fff}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}

/* CARD */
.card{
background:#fff;border-radius:12px;padding:10px;text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}
.card img{width:100%;height:100px;object-fit:contain}
.price{color:#ff6a00;font-weight:bold}

/* FOOTER */
.footer{
position:fixed;bottom:0;width:100%;background:#fff;
display:flex;justify-content:space-between;padding:10px;border-top:1px solid #ddd
}

/* BTN */
.btn{
background:#ff6a00;color:#fff;padding:10px;border-radius:8px;margin-top:6px
}

/* TOAST */
.toast{
position:fixed;top:20px;left:50%;transform:translateX(-50%);
background:#2e7d32;color:#fff;padding:10px;border-radius:20px;display:none
}

/* FORM */
.input{
width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc
}
</style>
</head>

<body>

<div class="header">
<img id="headerImg">
<div class="overlay"></div>
<div class="title">الأهرام للتجارة والتوزيع</div>
<div class="backTop" id="backTop" onclick="goBack()">⬅</div>
</div>

<div class="news" id="news"></div>
<div class="tiers" id="tiers"></div>

<div id="app"></div>

<div class="footer" id="footer">
<div onclick="goBack()">⬅ رجوع</div>
<div id="totalBox">0 جنيه</div>
<div onclick="review()">🧾 مراجعة</div>
</div>

<div class="toast" id="toast">✔ تمت الإضافة</div>

<script>

/* ================== DATA ================== */

function fix(u){return u+"&t="+Date.now()}

function load(url){
return new Promise(r=>{
Papa.parse(fix(url),{download:true,header:true,complete:(res)=>r(res.data)})
})
}

let products=[],tiers=[],settings=[]
let cart=JSON.parse(localStorage.getItem("cart")||"{}")
let tier=JSON.parse(localStorage.getItem("tier")||"null")
let customer=JSON.parse(localStorage.getItem("customer")||"{}")
let current="brands"

/* ================== LOAD ================== */

Promise.all([
load("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=2123604928&output=csv"),
load("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=688371996&output=csv"),
load("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1922249138&output=csv")
]).then(([p,t,s])=>{

products=p.filter(x=>x.status=="active")
tiers=t.filter(x=>x.tier_active=="1")
settings=s

document.getElementById("headerImg").src=settings.find(x=>x.type=="company_image")?.value||""

/* NEWS */
let news=settings.filter(x=>x.type=="news").map(x=>x.value).join("،").split("،")
let i=0
setInterval(()=>{
document.getElementById("news").innerText=news[i]||""
i=(i+1)%news.length
},3000)

/* TIERS */
let box=document.getElementById("tiers")
tiers.forEach(t=>{
let d=document.createElement("div")
d.className="tier"
d.innerText=t.tier_name

d.onclick=()=>{
tier=t
localStorage.setItem("tier",JSON.stringify(t))
showBrands()
}

box.appendChild(d)
})

showBrands()
updateTotal()

})

/* ================== BRANDS ================== */

function showBrands(){
current="brands"
toggleBack(false)

let app=document.getElementById("app")
let brands=[...new Set(products.map(p=>p.company))]

app.innerHTML="<div class='grid'>"

brands.forEach(b=>{
if(tier && b=="صفقة اليوم") return

let img=products.find(p=>p.company==b)?.brand_image||""

app.innerHTML+=`
<div class="card" onclick="showProducts('${b}')">
<img src="${img}">
<h4>${b}</h4>
</div>`
})

app.innerHTML+="</div>"
}

/* ================== PRODUCTS ================== */

function showProducts(company){
current=company
toggleBack(true)

let app=document.getElementById("app")
app.innerHTML="<div class='grid'>"

products.filter(p=>p.company==company).forEach(p=>{

app.innerHTML+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<div class="price">${p.price_carton} جنيه</div>

<select id="u_${p.code}" class="input">
<option value="">اختر الوحدة</option>
${p.price_carton>0?'<option value="carton">كرتونة</option>':''}
${p.price_dozen>0?'<option value="dozen">دستة</option>':''}
${p.price_piece>0?'<option value="piece">قطعة</option>':''}
</select>

<div>
<button onclick="qty('${p.code}',-1)">-</button>
<span id="q_${p.code}">1</span>
<button onclick="qty('${p.code}',1)">+</button>
</div>

<div class="btn" onclick="add('${p.code}')">🛒 أضف للسلة</div>
</div>`
})

app.innerHTML+="</div>"
}

/* ================== CART ================== */

function qty(c,v){
let el=document.getElementById("q_"+c)
let q=+el.innerText+v
if(q<1) q=1
el.innerText=q
}

function add(code){
let p=products.find(x=>x.code==code)
let unit=document.getElementById("u_"+code).value
if(!unit) return alert("اختر الوحدة")

let q=+document.getElementById("q_"+code).innerText
let price=+p["price_"+unit]

cart[code]={code,name:p.name,qty:q,unit,price}
localStorage.setItem("cart",JSON.stringify(cart))

toast()
updateTotal()
}

/* ================== REVIEW ================== */

function review(){
toggleBack(true)

let app=document.getElementById("app")
let total=0
let html=""

for(let i in cart){
let c=cart[i]
let sum=c.qty*c.price
total+=sum

html+=`
<div class="card">
[${c.code}] ${c.name}<br>
${c.unit} × ${c.qty}<br>
${sum} جنيه
</div>`
}

/* FORM */
html+=`
<input class="input" placeholder="الاسم" id="name">
<input class="input" placeholder="الموبايل" id="phone">
<input class="input" placeholder="العنوان" id="address">
<input class="input" placeholder="النشاط" id="biz">

<div class="btn" onclick="send(${total})">إرسال الطلب</div>
`

app.innerHTML=html
}

/* ================== SEND ================== */

function send(total){
let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let address=document.getElementById("address").value

let msg="طلب:%0A"

for(let i in cart){
let c=cart[i]
msg+=`[${c.code}] ${c.name}%0A${c.qty} ${c.unit} = ${c.qty*c.price}%0A`
}

msg+=`%0A${total} جنيه%0A${name}%0A${phone}%0A${address}`

window.open("https://wa.me/201552670465?text="+msg)
}

/* ================== UTILS ================== */

function updateTotal(){
let t=0
for(let i in cart){
t+=cart[i].qty*cart[i].price
}
document.getElementById("totalBox").innerText=t+" جنيه"
}

function toast(){
let t=document.getElementById("toast")
t.style.display="block"
setTimeout(()=>t.style.display="none",1500)
}

function goBack(){
showBrands()
}

function toggleBack(show){
document.getElementById("backTop").style.display=show?"block":"none"
}

</script>

</body>
</html>
