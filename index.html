<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alahram Store</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{margin:0;font-family:Cairo;background:#f5f7fa}

/* HEADER */
.header{position:sticky;top:0;z-index:1000;background:#0B3D91;color:#fff}
.header img{width:100%;height:120px;object-fit:cover}
.title{text-align:center;padding:5px;font-weight:bold}

/* NEWS */
.news{background:#ff7a00;padding:6px;text-align:center}

/* TIERS */
.tiers{display:flex;gap:6px;padding:8px;overflow-x:auto;background:#fff}
.tier{padding:6px 12px;border-radius:20px;border:1px solid #ddd}
.tier.active{background:#0B3D91;color:#fff}

/* BACK */
.back{display:none;text-align:center;padding:6px;background:#fff;color:#0B3D91;font-weight:bold}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}

/* CARD */
.card{background:#fff;padding:10px;border-radius:10px;text-align:center}
.card img{width:100%;height:100px;object-fit:contain}

/* PRICE */
.price{color:#e53935;font-weight:bold}

/* QTY */
.qty{display:flex;justify-content:center;gap:5px;margin:5px}
.qty input{width:50px;text-align:center}
.qty button{padding:5px}

/* BTN */
.btn{background:#ff7a00;color:#fff;padding:8px;border-radius:8px;margin-top:5px}

/* FOOTER */
.footer{position:fixed;bottom:0;width:100%;background:#fff;display:flex;justify-content:space-between;padding:10px;border-top:1px solid #ddd}

/* INPUT */
.input{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:1px solid #ccc}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);
background:#2e7d32;color:#fff;padding:10px;border-radius:20px;display:none}
</style>
</head>

<body>

<div class="header">
<img id="headerImg">
<div class="title">الأهرام للتجارة والتوزيع</div>
<div class="news" id="news"></div>
<div class="tiers" id="tiers"></div>
<div class="back" id="backBtn" onclick="goBack()">⬅ اضغط للرجوع</div>
</div>

<div id="app"></div>

<div class="footer">
<div onclick="goBack()">⬅ رجوع</div>
<div id="totalBox">0 جنيه</div>
<div onclick="review()">🧾 مراجعة</div>
</div>

<div class="toast" id="toast">✔ تمت الإضافة</div>

<script>

const fix=u=>u+"&t="+Date.now();
const num=v=>parseFloat(v)||0;

let products=[],tiers=[],settings=[];
let cart=JSON.parse(localStorage.getItem("cart")||"{}");
let tier=JSON.parse(localStorage.getItem("tier")||"null");
let customer=JSON.parse(localStorage.getItem("customer")||"{}");

let current="brands",lastCompany=null;

/* LOAD */
function load(url){
return new Promise(res=>{
Papa.parse(fix(url),{download:true,header:true,complete:r=>res(r.data||[])});
});
}

Promise.all([
load("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=2123604928&output=csv"),
load("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=688371996&output=csv"),
load("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1922249138&output=csv")
]).then(([p,t,s])=>{

products=p.filter(x=>x.company && x.company.trim()!="" && x.status=="active");
tiers=t.filter(x=>x.tier_active=="1");
settings=s;

/* HEADER */
let img=settings.find(x=>x.type=="company_image")?.value;
document.getElementById("headerImg").src=img||"https://via.placeholder.com/600x200";

/* NEWS FIX */
let newsArr=settings.filter(x=>x.type=="news" && x.value).map(x=>x.value);
let i=0;
if(newsArr.length){
setInterval(()=>{
document.getElementById("news").innerText=newsArr[i];
i=(i+1)%newsArr.length;
},3000);
}

/* TIERS */
tiers.forEach(t=>{
let d=document.createElement("div");
d.className="tier";
d.innerText=t.tier_name;

d.onclick=()=>{
tier=t;
cart={};localStorage.setItem("cart","{}");
localStorage.setItem("tier",JSON.stringify(t));
showBrands();updateTotal();
};

document.getElementById("tiers").appendChild(d);
});

showBrands();
updateTotal();

});

/* BRANDS */
function showBrands(){
current="brands";
backBtn.style.display="none";

let brands=[...new Set(products.map(p=>p.company.trim()))];

app.innerHTML="<div class='grid'>";
brands.forEach(b=>{
if(tier && b=="صفقة اليوم")return;

let img=products.find(p=>p.company==b)?.brand_image || "https://via.placeholder.com/100";
app.innerHTML+=`<div class="card" onclick="showProducts('${b}')"><img src="${img}"><div>${b}</div></div>`;
});
app.innerHTML+="</div>";
}

/* PRODUCTS */
function showProducts(c){
current="products";
lastCompany=c;
backBtn.style.display="block";

app.innerHTML="<div class='grid'>";

products.filter(p=>p.company==c).forEach(p=>{

let units=["carton","dozen","piece"].filter(u=>num(p["price_"+u])>0);

app.innerHTML+=`
<div class="card">
<img src="${p.image}">
<div>${p.name}</div>
<div class="price" id="price_${p.code}">--</div>

<select id="u_${p.code}" onchange="enable('${p.code}')">
<option value="">اختر الوحدة</option>
${units.map(u=>`<option value="${u}">${u=="carton"?"كرتونة":u=="dozen"?"دستة":"قطعة"}</option>`).join("")}
</select>

<div class="qty">
<button id="m_${p.code}" disabled onclick="change('${p.code}',-1)">-</button>
<input id="q_${p.code}" disabled placeholder="0">
<button id="p_${p.code}" disabled onclick="change('${p.code}',1)">+</button>
</div>

<div class="btn" onclick="add('${p.code}')">🛒 أضف للسلة</div>
</div>
`;
});

app.innerHTML+="</div>";
}

/* ENABLE QTY */
function enable(code){
let u=document.getElementById("u_"+code).value;
let p=products.find(x=>x.code==code);

if(!u)return;

document.getElementById("q_"+code).disabled=false;
document.getElementById("m_"+code).disabled=false;
document.getElementById("p_"+code).disabled=false;

let price=num(p["price_"+u]);
document.getElementById("price_"+code).innerText=price+" جنيه";
}

/* QTY */
function change(code,val){
let el=document.getElementById("q_"+code);
let v=parseInt(el.value)||0;
v+=val;
if(v<1)v=1;
el.value=v;
}

/* ADD */
function add(code){
let p=products.find(x=>x.code==code);
if(!p)return alert("خطأ");

let unit=document.getElementById("u_"+code).value;
if(!unit)return alert("اختر الوحدة");

let qty=parseInt(document.getElementById("q_"+code).value)||1;
let price=num(p["price_"+unit]);

cart[code]={code,name:p.name,unit,qty,price};
localStorage.setItem("cart",JSON.stringify(cart));

toast();updateTotal();
}

/* TOAST */
function toast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1000);
}

/* TOTAL */
function updateTotal(){
let total=0;
Object.values(cart).forEach(c=>total+=c.qty*c.price);
totalBox.innerText=total+" جنيه";
}

/* REVIEW */
function review(){
current="review";
backBtn.style.display="block";

let html="",total=0;

Object.values(cart).forEach(c=>{
let s=c.qty*c.price; total+=s;
html+=`<div class="card">[${c.code}] ${c.name}<br>${c.qty} × ${c.unit}<br>${s}</div>`;
});

html+=`
<div class="card">
<input class="input" id="name" placeholder="الاسم" value="${customer.name||""}">
<input class="input" id="phone" placeholder="الموبايل" value="${customer.phone||""}">
<input class="input" id="address" placeholder="العنوان" value="${customer.address||""}">
<div class="btn" onclick="getLocation()">📍 تحديد الموقع</div>
<div id="loc"></div>
<div class="btn" onclick="send(${total})">إرسال</div>
</div>`;

app.innerHTML=html;
}

/* LOCATION */
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
let link=`https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
customer.location=link;
localStorage.setItem("customer",JSON.stringify(customer));
loc.innerText="✔ تم تحديد الموقع";
});
}

/* SEND */
function send(total){
let name=name.value,phone=phone.value,address=address.value;

let msg="طلب:%0A";
Object.values(cart).forEach(c=>{
msg+=`[${c.code}] ${c.name}%0A${c.qty} ${c.unit} = ${c.qty*c.price}%0A`;
});

msg+=`%0Aالإجمالي:${total}%0A${name}%0A${phone}%0A${address}`;

window.open("https://wa.me/201552670465?text="+msg);
}

/* BACK */
function goBack(){
if(current=="products")showBrands();
else if(current=="review")showProducts(lastCompany);
}

</script>

</body>
</html>
