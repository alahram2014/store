<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Joker 3.1</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:Cairo;margin:0;background:#F5F7FA}

/* HEADER */
.header{position:relative;height:180px}
.header img{width:100%;height:100%;object-fit:cover}
.overlay{position:absolute;inset:0;background:#0006}
.title{position:absolute;top:10px;right:10px;color:#fff}

/* NEWS */
.news{background:#E53935;color:#fff;padding:10px;text-align:center}

/* TIERS */
.tiers{display:flex;flex-wrap:wrap;gap:6px;padding:10px}
.tiers button{flex:1;padding:10px;border:none;border-radius:20px;background:#0B3D91;color:#fff}
.cancel{background:#000!important}

/* BANNER */
.banner{background:#FFD600;text-align:center;padding:8px;font-weight:bold}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}

/* CARD */
.card{background:#fff;padding:10px;border-radius:12px;text-align:center}
.card img{width:100%;height:110px;object-fit:contain}

/* PRICE */
.price{font-size:18px;font-weight:bold;color:#E53935}

/* BACK */
.back{background:#E53935;color:#fff;padding:10px;margin:10px;border-radius:10px;text-align:center}

/* INPUT */
select,input{width:100%;padding:8px;margin-top:5px;border-radius:8px}

/* FOOTER */
.footer{position:fixed;bottom:0;width:100%;background:#fff;padding:10px;display:flex;justify-content:space-between}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);
background:#2e7d32;color:#fff;padding:10px 20px;border-radius:20px;display:none}
</style>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<div class="header">
<img id="headerImg">
<div class="overlay"></div>
<div class="title">الأهرام للتجارة والتوزيع</div>
</div>

<div class="news" id="news"></div>
<div id="banner"></div>
<div class="tiers" id="tiers"></div>

<div id="app"></div>

<div class="footer">
<div onclick="showBrands()">⬅ رجوع</div>
<div onclick="review()">🧾 مراجعة</div>
</div>

<div class="toast" id="toast">✔ تم إضافة المنتج</div>

<script>

let products=[],tiers=[],settings=[];
let cart=JSON.parse(localStorage.getItem("cart")||"{}");
let tier=JSON.parse(localStorage.getItem("tier")||"null");

const clean=v=>(v||"").toString().trim();

/* 🔥 Anti Cache */
function url(u){
return u + "&t=" + Date.now();
}

/* LOAD */
function loadCSV(u){
return new Promise(r=>{
Papa.parse(url(u),{
download:true,
header:true,
skipEmptyLines:true,
complete:(res)=>r(res.data)
});
});
}

Promise.all([
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=2123604928&output=csv"),
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=688371996&output=csv"),
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1922249138&output=csv")
]).then(([p,t,s])=>{

products=p.filter(x=>clean(x.status)==="active");
tiers=t.filter(x=>clean(x.tier_active)==="1");
settings=s;

/* HEADER */
document.getElementById("headerImg").src=
settings.find(x=>clean(x.type)==="company_image")?.value||"";

/* NEWS */
let news=settings.filter(x=>clean(x.type)==="news").map(x=>x.value);
let i=0;
if(news.length){
setInterval(()=>{
document.getElementById("news").innerText=news[i];
i=(i+1)%news.length;
},3000);
}

/* TIERS */
loadTiers();

if(tier) applyTier();

showBrands();

});

/* TIERS */
function loadTiers(){
let c=document.getElementById("tiers");

tiers.forEach(t=>{
let b=document.createElement("button");
b.innerText=t.tier_name;
b.onclick=()=>changeTier(t);
c.appendChild(b);
});

let cancel=document.createElement("button");
cancel.innerText="إلغاء";
cancel.className="cancel";
cancel.onclick=()=>{
tier=null;
localStorage.removeItem("tier");
updateCartPrices();
applyTier();
};
c.appendChild(cancel);
}

function changeTier(t){
tier=t;
localStorage.setItem("tier",JSON.stringify(t));
applyTier();
updateCartPrices();
}

function applyTier(){
document.getElementById("banner").innerText=
tier?`أنت على شريحة ${tier.tier_name} (حد أدنى ${tier.tier_min})`:"";
}

/* PRICE */
function calc(base){
if(!tier) return base;
return base-(base*(tier.tier_discount/100));
}

/* UPDATE CART */
function updateCartPrices(){
for(let i in cart){
cart[i].final=calc(cart[i].base);
}
localStorage.setItem("cart",JSON.stringify(cart));
}

/* BRANDS */
function showBrands(){
let app=document.getElementById("app");
app.innerHTML="";

let brands=[...new Set(products.map(p=>p.company))];

brands.forEach(b=>{
let logo=products.find(p=>p.company==b)?.brand_image||"";
app.innerHTML+=`
<div class="card" onclick="showProducts('${b}')">
<img src="${logo}">
<h4>${b}</h4>
</div>`;
});
}

/* PRODUCTS */
function showProducts(company){
let app=document.getElementById("app");
app.innerHTML=`<div class="back" onclick="showBrands()">⬅ رجوع</div>`;

products.filter(p=>p.company==company).forEach(p=>{

let price=calc(+p.price_carton||0);

app.innerHTML+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<div class="price">${price} جنيه</div>

<select onchange="setUnit('${p.code}',this)">
<option disabled selected>اختر الوحدة</option>
<option value="carton">كرتونة</option>
<option value="dozen">دستة</option>
<option value="piece">قطعة</option>
</select>

<input type="number" placeholder="الكمية" disabled
onfocus="checkUnit('${p.code}')"
onchange="setQty('${p.code}',this.value)">
</div>`;
});
}

/* CART */
function setUnit(code,el){
if(!cart[code]) cart[code]={};
cart[code].unit=el.value;
el.nextElementSibling.disabled=false;
}

function checkUnit(code){
if(!cart[code]?.unit) alert("اختر الوحدة أولاً");
}

function setQty(code,qty){
let p=products.find(x=>x.code==code);
let base=+p["price_"+cart[code].unit]||0;

cart[code]={
...cart[code],
qty:+qty,
base,
final:calc(base),
name:p.name
};

localStorage.setItem("cart",JSON.stringify(cart));
toast();
}

/* REVIEW */
function review(){
let app=document.getElementById("app");
let total=0;

let html="<div class='back' onclick='showBrands()'>⬅ رجوع</div><h3>مراجعة الطلب</h3>";

for(let i in cart){
let c=cart[i];
let sum=c.final*c.qty;
total+=sum;

html+=`
<div class="card">
[${i}] ${c.name}<br>
${c.qty} × ${c.unit}<br>
${sum} جنيه
<input type="number" value="${c.qty}" onchange="setQty('${i}',this.value)">
</div>`;
}

/* شرط الشريحة */
if(tier && total < +tier.tier_min){
let diff = tier.tier_min - total;
html+=`<h3 style="color:red">أضف ${diff} جنيه لإكمال الشريحة</h3>`;
html+=`<button disabled>غير متاح الإرسال</button>`;
}else{
html+=`<button onclick="send(${total})">إرسال الطلب</button>`;
}

app.innerHTML=html;
}

/* SEND */
function send(total){
let msg="طلب:%0A";

for(let i in cart){
let c=cart[i];
msg+=`[${i}] ${c.name}%0A${c.qty} ${c.unit} = ${c.final*c.qty}%0A`;
}

msg+=`%0Aالإجمالي: ${total}`;

window.open("https://wa.me/201552670465?text="+msg);
}

/* TOAST */
function toast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

</script>

</body>
</html>
