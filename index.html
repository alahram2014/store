<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>الأهرام للتجارة والتوزيع</title>
<meta name="theme-color" content="#0B3D91" />
<link rel="manifest" href="./manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{
  --blue:#0B3D91;
  --blue2:#1852b6;
  --red:#E53935;
  --orange:#FF7A00;
  --gold:#b88a00;
  --gold2:#f5d67a;
  --gold3:#fff6cf;
  --gray:#7A8596;
  --bg:#F5F7FA;
  --card:#ffffff;
  --line:#e7e9ee;
  --text:#172233;
  --wood1:#6d4c2f;
  --wood2:#8b623f;
  --wood3:#c49a6c;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
}
a{color:inherit;text-decoration:none}
button,input,select,textarea{font-family:inherit}

.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:linear-gradient(180deg,#0B3D91,#09357c);
  color:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.hero{
  position:relative;
  height:176px;
  overflow:hidden;
  background:linear-gradient(135deg,#0B3D91,#0a2b66);
}
.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  image-rendering:auto;
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.58), rgba(0,0,0,.06));
}
.heroOverlay{
  position:absolute;
  top:12px;
  right:12px;
  z-index:2;
  display:flex;
  justify-content:flex-end;
  align-items:flex-start;
}
.heroTitle{
  font-weight:700;
  font-size:17px;
  color:#fff;
  background:rgba(255,255,255,.16);
  backdrop-filter:blur(10px);
  padding:10px 14px;
  border-radius:16px;
  text-shadow:0 1px 3px rgba(0,0,0,.36);
  box-shadow:0 6px 18px rgba(0,0,0,.14);
}

.news{
  background:var(--orange);
  color:#fff;
  padding:7px 10px;
  text-align:center;
  font-weight:700;
  font-size:13px;
  min-height:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1.35;
}

.topActions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:8px 10px 10px;
  background:rgba(255,255,255,.04);
}
.actionBtn{
  border:none;
  border-radius:14px;
  min-height:44px;
  font-family:inherit;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  color:#fff;
  box-shadow:0 8px 18px rgba(0,0,0,.12);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.actionBtn.tier{
  background:linear-gradient(135deg,#1b55be,#0B3D91);
}
.actionBtn.offer{
  background:linear-gradient(135deg,#c79b18,#f0d46c);
  color:#5a4300;
}
.actionBtn.active{
  outline:2px solid rgba(255,255,255,.55);
  outline-offset:1px;
}

.tiersWrap{
  display:none;
  background:#fff;
  border-bottom:1px solid var(--line);
  padding:8px 10px;
}
.tierBanner{
  display:none;
  padding:10px 12px;
  border-radius:12px;
  background:#eef4ff;
  color:#10306a;
  font-size:12px;
  line-height:1.55;
  box-shadow:0 4px 12px rgba(16,24,40,.06);
}
.tierBannerRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
.tierBannerAction{
  border:none;
  border-radius:10px;
  background:linear-gradient(180deg,#ff5e57,#e53935);
  color:#fff;
  padding:7px 10px;
  font-family:inherit;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
  font-size:12px;
}

.back{
  display:none;
  position:fixed;
  top:12px;
  right:12px;
  z-index:1500;
  background:linear-gradient(180deg,#ffffff,#eef4ff);
  color:var(--blue);
  padding:9px 12px;
  border:1px solid #c9d8f4;
  border-radius:999px;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(16,24,40,.12);
  user-select:none;
}

#app{
  padding:10px;
  padding-bottom:120px;
}

.searchBar{margin:0 0 10px 0}
.searchRow{
  display:grid;
  grid-template-columns:1fr 84px 56px;
  gap:8px;
}
.searchInput,.unitSelect,.qtyInput,.reviewQtyInput,.input{
  width:100%;
  height:42px;
  border-radius:10px;
  border:1px solid #d7dce5;
  padding:0 12px;
  font-family:inherit;
  font-size:14px;
  outline:none;
  background:#fff;
}
.searchBtn,.clearBtn,.mainBtn,.addBtn,.qtyBtn,.footerBtn,.smallBtn,.tierCardBtn,.quickContact,.miniDanger{
  border:none;
  border-radius:10px;
  font-family:inherit;
  font-weight:700;
  cursor:pointer;
}
.searchBtn,.clearBtn{
  color:#fff;
  height:42px;
}
.searchBtn{background:var(--blue)}
.clearBtn{background:#6b7280}
.searchHint{
  margin:0 0 10px 0;
  color:var(--blue);
  font-weight:700;
  text-align:center;
}
.sectionTitle{
  margin:12px 0 8px;
  font-weight:700;
  color:#39485f;
  font-size:13px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:8px;
  text-align:center;
  box-shadow:0 2px 10px rgba(16,24,40,.04);
  overflow:hidden;
}

.pageCard{
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  box-shadow:0 2px 10px rgba(16,24,40,.04);
  margin-bottom:10px;
}
.pageCard.blue{
  background:linear-gradient(180deg,#f4f8ff,#ffffff);
  border-color:#dce7ff;
}
.pageCard.gold{
  background:linear-gradient(180deg,#fff8df,#fffef7);
  border-color:#ead08a;
}
.pageCardTitle{
  font-weight:700;
  font-size:15px;
  margin-bottom:6px;
  color:#173a84;
}
.pageCardSub{
  font-size:13px;
  line-height:1.7;
  color:#435166;
}
.pageList{
  margin:8px 0 0;
  padding:0 18px 0 0;
}
.pageList li{
  margin:4px 0;
  line-height:1.6;
}

.homeHeroTip{
  background:#fff;
  border:1px dashed #d7dce5;
  border-radius:14px;
  padding:10px 12px;
  text-align:center;
  color:#4b5563;
  font-size:13px;
  margin-bottom:10px;
}

.contactDock{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin:0 0 10px;
}
.quickContact{
  min-height:44px;
  border-radius:14px;
  background:#fff;
  border:1px solid var(--line);
  box-shadow:0 4px 10px rgba(16,24,40,.06);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}
.quickContact.phone{color:#173a84}
.quickContact.wa{color:#1f8b4c}
.quickContact.fb{color:#0B3D91;font-weight:700}

.brandCard{
  min-height:118px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:6px;
}
.brandCard .brandImg{
  width:100%;
  height:66px;
  object-fit:contain;
}
.brandCard .brandName{
  font-weight:700;
  font-size:13px;
  line-height:1.3;
}

.productCard{
  min-height:260px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.productCard.inactive{opacity:.95}
.productCard.offerCard{
  background:linear-gradient(180deg,#fffdf0,#fff4c8);
  border-color:#e0c46c;
  box-shadow:0 8px 20px rgba(184,138,0,.12);
}
.productCard.offerCard .productName{
  color:#7a5a00;
}
.productImg{
  width:100%;
  height:88px;
  object-fit:contain;
  border-radius:10px;
  background:#f7f9fc;
}
.productName{
  font-weight:700;
  font-size:13px;
  line-height:1.32;
  min-height:34px;
}
.offerLabel{
  font-weight:700;
  font-size:12px;
  line-height:1.3;
  color:#8b6500;
  min-height:18px;
}
.stockBadge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:5px 9px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  margin:0 auto;
}
.stockBadge.active{background:#e8f5ee;color:#16824b}
.stockBadge.inactive{background:#fff0f0;color:#bf2c2c}
.cartonPrice{
  font-weight:700;
  font-size:12px;
  line-height:1.25;
  min-height:18px;
  color:var(--red);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.price{
  color:var(--red);
  font-weight:700;
  font-size:14px;
  min-height:22px;
}
.price.offer{color:#8b6500}
.price.wait{color:var(--gray);font-weight:700}
.unitSelect{
  height:36px;
  padding:0 10px;
  font-size:13px;
  color:#1f2a3a;
}
.qtyWrap{
  display:grid;
  grid-template-columns:34px 1fr 34px;
  gap:5px;
  align-items:center;
}
.qtyBtn{
  width:34px;
  height:34px;
  border:none;
  border-radius:10px;
  background:#e9edf3;
  color:#1f2a3a;
  font-size:18px;
  font-weight:700;
}
.qtyBtn:disabled,.unitSelect:disabled,.qtyInput:disabled,.addBtn:disabled{opacity:.55;cursor:not-allowed}
.qtyInput{text-align:center}
.addBtn{
  margin-top:auto;
  background:linear-gradient(135deg,var(--orange),#ff9a3a);
  color:#fff;
  padding:10px 12px;
  min-height:40px;
}
.addBtn.offer{
  background:linear-gradient(135deg,#c59a14,#f4d76b);
  color:#5a4300;
}

.tiersGrid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
}
.tierCard{
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:10px;
  box-shadow:0 2px 10px rgba(16,24,40,.04);
  text-align:right;
}
.tierCard.active{
  border-color:#0B3D91;
  box-shadow:0 10px 22px rgba(11,61,145,.14);
}
.tierCard.locked{
  background:linear-gradient(180deg,#fbfcff,#f3f7ff);
}
.tierCardName{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  font-weight:700;
  font-size:14px;
  margin-bottom:6px;
  color:#173a84;
}
.tierBadge{
  font-size:11px;
  font-weight:700;
  border-radius:999px;
  padding:4px 8px;
  background:#eef4ff;
  color:#10306a;
}
.tierCardMeta{
  font-size:12px;
  line-height:1.7;
  color:#435166;
}
.tierCardBtn{
  width:100%;
  min-height:38px;
  margin-top:10px;
  background:linear-gradient(135deg,#0B3D91,#1852b6);
  color:#fff;
}
.tierCardBtn.locked{
  background:linear-gradient(135deg,#7a5a00,#c59a14);
  color:#fff;
}

.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  z-index:1000;
  background:#fff;
  border-top:1px solid var(--line);
  display:grid;
  grid-template-columns:92px 1fr 108px;
  align-items:center;
  gap:8px;
  padding:10px;
  box-shadow:0 -2px 10px rgba(0,0,0,.04);
}
.footerBtn{
  text-align:center;
  font-weight:700;
  color:#1f2a3a;
  cursor:pointer;
  user-select:none;
  min-height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  background:#eff3f8;
  font-size:15px;
}
.footerBtn.primary{
  background:linear-gradient(135deg,#1f8b4c,#2da35d);
  color:#fff;
}
.footerTotal{
  text-align:center;
  font-weight:700;
  color:var(--blue);
  font-size:15px;
}

.toast{
  position:fixed;
  top:18px;
  left:50%;
  transform:translateX(-50%);
  z-index:2000;
  min-width:180px;
  max-width:90vw;
  background:#1f8b4c;
  color:#fff;
  padding:10px 14px;
  border-radius:999px;
  text-align:center;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
  display:none;
  font-size:14px;
}
.toast.error{background:#c0392b}
.toast.info{background:#0B3D91}

.reviewWrap{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.reviewSummary,.reviewItem,.formCard,.emptyState{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
}
.reviewSummary{
  padding:12px;
  line-height:1.8;
}
.reviewSummaryTop{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px;
}
.reviewItem{
  padding:10px;
  line-height:1.7;
}
.reviewItemTop{
  font-weight:700;
}
.reviewControls{
  display:grid;
  grid-template-columns:34px 1fr 34px;
  gap:5px;
  align-items:center;
  margin-top:8px;
}
.reviewQtyInput{text-align:center}
.reviewAction{
  margin-top:8px;
  text-align:center;
  color:var(--red);
  font-weight:700;
  cursor:pointer;
  user-select:none;
}
.formCard{
  padding:12px;
}
.input{margin-bottom:8px}
.input:focus,.unitSelect:focus,.qtyInput:focus,.reviewQtyInput:focus,.searchInput:focus{
  border-color:#8fb0e6;
  box-shadow:0 0 0 3px rgba(11,61,145,.08);
}
.mainBtn{
  width:100%;
  border:none;
  border-radius:12px;
  min-height:46px;
  font-family:inherit;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}
.mainBtn.primary{
  background:linear-gradient(135deg,var(--orange),#ff9a3a);
  color:#fff;
}
.mainBtn.secondary{
  background:#eff3f8;
  color:#1f2a3a;
}
.smallBtn{
  min-height:38px;
  padding:0 12px;
  background:#f0f4fb;
  color:#173a84;
  border:1px solid #d9e6ff;
}
.miniDanger{
  min-height:36px;
  padding:0 12px;
  background:linear-gradient(135deg,#ff6d66,#e53935);
  color:#fff;
  border:none;
  font-size:13px;
}
.locationStatus{
  margin-top:6px;
  font-size:13px;
  color:var(--gray);
  min-height:20px;
}
.emptyState{
  padding:20px;
  text-align:center;
  color:var(--gray);
}
.designSignature{
  margin:10px 0 0;
  background:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  text-align:center;
  padding:8px 10px;
  color:#4b5563;
  font-size:12px;
  font-weight:700;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.hidden{display:none!important}

body.compact .hero{display:none}
body.compact .news{font-size:12px;min-height:28px;padding:6px 8px}
body.compact .topActions{padding:6px 8px 8px}
body.compact .back{top:10px;right:10px;padding:8px 11px;font-size:13px}
body.compact #app{padding-top:8px}
body.compact .actionBtn{min-height:40px;font-size:13px}
body.compact .tiersWrap{padding:6px 8px}
body.offerPage{
  background:linear-gradient(180deg,#f7ecd0,#f7f1dc 35%,#f4f0e3);
}
body.offerPage .header{
  background:linear-gradient(180deg,#8b6500,#5a4300);
}
body.offerPage .actionBtn.offer{
  outline:2px solid rgba(255,255,255,.4);
}
body.tierPage{
  background:linear-gradient(180deg,#eef4ff,#f9fbff 45%,#f4f8ff);
}
body.tierPage .header{
  background:linear-gradient(180deg,#0B3D91,#0a2b66);
}
body.offerPage .offerNotice{
  background:linear-gradient(180deg,#fff8db,#fff0ab);
  color:#715500;
  border-color:#e6cf7e;
}
body.offerPage .productCard.offerCard{
  background:linear-gradient(180deg,#fffef7,#fff4c8);
}
body.offerPage .card,
body.offerPage .pageCard{
  border-color:#ead08a;
}
body.tierPage .pageCard.blue{
  background:linear-gradient(180deg,#f2f6ff,#ffffff);
}
body.tierPage .tierCardBtn{
  background:linear-gradient(135deg,#0B3D91,#1852b6);
}
body.offerPage .tierCardBtn{
  background:linear-gradient(135deg,#c79b18,#f0d46c);
  color:#5a4300;
}
@media (min-width: 700px){
  .grid,.tiersGrid{grid-template-columns:repeat(3,minmax(0,1fr))}
  .topActions{grid-template-columns:repeat(2,minmax(0,240px));justify-content:center}
  .topActions{justify-items:center}
}
</style>
</head>
<body>
<div class="header">
  <div class="hero">
    <img id="headerImg" alt="company header" fetchpriority="high" loading="eager">
    <div class="heroOverlay">
      <div class="heroTitle">الأهرام للتجارة والتوزيع</div>
    </div>
  </div>

  <div class="news" id="news"></div>

  <div class="topActions">
    <button class="actionBtn tier" id="tierActionBtn" onclick="openTiersPage()">🧾 الشرائح</button>
    <button class="actionBtn offer" id="offerActionBtn" onclick="openOffersPage()">🔥 صفقة اليوم</button>
  </div>

  <div class="tiersWrap" id="tiersWrap">
    <div class="tierBanner" id="tierBanner"></div>
  </div>

  <div class="back" id="backBtn" onclick="goBack()">↩ رجوع</div>
</div>

<div id="app">
  <div class="emptyState">جارٍ التحميل...</div>
</div>

<div class="footer">
  <div class="footerBtn" id="footerBack" onclick="goBack()">رجوع</div>
  <div class="footerTotal" id="totalBox">0 جنيه</div>
  <div class="footerBtn primary" id="footerPrimary" onclick="openReview()">إتمام الشراء</div>
</div>

<div class="toast" id="toastBox"></div>

<script>
/* =========================
   URLs / Storage / Globals
========================= */
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbwaWPLXheiziFzHZAgW8yBPoFvJqOfsLR8dDnYwZJWGdw46HSnbWqxJHbq6WpN519cz/exec";

const URLS = {
  products: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=2123604928&output=csv",
  tiers:    "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=688371996&output=csv",
  settings:  "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1922249138&output=csv"
};

const PLACEHOLDERS = {
  header: "https://via.placeholder.com/1200x500/f5f7fa/0B3D91?text=Alahram+Store",
  brand: (name) => `https://via.placeholder.com/400x250/f5f7fa/0B3D91?text=${encodeURIComponent(name || "Brand")}`,
  product: (name) => `https://via.placeholder.com/400x250/f7f9fc/0B3D91?text=${encodeURIComponent(name || "Product")}`
};

const UNIT_NAMES = { carton:"كرتونة", dozen:"دستة", piece:"قطعة", offer:"عرض" };
const LS = {
  cart: "alahram_cart_v9",
  tier: "alahram_tier_v9",
  customer: "alahram_customer_v9",
  drafts: "alahram_drafts_v9",
  unlocks: "alahram_tier_unlocks_v9",
  analytics: "alahram_events_v9",
  latestOrder: "alahram_latest_order_v9"
};

const el = {
  headerImg: document.getElementById("headerImg"),
  news: document.getElementById("news"),
  tiersWrap: document.getElementById("tiersWrap"),
  tierBanner: document.getElementById("tierBanner"),
  backBtn: document.getElementById("backBtn"),
  app: document.getElementById("app"),
  totalBox: document.getElementById("totalBox"),
  toastBox: document.getElementById("toastBox"),
  footerPrimary: document.getElementById("footerPrimary"),
  footerBack: document.getElementById("footerBack"),
  tierActionBtn: document.getElementById("tierActionBtn"),
  offerActionBtn: document.getElementById("offerActionBtn")
};

const clean = (v) => (v ?? "").toString().trim();
const toNum = (v) => {
  const n = parseFloat(v);
  return Number.isFinite(n) ? n : 0;
};
const escapeAttr = (v) => String(v)
  .replaceAll("&","&amp;")

function stripDiacritics(str) {
  return clean(str).normalize("NFKD").replace(/[\u064B-\u065F\u0670\u0640]/g, "");
}
function normalizeLoose(str) {
  return stripDiacritics(str)
    .toLowerCase()
    .replace(/[أإآ]/g,"ا")
    .replace(/ى/g,"ي")
    .replace(/ؤ/g,"و")
    .replace(/ئ/g,"ي")
    .replace(/ة/g,"ه")
    .replace(/[^\w\u0600-\u06FF ]+/g," ")
    .replace(/\s+/g," ")
    .trim();
}
function normalizeCompact(str) {
  return normalizeLoose(str).replace(/\s+/g,"");
}
function formatMoney(n) {

function getOriginalPrice(p, unit) {
  const map = {
    carton: ["price_carton","carton_price","سعر الكرتونة","سعر الكرتونه","سعر كرتونة","سعر كرتونه"],
    dozen:  ["price_dozen","dozen_price","سعر الدستة","سعر الدسته","سعر دستة","سعر دسته"],
    piece:  ["price_piece","piece_price","سعر القطعة","سعر القطعه","سعر قطعة","سعر قطعه"],
    offer:  ["price_offer","offer_price","priceعرض","سعر العرض","سعر العرض الخاص"]
  };
  for (const key of (map[unit] || [])) {
    if (p[key] !== undefined && p[key] !== null && clean(p[key]) !== "") return toNum(p[key]);
  }
  return 0;
}
function getDiscountedPrice(base) {
  const d = selectedTier ? toNum(selectedTier.tier_discount) : 0;
  if (!selectedTier || d <= 0) return toNum(base);
  return Math.max(0, toNum(base) - (toNum(base) * d / 100));
}
function isAddableToCart(p) {
  const raw = p.allow_cart ?? p.add_to_cart ?? p.can_add_to_cart ?? p.orderable ?? p.can_order ?? p.buyable ?? p.purchasable ?? p.cartable ?? p.allow_order;
  if (raw === undefined || raw === null || clean(raw) === "") return true;
  const s = normalizeLoose(raw).replace(/\s+/g, "");
  const falseList = ["0","false","no","n","لا","غيرمتاح","ممنوع","disabled","off","inactive","غيرمسموح"];
  const trueList  = ["1","true","yes","y","نعم","متاح","مسموح","allow","allowed","available","active","فعال","ok","on"];
  if (falseList.includes(s)) return false;
  if (trueList.includes(s)) return true;
  if (raw === 0 || raw === "0") return false;
  if (raw === 1 || raw === "1") return true;
  return true;
}

function buildProductSearchScore(p, raw) {
  const qLoose = normalizeLoose(raw);
  const q = normalizeCompact(raw);
  if (!q) return 0;

  const code = getProductCode(p);
  const name = getDisplayName(p);
  const company = getCompany(p);

  const nameC = normalizeCompact(name);
  const codeC = normalizeCompact(code);
  const companyC = normalizeCompact(company);
  const all = [
    nameC,
    codeC,
    companyC,
    normalizeCompact(String(getOriginalPrice(p, "carton"))),
    normalizeCompact(String(getOriginalPrice(p, "dozen"))),
    normalizeCompact(String(getOriginalPrice(p, "piece"))),
    normalizeCompact(String(getOriginalPrice(p, "offer"))),
    normalizeCompact(getOfferLabel(p))
  ].join(" ");

  let score = 0;
  if (nameC === q || codeC === q) score += 1500;
  if (nameC.startsWith(q)) score += 1200;
  if (codeC.startsWith(q)) score += 1100;
  if (companyC.startsWith(q)) score += 800;
  if (nameC.includes(q)) score += 700;
  if (codeC.includes(q)) score += 550;
  if (companyC.includes(q)) score += 300;
  if (all.includes(q)) score += 150;

  const tokens = qLoose.split(" ").filter(Boolean);
  if (tokens.length > 1) {
    let allFound = true;
    let points = 0;
    for (const tok of tokens) {
      const t = normalizeCompact(tok);
      const hitName = nameC.includes(t);
      const hitCode = codeC.includes(t);
      const hitCompany = companyC.includes(t);
      if (!hitName && !hitCode && !hitCompany) {
        allFound = false;
        break;
      }
      if (nameC.startsWith(t)) points += 50;
      else if (nameC.includes(t)) points += 25;
      else if (companyC.includes(t)) points += 10;
    }
    if (allFound) score += 250 + points;
  }
  return score;
}
function sortSearchResults(list, raw) {
  return list
    .map(p => ({ p, score: buildProductSearchScore(p, raw) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score || clean(a.p.name).localeCompare(clean(b.p.name), "ar"))
    .map(x => x.p);
}

function findProductByKey(uiKey) {

  return products.find((p, i) => {
    return getProductKey(p) === key || clean(p.__uiKey) === key || clean(p.codo) === key || clean(p.code) === key || clean(p.CODO) === key || clean(p.CODE) === key;
  });
}
function selectUnit(uiKey, unit, silent = false) {
  const product = findProductByKey(uiKey);
  if (!product) return;
  if (isOfferProduct(product)) return;
  if (!isAddableToCart(product)) return;

  const u = clean(unit);
  drafts[uiKey] = drafts[uiKey] || {};
  drafts[uiKey].unit = u;
  persistAll();

  const base = getOriginalPrice(product, u || "carton");
  const priceEl = document.getElementById(`price_${uiKey}`);
  if (priceEl) {
    const shown = selectedTier ? getDiscountedPrice(base) : base;
    priceEl.innerHTML = `${formatMoney(shown)} جنيه`;
    priceEl.classList.remove("wait");
  }

  if (!silent) notify(`تم اختيار ${UNIT_NAMES[u] || "الوحدة"}`, "info");
}
function draftQty(uiKey, value) {
  const cleaned = clean(value).replace(/[^\d]/g, "");
  drafts[uiKey] = drafts[uiKey] || {};
  drafts[uiKey].qty = cleaned === "" ? "" : parseInt(cleaned, 10);
  persistAll();
}
function changeQty(uiKey, delta) {
  const input = document.getElementById(`qty_${uiKey}`);
  if (!input) return;
  let current = parseInt(clean(input.value), 10);
  if (!Number.isFinite(current) || current <= 0) current = 1;
  current += delta;
  if (current < 1) current = 1;
  input.value = String(current);
  draftQty(uiKey, input.value);
}
function addToCart(uiKey) {
  const product = findProductByKey(uiKey);
  if (!product) {
    notify("خطأ في المنتج", "error");
    return;
  }
  if (!isAddableToCart(product)) {
    notify("هذا الصنف غير جاهز للإضافة للسلة", "error");
    return;
  }

  const offerMode = isOfferProduct(product);
  const unit = offerMode ? "offer" : clean(drafts[uiKey]?.unit || document.getElementById(`unit_${uiKey}`)?.value);
  if (!offerMode && !unit) {
    notify("اختر الوحدة أولاً", "error");
    return;
  }

  let qty = clean(drafts[uiKey]?.qty || document.getElementById(`qty_${uiKey}`)?.value);
  qty = qty === "" ? 1 : parseInt(qty, 10);
  if (!Number.isFinite(qty) || qty <= 0) qty = 1;

  const basePrice = getOriginalPrice(product, unit);
  if (!basePrice) {
    notify("سعر هذا الصنف غير جاهز للشراء", "error");
    return;
  }

  cart[clean(uiKey)] = {
    uiKey: clean(uiKey),
    code: getProductCode(product),
    name: getDisplayName(product),
    company: clean(product.company),
    unit,
    qty,
    price: basePrice,
    basePrice
  };

  persistAll();
  updateFooterTotal();
  notify("تمت الإضافة للسلة", "ok");
  logEvent("add_to_cart", {
    code: getProductCode(product),
    name: getDisplayName(product),
    company: clean(product.company),
    unit,
    qty
  });
}

function postOrderToSheet(payload) {
  const body = JSON.stringify(payload);

  try {
    if (navigator.sendBeacon) {
      const blob = new Blob([body], { type: "text/plain;charset=UTF-8" });
      if (navigator.sendBeacon(SHEETS_URL, blob)) return Promise.resolve(true);
    }
  } catch (_) {}

  return fetch(SHEETS_URL, {
    method: "POST",
    mode: "no-cors",
    body
  }).then(() => true).catch(() => false);
}

  if (selectedTier && !isTierSatisfied()) {
    notify("لم تصل للحد الأدنى للشريحة", "error");
    return;
  }

  customer = {
    name, phone, business, address, location, invoiceNumber
  };
  persistAll();

  const payload = buildOrderPayload();
  saveJSON(LS.latestOrder, payload);
  logEvent("order_prepare", { order_id: payload.order_id, total: payload.total, items_count: payload.items_count });

  postOrderToSheet(payload);
  const msg = buildWhatsAppMessage(payload);

  const waUrl = `https://wa.me/201040880002?text=${encodeURIComponent(msg)}`;
  window.open(waUrl, "_blank");

  notify("تم تجهيز الطلب وإرساله", "ok");

}
