<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>الأهرام للتجارة والتوزيع</title>
<meta name="theme-color" content="#8a5a00" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{
  --gold:#c79b18;
  --gold-2:#f0d46c;
  --gold-3:#fff4cc;
  --ink:#2b2416;
  --navy:#173a84;
  --cream:#fffdf4;
  --card:#ffffff;
  --line:#ead08a;
  --muted:#6b7280;
  --danger:#c0392b;
  --ok:#1f8b4c;
  --shadow:0 10px 24px rgba(120,86,0,.12);
  --shadow-soft:0 4px 14px rgba(0,0,0,.06);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:linear-gradient(180deg,#fffaf0 0%,#fff7df 40%,#fffdf6 100%);
  color:var(--ink);
  -webkit-tap-highlight-color:transparent;
}
a{color:inherit;text-decoration:none}
button,input,select{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
#app{padding:10px 10px 126px}
.header{
  position:sticky;top:0;z-index:1000;
  background:linear-gradient(180deg,#6d4c2f,#4e381f);
  color:#fff;
  box-shadow:0 2px 14px rgba(0,0,0,.14);
}
.hero{
  position:relative;height:182px;overflow:hidden;
  background:linear-gradient(135deg,#7a5a00,#4e381f);
}
.hero img{width:100%;height:100%;object-fit:cover;display:block}
.hero::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.58),rgba(0,0,0,.08));
}
.heroOverlay{
  position:absolute;inset:12px 12px auto 12px;z-index:2;
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.heroTitle{
  font-weight:800;font-size:17px;line-height:1.25;
  color:#fff;background:rgba(255,255,255,.18);
  padding:10px 14px;border-radius:16px;
  backdrop-filter:blur(10px);
  box-shadow:0 8px 20px rgba(0,0,0,.12);
}
.repChip{
  border:none;border-radius:999px;
  min-width:42px;min-height:42px;
  padding:0 14px;
  background:rgba(255,244,204,.95);
  color:#6a4a00;
  font-weight:800;
  box-shadow:0 8px 16px rgba(0,0,0,.12);
}
.repChip.active{
  background:linear-gradient(135deg,var(--gold),var(--gold-2));
  color:#fff;
}
.news{
  background:linear-gradient(135deg,var(--gold),var(--gold-2));
  color:#fff;padding:8px 10px;
  text-align:center;font-weight:800;font-size:13px;line-height:1.5;
  min-height:32px;display:flex;align-items:center;justify-content:center;
}
.topActions{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  padding:10px;
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,0));
}
.actionBtn{
  border:none;border-radius:16px;min-height:46px;
  font-weight:800;font-size:15px;color:#fff;
  box-shadow:0 10px 20px rgba(0,0,0,.10);
}
.actionBtn.tier{background:linear-gradient(135deg,#d8b34b,#8a5a00)}
.actionBtn.offer{background:linear-gradient(135deg,#8a5a00,#c79b18)}
.actionBtn.active{outline:2px solid rgba(255,255,255,.6);outline-offset:1px}
.banner{
  margin:0 0 10px;
  background:linear-gradient(135deg,#fff8df,#fffdf6);
  border:1px solid #e6cc7a;
  border-radius:18px;
  box-shadow:var(--shadow-soft);
  padding:12px;
}
.bannerTitle{font-weight:800;color:#7a5a00;font-size:15px;margin-bottom:4px}
.bannerText{color:#556170;font-size:13px;line-height:1.7}
.bannerRow{display:flex;align-items:center;justify-content:space-between;gap:10px}
.bannerPill{
  border:none;border-radius:999px;
  min-height:36px;padding:0 12px;
  background:linear-gradient(135deg,#7a5a00,#c79b18);
  color:#fff;font-weight:800;
  white-space:nowrap;
}
.searchBar{
  margin:0 0 10px;
  background:#fff;border:1px solid #ead8a5;border-radius:16px;
  box-shadow:var(--shadow-soft);
  padding:8px;
}
.searchRow{display:grid;grid-template-columns:1fr 92px;gap:8px}
.searchInput,.unitSelect,.qtyInput,.reviewQtyInput,.input{
  width:100%;height:44px;
  border:1px solid #e2dfd5;border-radius:12px;
  padding:0 12px;
  outline:none;background:#fff;
  font-size:14px;
}
.searchBtn,.mainBtn,.addBtn,.qtyBtn,.footerBtn,.smallBtn,.tierCardBtn,.miniDanger,.repAction,.brandChip{
  border:none;border-radius:12px;font-weight:800;
}
.searchBtn{height:44px;background:linear-gradient(135deg,#7a5a00,#c79b18);color:#fff}
.searchBtn:active,.mainBtn:active,.addBtn:active,.tierCardBtn:active,.footerBtn:active{transform:scale(.99)}
.sectionTitle{margin:12px 0 8px;font-size:14px;font-weight:800;color:#7a5a00}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.card,.pageCard,.reviewSummary,.reviewItem,.formCard,.emptyState,.tierCard{
  background:#fff;border:1px solid #ead8a5;border-radius:18px;
  box-shadow:var(--shadow-soft);
}
.card{padding:8px;text-align:center;overflow:hidden}
.pageCard{padding:12px;margin-bottom:10px}
.pageCardTitle{font-size:15px;font-weight:800;color:#7a5a00;margin-bottom:4px}
.pageCardSub{font-size:13px;line-height:1.7;color:#56616f}
.pageList{margin:8px 0 0;padding:0 18px 0 0}
.pageList li{margin:4px 0;line-height:1.6}
.contactDock{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 0 10px}
.quickContact{
  min-height:44px;background:#fff;border:1px solid #ead8a5;border-radius:14px;
  box-shadow:var(--shadow-soft);display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:800;
}
.quickContact.phone{color:#173a84}.quickContact.wa{color:#1f8b4c}.quickContact.fb{color:#0b3d91}
.brandCard{min-height:118px;display:flex;flex-direction:column;justify-content:center;gap:6px}
.brandImg{width:100%;height:68px;object-fit:contain;border-radius:10px;background:#fbfbf7}
.brandName{font-size:13px;font-weight:800;line-height:1.3;color:#5a4300}
.productCard{min-height:260px;display:flex;flex-direction:column;gap:6px}
.productCard.offerCard{background:linear-gradient(180deg,#fffef2,#fff5cf)}
.productImg{width:100%;height:92px;object-fit:contain;border-radius:10px;background:#f7f9fc}
.productName{font-weight:800;font-size:13px;line-height:1.35;min-height:36px}
.offerLabel{font-weight:700;font-size:12px;line-height:1.3;color:#8b6500;min-height:18px}
.priceWrap{display:flex;flex-direction:column;gap:2px;align-items:center;justify-content:center;min-height:42px}
.price{color:#b12d28;font-weight:800;font-size:14px;line-height:1.2}
.priceOld{font-size:12px;color:#7b8490;text-decoration:line-through}
.priceNew{font-size:14px;color:#7a5a00;font-weight:800}
.priceTag{display:inline-block;margin-top:2px;padding:2px 8px;border-radius:999px;background:linear-gradient(135deg,#ffd85c,#c79b18);color:#fff;font-size:11px;font-weight:800}
.stockBadge{display:inline-flex;align-items:center;justify-content:center;padding:5px 9px;border-radius:999px;font-size:11px;font-weight:800;margin:0 auto}
.stockBadge.active{background:#e8f5ee;color:#16824b}
.stockBadge.inactive{background:#fff0f0;color:#bf2c2c}
.unitSelect{height:36px;padding:0 10px;font-size:13px}
.qtyWrap{display:grid;grid-template-columns:36px 1fr 36px;gap:6px;align-items:center}
.qtyBtn{width:36px;height:36px;background:#edf1f7;color:#1f2a3a;font-size:18px}
.qtyInput,.reviewQtyInput{text-align:center}
.addBtn{
  margin-top:auto;min-height:42px;
  background:linear-gradient(135deg,#d8b34b,#8a5a00);
  color:#fff;padding:10px 12px;
}
.addBtn.offer{background:linear-gradient(135deg,#8a5a00,#c79b18)}
.tierPageActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 12px}
.vipLaunchBtn{
  min-height:42px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#d8b34b,#8a5a00);
  color:#fff;font-weight:800;
}
.tiersGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.tierCard{padding:10px;text-align:right}
.tierCard.active{border-color:#7a5a00;box-shadow:0 10px 20px rgba(122,90,0,.14)}
.tierCard.locked{background:linear-gradient(180deg,#fffdf6,#fff8ea)}
.tierCardName{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:14px;font-weight:800;color:#7a5a00;margin-bottom:6px}
.tierBadge{font-size:11px;font-weight:800;border-radius:999px;padding:4px 8px;background:#fff4cc;color:#7a5a00}
.tierCardMeta{font-size:12px;line-height:1.7;color:#55616f}
.tierCardDesc{font-size:12px;line-height:1.7;color:#5b6676;margin-top:6px}
.tierCardBtn{width:100%;min-height:40px;margin-top:10px;background:linear-gradient(135deg,#7a5a00,#c79b18);color:#fff}
.tierCardBtn.locked{background:linear-gradient(135deg,#9c7a19,#d8b34b)}
.footer{
  position:fixed;bottom:0;left:0;right:0;z-index:1000;
  background:#fff;border-top:1px solid #ead8a5;
  display:grid;grid-template-columns:94px 1fr 112px;gap:8px;
  padding:10px;box-shadow:0 -4px 14px rgba(0,0,0,.04);
}
.footerBtn{
  min-height:46px;display:flex;align-items:center;justify-content:center;
  background:#f4efe2;color:#7a5a00;box-shadow:var(--shadow-soft);
  font-size:15px;
}
.footerBtn.primary{background:linear-gradient(135deg,#d8b34b,#8a5a00);color:#fff}
.footerTotal{display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#7a5a00}
.toast{
  position:fixed;top:18px;left:50%;transform:translateX(-50%);
  z-index:2000;min-width:180px;max-width:90vw;
  background:#1f8b4c;color:#fff;padding:10px 14px;border-radius:999px;
  text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.18);display:none;font-size:14px;
}
.toast.error{background:var(--danger)} .toast.info{background:#7a5a00}
.reviewWrap{display:flex;flex-direction:column;gap:10px}
.reviewSummary{padding:12px;line-height:1.8}
.reviewSummaryTop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.reviewItem{padding:10px;line-height:1.7}
.reviewItemTop{font-weight:800}
.reviewControls{display:grid;grid-template-columns:36px 1fr 36px;gap:6px;align-items:center;margin-top:8px}
.reviewAction{margin-top:8px;text-align:center;color:var(--danger);font-weight:800;cursor:pointer}
.formCard{padding:12px}
.input{margin-bottom:8px}
.input:focus,.searchInput:focus,.unitSelect:focus,.qtyInput:focus,.reviewQtyInput:focus{border-color:#c79b18;box-shadow:0 0 0 3px rgba(199,155,24,.12)}
.mainBtn{
  width:100%;min-height:46px;font-size:16px;color:#fff;
  background:linear-gradient(135deg,#d8b34b,#8a5a00);
}
.mainBtn.secondary{background:#f4efe2;color:#7a5a00}
.mainBtn.disabled{opacity:.45;cursor:not-allowed}
.smallBtn{min-height:38px;padding:0 12px;background:#f4efe2;color:#7a5a00;border:1px solid #ead8a5}
.miniDanger{min-height:36px;padding:0 12px;background:linear-gradient(135deg,#ff6d66,#c0392b);color:#fff}
.locationStatus{margin-top:6px;font-size:13px;color:var(--muted);min-height:20px}
.emptyState{padding:20px;text-align:center;color:var(--muted)}
.noticeCard{background:#fffdf6;border-color:#ead8a5}
.badgeRow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 10px;border-radius:999px;
  background:#fff4cc;color:#7a5a00;font-weight:800;font-size:12px;
  border:1px solid #ead08a;
}
body.compact .hero{display:none}
body.compact #app{padding-top:8px}
body.compact .topActions{padding-top:6px}
body.compact .actionBtn{min-height:42px;font-size:14px}
body.compact .news{font-size:12px;min-height:28px;padding:6px 8px}
body.offerMode{background:linear-gradient(180deg,#fff8dd,#fffdf6 40%,#fffaf0)}
body.offerMode .header{background:linear-gradient(180deg,#8a5a00,#c79b18)}
body.offerMode .actionBtn.offer{outline:2px solid rgba(255,255,255,.4)}
body.tierMode .header{background:linear-gradient(180deg,#6d4c2f,#4e381f)}
body.goldTheme .header{background:linear-gradient(180deg,#8a5a00,#c79b18)}
body.goldTheme .actionBtn.tier{background:linear-gradient(135deg,#d8b34b,#8a5a00)}
body.goldTheme .footerBtn.primary,.mainBtn.primary,.vipLaunchBtn,.tierCardBtn,.addBtn{
  background:linear-gradient(135deg,#d8b34b,#8a5a00);
}
body.goldTheme .pageCard,body.goldTheme .card{border-color:#ead08a}
@media (min-width:700px){
  .grid,.tiersGrid{grid-template-columns:repeat(3,minmax(0,1fr))}
  .topActions{grid-template-columns:repeat(2,minmax(0,240px));justify-content:center}
}
.modal{
  position:fixed;inset:0;z-index:3000;background:rgba(18,14,8,.44);
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.modalBox{
  width:min(420px,100%);
  background:#fff;border:1px solid #ead08a;border-radius:22px;
  overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.24);
}
.modalHead{
  background:linear-gradient(180deg,#6d4c2f,#4e381f);color:#fff;
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
}
.modalHeadTitle{font-size:18px;font-weight:800}
.modalClose{
  width:42px;height:42px;border:none;border-radius:12px;background:#fff;color:#4e381f;font-size:18px;font-weight:800;
}
.modalBody{padding:14px 16px 16px;background:#fffdf6}
.modalGrid{display:grid;gap:8px}
.modalNote{display:none}
.repSummary{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:10px 12px;border-radius:14px;background:#fff4cc;color:#7a5a00;
  border:1px solid #ead08a;font-weight:800;margin-top:8px;
}
.repLogout{
  border:none;border-radius:12px;min-height:34px;padding:0 10px;
  background:#fff;color:#7a5a00;border:1px solid #ead08a;font-weight:800;
}
</style>
</head>
<body class="goldTheme">
<div class="header">
  <div class="hero">
    <img id="headerImg" alt="company header" loading="eager">
    <div class="heroOverlay">
      <button class="repChip" id="repChip" onclick="openRepModal()" title="حساب المندوب">👔</button>
      <div class="heroTitle">الأهرام للتجارة والتوزيع</div>
    </div>
  </div>
  <div class="news" id="news">جارٍ التحميل...</div>
  <div class="topActions">
    <button class="actionBtn tier" id="tierBtn" onclick="openTiersPage()">💰 شرائح الجملة VIP</button>
    <button class="actionBtn offer" id="offerBtn" onclick="openOffersPage()">🔥 صفقة اليوم</button>
  </div>
</div>

<div id="app"><div class="emptyState">جارٍ التحميل...</div></div>

<div class="footer">
  <div class="footerBtn" id="footerBack" onclick="goBack()">رجوع</div>
  <div class="footerTotal" id="totalBox">0 جنيه</div>
  <div class="footerBtn primary" id="footerPrimary" onclick="openReview()">إتمام الشراء</div>
</div>

<div class="toast" id="toastBox"></div>

<div class="modal hidden" id="repModal" aria-hidden="true">
  <div class="modalBox">
    <div class="modalHead">
      <div class="modalHeadTitle" id="repModalTitle">حساب المندوب</div>
      <button class="modalClose" onclick="closeRepModal()">×</button>
    </div>
    <div class="modalBody" id="repModalBody"></div>
  </div>
</div>

<script>
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbyo8bxUpKK4UKGQgZZHmDfR9kDvEmsuLYSTIRltjWsUEX23jOrk1xGnnCf9YW_NLL4eHw/exec";
const CSV_URLS = {
  products: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1503749054&single=true&output=csv",
  tiers: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1417829941&single=true&output=csv",
  settings: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=47255050&single=true&output=csv",
  reps: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1117843076&single=true&output=csv"
};
const LS = {
  cart: "alahram_cart_v5",
  view: "alahram_view_v5",
  tier: "alahram_selected_tier_v5",
  rep: "alahram_selected_rep_v5",
  customer: "alahram_customer_v5",
  drafts: "alahram_drafts_v5",
  homeSearch: "alahram_home_search_v5",
  productSearch: "alahram_product_search_v5"
};
const UNIT_LABELS = { carton:"كرتونة", dozen:"دستة", piece:"قطعة" };
const el = {
  app: document.getElementById("app"),
  totalBox: document.getElementById("totalBox"),
  footerBack: document.getElementById("footerBack"),
  footerPrimary: document.getElementById("footerPrimary"),
  toastBox: document.getElementById("toastBox"),
  headerImg: document.getElementById("headerImg"),
  news: document.getElementById("news"),
  tierBtn: document.getElementById("tierBtn"),
  offerBtn: document.getElementById("offerBtn"),
  repChip: document.getElementById("repChip"),
  repModal: document.getElementById("repModal"),
  repModalTitle: document.getElementById("repModalTitle"),
  repModalBody: document.getElementById("repModalBody")
};

const clean = v => (v ?? "").toString().trim();
const toNum = v => {
  const raw = clean(v).replace(/[٬،\s]/g, "").replace(/,/g, "");
  const n = parseFloat(raw);
  return Number.isFinite(n) ? n : 0;
};
const nf = new Intl.NumberFormat('ar-EG');
const money = n => nf.format(Math.round(toNum(n)));
const saveJSON = (k,v) => localStorage.setItem(k, JSON.stringify(v));
const loadJSON = (k,f) => { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : f; } catch { return f; } };
const normalize = s => clean(s).normalize("NFKD")
  .replace(/[\u064B-\u065F\u0670\u0640]/g,"")
  .replace(/[أإآ]/g,"ا").replace(/ى/g,"ي").replace(/ؤ/g,"و").replace(/ئ/g,"ي").replace(/ة/g,"ه")
  .toLowerCase().replace(/[^\w\u0600-\u06FF ]+/g," ").replace(/\s+/g," ").trim();
const compact = s => normalize(s).replace(/\s+/g,"");

let products = [], tiers = [], settings = [], reps = [];
let cart = loadJSON(LS.cart, {});
let selectedTierId = loadJSON(LS.tier, "");
let selectedRepId = loadJSON(LS.rep, "");
let customer = loadJSON(LS.customer, { name:"", phone:"", business:"", address:"", location:"" });
let drafts = loadJSON(LS.drafts, {});
let view = loadJSON(LS.view, "home");
let homeSearch = loadJSON(LS.homeSearch, "");
let productSearch = loadJSON(LS.productSearch, "");
let searchTimer = null;
let currentCompany = "";
let historyStack = [];
let navLock = false;

function persist() {
  saveJSON(LS.cart, cart);
  saveJSON(LS.tier, selectedTierId);
  saveJSON(LS.rep, selectedRepId);
  saveJSON(LS.customer, customer);
  saveJSON(LS.drafts, drafts);
  saveJSON(LS.view, view);
  saveJSON(LS.homeSearch, homeSearch);
  saveJSON(LS.productSearch, productSearch);
}
function notify(msg, kind="ok") {
  el.toastBox.textContent = msg;
  el.toastBox.className = `toast ${kind}`;
  el.toastBox.style.display = "block";
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => el.toastBox.style.display = "none", 1800);
}
function csvLoad(url) {
  return new Promise(resolve => {
    Papa.parse(`${url}${url.includes("?") ? "&" : "?"}t=${Date.now()}`, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: res => resolve((res.data || []).filter(r => Object.values(r || {}).some(v => clean(v) !== "")))
    });
  });
}
function getSetting(key) {
  const k = normalize(key);
  const row = settings.find(r => normalize(r.type) === k || normalize(r.key) === k);
  return clean(row?.value);
}
function getHeaderImage() {
  return getSetting("company_image") || getSetting("header") || "";
}
function isActive(row) {
  const s = normalize(row?.status);
  const a = clean(row?.active || row?.tier_active || row?.is_active || "1");
  return !s || s === "active" || s === "فعال" || a === "1" || a === "yes" || a === "true";
}
function getProductName(p) {

function productScore(p, qRaw) {
  const q = compact(qRaw);
  if (!q) return 0;
  const name = compact(getProductName(p));
  const code = compact(getCode(p));
  const company = compact(getCompany(p));
  let score = 0;
  if (name === q || code === q) score += 2000;
  if (name.startsWith(q)) score += 1200;
  if (code.startsWith(q)) score += 1100;
  if (company.startsWith(q)) score += 700;
  if (name.includes(q)) score += 600;
  if (code.includes(q)) score += 500;
  if (company.includes(q)) score += 300;
  if (compact(String(getActivePrice(p,"carton").price)).includes(q)) score += 80;
  return score;
}

  } catch (_) {}
  try {

    }
  } catch (e) {
    el.app.innerHTML = `<div class="emptyState">تعذر تحميل البيانات. راجع روابط الشيت أو الاتصال.</div>`;
  }
}
bindModalCloseOnBackdrop();
document.addEventListener("input", (e) => {
  if (e.target && e.target.id === "custName" || e.target?.id === "custPhone" || e.target?.id === "custBusiness" || e.target?.id === "custAddress") {
    syncCustomerForm();
  }
});
document.addEventListener("click", (e) => {
  const brand = e.target.closest?.(".brandCard");
  if (brand && view === "home") {
    openProductsPage(clean(brand.getAttribute("data-brand")));
  }
});
window.addEventListener("beforeunload", persist);
boot();
</script>
</body>
</html>
