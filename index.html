<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الأهرام للتجارة والتوزيع</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{font-family:Cairo;margin:0;background:#f5f7fa}

/* HEADER */
.header{
height:180px;
background:#0B3D91;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
}

/* NEWS */
.news{
background:#e53935;
color:#fff;
padding:10px;
text-align:center;
font-weight:bold;
}

/* TIERS */
.tiers{
display:flex;
gap:8px;
padding:10px;
overflow-x:auto;
}
.tier{
background:#fff;
padding:8px 12px;
border-radius:20px;
border:1px solid #ddd;
white-space:nowrap;
}
.tier.active{
background:#0B3D91;
color:#fff;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:10px;
}

/* CARD */
.card{
background:#fff;
padding:12px;
border-radius:14px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}
.card img{
width:100%;
height:110px;
object-fit:contain;
}

/* PRICE */
.price{
color:#e53935;
font-weight:bold;
font-size:16px;
}

/* BUTTON */
.btn{
background:#0B3D91;
color:#fff;
padding:8px;
border-radius:8px;
margin-top:6px;
}

/* FOOTER */
.footer{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-between;
padding:10px;
border-top:1px solid #ddd;
}

/* TOAST */
.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#2e7d32;
color:#fff;
padding:10px;
border-radius:20px;
display:none;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

<div class="header">الأهرام للتجارة والتوزيع</div>

<div class="news" id="news"></div>

<div class="tiers" id="tiers"></div>

<div id="app"></div>

<div class="footer">
<div onclick="showBrands()">⬅ رجوع</div>
<div id="totalBox">0 جنيه</div>
<div onclick="review()">🧾 مراجعة</div>
</div>

<div class="toast" id="toast">تمت الإضافة</div>

<script>

/* CACHE FIX */
function fix(u){return u+"&t="+Date.now()}

/* LOAD */
function loadCSV(url){
return new Promise(r=>{
Papa.parse(fix(url),{download:true,header:true,complete:(res)=>r(res.data)});
});
}

let products=[],tiers=[],settings=[];
let cart={},tier=null;

Promise.all([
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=2123604928&output=csv"),
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=688371996&output=csv"),
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1922249138&output=csv")
]).then(([p,t,s])=>{

products=p.filter(x=>(x.status||"").trim()=="active");
tiers=t.filter(x=>x.tier_active=="1");
settings=s;

/* NEWS FIX (تقسيم) */
let rawNews=settings.filter(x=>x.type=="news").map(x=>x.value).join("،");
let newsList=rawNews.split("،").filter(x=>x.trim()!="");

let i=0;
if(newsList.length){
setInterval(()=>{
document.getElementById("news").innerText=newsList[i];
i=(i+1)%newsList.length;
},3000);
}

/* TIERS */
let box=document.getElementById("tiers");
tiers.forEach(t=>{
let div=document.createElement("div");
div.className="tier";
div.innerText=t.tier_name;

div.onclick=()=>{
tier=t;
document.querySelectorAll(".tier").forEach(x=>x.classList.remove("active"));
div.classList.add("active");
};

box.appendChild(div);
});

showBrands();

});

/* BRANDS */
function showBrands(){
let app=document.getElementById("app");
app.innerHTML="<div class='grid'>";

let brands=[...new Set(products.map(p=>p.company))];

brands.forEach(b=>{
let logo=products.find(p=>p.company==b)?.brand_image||"";
app.innerHTML+=`
<div class="card" onclick="showProducts('${b}')">
<img src="${logo}">
<h4>${b}</h4>
</div>`;
});

app.innerHTML+="</div>";
}

/* PRODUCTS */
function showProducts(company){
let app=document.getElementById("app");
app.innerHTML="<div class='grid'>";

products.filter(p=>p.company==company).forEach(p=>{

let units="";
["carton","dozen","piece"].forEach(u=>{
if(p["price_"+u]>0){
units+=`<option value="${u}">${u}</option>`;
}
});

app.innerHTML+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<div class="price">${p.price_carton} جنيه</div>

<select onchange="setUnit('${p.code}',this)">
<option disabled selected>الوحدة</option>
${units}
</select>

<input type="number" placeholder="الكمية"
onchange="addCart('${p.code}',this.value)">
</div>`;
});

app.innerHTML+="</div>";
}

/* CART */
function setUnit(code,el){
if(!cart[code]) cart[code]={};
cart[code].unit=el.value;
}

function addCart(code,qty){
let p=products.find(x=>x.code==code);
let unit=cart[code]?.unit;
if(!unit) return alert("اختر الوحدة");

let price=p["price_"+unit];

cart[code]={code,name:p.name,qty:+qty,unit,price};

toast();
updateTotal();
}

/* TOAST */
function toast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}

/* TOTAL */
function updateTotal(){
let total=0;
for(let i in cart){
total+=cart[i].qty*cart[i].price;
}
document.getElementById("totalBox").innerText=total+" جنيه";
}

/* REVIEW + WHATSAPP */
function review(){
let total=0;
let msg="طلب جديد:%0A";

for(let i in cart){
let c=cart[i];
let sum=c.qty*c.price;
total+=sum;

msg+=`[${c.code}] ${c.name}%0A${c.qty} ${c.unit} × ${c.price} = ${sum}%0A`;
}

if(tier && total < tier.tier_min){
alert("لم تحقق الحد الأدنى للشريحة");
return;
}

msg+=`%0Aالإجمالي: ${total}`;

window.open("https://wa.me/201552670465?text="+msg);
}

</script>

</body>
</html>
