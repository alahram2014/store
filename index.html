<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>الأهرام للتجارة والتوزيع</title>
<meta name="theme-color" content="#0B3D91" />
<link rel="manifest" href="./manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{--blue:#0B3D91;--blue2:#1852b6;--red:#E53935;--orange:#FF7A00;--gold:#c79b18;--gold2:#f0d46c;--gray:#7A8596;--bg:#F5F7FA;--card:#fff;--line:#e7e9ee;--text:#172233}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
a{color:inherit;text-decoration:none}
button,input,select{font-family:inherit}
.header{position:sticky;top:0;z-index:1000;background:linear-gradient(180deg,#0B3D91,#09357c);color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.hero{position:relative;height:176px;overflow:hidden;background:linear-gradient(135deg,#0B3D91,#0a2b66)}
.hero img{width:100%;height:100%;object-fit:cover;display:block}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.58),rgba(0,0,0,.06))}
.heroOverlay{position:absolute;top:12px;right:12px;z-index:2;display:flex;justify-content:flex-end;align-items:flex-start}
.heroTitle{font-weight:700;font-size:17px;color:#fff;background:rgba(255,255,255,.16);backdrop-filter:blur(10px);padding:10px 14px;border-radius:16px;text-shadow:0 1px 3px rgba(0,0,0,.36);box-shadow:0 6px 18px rgba(0,0,0,.14)}
.news{background:var(--orange);color:#fff;padding:7px 10px;text-align:center;font-weight:700;font-size:13px;min-height:30px;display:flex;align-items:center;justify-content:center;line-height:1.35}
.topActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 10px 10px;background:rgba(255,255,255,.04)}
.actionBtn{border:none;border-radius:14px;min-height:44px;font-size:14px;font-weight:700;cursor:pointer;color:#fff;box-shadow:0 8px 18px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;gap:6px}
.actionBtn.tier{background:linear-gradient(135deg,#1fb7a9,#0f8f83);color:#fff;border:1px solid rgba(255,255,255,.28);box-shadow:0 10px 22px rgba(15,143,131,.22)}
.actionBtn.offer{background:linear-gradient(135deg,#c79b18,#f0d46c);color:#5a4300}
.actionBtn.active{outline:2px solid rgba(255,255,255,.55);outline-offset:1px}
.back{display:none;position:fixed;top:12px;right:12px;z-index:1500;background:linear-gradient(135deg,#ffffff,#dbeafe);color:#0a2f75;padding:10px 14px;border:1px solid #8fb0e6;border-radius:999px;font-weight:800;cursor:pointer;box-shadow:0 10px 24px rgba(11,61,145,.22);user-select:none;letter-spacing:.1px}
#app{padding:10px;padding-bottom:120px}
.searchBar{margin:0 0 10px 0}.searchRow{display:grid;grid-template-columns:1fr 84px 56px;gap:8px}
.searchInput,.unitSelect,.qtyInput,.reviewQtyInput,.input{width:100%;height:42px;border-radius:10px;border:1px solid #d7dce5;padding:0 12px;font-size:14px;outline:none;background:#fff}
.searchBtn,.clearBtn,.mainBtn,.addBtn,.qtyBtn,.footerBtn,.smallBtn,.tierCardBtn,.quickContact,.miniDanger{border:none;border-radius:10px;font-weight:700;cursor:pointer}
.searchBtn,.clearBtn{color:#fff;height:42px}.searchBtn{background:var(--blue)}.clearBtn{background:#6b7280}
.searchHint{margin:0 0 10px 0;color:var(--blue);font-weight:700;text-align:center}
.sectionTitle{margin:12px 0 8px;font-weight:700;color:#39485f;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px;text-align:center;box-shadow:0 2px 10px rgba(16,24,40,.04);overflow:hidden}
.pageCard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:0 2px 10px rgba(16,24,40,.04);margin-bottom:10px}
.pageCard.blue{background:linear-gradient(180deg,#f4f8ff,#ffffff);border-color:#dce7ff}
.pageCard.gold{background:linear-gradient(180deg,#fff8df,#fffef7);border-color:#ead08a}
.pageCardTitle{font-weight:700;font-size:15px;margin-bottom:6px;color:#173a84}
.pageCardSub{font-size:13px;line-height:1.7;color:#435166}
.pageList{margin:8px 0 0;padding:0 18px 0 0}.pageList li{margin:4px 0;line-height:1.6}
.contactDock{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 0 10px}
.quickContact{min-height:44px;border-radius:14px;background:#fff;border:1px solid var(--line);box-shadow:0 4px 10px rgba(16,24,40,.06);display:flex;align-items:center;justify-content:center;font-size:18px}
.quickContact.phone{color:#173a84}.quickContact.wa{color:#1f8b4c}.quickContact.fb{color:#0B3D91;font-weight:700}
.quickContact svg{width:20px;height:20px;display:block;flex:0 0 auto}
.quickContact .waSvg{width:22px;height:22px}
.tierPageActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 12px}
.vipLaunchBtn{min-height:40px;border:none;border-radius:12px;background:linear-gradient(135deg,#ffd85c,#c79b18);color:#5a4300;font-family:inherit;font-weight:800;cursor:pointer;box-shadow:0 8px 18px rgba(184,138,0,.18)}
.vipPage{background:linear-gradient(180deg,#2f2416 0%, #f5ecd5 12%, #fbf4e2 44%, #f4ead0 100%)}
.vipPage .header{background:linear-gradient(180deg,#6d4c2f,#4e381f)}
.vipPage .pageCard,.vipPage .card{border-color:#e1c777;box-shadow:0 8px 20px rgba(184,138,0,.10)}
.vipPage .brandCard{background:linear-gradient(180deg,#fffef8,#fff7de);border-color:#e7cf87}
.vipPage .brandCard .brandName{color:#5a4300}
.vipPage .pageCard.blue{background:linear-gradient(180deg,#fffaf0,#ffffff);border-color:#e7cf87}
.vipPage .footer{background:#fff8ea}

.brandCard{min-height:118px;display:flex;flex-direction:column;justify-content:center;gap:6px}
.brandCard .brandImg{width:100%;height:66px;object-fit:contain}
.brandCard .brandName{font-weight:700;font-size:13px;line-height:1.3}
.productCard{min-height:260px;display:flex;flex-direction:column;gap:6px}
.productCard.offerCard{background:linear-gradient(180deg,#fffdf0,#fff4c8);border-color:#e0c46c;box-shadow:0 8px 20px rgba(184,138,0,.12)}
.productImg{width:100%;height:88px;object-fit:contain;border-radius:10px;background:#f7f9fc}
.productName{font-weight:700;font-size:13px;line-height:1.32;min-height:34px}
.offerLabel{font-weight:700;font-size:12px;line-height:1.3;color:#8b6500;min-height:18px}
.stockBadge{display:inline-flex;align-items:center;justify-content:center;padding:5px 9px;border-radius:999px;font-size:11px;font-weight:700;margin:0 auto}
.stockBadge.active{background:#e8f5ee;color:#16824b}.stockBadge.inactive{background:#fff0f0;color:#bf2c2c}
.cartonPrice{font-weight:700;font-size:12px;line-height:1.25;min-height:18px;color:var(--red);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.price{color:var(--red);font-weight:700;font-size:14px;min-height:22px}.price.offer{color:#8b6500}
.unitSelect{height:36px;padding:0 10px;font-size:13px;color:#1f2a3a}
.qtyWrap{display:grid;grid-template-columns:34px 1fr 34px;gap:5px;align-items:center}
.qtyBtn{width:34px;height:34px;border:none;border-radius:10px;background:#e9edf3;color:#1f2a3a;font-size:18px;font-weight:700}
.qtyBtn:disabled,.unitSelect:disabled,.qtyInput:disabled,.addBtn:disabled{opacity:.55;cursor:not-allowed}.qtyInput{text-align:center}
.addBtn{margin-top:auto;background:linear-gradient(135deg,var(--orange),#ff9a3a);color:#fff;padding:10px 12px;min-height:40px}
.addBtn.offer{background:linear-gradient(135deg,#c79b18,#f0d46c);color:#5a4300}
.tiersGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.tierCard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;box-shadow:0 2px 10px rgba(16,24,40,.04);text-align:right}
.tierCard.active{border-color:#0B3D91;box-shadow:0 10px 22px rgba(11,61,145,.14)}
.tierCard.locked{background:linear-gradient(180deg,#fbfcff,#f3f7ff)}
.tierCardName{display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:700;font-size:14px;margin-bottom:6px;color:#173a84}
.tierBadge{font-size:11px;font-weight:700;border-radius:999px;padding:4px 8px;background:#eef4ff;color:#10306a}
.tierCardMeta{font-size:12px;line-height:1.7;color:#435166}
.tierCardBtn{width:100%;min-height:38px;margin-top:10px;background:linear-gradient(135deg,#0B3D91,#1852b6);color:#fff}
.tierCardBtn.locked{background:linear-gradient(135deg,#7a5a00,#c59a14);color:#fff}
.footer{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:92px 1fr 108px;align-items:center;gap:8px;padding:10px;box-shadow:0 -2px 10px rgba(0,0,0,.04)}
.footerBtn{text-align:center;font-weight:700;color:#1f2a3a;cursor:pointer;user-select:none;min-height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:#eff3f8;font-size:15px}
.footerBtn.primary{background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff}
.footerTotal{text-align:center;font-weight:700;color:var(--blue);font-size:15px}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:2000;min-width:180px;max-width:90vw;background:#1f8b4c;color:#fff;padding:10px 14px;border-radius:999px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.18);display:none;font-size:14px}.toast.error{background:#c0392b}.toast.info{background:#0B3D91}
.reviewWrap{display:flex;flex-direction:column;gap:10px}.reviewSummary,.reviewItem,.formCard,.emptyState{background:#fff;border:1px solid var(--line);border-radius:14px}.reviewSummary{padding:12px;line-height:1.8}
.reviewSummaryTop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}.reviewItem{padding:10px;line-height:1.7}.reviewItemTop{font-weight:700}
.reviewControls{display:grid;grid-template-columns:34px 1fr 34px;gap:5px;align-items:center;margin-top:8px}.reviewQtyInput{text-align:center}.reviewAction{margin-top:8px;text-align:center;color:var(--red);font-weight:700;cursor:pointer;user-select:none}
.formCard{padding:12px}.input{margin-bottom:8px}.input:focus,.unitSelect:focus,.qtyInput:focus,.reviewQtyInput:focus,.searchInput:focus{border-color:#8fb0e6;box-shadow:0 0 0 3px rgba(11,61,145,.08)}
.mainBtn{width:100%;border:none;border-radius:12px;min-height:46px;font-size:16px;font-weight:700;cursor:pointer}.mainBtn.primary{background:linear-gradient(135deg,var(--orange),#ff9a3a);color:#fff}.mainBtn.secondary{background:#eff3f8;color:#1f2a3a}
.smallBtn{min-height:38px;padding:0 12px;background:#f0f4fb;color:#173a84;border:1px solid #d9e6ff}.miniDanger{min-height:36px;padding:0 12px;background:linear-gradient(135deg,#ff6d66,#e53935);color:#fff;border:none;font-size:13px}
.locationStatus{margin-top:6px;font-size:13px;color:var(--gray);min-height:20px}.emptyState{padding:20px;text-align:center;color:var(--gray)}
.designSignature{margin:10px 0 0;background:#fff;border:1px solid var(--line);border-radius:12px;text-align:center;padding:8px 10px;color:#4b5563;font-size:12px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.hidden{display:none!important}
body.compact .hero{display:none}body.compact .news{font-size:12px;min-height:28px;padding:6px 8px}body.compact .topActions{padding:6px 8px 8px}body.compact .back{top:10px;right:10px;padding:8px 11px;font-size:13px}body.compact #app{padding-top:8px}body.compact .actionBtn{min-height:40px;font-size:13px}
body.offerPage{background:linear-gradient(180deg,#f7ecd0,#f7f1dc 35%,#f4f0e3)}body.offerPage .header{background:linear-gradient(180deg,#8b6500,#5a4300)}body.offerPage .actionBtn.offer{outline:2px solid rgba(255,255,255,.4)}body.offerPage .productCard.offerCard{background:linear-gradient(180deg,#fffef7,#fff4c8)}body.offerPage .card,body.offerPage .pageCard{border-color:#ead08a}
body.tierPage{background:linear-gradient(180deg,#eef4ff,#f9fbff 45%,#f4f8ff)}body.tierPage .header{background:linear-gradient(180deg,#0B3D91,#0a2b66)}body.tierPage .pageCard.blue{background:linear-gradient(180deg,#f2f6ff,#ffffff)}
@media (min-width:700px){.grid,.tiersGrid{grid-template-columns:repeat(3,minmax(0,1fr))}.topActions{grid-template-columns:repeat(2,minmax(0,240px));justify-content:center}.topActions{justify-items:center}}
</style>
</head>
<body>
<div class="header">
  <div class="hero">
    <img id="headerImg" alt="company header" fetchpriority="high" loading="eager">
    <div class="heroOverlay"><div class="heroTitle">الأهرام للتجارة والتوزيع</div></div>
  </div>
  <div class="news" id="news"></div>
  <div class="topActions">
    <button class="actionBtn tier" id="tierActionBtn" onclick="openTiersPage()">💰 شرائح الجملة VIP</button>
    <button class="actionBtn offer" id="offerActionBtn" onclick="openOffersPage()">🔥 صفقة اليوم</button>
  </div>
  <div class="back" id="backBtn" onclick="goBack()">↩ رجوع</div>
</div>
<div id="app"><div class="emptyState">جارٍ التحميل...</div></div>
<div class="footer">
  <div class="footerBtn" id="footerBack" onclick="goBack()">رجوع</div>
  <div class="footerTotal" id="totalBox">0 جنيه</div>
  <div class="footerBtn primary" id="footerPrimary" onclick="openReview()">إتمام الشراء</div>
</div>
<div class="toast" id="toastBox"></div>
<script>
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbwaWPLXheiziFzHZAgW8yBPoFvJqOfsLR8dDnYwZJWGdw46HSnbWqxJHbq6WpN519cz/exec";
const URLS = {
  products: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1503749054&output=csv",
  tiers: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1417829941&output=csv",
  settings: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=47255050&output=csv"
};
const PLACEHOLDERS = { header:"https://via.placeholder.com/1200x500/f5f7fa/0B3D91?text=Alahram+Store", brand:n=>`https://via.placeholder.com/400x250/f5f7fa/0B3D91?text=${encodeURIComponent(n||"Brand")}`, product:n=>`https://via.placeholder.com/400x250/f7f9fc/0B3D91?text=${encodeURIComponent(n||"Product")}` };
const UNIT_NAMES = { carton:"كرتونة", dozen:"دستة", piece:"قطعة", offer:"عرض" };
const LS = { cart:"alahram_cart_v10", tier:"alahram_tier_v10", customer:"alahram_customer_v10", drafts:"alahram_drafts_v10", unlocks:"alahram_tier_unlocks_v10", analytics:"alahram_events_v10", latestOrder:"alahram_latest_order_v10" };
const el = { headerImg:document.getElementById("headerImg"), news:document.getElementById("news"), backBtn:document.getElementById("backBtn"), app:document.getElementById("app"), totalBox:document.getElementById("totalBox"), toastBox:document.getElementById("toastBox"), footerPrimary:document.getElementById("footerPrimary"), footerBack:document.getElementById("footerBack"), tierActionBtn:document.getElementById("tierActionBtn"), offerActionBtn:document.getElementById("offerActionBtn") };
const clean = v => (v ?? "").toString().trim();
const toNum = v => {
  const raw = clean(v).replace(/[٬،\s]/g, "");
  if (!raw) return 0;
  const normalized = raw.includes(",") && !raw.includes(".")
    ? raw.replace(",", ".")
    : raw.replace(/,/g, "");
  const n = parseFloat(normalized);
  return Number.isFinite(n) ? n : 0;
};
const saveJSON = (k,v) => localStorage.setItem(k, JSON.stringify(v));
const loadJSON = (k,f) => { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : f; } catch { return f; } };
const stripDiacritics = s => clean(s).normalize("NFKD").replace(/[\u064B-\u065F\u0670\u0640]/g, "");
const normalizeLoose = s => stripDiacritics(s).toLowerCase().replace(/[أإآ]/g,"ا").replace(/ى/g,"ي").replace(/ؤ/g,"و").replace(/ئ/g,"ي").replace(/ة/g,"ه").replace(/[^\w\u0600-\u06FF ]+/g," ").replace(/\s+/g," ").trim();
const normalizeCompact = s => normalizeLoose(s).replace(/\s+/g, "");
const escapeHtml = v => String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"','&quot;');
const escapeAttr = escapeHtml;
const formatMoney = n => Math.round(toNum(n)).toLocaleString("en-US");
const formatPercent = n => {
  const value = toNum(n);
  return Number.isInteger(value) ? String(value) : String(value);
};

let products = [], tiersData = [], settings = [];
let cart = loadJSON(LS.cart, {}), selectedTier = loadJSON(LS.tier, null), customer = loadJSON(LS.customer, {}), drafts = loadJSON(LS.drafts, {}), unlockedTiers = loadJSON(LS.unlocks, {}), analytics = loadJSON(LS.analytics, []);
let currentPage = "home", lastCompany = null, reviewReturn = { type:"home", value:null }, searchQuery = "", searchTimer = null, brandPageStyle = "standard", brandReturnTarget = "home";

function persistAll(){ saveJSON(LS.cart, cart); saveJSON(LS.tier, selectedTier); saveJSON(LS.customer, customer); saveJSON(LS.drafts, drafts); saveJSON(LS.unlocks, unlockedTiers); saveJSON(LS.analytics, analytics.slice(-500)); }
function logEvent(type, data = {}){ analytics.push({ type, time:Date.now(), page:currentPage, ...data }); if(analytics.length > 500) analytics = analytics.slice(-500); saveJSON(LS.analytics, analytics); }
function notify(message, kind = "ok"){ el.toastBox.textContent = message; el.toastBox.className = `toast ${kind}`; el.toastBox.style.display = "block"; clearTimeout(window.__toastTimer); window.__toastTimer = setTimeout(()=>el.toastBox.style.display = "none", 1400); }
function loadCSV(url){ return new Promise(resolve => Papa.parse(`${url}&t=${Date.now()}`, { download:true, header:true, skipEmptyLines:true, complete:res => resolve(res.data || []) })); }
function applyBrandStyle(){ document.body.classList.toggle("vipPage", brandPageStyle === "vip"); }
function setMode(page){ currentPage = page; document.body.className = document.body.className.replace(/\bhomeMode\b|\btierPage\b|\bofferPage\b|\bvipPage\b|\bpurchaseMode\b|\bcompact\b/g, "").trim(); if(page !== "home") document.body.classList.add("compact"); if(page === "tiers") document.body.classList.add("tierPage"); if(page === "offers") document.body.classList.add("offerPage"); applyBrandStyle(); }
function scrollTop(){ window.scrollTo({ top:0, behavior:"auto" }); }
function syncFooter(){ el.footerPrimary.textContent = currentPage === "review" ? "إرسال الطلب" : "إتمام الشراء"; el.footerPrimary.onclick = currentPage === "review" ? sendOrder : openReview; }
function updateFooterTotal(){ el.totalBox.textContent = `${formatMoney(getPayableTotal())} جنيه`; }
function renderPageCard(title, subtitle, tone="blue", extra=""){ return `<div class="pageCard ${tone}"><div class="pageCardTitle">${escapeHtml(title)}</div><div class="pageCardSub">${escapeHtml(subtitle || "")}</div>${extra}</div>`; }
function renderTextBlock(text){ const lines = clean(text).split(/\n|،|;/g).map(s=>clean(s)).filter(Boolean); return lines.length ? `<ul class="pageList">${lines.map(x=>`<li>${escapeHtml(x)}</li>`).join("")}</ul>` : ""; }
function getSettingText(keys=[]){ const out = settings.filter(row => { const hay = normalizeLoose([row.type,row.key,row.name,row.title].filter(Boolean).join(" ")); return keys.some(k => hay.includes(normalizeLoose(k))); }).map(row => clean(row.value)).filter(Boolean); return out.join("\n"); }
function splitSettingsTypes(keys=[]){ return getSettingText(keys); }
function getProductCode(p){ return clean(p.codo || p.code || p.CODO || p.CODE || p.product_code || p.productCode || p.sku || ""); }
function getCompany(p){ return clean(p.company || p.company_name || p.brand || ""); }
function isOfferProduct(p){ return getCompany(p) === "صفقة اليوم"; }
function isActiveProduct(p){ const s = clean(p.status).toLowerCase(); return s === "active" || s === "فعال" || s === "1" || s === "yes" || s === "true"; }
function getOfferLabel(p){ return clean(p.offer_label || p.offer_name || p.offer || ""); }
function getDisplayName(p){ return clean(p.name || p.product_name || p.item_name || p.item || p.title) || getOfferLabel(p) || "صنف"; }
function getProductKey(p){ return clean(p.id || p.product_id || p.sku || `${getProductCode(p)}_${getDisplayName(p)}_${getCompany(p)}`) || `${getDisplayName(p)}_${getCompany(p)}`; }

  function promptTierUnlock(t) {
    const secret = window.prompt(`أدخل الرقم السري للشريحة: ${clean(t?.visible_label || t?.tier_name || "")}`);
    if (secret === null) return;
    if (clean(secret) === tierPassword(t)) {
      const key = clean(t?.tier_name || t?.tier_id || t?.id || "");
      unlockedTiers[key] = true;
      persistAll();
      notify("تم فتح الشريحة", "ok");
      chooseTier(t);
    } else {
      notify("الرقم السري غير صحيح", "error");
    }
  }

  function selectUnit(uiKey, unit, silent = false) {
    const product = findProductByKey(uiKey);
    if (!product || isOfferProduct(product) || !isAddableToCart(product)) return;
    const u = clean(unit);
    drafts[uiKey] = drafts[uiKey] || {};
    drafts[uiKey].unit = u;
    persistAll();
    refreshProductPrice(uiKey);
    if (!silent) notify(`تم اختيار ${UNIT_NAMES[u] || "الوحدة"}`, "info");
  }

  function draftQty(uiKey, value) {
    const cleaned = clean(value).replace(/[^\d]/g, "");
    drafts[uiKey] = drafts[uiKey] || {};
    drafts[uiKey].qty = cleaned === "" ? "" : parseInt(cleaned, 10);
    persistAll();
  }

  function changeQty(uiKey, delta) {
    const input = document.getElementById(`qty_${uiKey}`);
    if (!input) return;
    let current = parseInt(clean(input.value), 10);
    if (!Number.isFinite(current) || current <= 0) current = 1;
    current += delta;
    if (current < 1) current = 1;
    input.value = String(current);
    draftQty(uiKey, input.value);
  }

  function addToCart(uiKey) {
    const product = findProductByKey(uiKey);
    if (!product) {
      notify("خطأ في المنتج", "error");
      return;
    }
    if (!isAddableToCart(product)) {
      notify("نفذت الكمية ستصل قريبًا", "error");
      return;
    }
    const offerMode = isOfferProduct(product);
    const unit = offerMode ? "offer" : clean(drafts[uiKey]?.unit || document.getElementById(`unit_${uiKey}`)?.value);
    if (!offerMode && !unit) {
      notify("اختر الوحدة أولاً", "error");
      return;
    }
    let qty = clean(drafts[uiKey]?.qty || document.getElementById(`qty_${uiKey}`)?.value);
    qty = qty === "" ? 1 : parseInt(qty, 10);
    if (!Number.isFinite(qty) || qty <= 0) qty = 1;
    const unitPrice = getTierUnitPrice(product, unit);
    if (!unitPrice) {
      notify("السعر غير متاح لهذا الصنف", "error");
      return;
    }
    cart[clean(uiKey)] = {
      uiKey: clean(uiKey),
      code: getProductCode(product),
      name: getDisplayName(product),
      company: clean(product.company),
      unit,
      qty,
      price: unitPrice,
      basePrice: getBaseUnitPrice(product, unit)
    };
    persistAll();
    updateFooterTotal();
    notify("تمت الإضافة للسلة", "ok");
    logEvent("add_to_cart", { code: getProductCode(product), name: getDisplayName(product), company: clean(product.company), unit, qty });
  }

  function buildOrderItemsPayload() {
    return Object.values(cart).map(item => {
      const product = findProductByKey(item.uiKey || item.code || item.name);
      const unit = clean(item.unit || "carton");
      const unitPrice = product ? getTierUnitPrice(product, unit) : toNum(item.price || item.basePrice || 0);
      return {
        order_id: "",
        product_code: item.code || "",
        product_name: item.name || "",
        company: item.company || "",
        unit,
        quantity: toNum(item.qty),
        price_after_discount: unitPrice,
        item_total: toNum(item.qty) * unitPrice
      };
    });
  }

  function buildOrderPayload() {
    const name = clean(document.getElementById("custName")?.value);
    const phone = clean(document.getElementById("custPhone")?.value);
    const business = clean(document.getElementById("custBusiness")?.value);
    const address = clean(document.getElementById("custAddress")?.value);
    const location = clean(customer.location || "");
    const total = getCartTotal();
    const orderId = `ORD-${Date.now()}`;
    return {
      order_id: orderId,
      time: new Date().toISOString(),
      name,
      phone,
      business,
      address,
      location,
      tier: currentTierKey() || "بدون",
      tier_label: selectedTier ? currentTierLabel() : "بدون",
      tier_min: selectedTier ? getTierMin() : 0,
      subtotal: total,
      total,
      status: "تم التواصل مع العميل",
      notes: "",
      items_count: Object.keys(cart).length,
      items: buildOrderItemsPayload(),
      items_json: JSON.stringify(buildOrderItemsPayload())
    };
  }

  function buildWhatsAppMessage(payload) {
    const unitMap = { carton: "كرتونة", dozen: "دستة", piece: "قطعة", offer: "عرض" };
    const lines = [];
    lines.push(`طلب شراء من : ${payload.name}`);
    lines.push(`رقم التليفون : ${payload.phone}`);
    lines.push(`العنوان : ${payload.address}`);
    lines.push(`اسم النشاط : ${payload.business}`);
    lines.push(`اللوكيشن : ${payload.location}`);
    lines.push("");
    if (payload.tier_label && payload.tier_label !== "بدون") {
      lines.push(`الشريحة : ${payload.tier_label}`);
      lines.push("");
    }
    lines.push("بيان الفاتورة");
    lines.push("");
    buildOrderItemsPayload().forEach(item => {
      lines.push(`كود الصنف : ${item.product_code || "-"}`);
      lines.push(`اسم الصنف : ${item.product_name}`);
      lines.push(`الوحدة : ${unitMap[item.unit] || item.unit}`);
      lines.push(`الكميه : ${item.quantity}`);
      lines.push(`السعر : ${formatMoney(item.price_after_discount)} جنيه`);
      lines.push(`اجمالي الصنف بالجنيه : ${formatMoney(item.item_total)} جنيه`);
      lines.push("");
    });
    lines.push(`إجمالي الفاتورة : ${formatMoney(payload.total)} جنيه`);
    return lines.join("\n");
  }

  function sendOrder() {
    const name = clean(document.getElementById("custName")?.value);
    const phone = clean(document.getElementById("custPhone")?.value);
    const business = clean(document.getElementById("custBusiness")?.value);
    const address = clean(document.getElementById("custAddress")?.value);
    const location = clean(customer.location || "");
    if (!name || !phone || !business || !address || !location) {
      notify("من فضلك أكمل بيانات العميل واللوكيشن", "error");
      return;
    }
    if (selectedTier && !isTierSatisfied()) {
      notify("لم يتم تحقيق الشريحة بعد", "error");
      return;
    }
    customer = { name, phone, business, address, location };
    persistAll();
    const payload = buildOrderPayload();
    saveJSON(LS.latestOrder, payload);
    logEvent("order_prepare", { order_id: payload.order_id, total: payload.total, items_count: payload.items_count });
    postOrderToSheet(payload);
    window.open(`https://wa.me/201040880002?text=${encodeURIComponent(buildWhatsAppMessage(payload))}`, "_blank");
    notify("تم تجهيز الطلب وإرساله", "ok");
    logEvent("order_sent", { order_id: payload.order_id, total: payload.total, items_count: payload.items_count });
  }

<script>
(function () {

  function tierKey(t) {
    const raw = String(t?.tier_name || t?.tier_id || t?.id || "").trim().toLowerCase();
    const compact = raw.replace(/\s+/g, "").replace(/[-]+/g, "_");
    if (compact.includes("vip10k") || compact.includes("10k")) return "vip_10k";
    if (compact.includes("vip20k") || compact.includes("20k")) return "vip_20k";
    if (compact.includes("vip1m") || compact.includes("1m")) return "vip_1m";
    if (compact.includes("vip2m") || compact.includes("2m")) return "vip_2m";
    return compact;
  }

  function tierLabel(t) {
    return String(t?.visible_label || t?.tier_name || "").trim();
  }

  function tierPasswordValue(t) {
    return String(t?.tier_password ?? t?.password ?? t?.secret_code ?? t?.code ?? t?.pin ?? "").trim();
  }

  function updateRootThemeVars(theme) {
    if (!theme) return;
    const root = document.documentElement.style;
    root.setProperty("--blue", theme.bg1);
    root.setProperty("--blue2", theme.bg2);
    root.setProperty("--orange", theme.accent2);
    root.setProperty("--gold", theme.accent1);
    root.setProperty("--gold2", theme.accent2);
    root.setProperty("--red", theme.accent1);
    root.setProperty("--bg", theme.soft);
    root.setProperty("--line", theme.border);
  }

  function applyTierTheme() {
    document.body.classList.remove(...THEME_CLASSES);
    if (!selectedTier) {
      updateRootThemeVars({
        bg1: "#0B3D91",
        bg2: "#1852b6",
        accent1: "#1f8b4c",
        accent2: "#ff9a3a",
        soft: "#F5F7FA",
        border: "#e7e9ee"
      });
      return;
    }
    const key = tierKey(selectedTier);
    const theme = THEME_STYLES[key] || THEME_STYLES.vip_10k;
    document.body.classList.add(`theme-${key}`);
    updateRootThemeVars(theme);
  }

  function injectFinalStyles() {
    if (document.getElementById("alahram-final-fix-styles")) return;
    const style = document.createElement("style");

        min-height:52px!important;
        font-size:16px!important;
      }
      body.theme-vip_10k .header,
      body.theme-vip_20k .header,
      body.theme-vip_1m .header,

        background:linear-gradient(180deg,var(--blue),var(--blue2))!important;

        background:linear-gradient(135deg,var(--gold),var(--gold2))!important;
        color:#fff!important;

      body.theme-vip_20k .footerBtn.primary,
      body.theme-vip_1m .footerBtn.primary,
      body.theme-vip_2m .footerBtn.primary,
      body.theme-vip_10k .addBtn,
      body.theme-vip_20k .addBtn,
      body.theme-vip_1m .addBtn,
      body.theme-vip_2m .addBtn,
      body.theme-vip_10k .tierCardBtn,
      body.theme-vip_20k .tierCardBtn,
      body.theme-vip_1m .tierCardBtn,
      body.theme-vip_2m .tierCardBtn,
      body.theme-vip_10k .vipLaunchBtn,
      body.theme-vip_20k .vipLaunchBtn,
      body.theme-vip_1m .vipLaunchBtn,
      body.theme-vip_2m .vipLaunchBtn{
        background:linear-gradient(135deg,var(--gold),var(--gold2))!important;
        color:#fff!important;
      }
      body.theme-vip_10k .pageCard,
      body.theme-vip_20k .pageCard,
      body.theme-vip_1m .pageCard,
      body.theme-vip_2m .pageCard,
      body.theme-vip_10k .card,
      body.theme-vip_20k .card,
      body.theme-vip_1m .card,
      body.theme-vip_2m .card{
        border-color:var(--line)!important;
      }
    `;
    document.head.appendChild(style);
  }

  function hideTopBackButton() {
    const top = document.getElementById("backBtn");
    if (top) {
      top.style.display = "none";
      top.style.visibility = "hidden";
      top.style.pointerEvents = "none";
    }
  }

  function refreshThemeAndTopBack() {
    applyTierTheme();
    hideTopBackButton();
    updateTierActionButton?.();
  }

  function rerenderCurrentPage() {
    if (currentPage === "home") return renderHome();
    if (currentPage === "products") return renderBrandProducts(lastCompany, brandReturnTarget);
    if (currentPage === "tiers") return renderTiersPage();
    if (currentPage === "vipBrands") return renderTierProductsPage();
    if (currentPage === "offers") return renderOffersPage();
    if (currentPage === "review") return renderReview();
    return renderHome();
  }

  getTierPassword = function (t) {
    return tierPasswordValue(t);
  };

  isProtectedTier = function (t) {
    return !!tierPasswordValue(t);
  };

  isTierUnlocked = function (t) {
    if (!isProtectedTier(t)) return true;
    const key = tierKey(t);
    return !!unlockedTiers[key];
  };

  currentTierLabel = function () {
    return tierLabel(selectedTier);
  };

  updateTierActionButton = function () {
    if (!el.tierActionBtn) return;
    el.tierActionBtn.textContent = selectedTier ? `${currentTierLabel()} (اضغط لتغيير الشريحة)` : "💰 شرائح الجملة VIP";
  };

  renderTierBanner = function () {
    const wrap = document.getElementById("tierBanner");
    const host = document.getElementById("tiersWrap");
    if (!wrap || !host) return;
    if (!selectedTier) {
      host.style.display = "none";
      wrap.innerHTML = "";
      updateTierActionButton();
      return;
    }
    host.style.display = "block";
    wrap.style.display = "block";
    wrap.innerHTML = `
      <div class="tierBannerRow">
        <div>الشريحة الحالية: <b>${escapeHtml(currentTierLabel())}</b></div>
        <button class="tierBannerAction" onclick="clearTier()">إلغاء الشريحة</button>
      </div>
    `;
    updateTierActionButton();
  };

  isOfferProduct = function (p) {
    return String(getCompany(p) || "").trim() === "صفقة اليوم";
  };

  getAvailableUnits = function (p) {
    return ["carton", "dozen", "piece"].filter((u) => getBaseUnitPrice(p, u) > 0 || getTierUnitPrice(p, u) > 0);
  };

  getPrimaryUnit = function (p) {
    const units = getAvailableUnits(p);
    if (getBaseUnitPrice(p, "carton") > 0 || getTierUnitPrice(p, "carton") > 0) return "carton";
    if (getBaseUnitPrice(p, "dozen") > 0 || getTierUnitPrice(p, "dozen") > 0) return "dozen";
    if (getBaseUnitPrice(p, "piece") > 0 || getTierUnitPrice(p, "piece") > 0) return "piece";
    return units[0] || "";
  };

  getSubtotal = function () {
    return Object.values(cart).reduce((sum, item) => {
      const product = findProductByKey(item.uiKey || item.code || item.name);
      const unit = String(item.unit || "carton").trim();
      const qty = Number(item.qty || 0);
      const price = product ? getTierUnitPrice(product, unit) : Number(item.price || item.basePrice || 0);
      return sum + qty * price;
    }, 0);
  };

  getPayableTotal = function () {
    return getSubtotal();
  };

  getDiscountAmount = function () {
    return 0;
  };

  getDiscountedPrice = function (base) {
    return Number(base || 0);
  };

  updateFooterTotal = function () {
    el.totalBox.textContent = `${formatMoney(getPayableTotal())} جنيه`;
  };

  function buildOrderItemsPayloadFixed() {
    return Object.values(cart).map((item) => {
      const product = findProductByKey(item.uiKey || item.code || item.name);
      const unit = String(item.unit || "carton").trim();
      const unitPrice = product ? getTierUnitPrice(product, unit) : Number(item.price || item.basePrice || 0);
      return {
        order_id: "",
        product_code: item.code || "",
        product_name: item.name || "",
        company: item.company || "",
        unit,
        quantity: Number(item.qty || 0),
        price_after_discount: unitPrice,
        item_total: Number(item.qty || 0) * unitPrice
      };
    });
  }

  buildOrderItemsPayload = function () {
    return buildOrderItemsPayloadFixed();
  };

  buildOrderPayload = function () {
    const name = String(document.getElementById("custName")?.value || "").trim();
    const phone = String(document.getElementById("custPhone")?.value || "").trim();
    const business = String(document.getElementById("custBusiness")?.value || "").trim();
    const address = String(document.getElementById("custAddress")?.value || "").trim();
    const location = String(customer.location || "").trim();
    const total = getSubtotal();
    const orderId = `ORD-${Date.now()}`;
    return {
      order_id: orderId,
      time: new Date().toISOString(),
      name,
      phone,
      business,
      address,
      location,
      tier: selectedTier ? currentTierKey() : "بدون",
      tier_label: selectedTier ? currentTierLabel() : "بدون",
      tier_min: selectedTier ? getTierMin() : 0,
      subtotal: total,
      total,
      status: "تم التواصل مع العميل",
      notes: "",
      items_count: Object.keys(cart).length,
      items: buildOrderItemsPayloadFixed(),
      items_json: JSON.stringify(buildOrderItemsPayloadFixed())
    };
  };

  buildWhatsAppMessage = function (payload) {
    const unitMap = { carton: "كرتونة", dozen: "دستة", piece: "قطعة", offer: "عرض" };
    const lines = [];
    lines.push(`طلب شراء من : ${payload.name}`);
    lines.push(`رقم التليفون : ${payload.phone}`);
    lines.push(`العنوان : ${payload.address}`);
    lines.push(`اسم النشاط : ${payload.business}`);
    lines.push(`اللوكيشن : ${payload.location}`);
    if (payload.tier_label && payload.tier_label !== "بدون") {
      lines.push(`الشريحة : ${payload.tier_label}`);
    }
    lines.push("");
    lines.push("بيان الفاتورة");
    lines.push("");
    buildOrderItemsPayloadFixed().forEach((item) => {
      lines.push(`كود الصنف : ${item.product_code || "-"}`);
      lines.push(`اسم الصنف : ${item.product_name}`);
      lines.push(`الوحدة : ${unitMap[item.unit] || item.unit}`);
      lines.push(`الكميه : ${item.quantity}`);
      lines.push(`السعر : ${formatMoney(item.price_after_discount)} جنيه`);
      lines.push(`اجمالي الصنف بالجنيه : ${formatMoney(item.item_total)} جنيه`);
      lines.push("");
    });
    lines.push(`إجمالي الفاتورة : ${formatMoney(payload.total)} جنيه`);
    return lines.join("\n");
  };

  selectUnit = function (uiKey, unit, silent = false) {
    const product = findProductByKey(uiKey);
    if (!product || isOfferProduct(product) || !isAddableToCart(product)) return;
    const u = String(unit || "").trim();
    drafts[uiKey] = drafts[uiKey] || {};
    drafts[uiKey].unit = u;
    persistAll();
    refreshProductPrice?.(uiKey);
    if (!silent) notify(`تم اختيار ${UNIT_NAMES[u] || "الوحدة"}`, "info");
  };

  addToCart = function (uiKey) {
    const product = findProductByKey(uiKey);
    if (!product) {
      notify("خطأ في المنتج", "error");
      return;
    }
    if (!isAddableToCart(product)) {
      notify("نفذت الكمية ستصل قريبًا", "error");
      return;
    }
    const offerMode = isOfferProduct(product);
    const unit = offerMode ? "offer" : String(drafts[uiKey]?.unit || document.getElementById(`unit_${uiKey}`)?.value || "").trim();
    if (!offerMode && !unit) {
      notify("اختر الوحدة أولاً", "error");
      return;
    }
    let qty = String(drafts[uiKey]?.qty || document.getElementById(`qty_${uiKey}`)?.value || "").trim();
    qty = qty === "" ? 1 : parseInt(qty, 10);
    if (!Number.isFinite(qty) || qty <= 0) qty = 1;
    const unitPrice = getTierUnitPrice(product, unit);
    if (!unitPrice) {
      notify("السعر غير متاح لهذا الصنف", "error");
      return;
    }
    cart[String(uiKey).trim()] = {
      uiKey: String(uiKey).trim(),
      code: getProductCode(product),
      name: getDisplayName(product),
      company: String(product.company || "").trim(),
      unit,
      qty,
      price: unitPrice,
      basePrice: getBaseUnitPrice(product, unit)
    };
    persistAll();
    updateFooterTotal();
    notify("تمت الإضافة للسلة", "ok");
  };

    const activeTiers = (tiersData || []).filter((t) => {

    const cards = activeTiers.map((t) => {
      const key = String(t.tier_name || t.tier_id || t.id || "").trim();

      const unlocked = isTierUnlocked(t);
      const active = selectedTier && key === currentTierKey();
      const lockBadge = protectedTier ? (unlocked ? "🔓 مفتوح" : "🔒 مقفل") : "متاح";
      const btnText = active ? "الشريحة الحالية" : (protectedTier && !unlocked ? "دخول بالرقم السري" : "اختيار الشريحة");
      const description = String(t.tier_description || "").trim();
      const visible = String(t.visible_label || t.tier_name || key).trim();

      return `
        <div class="tierCard ${active ? "active" : ""} ${protectedTier && !unlocked ? "locked" : ""}">
          <div class="tierCardName">
            <span>${escapeHtml(visible)}</span>
            <span class="tierBadge">${lockBadge}</span>
          </div>
          <div class="tierCardMeta">
            <div>الحد الأدنى: <b>${formatMoney(t.tier_min || 0)} جنيه</b></div>
          </div>
          ${description ? `<div class="tierCardDesc">${escapeHtml(description)}</div>` : ""}
          <button class="tierCardBtn ${protectedTier && !unlocked ? "locked" : ""}" onclick="tierCardClick('${escapeAttr(key)}')">${escapeHtml(btnText)}</button>
        </div>
      `;
    }).join("");

    el.app.innerHTML = `
      ${selectedTier ? renderPageCard("الشريحة الحالية", `أنت الآن على شريحة: ${escapeHtml(currentTierLabel())}`, "blue") : ""}
      <div class="tierPageActions">
        ${selectedTier ? `<button class="miniDanger" onclick="clearTier()">إلغاء الشريحة</button>` : ""}
        <button class="vipLaunchBtn" onclick="openTierProductsPage()">الذهاب للتسوق</button>
      </div>
      <div class="tiersGrid">${cards || '<div class="emptyState">لا توجد شرائح متاحة</div>'}</div>
    `;
    renderTierBanner();
    syncFooter();
    updateTierActionButton();
  }

  function renderReviewMinimal(replace = false) {
    setMode("review");
    applyTierTheme();
    scrollTop();
    document.title = "إتمام الشراء - الأهرام للتجارة والتوزيع";
    logEvent("page_review");
    el.backBtn.style.display = "none";
    if (typeof routeSet === "function") routeSet("review", { returnTo: reviewReturn, company: lastCompany, brandReturnTarget }, replace);

    const items = Object.values(cart);
    const total = getSubtotal();
    const tierOk = isTierSatisfied();
    const tierMsg = selectedTier
      ? (tierOk
          ? `<div class="reviewTierState ok">أنت الآن على شريحة <b>${escapeHtml(currentTierLabel())}</b> — تم تحقيق الشريحة يمكنك الآن إرسال الفاتورة.</div>`
          : `<div class="reviewTierState warn">أنت الآن على شريحة <b>${escapeHtml(currentTierLabel())}</b> — متبقي <b>${formatMoney(getTierMin() - total)} جنيه</b> لتحقيق الفاتورة.</div>`)
      : `<div class="reviewTierState">لم يتم اختيار شريحة بعد.</div>`;

    let html = `<div class="reviewWrap">${tierMsg}`;

    if (!items.length) {
      html += `
        <div class="reviewSummary">
          <div class="reviewSummaryTop">
            <div><b>إجمالي الطلب:</b> ${formatMoney(total)} جنيه</div>
            <button class="miniDanger" onclick="clearCartConfirm()">🗑️ تصفير السلة</button>
          </div>
        </div>
        <div class="emptyState">السلة فارغة</div>
        <div class="card"><button class="mainBtn secondary" onclick="goBack()">⬅ الرجوع للتسوق</button></div>
      </div>`;
      el.app.innerHTML = html;
      updateFooterTotal();
      syncFooter();
      renderTierBanner();
      updateTierActionButton();
      return;
    }

    items.forEach((item) => {
      const product = findProductByKey(item.uiKey || item.code || item.name);
      const unit = String(item.unit || "carton").trim();
      const unitPrice = product ? getTierUnitPrice(product, unit) : Number(item.price || item.basePrice || 0);
      const lineTotal = Number(item.qty || 0) * unitPrice;
      const isOfferItem = unit === "offer";
      html += `
        <div class="reviewItem">
          <div class="reviewItemTop">${escapeHtml(item.name)}${item.code ? ` (${escapeHtml(item.code)})` : ""}</div>
          <div>الوحدة: ${escapeHtml(isOfferItem ? "عرض" : (UNIT_NAMES[unit] || unit))}</div>
          <div>الكمية: ${item.qty}</div>
          <div>السعر: ${formatMoney(unitPrice)} جنيه</div>
          <div><b>إجمالي الصنف بالجنيه:</b> ${formatMoney(lineTotal)} جنيه</div>
          <div class="reviewControls">
            <button class="qtyBtn" onclick="reviewQty('${item.uiKey}', -1)">-</button>
            <input class="reviewQtyInput" value="${item.qty}" inputmode="numeric" oninput="reviewQtyInput('${item.uiKey}', this.value)">
            <button class="qtyBtn" onclick="reviewQty('${item.uiKey}', 1)">+</button>
          </div>
          <div class="reviewAction" onclick="removeFromCart('${item.uiKey}')">حذف</div>
        </div>
      `;
    });

    html += `
      <div class="card">
        <button class="mainBtn secondary" onclick="backToShopping()">⬅ الرجوع للتسوق</button>
      </div>
      <div class="reviewSummary">
        <div class="reviewSummaryTop">
          <div><b>إجمالي الطلب:</b> ${formatMoney(total)} جنيه</div>
          <button class="miniDanger" onclick="clearCartConfirm()">🗑️ تصفير السلة</button>
        </div>
      </div>
      <div class="formCard">
        <input class="input" id="custName" placeholder="اسم العميل" value="${escapeAttr(customer.name || "")}">
        <input class="input" id="custPhone" placeholder="رقم الهاتف" value="${escapeAttr(customer.phone || "")}">
        <input class="input" id="custBusiness" placeholder="اسم النشاط" value="${escapeAttr(customer.business || "")}">
        <input class="input" id="custAddress" placeholder="العنوان" value="${escapeAttr(customer.address || "")}">
        <button class="mainBtn secondary" onclick="setLocation()">📍 اضغط لإضافة اللوكيشن</button>
        <div class="locationStatus" id="locationStatus">${customer.location ? "✔ تم حفظ اللوكيشن" : ""}</div>
        <div style="height:10px"></div>
        <button class="mainBtn primary" id="sendNowBtn" onclick="sendOrder()" ${selectedTier && !tierOk ? "disabled" : ""}>إرسال الطلب الآن</button>
      </div>
    </div>`;

    el.app.innerHTML = html;
    updateFooterTotal();
    syncFooter();
    renderTierBanner();
    updateTierActionButton();
  }

  function tierPageButtonTextFix() {
    const btn = document.querySelector(".vipLaunchBtn");
    if (btn && btn.textContent.includes("اختار منتجاتك")) btn.textContent = "الذهاب للتسوق";
  }

  chooseTier = function (t) {
    if (!t) return;
    if (isProtectedTier(t) && !isTierUnlocked(t)) {
      return promptTierUnlock(t);
    }
    selectedTier = t;
    unlockedTiers[tierKey(t)] = true;
    persistAll();
    applyTierTheme();
    updateTierActionButton();
    rerenderCurrentPage();
    notify("تم اختيار الشريحة", "ok");
  };

  promptTierUnlock = function (t) {
    const entered = String(window.prompt(`أدخل الرقم السري للشريحة: ${tierLabel(t)}`) || "").trim();
    if (!entered) return;
    if (entered === tierPasswordValue(t)) {
      unlockedTiers[tierKey(t)] = true;
      selectedTier = t;
      persistAll();
      applyTierTheme();
      updateTierActionButton();
      rerenderCurrentPage();
      notify("تم فتح الشريحة", "ok");
      return;
    }
    notify("الرقم السري غير صحيح", "error");
  };

  clearTier = function () {
    selectedTier = null;
    persistAll();
    applyTierTheme();
    updateTierActionButton();
    rerenderCurrentPage();
    notify("تم إلغاء الشريحة", "info");
  };

  function wrapRender(fnName) {
    const original = window[fnName];
    if (typeof original !== "function") return;
    window[`__orig_${fnName}`] = original;
    window[fnName] = function (...args) {
      const result = original.apply(this, args);
      refreshThemeAndTopBack();
      tierPageButtonTextFix();
      return result;
    };
  }

  wrapRender("renderHome");
  wrapRender("renderBrandProducts");
  wrapRender("renderOffersPage");
  wrapRender("renderTierProductsPage");

  openReview = function () {
    reviewReturn = { type: currentPage, value: lastCompany, returnTo: brandReturnTarget };
    renderReview();
  };

  function postRenderFixes() {
    hideTopBackButton();
    updateTierActionButton();
    applyTierTheme();
  }

  sendOrder = function () {
    const name = String(document.getElementById("custName")?.value || "").trim();
    const phone = String(document.getElementById("custPhone")?.value || "").trim();
    const business = String(document.getElementById("custBusiness")?.value || "").trim();
    const address = String(document.getElementById("custAddress")?.value || "").trim();
    const location = String(customer.location || "").trim();

    if (!name || !phone || !business || !address || !location) {
      notify("من فضلك أكمل بيانات العميل واللوكيشن", "error");
      return;
    }
    if (selectedTier && !isTierSatisfied()) {
      notify("لم يتم تحقيق الشريحة بعد", "error");
      return;
    }

    customer = { name, phone, business, address, location };
    persistAll();

    const payload = buildOrderPayload();
    saveJSON(LS.latestOrder, payload);
    logEvent("order_prepare", { order_id: payload.order_id, total: payload.total, items_count: payload.items_count });
    postOrderToSheet(payload);
    window.open(`https://wa.me/201040880002?text=${encodeURIComponent(buildWhatsAppMessage(payload))}`, "_blank");
    notify("تم تجهيز الطلب وإرساله", "ok");
    logEvent("order_sent", { order_id: payload.order_id, total: payload.total, items_count: payload.items_count });
  };

  const originalRenderReview = renderReview;
  renderReview = function (...args) {
    const result = originalRenderReview.apply(this, args);
    postRenderFixes();
    return result;
  };

  const originalRenderTiersPage = renderTiersPage;
  renderTiersPage = function (...args) {
    const result = originalRenderTiersPage.apply(this, args);
    postRenderFixes();
    tierPageButtonTextFix();
    return result;
  };

  window.renderReview = renderReview;
  window.renderTiersPage = renderTiersPage;
  window.chooseTier = chooseTier;
  window.promptTierUnlock = promptTierUnlock;
  window.clearTier = clearTier;
  window.openReview = openReview;
  window.sendOrder = sendOrder;

  applyTierTheme();
  injectFinalStyles();
  postRenderFixes();

  if (selectedTier) {
    unlockedTiers[tierKey(selectedTier)] = true;
    persistAll();
  }
})();
</script>


<script>
(function () {
  if (window.__alahramStatePatchLoaded) return;
  window.__alahramStatePatchLoaded = true;

  const NAV_KEY = 'alahram_nav_stack_v3';
  const SELECTED_TIER_KEY = 'alahram_selected_tier_v3';
  const TIER_UNLOCKS_KEY = 'alahram_tier_unlocks_v3';
  const HISTORY_DEDUPE_KEY = '__alahram_last_history_state_v3';
  const PRELOAD_LIMIT = 180;

  const nav = {
    stack: [],
    current: null,
    restoring: false,
    booted: false
  };

  const pushStateNative = history.pushState.bind(history);
  const replaceStateNative = history.replaceState.bind(history);

  const safeParse = (raw, fallback) => {
    try { return raw ? JSON.parse(raw) : fallback; } catch { return fallback; }
  };

  const cleanStr = (v) => (v ?? '').toString().trim();
  const tierKey = (t) => {
    const raw = cleanStr(t?.tier_name || t?.tier_id || t?.id || t?.visible_label || '');
    const compact = raw.toLowerCase().replace(/\s+/g, '').replace(/[-]+/g, '_');
    if (compact.includes('vip10k') || compact.includes('10k')) return 'vip_10k';
    if (compact.includes('vip20k') || compact.includes('20k')) return 'vip_20k';
    if (compact.includes('vip1m') || compact.includes('1m')) return 'vip_1m';
    if (compact.includes('vip2m') || compact.includes('2m')) return 'vip_2m';
    return compact || raw;
  };
  const tierLabel = (t) => cleanStr(t?.visible_label || t?.tier_name || '');
  const tierPassword = (t) => cleanStr(t?.tier_password ?? t?.password ?? t?.secret_code ?? t?.code ?? t?.pin ?? '');
  const tierIsProtected = (t) => !!tierPassword(t);
  const tierIsUnlocked = (t) => {
    if (!tierIsProtected(t)) return true;
    const key = tierKey(t);
    const unlocks = safeParse(localStorage.getItem(TIER_UNLOCKS_KEY), {});
    return !!unlocks[key];
  };
  const findTier = (key) => (tiersData || []).find(t => tierKey(t) === cleanStr(key)) || null;
  const persistTierSnapshot = () => {
    try {
      if (selectedTier) {
        localStorage.setItem(SELECTED_TIER_KEY, JSON.stringify({
          key: tierKey(selectedTier),
          tier: selectedTier
        }));
      } else {
        localStorage.removeItem(SELECTED_TIER_KEY);
      }
    } catch (_) {}
  };
  const loadTierFromStorage = () => {
    const raw = safeParse(localStorage.getItem(SELECTED_TIER_KEY), null);
    if (!raw) return null;
    if (raw.tier && typeof raw.tier === 'object') {
      const match = findTier(raw.key || tierKey(raw.tier));
      return match || raw.tier;
    }
    const key = cleanStr(raw.key || raw);
    return findTier(key);
  };
  const saveNav = () => {
    try {
      localStorage.setItem(NAV_KEY, JSON.stringify({
        stack: nav.stack.slice(-20),
        current: nav.current
      }));
    } catch (_) {}
  };
  const setNav = (frame, push = true) => {
    if (nav.restoring) {
      nav.current = frame;
      nav.restoring = false;
      saveNav();
      return;
    }
    const current = nav.current;
    const same = current && current.page === frame.page && JSON.stringify(current.payload || {}) === JSON.stringify(frame.payload || {});
    if (push && current && !same) nav.stack.push(current);
    nav.current = frame;
    saveNav();
  };
  const dispatchFrame = (frame) => {
    if (!frame || !frame.page) {
      window.renderHome(true);
      return;
    }
    const payload = frame.payload || {};
    switch (frame.page) {
      case 'home':
        window.renderHome(true);
        break;
      case 'products':
        window.renderBrandProducts(payload.company || lastCompany || '', payload.returnTo || 'home', true);
        break;
      case 'tiers':
        window.renderTiersPage(true);
        break;
      case 'vipBrands':
        window.renderTierProductsPage(true);
        break;
      case 'offers':
        window.renderOffersPage(true);
        break;
      case 'review':
        window.renderReview(true);
        break;
      default:
        window.renderHome(true);
    }
  };
  const recordFrame = (page, payload = {}) => setNav({ page, payload }, true);

  const bodyTheme = {
    vip_10k: { bg1: '#0b3d91', bg2: '#1fb7a9', accent1: '#1f8b4c', accent2: '#2da35d', soft: '#eef8ff', border: '#b8d7ff' },
    vip_20k: { bg1: '#5b2a86', bg2: '#d98c2b', accent1: '#7b3fe4', accent2: '#b568ff', soft: '#fbf3ff', border: '#e2c5ff' },
    vip_1m: { bg1: '#0f7b57', bg2: '#1fb7a9', accent1: '#0f8f83', accent2: '#1fb7a9', soft: '#effff9', border: '#b8f0d7' },
    vip_2m: { bg1: '#1a1f2b', bg2: '#c79b18', accent1: '#8a5a00', accent2: '#f0d46c', soft: '#fff8df', border: '#ead08a' }
  };

  function applyThemeFromSelectedTier() {
    document.body.classList.remove('theme-vip_10k', 'theme-vip_20k', 'theme-vip_1m', 'theme-vip_2m');
    const tier = selectedTier;
    const root = document.documentElement.style;
    const fallback = { bg1: '#0B3D91', bg2: '#1852b6', accent1: '#1f8b4c', accent2: '#ff9a3a', soft: '#F5F7FA', border: '#e7e9ee' };
    const key = tier ? tierKey(tier) : '';
    const theme = bodyTheme[key] || fallback;
    root.setProperty('--blue', theme.bg1);
    root.setProperty('--blue2', theme.bg2);
    root.setProperty('--orange', theme.accent2);
    root.setProperty('--gold', theme.accent1);
    root.setProperty('--gold2', theme.accent2);
    root.setProperty('--red', theme.accent1);
    root.setProperty('--bg', theme.soft);
    root.setProperty('--line', theme.border);
    if (tier && bodyTheme[key]) document.body.classList.add(`theme-${key}`);
  }

  function preloadImages() {
    const urls = [];
    (products || []).forEach(p => {
      const img = cleanStr(p.image);
      const brand = cleanStr(p.brand_image);
      if (img) urls.push(img);
      if (brand) urls.push(brand);
    });
    const uniq = [...new Set(urls)].slice(0, PRELOAD_LIMIT);
    uniq.forEach(src => {
      const img = new Image();
      img.decoding = 'async';
      img.loading = 'eager';
      img.src = src;
    });
  }

  function fixHistoryDeduping() {
    if (window.__alahramHistoryDeduped) return;
    window.__alahramHistoryDeduped = true;

    history.pushState = function (state, title, url) {
      try {
        const marker = JSON.stringify([state?.appPage || '', state?.company || '', state?.returnTo || '']);
        if (sessionStorage.getItem(HISTORY_DEDUPE_KEY) === marker) return;
        sessionStorage.setItem(HISTORY_DEDUPE_KEY, marker);
      } catch (_) {}
      return pushStateNative(state, title, url);
    };

    history.replaceState = function (state, title, url) {
      try {
        const marker = JSON.stringify([state?.appPage || '', state?.company || '', state?.returnTo || '']);
        sessionStorage.setItem(HISTORY_DEDUPE_KEY, marker);
      } catch (_) {}
      return replaceStateNative(state, title, url);
    };
  }

  function updateSelectedTierState() {
    const stored = loadTierFromStorage();
    if (stored && (!selectedTier || tierKey(stored) !== tierKey(selectedTier))) {
      selectedTier = stored;
    }
    if (selectedTier) {
      const key = tierKey(selectedTier);
      const unlocks = safeParse(localStorage.getItem(TIER_UNLOCKS_KEY), {});
      unlocks[key] = true;
      try { localStorage.setItem(TIER_UNLOCKS_KEY, JSON.stringify(unlocks)); } catch (_) {}
      persistTierSnapshot();
    }
    applyThemeFromSelectedTier();
  }

  function customTierUnlock(t) {
    const pw = tierPassword(t);
    const entered = cleanStr(window.prompt(`أدخل الرقم السري للشريحة: ${tierLabel(t)}`) || '');
    if (!entered) return;
    if (entered === pw) {
      const unlocks = safeParse(localStorage.getItem(TIER_UNLOCKS_KEY), {});
      const key = tierKey(t);
      unlocks[key] = true;
      try { localStorage.setItem(TIER_UNLOCKS_KEY, JSON.stringify(unlocks)); } catch (_) {}
      selectedTier = t;
      persistTierSnapshot();
      applyThemeFromSelectedTier();
      if (currentPage === 'tiers') window.renderTiersPage(true);
      else if (currentPage === 'products') window.renderBrandProducts(lastCompany || '', brandReturnTarget || 'home', true);
      else if (currentPage === 'vipBrands') window.renderTierProductsPage(true);
      else if (currentPage === 'offers') window.renderOffersPage(true);
      else if (currentPage === 'review') window.renderReview(true);
      else window.renderHome(true);
      window.renderTierBanner?.();
      window.updateTierActionButton?.();
      window.updateFooterTotal?.();
      window.notify?.('تم فتح الشريحة', 'ok');
      return;
    }
    window.notify?.('الرقم السري غير صحيح', 'error');
  }

  function chooseTierFixed(t) {
    if (!t) return;
    if (tierIsProtected(t) && !tierIsUnlocked(t)) return customTierUnlock(t);
    selectedTier = t;
    persistTierSnapshot();
    const unlocks = safeParse(localStorage.getItem(TIER_UNLOCKS_KEY), {});
    unlocks[tierKey(t)] = true;
    try { localStorage.setItem(TIER_UNLOCKS_KEY, JSON.stringify(unlocks)); } catch (_) {}
    applyThemeFromSelectedTier();
    if (currentPage === 'tiers') window.renderTiersPage(true);
    else if (currentPage === 'products') window.renderBrandProducts(lastCompany || '', brandReturnTarget || 'home', true);
    else if (currentPage === 'vipBrands') window.renderTierProductsPage(true);
    else if (currentPage === 'offers') window.renderOffersPage(true);
    else if (currentPage === 'review') window.renderReview(true);
    else window.renderHome(true);
    window.renderTierBanner?.();
    window.updateTierActionButton?.();
    window.updateFooterTotal?.();
    window.notify?.('تم اختيار الشريحة', 'ok');
    recordFrame('tiers', {});
  }

  function clearTierFixed() {
    selectedTier = null;
    try { localStorage.removeItem(SELECTED_TIER_KEY); } catch (_) {}
    applyThemeFromSelectedTier();
    if (currentPage === 'tiers') window.renderTiersPage(true);
    else if (currentPage === 'products') window.renderBrandProducts(lastCompany || '', brandReturnTarget || 'home', true);
    else if (currentPage === 'vipBrands') window.renderTierProductsPage(true);
    else if (currentPage === 'offers') window.renderOffersPage(true);
    else if (currentPage === 'review') window.renderReview(true);
    else window.renderHome(true);
    window.renderTierBanner?.();
    window.updateTierActionButton?.();
    window.updateFooterTotal?.();
    window.notify?.('تم إلغاء الشريحة', 'info');
  }

  function customGoBack() {
    if (nav.stack.length > 0) {
      const prev = nav.stack.pop();
      nav.current = prev;
      saveNav();
      nav.restoring = true;
      dispatchFrame(prev);
      return true;
    }
    if (currentPage === 'home') {
      const ok = window.confirm ? window.confirm('هل تريد الخروج من المتجر؟') : true;
      if (ok) history.back();
      return true;
    }
    nav.restoring = true;
    dispatchFrame({ page: 'home', payload: {} });
    return true;
  }

  function getCompanyStrict(p) {
    return cleanStr(p?.company || p?.company_name || p?.brand || '');
  }

  function renderTiersPageFixed(replace = false) {
    currentPage = 'tiers';
    brandPageStyle = 'standard';
    brandReturnTarget = 'home';
    window.scrollTop?.();
    document.title = 'الشرائح - الأهرام للتجارة والتوزيع';
    recordFrame('tiers', {});
    try {
      if (history.state?.appPage !== 'tiers') history.pushState({ appPage: 'tiers' }, '', location.href);
    } catch (_) {}
    const tiers = (tiersData || []).filter(t => {
      const active = cleanStr(t.active ?? t.tier_active ?? '1');
      const status = cleanStr(t.status || '').toLowerCase();
      return active === '1' || status === 'active' || status === 'فعال';
    });
    const cards = tiers.map(t => {
      const key = tierKey(t);
      const isActive = selectedTier && tierKey(selectedTier) === key;
      const protectedTier = tierIsProtected(t);
      const unlocked = tierIsUnlocked(t);
      const btn = isActive ? 'الشريحة الحالية' : (protectedTier && !unlocked ? 'دخول بالرقم السري' : 'اختيار الشريحة');
      const badge = protectedTier ? (unlocked ? '🔓 مفتوح' : '🔒 مقفل') : 'متاح';
      return `
        <div class="tierCard ${isActive ? 'active' : ''} ${protectedTier && !unlocked ? 'locked' : ''}">
          <div class="tierCardName">
            <span>${escapeHtml(tierLabel(t))}</span>
            <span class="tierBadge">${badge}</span>
          </div>
          <div class="tierCardMeta">
            <div>الحد الأدنى: <b>${formatMoney(t.tier_min || 0)} جنيه</b></div>
          </div>
          ${cleanStr(t.tier_description || '') ? `<div class="tierCardDesc">${escapeHtml(cleanStr(t.tier_description))}</div>` : ''}
          <button class="tierCardBtn ${protectedTier && !unlocked ? 'locked' : ''}" onclick="tierCardClick('${escapeAttr(key)}')">${escapeHtml(btn)}</button>
        </div>
      `;
    }).join('');
    const selectedInfo = selectedTier ? `
      <div class="pageCard blue">
        <div class="pageCardTitle">الشريحة الحالية</div>
        <div class="pageCardSub">أنت الآن على شريحة: ${escapeHtml(tierLabel(selectedTier))}</div>
      </div>
    ` : '';
    const actionBtn = selectedTier
      ? `<button class="miniDanger" onclick="clearTier()">إلغاء الشريحة</button>`
      : '';
    el && (el.backBtn.style.display = 'none');
    el.app.innerHTML = `
      ${selectedInfo}
      <div class="tierPageActions">
        ${actionBtn}
        <button class="vipLaunchBtn" onclick="openTierProductsPage()">الذهاب للتسوق</button>
      </div>
      <div class="tiersGrid">${cards || '<div class="emptyState">لا توجد شرائح متاحة</div>'}</div>
    `;
    window.renderTierBanner?.();
    window.syncFooter?.();
    window.updateTierActionButton?.();
    window.updateFooterTotal?.();
    postRenderFixes();
  }

  function renderOffersPageFixed(replace = false) {
    currentPage = 'offers';
    brandPageStyle = 'standard';
    brandReturnTarget = 'home';
    window.scrollTop?.();
    document.title = 'صفقة اليوم - الأهرام للتجارة والتوزيع';
    recordFrame('offers', {});
    try {
      if (history.state?.appPage !== 'offers') history.pushState({ appPage: 'offers' }, '', location.href);
    } catch (_) {}
    const strictOffers = (products || []).filter(p => getCompanyStrict(p) === 'صفقة اليوم' && cleanStr(p.status).toLowerCase() === 'active');
    const intro = 'صفقة اليوم تعرض فقط الأصناف المسجلة تحت شركة صفقة اليوم.';
    const cards = strictOffers.map((p, i) => {
      const uiKey = p.__uiKey || window.getProductKey?.(p) || `${cleanStr(p.codo || p.code || p.name || 'item')}_${i}`;
      const img = cleanStr(p.image) || PLACEHOLDERS.product(cleanStr(window.getDisplayName ? window.getDisplayName(p) : (p.name || 'صنف')));
      const name = cleanStr(window.getDisplayName ? window.getDisplayName(p) : (p.name || 'صنف'));
      const offerLabel = cleanStr(window.getOfferLabel ? window.getOfferLabel(p) : (p.offer_label || ''));
      const units = window.getAvailableUnits ? window.getAvailableUnits(p) : ['carton','dozen','piece'];
      const baseUnit = window.getPrimaryUnit ? window.getPrimaryUnit(p) : 'carton';
      const basePrice = window.getBaseUnitPrice ? window.getBaseUnitPrice(p, baseUnit) : toNum(p.price_offer || p.price_carton || p.price_dozen || p.price_piece);
      return `
        <div class="card productCard offerCard">
          <img class="productImg" src="${img}" alt="${escapeAttr(name)}" onerror="this.src='${PLACEHOLDERS.product(name)}'">
          <div class="productName">${escapeHtml(name)}</div>
          <div class="offerLabel">${escapeHtml(offerLabel || 'عرض خاص')}</div>
          ${basePrice > 0 ? `<div class="price offer" id="price_${uiKey}">سعر العرض: ${formatMoney(basePrice)} جنيه</div>` : ''}
          ${units.length ? `<select class="unitSelect" id="unit_${uiKey}" onchange="selectUnit('${uiKey}', this.value)"><option value="">اختر الوحدة</option>${window.buildAvailableUnitsOptions ? window.buildAvailableUnitsOptions(p) : units.map(u=>`<option value="${u}">${u}</option>`).join('')}</select>` : ''}
          <div class="qtyWrap">
            <button class="qtyBtn" id="minus_${uiKey}" onclick="changeQty('${uiKey}', -1)">-</button>
            <input class="qtyInput" id="qty_${uiKey}" inputmode="numeric" value="${escapeAttr(cleanStr(drafts?.[uiKey]?.qty || ''))}" oninput="draftQty('${uiKey}', this.value)">
            <button class="qtyBtn" id="plus_${uiKey}" onclick="changeQty('${uiKey}', 1)">+</button>
          </div>
          <button class="addBtn offer" onclick="addToCart('${uiKey}')">أضف للسلة</button>
        </div>
      `;
    }).join('');
    el.backBtn.style.display = 'none';
    el.app.innerHTML = `
      ${renderPageCard('صفقة اليوم', intro, 'gold')}
      ${strictOffers.length ? `<div class="grid">${cards}</div>` : `<div class="emptyState">لا توجد عروض حالياً</div>`}
    `;
    window.renderTierBanner?.();
    window.syncFooter?.();
    window.updateTierActionButton?.();
    window.updateFooterTotal?.();
    postRenderFixes();
  }

  function renderReviewFixed(replace = false) {
    currentPage = 'review';
    window.scrollTop?.();
    document.title = 'إتمام الشراء - الأهرام للتجارة والتوزيع';
    recordFrame('review', { company: cleanStr(lastCompany || ''), returnTo: cleanStr(brandReturnTarget || 'home') });
    try {
      if (history.state?.appPage !== 'review') history.pushState({ appPage: 'review' }, '', location.href);
    } catch (_) {}
    const items = Object.values(cart || {});
    const subtotal = window.getSubtotal ? window.getSubtotal() : 0;
    const tierOk = window.isTierSatisfied ? window.isTierSatisfied() : true;
    const tierName = tierLabel(selectedTier);
    const tierBlock = selectedTier ? (
      tierOk
        ? `<div class="reviewTierState ok">أنت الآن على شريحة <b>${escapeHtml(tierName)}</b> — تم تحقيق الشريحة يمكنك الآن إرسال الفاتورة.</div>`
        : `<div class="reviewTierState warn">أنت الآن على شريحة <b>${escapeHtml(tierName)}</b> — متبقي <b>${formatMoney((window.getTierMin ? window.getTierMin() : 0) - subtotal)} جنيه</b> لتحقيق الفاتورة.</div>`
    ) : `<div class="reviewTierState">لم يتم اختيار شريحة بعد.</div>`;

    const itemsHtml = items.map(item => {
      const product = window.findProductByKey ? window.findProductByKey(item.uiKey || item.code || item.name) : null;
      const unit = cleanStr(item.unit || 'carton');
      const unitPrice = product && window.getTierUnitPrice ? window.getTierUnitPrice(product, unit) : toNum(item.price || item.basePrice || 0);
      const lineTotal = toNum(item.qty) * unitPrice;
      const unitLabel = unit === 'offer' ? 'عرض' : (UNIT_NAMES[unit] || unit);
      return `
        <div class="reviewItem">
          <div class="reviewItemTop">${escapeHtml(item.name)}${item.code ? ` (${escapeHtml(item.code)})` : ''}</div>
          <div>الوحدة: ${escapeHtml(unitLabel)}</div>
          <div>الكمية: ${item.qty}</div>
          <div>السعر: ${formatMoney(unitPrice)} جنيه</div>
          <div><b>إجمالي الصنف بالجنيه:</b> ${formatMoney(lineTotal)} جنيه</div>
          <div class="reviewControls">
            <button class="qtyBtn" onclick="reviewQty('${item.uiKey}', -1)">-</button>
            <input class="reviewQtyInput" value="${item.qty}" inputmode="numeric" oninput="reviewQtyInput('${item.uiKey}', this.value)">
            <button class="qtyBtn" onclick="reviewQty('${item.uiKey}', 1)">+</button>
          </div>
          <div class="reviewAction" onclick="removeFromCart('${item.uiKey}')">حذف</div>
        </div>
      `;
    }).join('');

    el.backBtn.style.display = 'none';
    el.app.innerHTML = `
      <div class="reviewWrap">
        ${tierBlock}
        <div class="reviewSummary">
          <div class="reviewSummaryTop">
            <div><b>إجمالي الطلب:</b> ${formatMoney(subtotal)} جنيه</div>
            <button class="miniDanger" onclick="clearCartConfirm()">🗑️ تصفير السلة</button>
          </div>
        </div>
        ${itemsHtml || '<div class="emptyState">السلة فارغة</div>'}
        <div class="card">
          <button class="mainBtn secondary" onclick="goBack()">⬅ الرجوع للتسوق</button>
        </div>
        <div class="reviewSummary">
          <div class="reviewSummaryTop">
            <div><b>إجمالي الطلب:</b> ${formatMoney(subtotal)} جنيه</div>
            <button class="miniDanger" onclick="clearCartConfirm()">🗑️ تصفير السلة</button>
          </div>
        </div>
        <div class="formCard">
          <input class="input" id="custName" placeholder="اسم العميل" value="${escapeAttr(customer?.name || '')}">
          <input class="input" id="custPhone" placeholder="رقم الهاتف" value="${escapeAttr(customer?.phone || '')}">
          <input class="input" id="custBusiness" placeholder="اسم النشاط" value="${escapeAttr(customer?.business || '')}">
          <input class="input" id="custAddress" placeholder="العنوان" value="${escapeAttr(customer?.address || '')}">
          <button class="mainBtn secondary" onclick="setLocation()">📍 اضغط لإضافة اللوكيشن</button>
          <div class="locationStatus" id="locationStatus">${customer?.location ? '✔ تم حفظ اللوكيشن' : ''}</div>
          <div style="height:10px"></div>
          <button class="mainBtn primary" id="sendNowBtn" onclick="sendOrder()" ${selectedTier && !tierOk ? 'disabled' : ''}>إرسال الطلب الآن</button>
        </div>
      </div>
    `;
    window.syncFooter?.();
    window.updateTierActionButton?.();
    window.updateFooterTotal?.();
    window.renderTierBanner?.();
    postRenderFixes();
  }

  function postRenderFixes() {
    applyThemeFromSelectedTier();
    window.renderTierBanner?.();
    window.updateTierActionButton?.();
    window.updateFooterTotal?.();
    if (el?.backBtn) {
      el.backBtn.style.display = 'none';
      el.backBtn.style.visibility = 'hidden';
      el.backBtn.style.pointerEvents = 'none';
    }
    if (el?.footerBack) {
      el.footerBack.style.minHeight = '52px';
      el.footerBack.style.fontSize = '16px';
      el.footerBack.style.background = 'linear-gradient(135deg,#1f8b4c,#2da35d)';
      el.footerBack.style.color = '#fff';
    }
    if (el?.footerPrimary) {
      el.footerPrimary.style.minHeight = '52px';
      el.footerPrimary.style.fontSize = '16px';
    }
  }

  function wrapNav(name, frameProvider) {
    const original = window[name];
    if (typeof original !== 'function') return;
    window[`__orig_${name}`] = original;
    window[name] = function (...args) {
      const result = original.apply(this, args);
      try {
        const frame = frameProvider ? frameProvider(args) : null;
        if (frame) setNav(frame, true);
      } catch (_) {}
      postRenderFixes();
      return result;
    };
  }

  function wrapOriginalGoBack() {
    window.goBack = customGoBack;
    window.backToShopping = customGoBack;
  }

  function wrapTierActions() {
    window.chooseTier = chooseTierFixed;
    window.promptTierUnlock = customTierUnlock;
    window.clearTier = clearTierFixed;
    window.tierCardClick = function (tierId) {
      const t = findTier(tierId);
      if (t) chooseTierFixed(t);
    };
    window.openTiersPage = function () {
      window.renderTiersPage(true);
    };
    window.openOffersPage = function () {
      window.renderOffersPage(true);
    };
    window.openTierProductsPage = function () {
      window.renderTierProductsPage(true);
    };
  }

  function wrapStrictOfferFilter() {
    window.isOfferProduct = function (p) {
      return getCompanyStrict(p) === 'صفقة اليوم';
    };
  }

  function wrapCustomRenders() {
    window.renderTiersPage = renderTiersPageFixed;
    window.renderOffersPage = renderOffersPageFixed;
    window.renderReview = renderReviewFixed;
    window.openReview = function () { window.renderReview(true); };
  }

  function patchCheckoutFooter() {
    if (el?.footerBack) {
      el.footerBack.textContent = 'رجوع';
      el.footerBack.onclick = customGoBack;
    }
  }

  function installBoot() {
    if (nav.booted) return;
    if (!products || !tiersData || typeof window.renderHome !== 'function') return;
    nav.booted = true;

    try {
      const raw = safeParse(localStorage.getItem(NAV_KEY), null);
      if (raw && Array.isArray(raw.stack)) nav.stack = raw.stack;
      if (raw && raw.current) nav.current = raw.current;
    } catch (_) {}

    fixHistoryDeduping();
    updateSelectedTierState();
    wrapStrictOfferFilter();
    wrapTierActions();
    wrapCustomRenders();
    wrapOriginalGoBack();
    wrapNav('renderHome', () => ({ page: 'home', payload: {} }));
    wrapNav('renderBrandProducts', (args) => ({ page: 'products', payload: { company: cleanStr(args[0] || lastCompany || ''), returnTo: cleanStr(args[1] || 'home') } }));
    wrapNav('renderTierProductsPage', () => ({ page: 'vipBrands', payload: {} }));
    wrapNav('renderOffersPage', () => ({ page: 'offers', payload: {} }));
    wrapNav('renderTiersPage', () => ({ page: 'tiers', payload: {} }));
    wrapNav('renderReview', () => ({ page: 'review', payload: { company: cleanStr(lastCompany || ''), returnTo: cleanStr(brandReturnTarget || 'home') } }));

    patchCheckoutFooter();
    preloadImages();
    applyThemeFromSelectedTier();
    window.renderTierBanner?.();
    window.updateTierActionButton?.();
    window.updateFooterTotal?.();
    window.syncFooter?.();

    if (currentPage === 'review') window.renderReview(true);
    else if (currentPage === 'offers') window.renderOffersPage(true);
    else if (currentPage === 'tiers') window.renderTiersPage(true);
    else if (currentPage === 'vipBrands') window.renderTierProductsPage(true);
    else if (currentPage === 'products') window.renderBrandProducts(lastCompany || '', brandReturnTarget || 'home', true);
    else window.renderHome(true);
  }

  const bootTimer = setInterval(() => {
    try {
      if ((products && products.length) || (tiersData && tiersData.length)) {
        installBoot();
        if (nav.booted) clearInterval(bootTimer);
      }
    } catch (_) {}
  }, 180);

  window.addEventListener('load', () => {
    try { installBoot(); } catch (_) {}
  });

  window.addEventListener('beforeunload', () => {
    try { saveNav(); persistTierSnapshot(); } catch (_) {}
  });

})();
</script>
