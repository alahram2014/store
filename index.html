<style>
:root{--blue:#0B3D91;--red:#E53935;--orange:#FF7A00;--gold:#b88a00;--gold2:#f5d67a;--gray:#7A8596;--bg:#F5F7FA;--card:#ffffff;--line:#e7e9ee;--text:#172233}
*{box-sizing:border-box}
body{margin:0;font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}
a{color:inherit;text-decoration:none}
.header{position:sticky;top:0;z-index:1000;background:var(--blue);color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.headerMeta{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 12px;background:rgba(10,47,117,.72);backdrop-filter:blur(10px)}
.companyTitle{font-weight:700;font-size:15px;line-height:1.2;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);padding:6px 10px;border-radius:999px}

.news{background:var(--orange);color:#fff;padding:8px 10px;text-align:center;font-weight:700;font-size:14px;min-height:34px;display:flex;align-items:center;justify-content:center}
.tiersWrap{background:#fff;border-bottom:1px solid var(--line);padding:8px 10px}
.tiers{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}.tiers::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid #d7dce5;background:#f8fafc;color:#233044;padding:7px 12px;border-radius:999px;white-space:nowrap;font-size:13px;cursor:pointer;user-select:none}

.searchBar{margin:0 0 10px 0}.searchRow{display:grid;grid-template-columns:1fr 84px 56px;gap:8px}
.searchInput,.unitSelect,.qtyInput,.reviewQtyInput,.input{width:100%;height:42px;border-radius:10px;border:1px solid #d7dce5;padding:0 12px;font-family:inherit;font-size:14px;outline:none;background:#fff}
.searchBtn,.clearBtn,.mainBtn,.addBtn,.qtyBtn,.tierBannerAction{border:none;border-radius:10px;color:#fff;height:42px;font-family:inherit;font-weight:700;cursor:pointer}
.searchBtn{background:var(--blue)}.clearBtn{background:#6b7280}
.searchHint{margin:0 0 10px 0;color:var(--blue);font-weight:700;text-align:center}
.sectionTitle{margin:12px 0 8px;font-weight:700;color:#39485f;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:8px;text-align:center;box-shadow:0 2px 10px rgba(16,24,40,.04);overflow:hidden}
.brandCard{min-height:118px;display:flex;flex-direction:column;justify-content:center;gap:6px}.brandCard .brandImg{width:100%;height:66px;object-fit:contain}.brandCard .brandName{font-weight:700;font-size:13px;line-height:1.3}
.productCard{min-height:252px;display:flex;flex-direction:column;gap:6px}.productCard.inactive{opacity:.95}
.productCard.offerCard{background:linear-gradient(180deg,#fffbe9,#fff8da);border-color:#e0c46c;box-shadow:0 8px 20px rgba(184,138,0,.12)}
.productCard.offerCard .productName{color:#7a5a00}
.productImg{width:100%;height:88px;object-fit:contain;border-radius:10px;background:#f7f9fc}
.productName{font-weight:700;font-size:13px;line-height:1.35;min-height:34px}
.offerLabel{font-weight:700;font-size:12px;line-height:1.3;color:#8b6500;min-height:18px}
.stockBadge{display:inline-flex;align-items:center;justify-content:center;padding:5px 9px;border-radius:999px;font-size:11px;font-weight:700;margin:0 auto}
.stockBadge.active{background:#e8f5ee;color:#16824b}.stockBadge.inactive{background:#fff0f0;color:#bf2c2c}
.cartonPrice{font-weight:700;font-size:13px;line-height:1.35;min-height:20px;color:var(--red)}
.cartonPrice .old{color:var(--gray);text-decoration:line-through;display:block}.cartonPrice .new{color:var(--red);display:block}
.price{color:var(--red);font-weight:700;font-size:14px;min-height:22px}
.price.offer{color:#8b6500}
.price.wait{color:var(--gray);font-weight:700}
.unitSelect{height:36px;padding:0 10px;font-size:13px;color:#1f2a3a}
.qtyWrap{display:grid;grid-template-columns:34px 1fr 34px;gap:5px;align-items:center}
.qtyBtn{width:34px;height:34px;border:none;border-radius:10px;background:#e9edf3;color:#1f2a3a;font-size:18px;font-weight:700}
.qtyBtn:disabled,.unitSelect:disabled,.qtyInput:disabled,.addBtn:disabled{opacity:.55;cursor:not-allowed}
.qtyInput{text-align:center}
.addBtn{margin-top:auto;background:linear-gradient(135deg,var(--orange),#ff9a3a);padding:10px 12px;min-height:40px}
.addBtn.offer{background:linear-gradient(135deg,#c59a14,#f4d76b);color:#5a4300}
.footer{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:92px 1fr 92px;align-items:center;gap:8px;padding:10px;box-shadow:0 -2px 10px rgba(0,0,0,.04)}
.footerBtn{text-align:center;font-weight:700;color:#1f2a3a;cursor:pointer;user-select:none}.footerTotal{text-align:center;font-weight:700;color:var(--blue);font-size:15px}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:2000;min-width:180px;max-width:90vw;background:#1f8b4c;color:#fff;padding:10px 14px;border-radius:999px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.18);display:none;font-size:14px}.toast.error{background:#c0392b}.toast.info{background:#0B3D91}
.reviewWrap{display:flex;flex-direction:column;gap:10px}.reviewSummary,.reviewItem,.formCard{background:#fff;border:1px solid var(--line);border-radius:14px}.reviewSummary{padding:12px;line-height:1.8}.reviewItem{padding:10px;line-height:1.7}.reviewItemTop{font-weight:700}.reviewControls{display:grid;grid-template-columns:34px 1fr 34px;gap:5px;align-items:center;margin-top:8px}.reviewQtyInput{text-align:center}.reviewAction{margin-top:8px;text-align:center;color:var(--red);font-weight:700;cursor:pointer;user-select:none}.formCard{padding:12px}.input{margin-bottom:8px}.input:focus,.unitSelect:focus,.qtyInput:focus,.reviewQtyInput:focus,.searchInput:focus{border-color:#8fb0e6;box-shadow:0 0 0 3px rgba(11,61,145,.08)}.mainBtn{width:100%;border:none;border-radius:12px;min-height:46px;font-size:16px;font-weight:700;cursor:pointer}.mainBtn.primary{background:linear-gradient(135deg,var(--orange),#ff9a3a);color:#fff}.mainBtn.secondary{background:#eff3f8;color:#1f2a3a}.locationStatus{margin-top:6px;font-size:13px;color:var(--gray);min-height:20px}.emptyState{background:#fff;border:1px dashed #d7dce5;border-radius:14px;padding:20px;text-align:center;color:var(--gray)}.designSignature{margin:10px 0 0;background:#fff;border:1px solid var(--line);border-radius:12px;text-align:center;padding:8px 10px;color:#4b5563;font-size:12px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.04)}.hidden{display:none!important}
body.compact .headerMeta,body.compact .hero{display:none}
body.compact .news{font-size:13px;min-height:30px;padding:6px 8px}
body.compact .tiersWrap{padding:6px 8px}
body.compact .contactRow{padding:6px 8px 8px;gap:6px}
body.compact .contactBtn{min-height:34px;font-size:12px;border-radius:10px}
body.compact .back{padding:8px 10px;font-size:13px}
body.compact #app{padding-top:8px}
body.compact .chip{padding:6px 10px;font-size:12px}
body.offerMode .tiersWrap{display:none}
body.homeMode .contactRow{margin-top:-14px;margin-inline:10px;border-bottom:none;background:rgba(255,255,255,.16);backdrop-filter:blur(10px);border-radius:14px;position:relative;z-index:3;box-shadow:0 4px 14px rgba(0,0,0,.08)}
body.homeMode .contactBtn{background:rgba(11,61,145,.74)}
body.homeMode .contactBtn.wa{background:rgba(31,139,76,.74)}
body.homeMode .headerMeta{background:rgba(10,47,117,.52)}
body.purchaseMode .contactRow{position:sticky;top:0;background:#fff}
body.purchaseMode .headerMeta{background:#0a2f75}
body.purchaseMode .contactRow .contactBtn{filter:none}
</style>
</head>
<body>
<div class="header">
  <div class="headerMeta">
    <div class="companyTitle">الأهرام للتجارة والتوزيع</div>

<div id="app"></div>
<div class="footer"><div class="footerBtn" onclick="goBack()">⬅ رجوع</div><div class="footerTotal" id="totalBox">0 جنيه</div><div class="footerBtn" onclick="openReview()">🧾 مراجعة</div></div>
<div class="toast" id="toastBox"></div>
<script>
const URLS={products:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=2123604928&output=csv",tiers:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=688371996&output=csv",settings:"https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1922249138&output=csv"};
const PLACEHOLDERS={header:"https://via.placeholder.com/1200x400/f5f7fa/0B3D91?text=Alahram+Store",brand:(n)=>`https://via.placeholder.com/400x250/f5f7fa/0B3D91?text=${encodeURIComponent(n||"Brand")}`,product:(n)=>`https://via.placeholder.com/400x250/f7f9fc/0B3D91?text=${encodeURIComponent(n||"Product")}`};
const UNIT_NAMES={carton:"كرتونة",dozen:"دستة",piece:"قطعة",offer:"عرض"};
const LS={cart:"alahram_cart_v7",tier:"alahram_tier_v7",customer:"alahram_customer_v7",drafts:"alahram_drafts_v7"};
const el={headerImg:document.getElementById("headerImg"),news:document.getElementById("news"),tiersBar:document.getElementById("tiersBar"),tierBanner:document.getElementById("tierBanner"),backBtn:document.getElementById("backBtn"),app:document.getElementById("app"),totalBox:document.getElementById("totalBox"),toastBox:document.getElementById("toastBox")};
const clean=v=>(v??"").toString().trim(); const toNum=v=>{const n=parseFloat(v);return Number.isFinite(n)?n:0};
const saveJSON=(k,v)=>localStorage.setItem(k,JSON.stringify(v)); const loadJSON=(k,f)=>{try{const r=localStorage.getItem(k);return r?JSON.parse(r):f}catch{return f}};
const stripDiacritics=str=>clean(str).normalize("NFKD").replace(/[\u064B-\u065F\u0670\u0640]/g,"");
const normalizeLoose=str=>stripDiacritics(str).toLowerCase().replace(/[أإآ]/g,"ا").replace(/ى/g,"ي").replace(/ؤ/g,"و").replace(/ئ/g,"ي").replace(/ة/g,"ه").replace(/[^\w\u0600-\u06FF ]+/g," ").replace(/\s+/g," ").trim();
const normalizeCompact=str=>normalizeLoose(str).replace(/\s+/g,"");
const escapeAttr=v=>String(v).replaceAll("&","&amp;").replaceAll('"',"&quot;").replaceAll("<","&lt;").replaceAll(">","&gt;");
let products=[],tiersData=[],settings=[],cart=loadJSON(LS.cart,{}),selectedTier=loadJSON(LS.tier,null),customer=loadJSON(LS.customer,{}),drafts=loadJSON(LS.drafts,{}),currentPage="home",lastCompany=null,reviewReturn={type:"home",value:null},searchQuery="",searchTimer=null;
function persistAll(){saveJSON(LS.cart,cart);saveJSON(LS.tier,selectedTier);saveJSON(LS.customer,customer);saveJSON(LS.drafts,drafts)}
function notify(message,kind="ok"){el.toastBox.textContent=message;el.toastBox.className=`toast ${kind}`;el.toastBox.style.display="block";clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>el.toastBox.style.display="none",1400)}
function loadCSV(url){return new Promise(resolve=>Papa.parse(`${url}&t=${Date.now()}`,{download:true,header:true,skipEmptyLines:true,complete:res=>resolve(res.data||[])}))}
function setCompactMode(isCompact){document.body.classList.toggle("compact",!!isCompact)}
function setOfferMode(isOffer){document.body.classList.toggle("offerMode",!!isOffer)}
function setMode(mode){document.body.classList.toggle("homeMode",mode==="home");document.body.classList.toggle("purchaseMode",mode!=="home")}
function getProductCode(p){return clean(p.codo||p.code||p.CODO||p.CODE)}
function getCompany(p){return clean(p.company)}
function isOfferProduct(p){return getCompany(p)==="صفقة اليوم"}
function isActiveProduct(p){const s=clean(p.status).toLowerCase();return s==="active"||s==="فعال"}
function getOfferLabel(p){return clean(p.offer_label||p.offer_name||p.offer||"")}
function getDisplayName(p){const explicit=clean(p.name||p.product_name||p.item_name||p.item||p.title);return explicit||getOfferLabel(p)||"صنف"}
function getOriginalPrice(p,unit){if(unit==="offer") return toNum(p.price_offer||p.offer_price||p.priceعرض); return toNum(p[`price_${unit}`])}
function getDiscountedPrice(base){const d=selectedTier?toNum(selectedTier.tier_discount):0; return (!selectedTier||d<=0)?base:Math.max(0,base-(base*d/100))}
function isAddableToCart(p){const raw=p.allow_cart??p.add_to_cart??p.can_add_to_cart??p.orderable??p.can_order??p.buyable??p.purchasable??p.cartable??p.allow_order; if(raw===undefined||raw===null||clean(raw)==="") return true; const s=normalizeLoose(raw).replace(/\s+/g,""); const F=["0","false","no","n","لا","غيرمتاح","ممنوع","disabled","off","inactive","غيرمسموح"]; const T=["1","true","yes","y","نعم","متاح","مسموح","allow","allowed","available","active","فعال","ok","on"]; if(F.includes(s)) return false; if(T.includes(s)) return true; if(raw===0||raw==="0") return false; if(raw===1||raw==="1") return true; return true}
function getSubtotal(){return Object.values(cart).reduce((s,it)=>s+(toNum(it.qty)*toNum(it.price)),0)}
function getTierMin(){return selectedTier?toNum(selectedTier.tier_min):0}
function getTierDiscount(){return selectedTier?toNum(selectedTier.tier_discount):0}
function isTierSatisfied(){return !selectedTier||getSubtotal()>=getTierMin()}
function getDiscountAmount(){return (!selectedTier||!isTierSatisfied())?0:getSubtotal()*(getTierDiscount()/100)}
function getPayableTotal(){return Math.max(0,getSubtotal()-getDiscountAmount())}
function updateFooterTotal(){el.totalBox.textContent=`${Math.round(getPayableTotal()).toLocaleString("en-US")} جنيه`}
function hasOfferItems(){return Object.values(cart).some(item=>clean(item.company)==="صفقة اليوم"||clean(item.unit)==="offer")}
function clearCart(){cart={};drafts={};persistAll();updateFooterTotal()}
function renderTiers(){el.tiersBar.innerHTML="";tiersData.forEach(t=>{const key=t.tier_id?clean(t.tier_id):clean(t.tier_name),activeKey=selectedTier?(selectedTier.tier_id?clean(selectedTier.tier_id):clean(selectedTier.tier_name)):"";const chip=document.createElement("div");chip.className=`chip${activeKey===key?" active":""}`;chip.textContent=t.tier_name;chip.onclick=()=>selectTier(t);el.tiersBar.appendChild(chip)}); if(selectedTier){el.tierBanner.style.display="block";el.tierBanner.innerHTML=`<div class="tierBannerRow"><div>أنت الآن على شريحة: <b>${selectedTier.tier_name}</b> — الخصم <b>${getTierDiscount()}%</b> — الحد الأدنى <b>${(getTierMin()?getTierMin().toLocaleString("en-US"):0)} جنيه</b></div><button class="tierBannerAction" onclick="clearTier()">إلغاء الشريحة</button></div>`}else{el.tierBanner.style.display="none";el.tierBanner.innerHTML=""}}
function selectTier(t){if(hasOfferItems()){clearCart();notify("تم تفريغ السلة لأن العروض لا تُجمع مع الشرائح","info")} selectedTier=t;persistAll();renderTiers(); if(currentPage==="home")renderHome(); else if(currentPage==="products")renderProducts(lastCompany); else if(currentPage==="review")renderReview(); updateFooterTotal()}
function clearTier(){selectedTier=null;persistAll();renderTiers(); if(currentPage==="home")renderHome(); else if(currentPage==="products")renderProducts(lastCompany); else if(currentPage==="review")renderReview(); updateFooterTotal();notify("تم إلغاء الشريحة","info")}
function productSearchScore(p,raw){const qLoose=normalizeLoose(raw),q=normalizeCompact(raw); if(!q) return 0; const code=getProductCode(p),name=getDisplayName(p),company=getCompany(p),nameC=normalizeCompact(name),codeC=normalizeCompact(code),companyC=normalizeCompact(company),all=[nameC,codeC,companyC,normalizeCompact(String(getOriginalPrice(p,"carton"))),normalizeCompact(String(getOriginalPrice(p,"dozen"))),normalizeCompact(String(getOriginalPrice(p,"piece"))),normalizeCompact(String(getOriginalPrice(p,"offer"))),normalizeCompact(getOfferLabel(p))].join(" "); let score=0; if(nameC===q||codeC===q)score+=1500; if(nameC.startsWith(q))score+=1200; if(codeC.startsWith(q))score+=1100; if(companyC.startsWith(q))score+=800; if(nameC.includes(q))score+=700; if(codeC.includes(q))score+=550; if(companyC.includes(q))score+=300; if(all.includes(q))score+=150; const tokens=qLoose.split(" ").filter(Boolean); if(tokens.length>1){let allFound=true,points=0; for(const tok of tokens){const t=normalizeCompact(tok),hitName=nameC.includes(t),hitCode=codeC.includes(t),hitCompany=companyC.includes(t); if(!hitName&&!hitCode&&!hitCompany){allFound=false;break} if(nameC.startsWith(t))points+=50; else if(nameC.includes(t))points+=25; else if(companyC.includes(t))points+=10} if(allFound)score+=250+points} return score}
const sortSearchResults=(list,raw)=>list.map(p=>({p,score:productSearchScore(p,raw)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score||clean(a.p.name).localeCompare(clean(b.p.name),"ar")).map(x=>x.p);
function renderBrandsGrid(visible){return `<div class="grid">${visible.map(b=>{const sample=products.find(p=>clean(p.company)===b),img=clean(sample?.brand_image)||PLACEHOLDERS.brand(b); return `<div class="card brandCard" data-company="${escapeAttr(b)}"><img class="brandImg" src="${img}" alt="${escapeAttr(b)}" onerror="this.src='${PLACEHOLDERS.brand(b)}'"><div class="brandName">${b}</div></div>`}).join("")}</div>`}
function bindBrandCards(){document.querySelectorAll(".brandCard").forEach(card=>card.onclick=()=>{const company=clean(card.getAttribute("data-company")); if(company) renderProducts(company)})}
function renderHome(){currentPage="home";lastCompany=null;setCompactMode(false);setOfferMode(false);setMode("home");el.backBtn.style.display="none";el.app.innerHTML=`<div class="searchBar"><div class="searchRow"><input class="searchInput" id="searchInput" placeholder="ابحث باسم الصنف أو الكود أو الرقم..." value="${escapeAttr(searchQuery)}" oninput="debouncedSearch(this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault(); renderSearchAndBrands();}"><button class="searchBtn" onclick="renderSearchAndBrands()">🔎 بحث</button><button class="clearBtn" onclick="clearSearch()" title="مسح">✖</button></div></div><div id="searchResults"></div><div id="brandsArea"></div><div class="designSignature">تم التصميم بواسطة YaSsEr EL Joker</div>`; renderSearchAndBrands(); updateFooterTotal()}
function clearSearch(){searchQuery="";clearTimeout(searchTimer);const input=document.getElementById("searchInput");if(input)input.value="";renderSearchAndBrands();document.getElementById("searchInput")?.focus()}
function debouncedSearch(value){searchQuery=clean(value);clearTimeout(searchTimer);searchTimer=setTimeout(renderSearchAndBrands,180)}

function renderProducts(company){const companyName=clean(company),offerMode=companyName==="صفقة اليوم"; currentPage="products";lastCompany=companyName;setCompactMode(true);setOfferMode(offerMode);setMode("purchase");el.backBtn.style.display="block"; const list=products.filter(p=>clean(p.company)===companyName); if(!list.length){el.app.innerHTML=`<div class="emptyState">لا توجد منتجات داخل هذا القسم</div>`;updateFooterTotal();return} const sortedList=companyName==="صفقة اليوم"?list.slice().sort((a,b)=>{const la=getOfferLabel(a),lb=getOfferLabel(b);return la.localeCompare(lb,"ar")}):list; el.app.innerHTML=`${offerMode?`<div class="offerNotice">صفقة اليوم: العروض لا تُجمع مع الشرائح، ولا يتم تطبيق خصم الشريحة عليها.</div>`:""}${renderProductsGrid(sortedList)}`; sortedList.forEach(p=>restoreDraftForProduct(p.__uiKey)); updateFooterTotal()}
