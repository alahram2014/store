<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>الأهرام للتجارة والتوزيع</title>
<meta name="theme-color" content="#c79b18" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{
  --gold:#c79b18; --gold2:#f0d46c; --gold3:#8a5a00; --bg:#fbf4de; --card:#ffffff;
  --soft:#fffdf6; --line:#ead08a; --text:#1d2633; --muted:#667085; --accent:#0b3d91;
  --danger:#c0392b; --success:#1f8b4c;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:'Cairo',sans-serif;
  background:linear-gradient(180deg,#fff7df,#fbf4de 30%,#f8f0da);
  color:var(--text); -webkit-tap-highlight-color:transparent;
}
a{text-decoration:none;color:inherit}
button,input,select{font-family:inherit}
img{max-width:100%;display:block}
#app{padding:12px 12px 116px;max-width:980px;margin:0 auto}
.header{position:static;z-index:1000;background:linear-gradient(180deg,#c79b18,#8a5a00);color:#fff;box-shadow:0 6px 20px rgba(0,0,0,.08);overflow:hidden}
.hero{position:relative;height:116px;background:linear-gradient(135deg,#8a5a00,#c79b18)}
.hero img{width:100%;height:100%;object-fit:cover;filter:saturate(1.05) contrast(1.02)}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.60),rgba(0,0,0,.06))}
.heroText{position:absolute;inset:0;z-index:2;padding:12px 14px;display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;gap:6px;text-align:right}
.companyBrand{display:flex;align-items:center;justify-content:flex-start;flex-direction:row-reverse;gap:10px;width:100%}
.companyLogo{width:56px;height:56px;border-radius:14px;object-fit:cover;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.24);box-shadow:0 8px 18px rgba(0,0,0,.12);display:none}
.companyTextWrap{display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:0}
.companyName{margin-top:1px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(8px);color:#fff;padding:8px 12px;border-radius:16px;font-weight:800;font-size:15px;line-height:1.2;box-shadow:0 8px 18px rgba(0,0,0,.12)}
.tagline{background:rgba(255,248,227,.16);border:1px solid rgba(255,248,227,.18);backdrop-filter:blur(8px);color:#fffbe8;padding:6px 10px;border-radius:14px;font-size:11px;font-weight:700;line-height:1.45;max-width:92%}
.socialRow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 12px 6px;background:rgba(255,255,255,.06)}
.socialBtn{min-height:38px;border:none;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:800;cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.10)}
.socialBtn.phone{background:#fff;color:#0b3d91}.socialBtn.wa{background:#1f8b4c;color:#fff}.socialBtn.fb{background:#fff;color:#0b3d91}
.newsTicker{background:linear-gradient(135deg,#fff0c1,#f0d46c);color:#5a4300;padding:6px 12px;font-size:12px;font-weight:800;min-height:32px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.5;border-top:1px solid rgba(255,255,255,.12)}
.topActions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;padding:8px 12px 10px}
.topBtn{min-height:44px;border:none;border-radius:16px;font-size:12px;font-weight:800;cursor:pointer;box-shadow:0 8px 18px rgba(0,0,0,.11);min-width:0;width:100%;padding:8px 10px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;justify-content:center;text-align:center;gap:6px;flex-direction:row}
.topBtn.tier{background:linear-gradient(135deg,#fff7cf,#f0d46c);color:#5a4300}
.topBtn.tier.active{background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff;box-shadow:0 10px 20px rgba(31,139,76,.18);border:1px solid rgba(255,255,255,.25)}
.topBtn.offer{background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff}
.topBtn.repBtn{background:linear-gradient(135deg,#8a5a00,#c79b18);color:#fff}
.topBtn.repChip{background:linear-gradient(135deg,#fff7cf,#f0d46c);color:#5a4300}
.quickNav{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding:0 12px 10px}
.quickNavBtn{min-height:34px;border:1px solid var(--line);background:rgba(255,255,255,.92);border-radius:999px;font-size:11px;font-weight:800;color:#5a4300;box-shadow:0 6px 12px rgba(0,0,0,.05)}
.quickNavBtn.primary{background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff;border:none}
.searchBox{margin:0 0 8px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:8px;box-shadow:0 6px 16px rgba(0,0,0,.04)}
.searchRow{display:grid;grid-template-columns:1fr 84px 52px;gap:8px}
.searchInput,.unitSelect,.qtyInput,.formInput{width:100%;height:44px;border-radius:12px;border:1px solid #d8dde7;padding:0 12px;font-size:14px;outline:none;background:#fff}
.searchInput:focus,.unitSelect:focus,.qtyInput:focus,.formInput:focus{border-color:#d4b14b;box-shadow:0 0 0 3px rgba(199,155,24,.12)}
.searchBtn,.clearBtn{min-height:44px;color:#fff;font-weight:800;border:none;border-radius:12px}
.searchBtn{background:var(--accent)}.clearBtn{background:#6b7280}
.sectionCard,.infoCard,.brandCard,.productCard,.tierCard,.cartCard,.emptyCard{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 6px 16px rgba(0,0,0,.04)}
.sectionCard,.infoCard,.cartCard,.emptyCard{padding:10px;margin-bottom:8px}
.sectionTitle{margin:0 0 8px;font-size:14px;font-weight:800;color:#173a84}
.sectionSub{color:var(--muted);font-size:12px;line-height:1.65}
.brandGrid,.productGrid,.tierGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.brandCard,.productCard,.tierCard{overflow:hidden}
.brandCard{padding:8px;min-height:116px;display:flex;flex-direction:column;gap:8px;justify-content:center;text-align:center}
.brandImg,.productImg{width:100%;height:160px;object-fit:contain;background:#f8fafc;border-radius:14px}
.brandName{font-weight:800;color:#5a4300;font-size:13px;line-height:1.35}
.productCard{padding:10px;display:flex;flex-direction:column;gap:9px;min-height:358px}
.productName{font-weight:800;font-size:13px;line-height:1.45;min-height:38px}
.priceLine{font-weight:800;color:#c0392b;font-size:14px}
.offerLabel{color:#7a5a00;font-weight:800}
.stockBadge{display:inline-flex;align-items:center;justify-content:center;margin:0 auto;padding:5px 10px;border-radius:999px;background:#fff0f0;color:#b63c2a;font-weight:800}
.stockBadge.ok{background:#e8f7ee;color:#1f8b4c}
.unitSelect{height:38px;font-size:13px}
.qtyRow{display:grid;grid-template-columns:40px 1fr 40px;gap:6px;align-items:center}
.qtyBtn{height:40px;font-size:18px;font-weight:900;background:#e9edf3;border:none;border-radius:12px}
.qtyInput{text-align:center}
.addBtn,.primaryBtn,.secondaryBtn,.dangerBtn,.repAction{min-height:44px;font-weight:800;font-size:15px;border:none;border-radius:12px}
.footerDock{position:fixed;bottom:0;left:0;right:0;z-index:2200;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);box-shadow:0 -8px 20px rgba(0,0,0,.08)}
.footerBtn{min-height:46px;border:none;border-radius:14px;font-weight:800;cursor:pointer}
.footerBtn.quick{background:linear-gradient(135deg,#8a5a00,#c79b18);color:#fff}
.footerBtn.checkout{background:linear-gradient(135deg,#1f8b4c,#2da35d);color:#fff}
.footerTotal{display:flex;align-items:center;justify-content:center;border:1px solid var(--line);background:#fff;border-radius:14px;font-weight:900;color:#5a4300;box-shadow:0 6px 12px rgba(0,0,0,.04);min-height:46px;padding:0 10px}
.old{text-decoration:line-through;color:#8b8f98;margin-inline-end:6px}
.priceNow{color:#c0392b;font-weight:900}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800}
.cartCard cartItem{padding:10px;display:flex;flex-direction:column;gap:8px}
.modal{position:fixed;inset:0;z-index:4000;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.45);backdrop-filter:blur(4px)}
.modal.show{display:flex}
.modalCard{width:min(430px,100%);background:#fff;border-radius:22px;border:1px solid #ead08a;box-shadow:0 26px 60px rgba(0,0,0,.2);padding:16px}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:5000;max-width:92vw;padding:10px 14px;border-radius:999px;background:#1f8b4c;color:#fff;display:none;font-size:14px;font-weight:800}
.toast.error{background:#c0392b}
@media (min-width:700px){#app{padding-inline:16px}.brandGrid,.productGrid,.tierGrid{grid-template-columns:repeat(3,minmax(0,1fr))}}
</style>
</head>
<body>
<div class="header">
  <div class="hero">
    <img id="heroImage" alt="الأهرام للتجارة والتوزيع" />
    <div class="heroText">
      <div class="companyBrand">
        <img id="companyLogo" class="companyLogo" alt="الأهرام للتجارة والتوزيع" />
        <div class="companyTextWrap">
          <div class="companyName">الأهرام للتجارة والتوزيع</div>
          <div class="tagline" id="heroTagline">تشكيل كبير ومتنوع لأكبر شركات مستحضرات التجميل</div>
        </div>
      </div>
    </div>
  </div>
  <div class="socialRow">
    <a class="socialBtn phone" href="tel:01040880002">📞</a>
    <a class="socialBtn wa" href="https://wa.me/201040880002" target="_blank">واتساب</a>
    <a class="socialBtn fb" href="https://www.facebook.com/alahram2014" target="_blank">Facebook</a>
  </div>
  <div class="newsTicker" id="newsTicker">جارٍ تحميل الأخبار...</div>
  <div class="topActions" id="topActions"></div>
  <div class="quickNav">
    <button class="quickNavBtn primary" type="button" onclick="goCompanies()">🏢 الشركات</button>
    <button class="quickNavBtn" type="button" onclick="goHome()">🏠 الرئيسية</button>
  </div>
</div>

<div class="footerDock">
  <button class="footerBtn quick" onclick="quickShop()">التسوق السريع</button>
  <div class="footerTotal" id="footerTotal">0 جنيه</div>
  <button class="footerBtn checkout" onclick="goCart()">إتمام الشراء</button>
</div>

<div id="app"><div class="emptyCard">جارٍ التحميل...</div></div>
<div class="toast" id="toast"></div>

<div class="modal" id="repModal">
  <div class="modalCard">
    <h3>دخول المندوب</h3>
    <input class="formInput" id="repCode" placeholder="كود المندوب">
    <input class="formInput" id="repPassword" type="password" placeholder="الرقم السري" style="margin-top:10px">
    <button class="primaryBtn" id="repLoginBtn" onclick="submitRepLogin()" style="margin-top:15px">دخول</button>
    <button class="secondaryBtn" onclick="closeRepLogin()" style="margin-top:8px">إلغاء</button>
  </div>
</div>

<div class="modal" id="tierModal">
  <div class="modalCard">
    <h3 id="tierModalText">تفعيل الشريحة</h3>
    <input class="formInput" id="tierPassword" type="password" placeholder="الرقم السري">
    <button class="primaryBtn" id="tierLoginBtn" onclick="submitTierPassword()" style="margin-top:15px">تفعيل</button>
    <button class="secondaryBtn" onclick="closeTierPassword()" style="margin-top:8px">إلغاء</button>
  </div>
</div>

<script>
const DATA = {
  productsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1503749054&single=true&output=csv",
  settingsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=47255050&single=true&output=csv",
  repsUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=1633587789&single=true&output=csv",
  tiersUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSRFXsca9uGfjZBwUH68RB1b_4Qcow1Ena2qeLo4WK_33rUAcqrQPrp2wD0MTaPaHKkQ3kC-BYH8QSK/pub?gid=917474192&single=true&output=csv",
  authUrl: "https://script.google.com/macros/s/AKfycbwaB-bv-GdQ78TdFmX_p3RKjze2bMjlHAuNip1yaPashWGhqXEO6-i8_2jmh48K1GuYzw/exec",
  orderUrl: "https://script.google.com/macros/s/AKfycbw36ri62dxHKYrw5D1sCg8utxKBoWdrqHj8IHj07BCwkvBeIOrgXs7Hto4IFOCSx3wqcA/exec"
};

const LS = { cart: "alah_c", tier: "alah_t", rep: "alah_r", customer: "alah_cust", unlocks: "alah_u", page: "alah_p", drafts: "alah_d" };
let state = { products:[], tiers:[], settings:[], reps:[], cart:loadJSON(LS.cart,{}), selectedTier:loadJSON(LS.tier,null), rep:loadJSON(LS.rep,null), customer:loadJSON(LS.customer,{name:"",phone:"",address:"",location:""}), tierUnlocks:loadJSON(LS.unlocks,{}), page:loadJSON(LS.page,"home"), search:"", loading:true, brands:[], brandImages:{}, currentBrand:"", pendingTier:null, drafts:loadJSON(LS.drafts,{}) };

const els = { app:document.getElementById("app"), toast:document.getElementById("toast"), heroImage:document.getElementById("heroImage"), heroTagline:document.getElementById("heroTagline"), newsTicker:document.getElementById("newsTicker"), topActions:document.getElementById("topActions"), footerTotal:document.getElementById("footerTotal"), repModal:document.getElementById("repModal"), tierModal:document.getElementById("tierModal"), repCode:document.getElementById("repCode"), repPassword:document.getElementById("repPassword"), tierPassword:document.getElementById("tierPassword"), tierModalText:document.getElementById("tierModalText") };

// --- الأساسيات (نسخ لصق من كودك المرجعي) ---
function loadJSON(k,f){try{const r=localStorage.getItem(k);return r?JSON.parse(r):f}catch{return f}}
function saveJSON(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function clean(v){return (v??"").toString().trim()}
function html(v){return String(v??"").replaceAll("&","&").replaceAll("<","<").replaceAll(">","<").replaceAll('"',""")}
function num(v){const r=clean(v).replace(/[٬،\s,]/g,"");const p=parseFloat(r);return Number.isFinite(p)?p:0}
function norm(s){return clean(s).normalize("NFKD").replace(/[\u064B-\u065F\u0670\u0640]/g,"").toLowerCase().replace(/[أإآ]/g,"ا").replace(/ى/g,"ي").replace(/ة/g,"ه").replace(/\s+/g," ").trim()}
function compact(s){return norm(s).replace(/\s/g,"")}
function toast(m,t="ok"){els.toast.textContent=m;els.toast.className=`toast ${t==="error"?"error":""}`;els.toast.style.display="block";setTimeout(()=>els.toast.style.display="none",2000)}
function fetchCSV(u){return new Promise(res=>{Papa.parse(`${u}&t=${Date.now()}`,{download:true,header:true,skipEmptyLines:true,complete:r=>res((r.data||[]).filter(Boolean)),error:()=>res([])})})}
function saveState(){saveJSON(LS.cart,state.cart);saveJSON(LS.tier,state.selectedTier);saveJSON(LS.rep,state.rep);saveJSON(LS.customer,state.customer);saveJSON(LS.unlocks,state.tierUnlocks);saveJSON(LS.page,state.page);saveJSON(LS.drafts,state.drafts)}

// --- قواعد الأسعار والشرائح (نسخ من كودك) ---
function tierKey(r){return clean(r?.tier_id||r?.tier_name||"")}
function tierLabel(r){return clean(r?.visible_label||r?.tier_name||"")}
function tierMin(r){return num(r?.tier_min||0)}
function tierPasswordLocal(r){return clean(r?.tier_password||"")}
function tierIsProtected(r){return !!tierPasswordLocal(r)}
function tierIsUnlocked(r){return !tierIsProtected(r)||!!state.tierUnlocks[compact(tierKey(r))]}
function repCode(r){return clean(r?.repId||r?.rep_id||"")}
function repName(r){return clean(r?.repName||r?.name||"")}
function companyName(r){return clean(r?.company||"")}
function productCode(r){return clean(r?.codo||r?.code||"")}
function productName(r){return clean(r?.name||"")}
function productKey(r){return clean(r?.id||r?.codo||"")}
function isOffer(r){return companyName(r)==="صفقة اليوم"||num(r.price_offer)>0}
function isActive(r){const s=clean(r.status).toLowerCase();return !s||["1","true","active","فعال"].includes(s)}

function basePrice(r, u){
  const map = { carton:["price_carton","carton_price"], dozen:["price_dozen","dozen_price"], piece:["price_piece","piece_piece"], offer:["price_offer"] };
  for(let k of map[u]||[]){if(num(r[k])>0)return num(r[k])}return 0;
}
function effectivePrice(r, u){
  if(state.selectedTier){
    const tk = compact(`${tierKey(state.selectedTier)}_${u}`);
    for(let [k,v] of Object.entries(r)){if(compact(k)===tk && num(v)>0)return num(v)}
  }
  if(state.rep){
    const rk = compact(`rep_price_${u}`);
    if(num(r[rk])>0)return num(r[rk]);
  }
  return basePrice(r, u);
}
function availableUnits(r){return ["carton","dozen","piece"].filter(u=>effectivePrice(r,u)>0)}
function cartTotal(){return Object.values(state.cart).reduce((s,i)=>s+(i.qty*i.price),0)}

// --- الأمان المربوط بالسيرفر (التعديل الوحيد) ---
async function submitRepLogin() {
  const code = clean(els.repCode.value); const pass = clean(els.repPassword.value);
  if (!code || !pass) return toast("أدخل الكود والرقم السري", "error");
  const btn = document.getElementById("repLoginBtn"); btn.textContent = "تحقق..."; btn.disabled = true;
  try {
    const res = await fetch(DATA.authUrl, { method:"POST", body:JSON.stringify({action:"check_rep", code, password:pass}) });
    const r = await res.json();
    if (r.success) {
      state.rep = r.repData; saveState(); closeRepLogin(); render(); toast(`أهلاً يا ${state.rep.repName}`, "ok");
    } else toast(r.message || "بيانات خطأ", "error");
  } catch { toast("خطأ اتصال بالسيرفر", "error"); }
  finally { btn.textContent = "دخول"; btn.disabled = false; }
}

async function submitTierPassword() {
  const row = state.pendingTier; const entered = clean(els.tierPassword.value);
  if (!row || !entered) return toast("أدخل الرقم السري", "error");
  const btn = document.getElementById("tierLoginBtn"); btn.textContent = "تحقق..."; btn.disabled = true;
  try {
    const res = await fetch(DATA.authUrl, { method:"POST", body:JSON.stringify({action:"check_tier", tierId:tierKey(row), password:entered}) });
    const r = await res.json();
    if (r.success) {
      state.tierUnlocks[compact(tierKey(row))] = true; saveState(); closeTierPassword(); activateTier(row);
    } else toast(r.message || "رقم سري خطأ", "error");
  } catch { toast("خطأ اتصال بالسيرفر", "error"); }
  finally { btn.textContent = "تفعيل"; btn.disabled = false; }
}

// --- العرض والوظائف (نسخ من كودك المرجعي) ---
function buildBrandImageCache(){state.brandImages={};state.products.forEach(p=>{const c=compact(companyName(p));if(c&&p.brand_image)state.brandImages[c]=p.brand_image})}
function getBrandImage(c){return state.brandImages[compact(c)]||""}
function brandList(){return [...new Set(state.products.filter(isActive).map(companyName))].filter(c=>c&&c!=="صفقة اليوم")}

function renderHome(){
  state.page="home"; saveState();
  const q = compact(state.search);
  const brands = brandList();
  let h = `<div class="searchBox"><div class="searchRow"><input class="searchInput" value="${state.search}" oninput="state.search=this.value; renderHome()" placeholder="ابحث باسم الصنف..."></div></div>`;
  if(q){
    const res = state.products.filter(p=>isActive(p) && (norm(p.name).includes(q)||norm(p.company).includes(q)));
    h += `<div class="productGrid">${res.slice(0,30).map(productCard).join("")}</div>`;
  } else {
    h += `<div class="brandGrid">` + brands.map(b=>`<div class="brandCard" onclick="openBrand('${b}')">${getBrandImage(b)?`<img class="brandImg" src="${getBrandImage(b)}">`:''}<b>${b}</b></div>`).join("") + `</div>`;
  }
  els.app.innerHTML = h; renderTopActions();
}

function productCard(p){
  const key = productKey(p); const id = key.replace(/\W/g,"_");
  const offer = isOffer(p); const unit = offer?"offer": (state.drafts[key]?.unit || availableUnits(p)[0]);
  const price = effectivePrice(p, unit);
  return `<div class="productCard">
    ${p.image?`<img class="productImg" src="${p.image}">`:''}
    <div class="productName">${html(p.name)}</div>
    <div class="priceLine">${Math.round(price)} ج (${offer?'عرض':unit})</div>
    <div class="qtyRow">
      <button class="qtyBtn" onclick="changeDraftQty('${key}',-1)">-</button>
      <input class="qtyInput" value="${state.drafts[key]?.qty||1}" oninput="setDraftQty('${key}',this.value)">
      <button class="qtyBtn" onclick="changeDraftQty('${key}',1)">+</button>
    </div>
    <button class="addBtn" onclick="addToCart('${key}','${unit}')">أضف للسلة</button>
  </div>`;
}

function openBrand(b){ state.currentBrand=b; state.page="brand"; renderBrand(); }
function renderBrand(){
  const list = state.products.filter(p=>isActive(p) && companyName(p)===state.currentBrand);
  els.app.innerHTML = `<button class="primaryBtn" onclick="goHome()">⬅ رجوع</button><div class="productGrid">${list.map(productCard).join("")}</div>`;
}

function addToCart(k,u){
  const p=state.products.find(x=>productKey(x)===k);
  const price=effectivePrice(p,u);
  state.cart[k]={name:p.name,qty:parseInt(state.drafts[k]?.qty||1),price,unit:u};
  saveState(); updateCartBadge(); toast("تمت الإضافة");
}
function changeDraftQty(k,d){state.drafts[k]=state.drafts[k]||{qty:1};state.drafts[k].qty=Math.max(1,(state.drafts[k].qty||1)+d);renderCurrentPage()}
function setDraftQty(k,v){state.drafts[k]={qty:Math.max(1,parseInt(v)||1)};saveState()}
function updateCartBadge(){els.footerTotal.textContent=`${Math.round(cartTotal())} ج`}
function goHome(){state.page="home";renderHome()}
function goCart(){state.page="cart";renderCart()}
function renderCart(){
  let h=`<h3>السلة</h3>`+Object.values(state.cart).map(i=>`<div class="sectionCard">${i.name} - ${i.qty} قطعة = ${i.qty*i.price} ج</div>`).join("");
  h+=`<input class="formInput" placeholder="الاسم" oninput="state.customer.name=this.value" value="${state.customer.name}">
      <input class="formInput" placeholder="الهاتف" oninput="state.customer.phone=this.value" value="${state.customer.phone}" style="margin-top:10px">
      <button class="primaryBtn" onclick="sendOrder()" style="margin-top:15px;width:100%">إرسال الطلب واتساب</button>`;
  els.app.innerHTML=h;
}
function sendOrder(){
  const c=state.customer; if(!c.name||!c.phone) return toast("أكمل البيانات","error");
  let t=`طلب من ${c.name}\n`;
  Object.values(state.cart).forEach(i=>t+=`- ${i.name} (${i.qty})\n`);
  t+=`الإجمالي: ${cartTotal()} ج`;
  window.open(`https://wa.me/201040880002?text=${encodeURIComponent(t)}`);
}

function renderTopActions(){
  els.topActions.innerHTML = `
    <button class="topBtn ${state.selectedTier?'active':''}" onclick="goTiers()">🏷️ ${state.selectedTier?tierLabel(state.selectedTier):'الشرائح'}</button>
    <button class="topBtn" onclick="goOffers()">🔥 عروض</button>
    <button class="topBtn" onclick="openRepLogin()">${state.rep?state.rep.repName:'دخول مندوب'}</button>
  `;
}
function goTiers(){
  let h=`<button class="primaryBtn" onclick="goHome()">⬅ رجوع</button><div class="tierGrid">`;
  state.tiers.forEach(t=>{
    h+=`<div class="tierCard"><h4>${tierLabel(t)}</h4><p>حد أدنى: ${t.tier_min} ج</p><button class="addBtn" onclick="selectTier('${tierKey(t)}')">تفعيل</button></div>`;
  });
  els.app.innerHTML=h+`</div>`;
}
function selectTier(k){
  const t=state.tiers.find(x=>tierKey(x)===k);
  if(tierIsProtected(t)&&!tierIsUnlocked(t)){state.pendingTier=t;els.tierModal.classList.add("show")}
  else activateTier(t);
}
function activateTier(t){state.selectedTier=t;saveState();goHome();toast("تم تفعيل "+tierLabel(t))}
function goOffers(){state.currentBrand="صفقة اليوم";renderBrand()}
function openRepLogin(){els.repModal.classList.add("show")}
function closeRepLogin(){els.repModal.classList.remove("show")}
function closeTierPassword(){els.tierModal.classList.remove("show")}

async function loadData(){
  try{
    const [p,s,r,t]=await Promise.all([fetchCSV(DATA.productsUrl),fetchCSV(DATA.settingsUrl),fetchCSV(DATA.repsUrl),fetchCSV(DATA.tiersUrl)]);
    state.products=p; state.settings=s; state.reps=r; state.tiers=t;
    buildBrandImageCache(); state.loading=false; renderCurrentPage(); updateCartBadge();
  }catch(e){toast("خطأ في الاتصال","error")}
}
function renderCurrentPage(){if(state.page==="brand")renderBrand();else if(state.page==="cart")renderCart();else renderHome()}

window.onload = loadData;
</script>
</body>
</html>
